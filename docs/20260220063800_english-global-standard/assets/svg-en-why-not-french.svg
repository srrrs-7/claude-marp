<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="370" fill="#1a1a2e"/>
  <text x="400" y="30" fill="#ffffff" font-size="17" font-family="sans-serif" text-anchor="middle" font-weight="bold">なぜフランス語でなく英語か — 分岐点の比較</text>
  <!-- Left: French -->
  <rect x="40" y="55" width="320" height="270" rx="10" fill="#16213e" stroke="#aaaaaa" stroke-width="1.5"/>
  <text x="200" y="85" fill="#aaaaaa" font-size="15" font-family="sans-serif" text-anchor="middle" font-weight="bold">フランス語の可能性</text>
  <text x="200" y="115" fill="#aaaaaa" font-size="11" font-family="sans-serif" text-anchor="middle">18世紀: 外交・文化の共通語</text>
  <text x="200" y="137" fill="#aaaaaa" font-size="11" font-family="sans-serif" text-anchor="middle">ヨーロッパ宮廷で広く使用</text>
  <text x="200" y="159" fill="#aaaaaa" font-size="11" font-family="sans-serif" text-anchor="middle">植民地: 北米・アフリカ・東南アジア</text>
  <text x="200" y="195" fill="#e91e63" font-size="11" font-family="sans-serif" text-anchor="middle">✗ ナポレオン敗北（1815）</text>
  <text x="200" y="215" fill="#e91e63" font-size="11" font-family="sans-serif" text-anchor="middle">✗ 米国が英語圏で独立</text>
  <text x="200" y="235" fill="#e91e63" font-size="11" font-family="sans-serif" text-anchor="middle">✗ 産業革命は英国から</text>
  <text x="200" y="295" fill="#888888" font-size="12" font-family="sans-serif" text-anchor="middle">歴史の転換点で敗退</text>
  <!-- Right: English -->
  <rect x="440" y="55" width="320" height="270" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2.5"/>
  <text x="600" y="85" fill="#f9a825" font-size="15" font-family="sans-serif" text-anchor="middle" font-weight="bold">英語の実際の歴史</text>
  <text x="600" y="115" fill="#ffffff" font-size="11" font-family="sans-serif" text-anchor="middle">産業革命（1760-）: 英国優位</text>
  <text x="600" y="137" fill="#ffffff" font-size="11" font-family="sans-serif" text-anchor="middle">大英帝国: 植民地5大陸に展開</text>
  <text x="600" y="159" fill="#ffffff" font-size="11" font-family="sans-serif" text-anchor="middle">米国覇権（1945〜）: 経済・軍事</text>
  <text x="600" y="195" fill="#f9a825" font-size="11" font-family="sans-serif" text-anchor="middle">✓ ハリウッド・ポップカルチャー</text>
  <text x="600" y="215" fill="#f9a825" font-size="11" font-family="sans-serif" text-anchor="middle">✓ インターネット（ARPANET）</text>
  <text x="600" y="235" fill="#f9a825" font-size="11" font-family="sans-serif" text-anchor="middle">✓ 科学論文の国際言語</text>
  <text x="600" y="295" fill="#f9a825" font-size="12" font-family="sans-serif" text-anchor="middle">覇権が言語を選んだ</text>
  <text x="400" y="350" fill="#888888" font-size="11" font-family="sans-serif" text-anchor="middle">言語の普及 = ネットワーク効果 × 政治力 × 経済力</text>
</svg>