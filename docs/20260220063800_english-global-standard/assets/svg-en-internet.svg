<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="370" fill="#1a1a2e"/>
  <text x="400" y="30" fill="#ffffff" font-size="17" font-family="sans-serif" text-anchor="middle" font-weight="bold">インターネットが英語支配を固定化した経緯</text>
  <!-- Timeline -->
  <line x1="80" y1="190" x2="720" y2="190" stroke="#f9a825" stroke-width="2.5"/>
  <!-- Arrow head -->
  <polygon points="720,190 705,183 705,197" fill="#f9a825"/>
  <!-- Events -->
  <circle cx="130" cy="190" r="8" fill="#f9a825"/>
  <line x1="130" y1="190" x2="130" y2="120" stroke="#f9a825" stroke-width="1.5"/>
  <rect x="55" y="65" width="155" height="50" rx="5" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="132" y="85" fill="#f9a825" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">1969</text>
  <text x="132" y="103" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">ARPANET誕生</text>
  <circle cx="280" cy="190" r="8" fill="#f9a825"/>
  <line x1="280" y1="190" x2="280" y2="260" stroke="#f9a825" stroke-width="1.5"/>
  <rect x="205" y="265" width="155" height="50" rx="5" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="282" y="283" fill="#f9a825" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">1991</text>
  <text x="282" y="301" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">WWW公開（英語で）</text>
  <circle cx="430" cy="190" r="8" fill="#e91e63"/>
  <line x1="430" y1="190" x2="430" y2="120" stroke="#e91e63" stroke-width="1.5"/>
  <rect x="355" y="65" width="155" height="50" rx="5" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="432" y="85" fill="#e91e63" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">1998</text>
  <text x="432" y="103" fill="#ffffff" font-size="10" font-family="sans-serif" text-anchor="middle">Google創業（英語UI）</text>
  <circle cx="580" cy="190" r="8" fill="#e91e63"/>
  <line x1="580" y1="190" x2="580" y2="260" stroke="#e91e63" stroke-width="1.5"/>
  <rect x="505" y="265" width="155" height="50" rx="5" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="582" y="283" fill="#e91e63" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">2004〜</text>
  <text x="582" y="301" fill="#ffffff" font-size="10" font-family="sans-serif" text-anchor="middle">SNS・GitHub・AI標準語</text>
  <!-- stats box -->
  <rect x="200" y="130" width="400" height="42" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="400" y="152" fill="#f9a825" font-size="12" font-family="sans-serif" text-anchor="middle" font-weight="bold">Webコンテンツの約55%が英語（2024年）</text>
  <text x="400" y="166" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">英語母語話者は世界人口の5% — 圧倒的な不均衡</text>
  <text x="400" y="350" fill="#888888" font-size="11" font-family="sans-serif" text-anchor="middle">技術プラットフォームのデフォルト言語 → 言語のロックイン</text>
</svg>