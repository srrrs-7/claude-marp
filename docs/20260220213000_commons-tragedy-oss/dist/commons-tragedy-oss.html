 fill="#aaaaaa" font-size="11" font-family="sans-serif">• 貢献はほぼゼロ</text><text x="470" y="236" fill="#aaaaaa" font-size="11" font-family="sans-serif">• リスクはメンテナ負担</text><text x="470" y="275" fill="#e91e63" font-size="12" font-family="sans-serif" font-weight="bold">「無料で当然」という意識</text></svg></li>

<h1 id="%E3%83%A1%E3%83%B3%E3%83%86%E3%83%8A%E3%81%AE%E5%A3%B022">メンテナの声（2/2）</h1>
<blockquote>
<p><em>善意だけでは続かない——持続可能なモデルへの転換が急務だ</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 360" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="360" fill="#1a1a2e" /><text x="400" y="28" text-anchor="middle" fill="#f9a825" font-size="16" font-weight="bold" font-family="sans-serif">メンテナの声：限界のバーンアウト</text><rect x="40" y="50" width="340" height="100" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="1.5" /><text x="210" y="75" text-anchor="middle" fill="#e91e63" font-size="12" font-weight="bold" font-family="sans-serif">OpenSSLメンテナ（2014年Heartbleed後）</text><text x="60" y="100" fill="#aaaaaa" font-size="11" font-family="sans-serif" xml:space="preserve">「私は週に20時間以上、無償で働いている。</text><text x="60" y="118" fill="#aaaaaa" font-size="11" font-family="sans-serif">世界中のHTTPS通信を支えているが、</text><text x="60" y="136" fill="#e91e63" font-size="11" font-family="sans-serif">誰も感謝しない。バグが出ると非難だけ来る。」</text><rect x="420" y="50" width="340" height="100" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="1.5" /><text x="590" y="75" text-anchor="middle" fill="#e91e63" font-size="12" font-weight="bold" font-family="sans-serif">curl作者 Daniel Stenberg</text><text x="440" y="100" fill="#aaaaaa" font-size="11" font-family="sans-serif">「私は27年間curlをメンテしてきた。</text><text x="440" y="118" fill="#aaaaaa" font-size="11" font-family="sans-serif">毎週無数のバグ報告に対応する。</text><text x="440" y="136" fill="#e91e63" font-size="11" font-family="sans-serif">助けを求めると『あなたの仕事でしょ』と言われる。」</text><rect x="40" y="170" width="340" height="100" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="1.5" /><text x="210" y="195" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold" font-family="sans-serif">左-pad事件（2016年）</text><text x="60" y="220" fill="#ffffff" font-size="11" font-family="sans-serif">たった1人のメンテナが全npm依存を削除。</text><text x="60" y="238" fill="#ffffff" font-size="11" font-family="sans-serif">数千のプロジェクトが即座にビルド不能に。</text><text x="60" y="256" fill="#f9a825" font-size="11" font-family="sans-serif">→ コモンズの依存がいかに深いかを露わに</text><rect x="420" y="170" width="340" height="160" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="1.5" /><text x="590" y="195" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold" font-family="sans-serif">構造的解決への示唆</text><rect x="438" y="208" width="304" height="30" rx="5" fill="#1a1a2e" /><text x="590" y="228" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">受益する企業による持続的な資金提供</text><rect x="438" y="246" width="304" height="30" rx="5" fill="#1a1a2e" /><text x="590" y="266" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">マルチメンテナ体制の構築</text><rect x="438" y="284" width="304" height="30" rx="5" fill="#f9a825" fill-opacity="0.15" /><text x="590" y="304" text-anchor="middle" fill="#f9a825" font-size="11" font-family="sans-serif">依存関係の可視化と責任の明確化</text></svg></li>
<li>
<blockquote>
<p>「GitHub Sponsorsで月$200もらっている。このライブラリを使う企業の時価総額は合計で数兆ドルだ」</p>
</blockquote>
</li>
<li></li>
<li>
<blockquote>
<p>「xzの件で学んだのは、疲れ切ったメンテナは最大のセキュリティホールだということ」</p>
</blockquote>
</li>
<li></li>
<li>— 匿名のOSSメンテナたちの証言</li>
</ul>
