験に最適</text><rect x="30" y="190" width="340" height="80" fill="#0d1b2a" stroke="#1565c0" stroke-width="1.5" rx="6" /><text x="200" y="215" font-family="sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="normal">Session A → Turn 1,2,3...N</text><text x="200" y="235" font-family="sans-serif" font-size="10" fill="#90caf9" text-anchor="middle" font-weight="normal">sessionId: user-123-session-abc</text><text x="200" y="253" font-family="sans-serif" font-size="10" fill="#888899" text-anchor="middle" font-weight="normal">終了後データは破棄</text><rect x="430" y="190" width="340" height="80" fill="#0d1b2a" stroke="#6a1b9a" stroke-width="1.5" rx="6" /><text x="600" y="215" font-family="sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="normal">Session A → Summary saved</text><text x="600" y="235" font-family="sans-serif" font-size="11" fill="#ce93d8" text-anchor="middle" font-weight="normal">Session B → 過去記憶を参照</text><text x="600" y="253" font-family="sans-serif" font-size="10" fill="#888899" text-anchor="middle" font-weight="normal">memoryId: user-123 (永続)</text><line x1="200" y1="270" x2="200" y2="275" stroke="#f9a825" stroke-width="2.5" /><polygon points="200,285 195,275 205,275" fill="#f9a825" /><line x1="600" y1="270" x2="600" y2="275" stroke="#f9a825" stroke-width="2.5" /><polygon points="600,285 595,275 605,275" fill="#f9a825" /><rect x="30" y="285" width="740" height="50" fill="#0a0f1c" stroke="#333366" stroke-width="1.5" rx="6" /><text x="400" y="308" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal">試験ポイント: 複数セッションにまたがるユーザー記憶が必要 → Memory機能 (memoryId)</text></svg></li>
