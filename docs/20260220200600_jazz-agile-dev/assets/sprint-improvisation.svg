<svg viewBox="0 0 800 400" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#f9a825">ジャズのパフォーマンス構造 vs アジャイルスプリント</text>
  <!-- Jazz column header -->
  <rect x="40" y="50" width="320" height="44" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="200" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#f9a825">ジャズ演奏</text>
  <!-- Agile column header -->
  <rect x="440" y="50" width="320" height="44" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="600" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#e91e63">アジャイルスプリント</text>
  <!-- Divider -->
  <line x1="400" y1="94" x2="400" y2="360" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <!-- Row 1: Theme -->
  <rect x="50" y="108" width="300" height="42" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="200" y="128" text-anchor="middle" font-size="12" fill="#f9a825">テーマ提示（Head）</text>
  <text x="200" y="143" text-anchor="middle" font-size="11" fill="#ffffff">メロディと構造を共有する</text>
  <rect x="450" y="108" width="300" height="42" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="600" y="128" text-anchor="middle" font-size="12" fill="#e91e63">スプリントプランニング</text>
  <text x="600" y="143" text-anchor="middle" font-size="11" fill="#ffffff">目標とタスクを合意する</text>
  <!-- Row 2: Solo -->
  <rect x="50" y="165" width="300" height="42" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="200" y="185" text-anchor="middle" font-size="12" fill="#f9a825">即興ソロ（Improvisation）</text>
  <text x="200" y="200" text-anchor="middle" font-size="11" fill="#ffffff">制約の中で自由に創造する</text>
  <rect x="450" y="165" width="300" height="42" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="600" y="185" text-anchor="middle" font-size="12" fill="#e91e63">スプリント実行</text>
  <text x="600" y="200" text-anchor="middle" font-size="11" fill="#ffffff">アーキテクチャ内で自律開発</text>
  <!-- Row 3: Response -->
  <rect x="50" y="222" width="300" height="42" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="200" y="242" text-anchor="middle" font-size="12" fill="#f9a825">コール＆レスポンス</text>
  <text x="200" y="257" text-anchor="middle" font-size="11" fill="#ffffff">他の演奏者に反応する</text>
  <rect x="450" y="222" width="300" height="42" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="600" y="242" text-anchor="middle" font-size="12" fill="#e91e63">デイリースクラム</text>
  <text x="600" y="257" text-anchor="middle" font-size="11" fill="#ffffff">チームの状況に適応する</text>
  <!-- Row 4: Coda -->
  <rect x="50" y="279" width="300" height="42" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="200" y="299" text-anchor="middle" font-size="12" fill="#f9a825">テーマ回帰（Coda）</text>
  <text x="200" y="314" text-anchor="middle" font-size="11" fill="#ffffff">元の構造に戻って締める</text>
  <rect x="450" y="279" width="300" height="42" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="600" y="299" text-anchor="middle" font-size="12" fill="#e91e63">スプリントレビュー＋振り返り</text>
  <text x="600" y="314" text-anchor="middle" font-size="11" fill="#ffffff">成果を確認・次に活かす</text>
  <!-- Bottom -->
  <text x="400" y="374" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.6">「計画」が枠組みで「即興」が実装 — 両者の本質は同じ</text>
</svg>
