<li>地政学・規制・市場競争によって、単一のグローバルネットワークが複数の<strong>閉じたサブネットワーク</strong>へ分断される現象</li>

<th>例</th>
</tr>

<td>GDPR、データローカライゼーション</td>
</tr>
<tr>
<td><strong>技術的</strong></td>

</tr>
<tr>

</tr>

<div class="fig">
<svg viewBox="0 0 800 400" style="display:block;margin:0 auto;display:block;width:100%;height:100%;max-width:100%;max-height:100%;margin:0 auto;letter-spacing:0;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><text x="400" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">BGPハイジャック：2010年中国Telecomの事例</text><rect x="40" y="65" width="180" height="60" rx="8" fill="#16213e" stroke="#4CAF50" stroke-width="2" /><text x="130" y="98" text-anchor="middle" font-size="12" fill="#4CAF50">米国ユーザー</text><rect x="580" y="65" width="180" height="60" rx="8" fill="#16213e" stroke="#2196F3" stroke-width="2" /><text x="670" y="98" text-anchor="middle" font-size="12" fill="#2196F3">米国サーバー</text><rect x="310" y="180" width="180" height="60" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="3" /><text x="400" y="208" text-anchor="middle" font-size="12" fill="#e91e63">中国Telecom</text><text x="400" y="226" text-anchor="middle" font-size="10" fill="#aaaaaa">「最短経路」と偽って広告</text><rect x="40" y="300" width="700" height="65" rx="8" fill="#1a0a0a" stroke="#f9a825" stroke-width="2" /><text x="400" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9a825">15分間で何が起きたか</text><text x="400" y="348" text-anchor="middle" font-size="11" fill="#ffffff">米国内トラフィックが中国を経由 → パケット傍受・遅延・通信内容の露出リスク</text><line x1="220" y1="95" x2="308" y2="195" stroke="#e91e63" stroke-width="2" stroke-dasharray="6,3" /><polygon points="305,193 313,201 303,206" fill="#e91e63" /><text x="240" y="160" font-size="10" fill="#e91e63">ハイジャック経路</text><line x1="490" y1="195" x2="578" y2="95" stroke="#e91e63" stroke-width="2" stroke-dasharray="6,3" /><polygon points="573,98 583,93 580,105" fill="#e91e63" /><line x1="220" y1="95" x2="578" y2="95" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,4" /><text x="400" y="80" font-size="10" fill="#4CAF50">正常な直接経路（存在するが無視された）</text></svg>

<li><strong>2022年</strong>: ロシア制裁後、BGP経路変更による一部サービス遅延</li>
<li><strong>リスク</strong>: 意図的なルート変更 → 中間者攻撃・盗聴・遅延の可能性</li>
<li><strong>対策</strong>: RPKI（Resource Public Key Infrastructure）による経路正当性検証</li>

="11" fill="#4CAF50">クライアント</text><rect x="190" y="225" width="120" height="50" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="2" /><text x="250" y="248" text-anchor="middle" font-size="11" fill="#e91e63">国家管理</text><text x="250" y="265" text-anchor="middle" font-size="11" fill="#e91e63">DNS Resolver</text><rect x="340" y="225" width="120" height="50" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="2" /><text x="400" y="248" text-anchor="middle" font-size="11" fill="#e91e63">偽のレスポンス</text><text x="400" y="265" text-anchor="middle" font-size="10" fill="#aaaaaa">NXDOMAIN / 偽IP</text><rect x="490" y="225" width="120" height="50" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="2" /><text x="550" y="248" text-anchor="middle" font-size="11" fill="#e91e63">接続失敗</text><text x="550" y="265" text-anchor="middle" font-size="10" fill="#aaaaaa">or 偽サイト</text><line x1="160" y1="250" x2="188" y2="250" stroke="#e91e63" stroke-width="2" /><polygon points="185,245 195,250 185,255" fill="#e91e63" /><line x1="310" y1="250" x2="338" y2="250" stroke="#e91e63" stroke-width="2" /><polygon points="335,245 345,250 335,255" fill="#e91e63" /><line x1="460" y1="250" x2="488" y2="250" stroke="#e91e63" stroke-width="2" /><polygon points="485,245 495,250 485,255" fill="#e91e63" /><text x="400" y="365" text-anchor="middle" font-size="11" fill="#f9a825">DoH/DoTはDNS汚染を回避できるが、それ自体が規制の標的になっている</text></svg>

<ul>

<li><strong>中国の独自TLD</strong>: <code>.政務</code>（.zhengwu）等の国内専用ドメイン</li>
<li><strong>ロシアの試み</strong>: 国家管理DNSルートサーバー（ICCANから独立可能な構造）</li>
<li><strong>DoH/DoT（DNS over HTTPS/TLS）</strong>: プライバシー保護目的だが、国家フィルタリングを回避するため規制の対象に</li>
</ul>

    overflow: hidden;
  }
  section &gt; * { flex: 0 0 auto; min-width: 0; }
  section * { max-width: 100%; box-sizing: border-box; }
  section h1 { overflow-wrap: break-word; word-break: break-word; }

  /* ── Auto-fit ─────────────────────────────────────────────
     Applied per slide by estimateFit() when the text would otherwise be
     clipped. Text cannot shrink itself the way a diagram can. */
  section.fit-94 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.94); }
  section.fit-88 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.88); }
  section.fit-82 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.82); }
  section.fit-76 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.76); }
  section.fit-70 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.7); }
  section.fit-64 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.64); }
  section.fit-58 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.58); }

  /* ── Readability ──────────────────────────────────────── */
  section li {
    line-height: 1.5;
    margin-bottom: 0.1em;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  section p { line-height: 1.7; overflow-wrap: break-word; }

  /* ── Figures (inline SVG + standalone images) ─────────────
     `vh` is deliberately not used anywhere here. Marp scales the slide with a
     CSS transform, so vh resolves against the browser window rather than the
     slide — on a tall window `max-height:70vh` exceeds the whole slide and
     caps nothing. These blocks are bounded by flex layout instead. */
  section &gt; .fig,
  section &gt; p:has(&gt; img) {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0.2em 0;
  }
  /* The SVG fills the wrapper; preserveAspectRatio letterboxes the drawing
     inside it, so it scales down instead of overflowing. */
  section &gt; .fig &gt; svg {
    display: block;
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
  }

  section &gt; p:has(&gt; img) &gt; img {

    max-width: 100% !important;
    object-fit: contain;
    height: auto;
    width: auto;
  }
  /* Fallback for images/SVGs that are not a direct child of the section

  section img, section svg { max-width: 100%; }

  /* ── Code blocks ──────────────────────────────────────── */
  section pre { overflow: hidden; }
  section pre code { font-size: 0.58em; line-height: 1.4; overflow-wrap: break-word; }

  /* ── Tables ───────────────────────────────────────────── */
  section table {
    font-size: 0.78em;
    width: 100%;
    overflow: hidden;
    word-break: break-word;
    border-collapse: collapse;
  }
  section th, section td {
    padding: 0.35em 0.6em;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  /* ── Subtitle / BLUF callout (blockquote) ─────────────── */
  section blockquote {
    font-size: 0.88em;
    line-height: 1.55;
    padding: 0.25em 0.8em;
    margin: 0.15em 0 0.35em;
    opacity: 0.88;
    overflow-wrap: break-word;
  }
  section blockquote p { margin: 0; }
