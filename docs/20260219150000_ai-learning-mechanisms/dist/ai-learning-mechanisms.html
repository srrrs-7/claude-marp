<header>AIの学習の仕組み</header>
<h1 id="%E6%95%99%E5%B8%AB%E3%81%82%E3%82%8A%E5%AD%A6%E7%BF%92%E3%81%AE%E5%AE%9A%E5%BC%8F%E5%8C%96">教師あり学習の定式化</h1>
<blockquote>
<p><em>汎化誤差の最小化が目標—経験的リスクと期待リスクのギャップを埋める</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 260" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="260" fill="#1a1a2e" />
<text x="400" y="26" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">教師あり学習の定式化</text>

<rect x="60" y="60" width="680" height="60" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<text x="400" y="86" text-anchor="middle" fill="#f9a825" font-size="14" font-family="monospace">f: X → Y</text>
<text x="400" y="110" text-anchor="middle" fill="#ffffff" font-size="11">訓練データ {(xᵢ, yᵢ)} から関数 f を学習</text>

<rect x="60" y="145" width="200" height="70" rx="4" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<text x="160" y="168" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold">仮説空間 H</text>
<text x="160" y="188" text-anchor="middle" fill="#ffffff" font-size="10">モデルアーキテクチャ</text>
<text x="160" y="205" text-anchor="middle" fill="#ffffff" font-size="10">パラメータ空間</text>
<rect x="300" y="145" width="200" height="70" rx="4" fill="#16213e" stroke="#e91e63" stroke-width="1.5" />
<text x="400" y="168" text-anchor="middle" fill="#e91e63" font-size="11" font-weight="bold">損失関数 L</text>
<text x="400" y="188" text-anchor="middle" fill="#ffffff" font-size="10">予測誤差の測定</text>
<text x="400" y="205" text-anchor="middle" fill="#ffffff" font-size="10">MSE / CrossEntropy</text>
<rect x="540" y="145" width="200" height="70" rx="4" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<text x="640" y="168" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold">最適化 O</text>
<text x="640" y="188" text-anchor="middle" fill="#ffffff" font-size="10">損失最小化</text>
<text x="640" y="205" text-anchor="middle" fill="#ffffff" font-size="10">SGD / Adam</text>
</li>
</ul>
</svg>
- 入力 x ∈ X, 出力 y ∈ Y, 仮説クラス H から h: X→Y を選択
- **経験的リスク**: R̂(h) = (1/n) Σ L(h(xᵢ), yᵢ)
- **期待リスク**: R(h) = E_{(x,y)~D}[L(h(x), y)] — 真の目標
- **汎化誤差**: R(h) − R̂(h) が小さいほど良い汎化
- 主なタスク: 分類 / 回帰 / 系列ラベリング / 構造予測
- 決定境界の複雑さとサンプル数のトレードオフが鍵

<header>AIの学習の仕組み</header>
<h1 id="%E6%95%99%E5%B8%AB%E3%81%AA%E3%81%97%E3%83%BB%E8%87%AA%E5%B7%B1%E6%95%99%E5%B8%AB%E3%81%82%E3%82%8A%E5%AD%A6%E7%BF%92">教師なし・自己教師あり学習</h1>
<blockquote>
<p><em>教師なし学習は密度構造の発見、自己教師あり学習は自動プレテキストで代替</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 240" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="240" fill="#1a1a2e" />
<text x="400" y="28" text-anchor="middle" fill="#f9a825" font-size="14" font-family="sans-serif">学習パラダイム比較</text>
<rect x="30" y="50" width="220" height="165" rx="8" fill="#16213e" stroke="#888" stroke-width="1.5" />
<text x="140" y="80" text-anchor="middle" fill="#888" font-size="12" font-family="sans-serif">教師あり学習</text>
<text x="140" y="103" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">ラベル付きデータ必須</text>
<text x="140" y="121" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">分類・回帰</text>
<text x="140" y="145" text-anchor="middle" fill="#888" font-size="28" font-family="sans-serif">🏷</text>
<rect x="290" y="50" width="220" height="165" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2" />
<text x="400" y="80" text-anchor="middle" fill="#f9a825" font-size="12" font-family="sans-serif">教師なし学習</text>
<text x="400" y="103" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">ラベルなし・構造発見</text>
<text x="400" y="121" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">クラスタリング・次元削減</text>
<text x="400" y="145" text-anchor="middle" fill="#f9a825" font-size="28" font-family="sans-serif">🔍</text>
<rect x="550" y="50" width="220" height="165" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2" />
<text x="660" y="80" text-anchor="middle" fill="#e91e63" font-size="12" font-family="sans-serif">自己教師あり学習</text>
<text x="660" y="103" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">データ自体がラベル</text>
<text x="660" y="121" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">マスク・穴埋め予測</text>
<text x="660" y="145" text-anchor="middle" fill="#e91e63" font-size="28" font-family="sans-serif">🤖</text>
<text x="660" y="195" text-anchor="middle" fill="#e91e63" font-size="10" font-family="sans-serif">LLM 事前学習の基盤</text>
</li>
</ul>
</svg>
- **教師なし**: ラベルなしデータ p(x) の構造を発見
- クラスタリング (K-means, DBSCAN): 密度に基づく分離
- 次元削減 (PCA, t-SNE, UMAP): 潜在空間 z ∈ Z の学習
- 生成モデル (VAE, GAN): p(x) = ∫ p(x|z)p(z)dz の近似
- **自己教師あり**: データ自身からプレテキストタスクを自動生成
- 例: マスクトークン予測 / 画像回転予測 / 対照学習

<header>AIの学習の仕組み</header>
<h1 id="%E5%BC%B7%E5%8C%96%E5%AD%A6%E7%BF%92%E3%81%AE%E5%9F%BA%E7%A4%8E">強化学習の基礎</h1>
<blockquote>
<p><em>MDP×ベルマン方程式でQ</em>を求めRLHFや自律エージェントの基盤を形成*</p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 260" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="260" fill="#1a1a2e" />
<text x="400" y="26" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">強化学習の基礎 — MDP</text>

<ellipse cx="200" cy="140" rx="80" ry="60" fill="#16213e" stroke="#f9a825" stroke-width="2" />
<text x="200" y="135" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold">Agent</text>
<text x="200" y="155" text-anchor="middle" fill="#ffffff" font-size="10">π(a|s)</text>
<ellipse cx="600" cy="140" rx="80" ry="60" fill="#16213e" stroke="#e91e63" stroke-width="2" />
<text x="600" y="135" text-anchor="middle" fill="#e91e63" font-size="12" font-weight="bold">Environment</text>
<text x="600" y="155" text-anchor="middle" fill="#ffffff" font-size="10">P(s'|s,a)</text>

<line x1="280" y1="120" x2="520" y2="120" stroke="#f9a825" stroke-width="2" />
<polygon points="520,120 506,113 506,127" fill="#f9a825" />
<text x="400" y="113" text-anchor="middle" fill="#f9a825" font-size="11">Action a</text>

<line x1="520" y1="160" x2="280" y2="160" stroke="#e91e63" stroke-width="2" />
<polygon points="280,160 294,153 294,167" fill="#e91e63" />
<text x="400" y="178" text-anchor="middle" fill="#e91e63" font-size="11">Reward r  +  State s'</text>

<text x="400" y="225" text-anchor="middle" fill="#f9a825" font-size="11">目標: 累積報酬 G = Σ γᵗ rₜ を最大化する方策 π を学習</text>
</li>
</ul>
</svg>
- **マルコフ決定過程 (MDP)**: (S, A, P, R, γ) の5タプルで定義
- 目標: 期待累積報酬 E[Σ γᵗ rₜ] の最大化 (γ: 割引率)
- **方策 π(a|s)**: 状態から行動確率への写像
- **Q 関数**: Q^π(s,a) = E[Σ γᵗ rₜ | s₀=s, a₀=a]
- **ベルマン方程式**: Q*(s,a) = r + γ max_{a'} Q*(s',a')
- 応用: ゲームAI (AlphaGo) / ロボティクス / RLHF

<header>AIの学習の仕組み</header>
<h1 id="%E6%B1%8E%E5%8C%96%E8%AA%A4%E5%B7%AE%E3%81%A8%E9%81%8E%E5%AD%A6%E7%BF%92">汎化誤差と過学習</h1>
<blockquote>
<p><em>過学習は訓練データの記憶—k-foldとテスト一回限り使用が汎化の鉄則</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 260" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="260" fill="#1a1a2e" />
<text x="400" y="26" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">汎化誤差と過学習</text>

<line x1="80" y1="220" x2="740" y2="220" stroke="#ffffff" stroke-width="1.5" />
<line x1="80" y1="50" x2="80" y2="220" stroke="#ffffff" stroke-width="1.5" />
<text x="415" y="240" text-anchor="middle" fill="#ffffff" font-size="11">学習エポック数</text>
<text x="56" y="135" text-anchor="middle" fill="#ffffff" font-size="10" transform="rotate(-90,56,135)">損失</text>

<polyline points="80,200 150,175 220,150 300,120 380,95 460,75 540,60 620,50 700,44"
  fill="none" stroke="#f9a825" stroke-width="2.5" />
<text x="710" y="42" fill="#f9a825" font-size="10">訓練損失</text>

<polyline points="80,200 150,170 220,145 300,120 380,105 460,105 540,115 620,130 700,148"
  fill="none" stroke="#e91e63" stroke-width="2.5" />
<text x="710" y="150" fill="#e91e63" font-size="10">検証損失</text>

<line x1="460" y1="50" x2="460" y2="220" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4" opacity="0.7" />
<text x="460" y="44" text-anchor="middle" fill="#f9a825" font-size="10">最適点</text>

<text x="580" y="195" text-anchor="middle" fill="#e91e63" font-size="10">過学習領域</text>
</li>
</ul>
</svg>
- **汎化誤差** = 期待リスク − 経験的リスク (理想は 0 に近い)
- **過学習**: 訓練損失 ↓ だが汎化損失 ↑ — 訓練データを記憶
- **過小適合**: モデル表現力が不足 — 両方の損失が高い
- 原因: 訓練データ不足 / モデル過複雑 / 正則化不足
- k-fold クロスバリデーション: 小データでの分散低減に有効
- テストセットは一度だけ使用 — 複数回使うと過楽観なバイアス

<header>AIの学習の仕組み</header>
<h1 id="%E6%AD%A3%E5%89%87%E5%8C%96%E6%89%8B%E6%B3%95">正則化手法</h1>
<blockquote>
<p><em>L2/L1/Dropout/Early Stopping/Mixup—6種の正則化で過学習を多層防御</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 260" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="260" fill="#1a1a2e" />
<text x="400" y="26" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">正則化手法の比較</text>
<rect x="40" y="55" width="220" height="150" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<text x="150" y="82" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold">L1正則化 (Lasso)</text>
<text x="150" y="107" text-anchor="middle" fill="#ffffff" font-size="10">+ λΣ|wᵢ|</text>
<text x="150" y="130" text-anchor="middle" fill="#ffffff" font-size="10">スパース解</text>
<text x="150" y="152" text-anchor="middle" fill="#f9a825" font-size="9">特徴選択に有効</text>
<text x="150" y="172" text-anchor="middle" fill="#ffffff" font-size="9">不要な重みを0に</text>
<text x="150" y="192" text-anchor="middle" fill="#f9a825" font-size="9">例: テキスト分類</text>
<rect x="290" y="55" width="220" height="150" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<text x="400" y="82" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold">L2正則化 (Ridge)</text>
<text x="400" y="107" text-anchor="middle" fill="#ffffff" font-size="10">+ λΣwᵢ²</text>
<text x="400" y="130" text-anchor="middle" fill="#ffffff" font-size="10">重みを均等に縮小</text>
<text x="400" y="152" text-anchor="middle" fill="#f9a825" font-size="9">滑らかな解</text>
<text x="400" y="172" text-anchor="middle" fill="#ffffff" font-size="9">数値的安定性高い</text>
<text x="400" y="192" text-anchor="middle" fill="#f9a825" font-size="9">例: 線形回帰</text>
<rect x="540" y="55" width="220" height="150" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="2" />
<text x="650" y="82" text-anchor="middle" fill="#e91e63" font-size="12" font-weight="bold">Dropout</text>
<text x="650" y="107" text-anchor="middle" fill="#ffffff" font-size="10">確率 p でニューロン無効化</text>
<text x="650" y="130" text-anchor="middle" fill="#ffffff" font-size="10">アンサンブル効果</text>
<text x="650" y="152" text-anchor="middle" fill="#f9a825" font-size="9">深層学習に必須</text>
<text x="650" y="172" text-anchor="middle" fill="#ffffff" font-size="9">p=0.1〜0.5</text>
<text x="650" y="192" text-anchor="middle" fill="#f9a825" font-size="9">例: Transformer</text>
</li>
</ul>
</svg>
- **L2 正則化 (Weight Decay)**: loss += λ Σ wᵢ² — 重みを小さく保つ
- **L1 正則化 (Lasso)**: loss += λ Σ |wᵢ| — スパース解を誘導
- **Dropout**: 学習時ランダムにニューロンをマスク (p = 0.1〜0.5)
- **Early Stopping**: Validation ロスの最小点で学習を停止
- **Mixup / CutMix**: サンプル間の線形補間で汎化性向上
- **Label Smoothing**: y = 0.9·one_hot + 0.1/K で過信を抑制

<header>AIの学習の仕組み</header>
<h1 id="%E6%90%8D%E5%A4%B1%E9%96%A2%E6%95%B0%E3%81%AE%E7%A8%AE%E9%A1%9E">損失関数の種類</h1>
<blockquote>
<p><em>MSE/CE/KL/Huber/Focal/InfoNCE—タスクと分布の性質で損失関数を選択</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 260" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="260" fill="#1a1a2e" />
<text x="400" y="26" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">主要な損失関数</text>

<rect x="40" y="55" width="340" height="70" rx="4" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<text x="210" y="78" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold">MSE (Mean Squared Error)</text>
<text x="210" y="97" text-anchor="middle" fill="#ffffff" font-size="10">L = Σ(ŷᵢ - yᵢ)² / n</text>
<text x="210" y="115" text-anchor="middle" fill="#f9a825" font-size="9">回帰問題・外れ値に敏感</text>
<rect x="420" y="55" width="340" height="70" rx="4" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<text x="590" y="78" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold">Cross-Entropy</text>
<text x="590" y="97" text-anchor="middle" fill="#ffffff" font-size="10">L = -Σ yᵢ log(ŷᵢ)</text>
<text x="590" y="115" text-anchor="middle" fill="#f9a825" font-size="9">分類問題・確率出力</text>
<rect x="40" y="145" width="340" height="70" rx="4" fill="#16213e" stroke="#e91e63" stroke-width="1.5" />
<text x="210" y="168" text-anchor="middle" fill="#e91e63" font-size="11" font-weight="bold">Contrastive Loss</text>
<text x="210" y="187" text-anchor="middle" fill="#ffffff" font-size="10">類似ペア近づけ / 非類似遠ざけ</text>
<text x="210" y="205" text-anchor="middle" fill="#f9a825" font-size="9">対照学習 (CLIP, SimCLR)</text>
<rect x="420" y="145" width="340" height="70" rx="4" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<text x="590" y="168" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold">Huber Loss</text>
<text x="590" y="187" text-anchor="middle" fill="#ffffff" font-size="10">MSE + MAEのハイブリッド</text>
<text x="590" y="205" text-anchor="middle" fill="#f9a825" font-size="9">外れ値ロバスト回帰</text>
</li>
</ul>
</svg>
- **MSE**: L = (1/n) Σ (yᵢ − ŷᵢ)² — 回帰の標準、外れ値に敏感
- **Cross-Entropy**: L = −Σ yᵢ log ŷᵢ — 分類の標準、最大尤度推定
- **KL Divergence**: DKL(P‖Q) = Σ P log(P/Q) — 分布間距離
- **Huber Loss**: MSE と MAE のハイブリッド — 外れ値に頑健
- **Focal Loss**: 難サンプルに重みを置く — 不均衡データ向け
- **InfoNCE / Contrastive**: 対照学習の目的関数

<header>AIの学習の仕組み</header>
<h1 id="sgd-%E2%86%92-adam-%E2%86%92-adamw-%E3%81%AE%E9%80%B2%E5%8C%96%E3%82%B3%E3%83%BC%E3%83%89%E4%BE%8B">SGD → Adam → AdamW の進化（コード例）</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Adam optimizer update</span>
m = beta1 * m + (<span class="hljs-number">1</span> - beta1) * grad       <span class="hljs-comment"># 1st moment (mean)</span>
v = beta2 * v + (<span class="hljs-number">1</span> - beta2) * grad**<span class="hljs-number">2</span>    <span class="hljs-comment"># 2nd moment (variance)</span>
m_hat = m / (<span class="hljs-number">1</span> - beta1**t)               <span class="hljs-comment"># bias correction</span>
v_hat = v / (<span class="hljs-number">1</span> - beta2**t)
theta -= lr * m_hat / (sqrt(v_hat) + eps)
<span class="hljs-comment"># AdamW: L2 weight decay を最適化ステップの外に分離</span>
theta -= lr * (m_hat / (sqrt(v_hat) + eps) + weight_decay * theta)
</code></pre>

<header>AIの学習の仕組み</header>
<h1 id="%E5%AD%A6%E7%BF%92%E7%8E%87%E3%82%B9%E3%82%B1%E3%82%B8%E3%83%A5%E3%83%BC%E3%83%AA%E3%83%B3%E3%82%B0">学習率スケジューリング</h1>
<blockquote>
<p><em>Warmup→Cosine Decayの組み合わせがTransformerの学習安定化に不可欠</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 280" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="280" fill="#1a1a2e" />
<text x="400" y="26" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">学習率スケジューリング</text>

<line x1="80" y1="230" x2="740" y2="230" stroke="#ffffff" stroke-width="1.5" />
<line x1="80" y1="50" x2="80" y2="230" stroke="#ffffff" stroke-width="1.5" />
<text x="415" y="252" text-anchor="middle" fill="#ffffff" font-size="11">学習ステップ</text>
<text x="50" y="140" text-anchor="middle" fill="#ffffff" font-size="10" transform="rotate(-90,50,140)">LR</text>

<polyline points="80,220 160,80 240,80 340,95 440,115 540,140 640,175 720,205"
  fill="none" stroke="#f9a825" stroke-width="2.5" />
<text x="730" y="205" fill="#f9a825" font-size="10">Cosine</text>

<polyline points="80,80 260,80 260,130 440,130 440,170 620,170 620,200 720,200"
  fill="none" stroke="#e91e63" stroke-width="2" stroke-dasharray="6" />
<text x="730" y="200" fill="#e91e63" font-size="10">Step</text>

<line x1="80" y1="60" x2="160" y2="60" stroke="#f9a825" stroke-width="1" stroke-dasharray="3" opacity="0.6" />
<line x1="160" y1="60" x2="160" y2="230" stroke="#f9a825" stroke-width="1" stroke-dasharray="3" opacity="0.6" />
<text x="120" y="55" text-anchor="middle" fill="#f9a825" font-size="10">Warmup</text>
</li>
</ul>

- **Warmup**: 初期の不安定な勾配を避けるため学習率を徐々に増加
- **Cosine Decay**: η(t) = η_min + 0.5(η_max−η_min)(1+cos(πt/T))
- **Linear Decay**: シンプルで BERT 系モデルに広く使用
- **OneCycleLR**: 超収束 — 1サイクルで高速学習 (Smith 2018)
- **Inverse Square Root**: Transformer 原論文の手法
- **LR Finder**: 小バッチで sweep して最適学習率を探索

<h1 id="%E6%90%8D%E5%A4%B1%E5%9C%B0%E5%BD%A2%E3%81%A8%E5%B1%80%E6%89%80%E6%9C%80%E9%81%A9%E8%A7%A3">損失地形と局所最適解</h1>
<blockquote>
<p><em>SAMでフラット最小を明示的に探索—シャープ最小より汎化性能が高い</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 300" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">

- **シャープ最小値 vs フラット最小値**: フラットほど汎化が良い傾向

- **Loss Landscape 可視化**: Filter Normalization (Li et al., 2018)
- 過パラメータ化が不思議なほど良い最小値へ収束しやすくする
- ランダム性 (SGD ノイズ) が暗黙的にフラット最小値を選択

<h1 id="%E5%8B%BE%E9%85%8D%E3%82%AF%E3%83%AA%E3%83%83%E3%83%94%E3%83%B3%E3%82%B0%E3%81%A8%E5%AD%A6%E7%BF%92%E5%AE%89%E5%AE%9A%E5%8C%96">勾配クリッピングと学習安定化</h1>
<blockquote>
<p><em>勾配クリッピング+BF16+LayerNormの三点セットがLLM学習安定化の標準</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 240" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="240" fill="#1a1a2e" />
<text x="400" y="28" text-anchor="middle" fill="#f9a825" font-size="14" font-family="sans-serif">勾配クリッピング: 効果の可視化</text>
<text x="240" y="55" text-anchor="middle" fill="#e91e63" font-size="12" font-family="sans-serif">クリッピングなし</text>
<line x1="60" y1="180" x2="420" y2="180" stroke="#444" stroke-width="1" />
<polyline points="80,175 120,170 160,155 200,60 210,175 240,170 260,165 290,155 320,148 360,135 400,130" fill="none" stroke="#e91e63" stroke-width="2" />
<text x="195" y="50" text-anchor="middle" fill="#e91e63" font-size="9" font-family="sans-serif">爆発!</text>
<text x="560" y="55" text-anchor="middle" fill="#f9a825" font-size="12" font-family="sans-serif">クリッピングあり</text>
<line x1="440" y1="180" x2="760" y2="180" stroke="#444" stroke-width="1" />
<polyline points="460,175 500,168 540,160 580,148 620,138 660,130 700,122 740,115" fill="none" stroke="#f9a825" stroke-width="2" />
<line x1="440" y1="100" x2="760" y2="100" stroke="#888" stroke-width="1" stroke-dasharray="4,3" />
<text x="700" y="92" fill="#888" font-size="9" font-family="sans-serif">clip threshold</text>
<text x="400" y="210" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">||grad|| &gt; threshold → grad = grad * (threshold / ||grad||)</text>
</li>
</ul>
</svg>
- **勾配爆発**: 深いNNで勾配が指数的に増大 → 発散
- **Gradient Clipping**: ‖g‖ &gt; τ なら g ← g × (τ/‖g‖)
- **LayerNorm / RMSNorm**: 各層の活性化を正規化して安定化
- **BF16**: FP32 と同じ指数域 — LLM 学習の実質標準
- **Dynamic Loss Scaling**: FP16 のアンダーフロー防止
- Gradient Checkpointing: 活性化を再計算でメモリ節約

<header>AIの学習の仕組み</header>
<h1 id="%E6%B4%BB%E6%80%A7%E5%8C%96%E9%96%A2%E6%95%B0%E3%81%AE%E9%80%B2%E5%8C%96">活性化関数の進化</h1>
<blockquote>
<p><em>ReLUからGELU/SiLUへ—活性化関数の選択でBERT系とLLaMA系が分岐</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 280" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="280" fill="#1a1a2e" />
<text x="400" y="26" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">活性化関数の進化</text>

<line x1="80" y1="170" x2="740" y2="170" stroke="#ffffff" stroke-width="1" opacity="0.5" />
<line x1="400" y1="50" x2="400" y2="260" stroke="#ffffff" stroke-width="1" opacity="0.5" />

<polyline points="80,165 140,160 200,148 260,130 320,110 380,92 400,88 420,88 480,95 540,115 600,135 660,152 720,160 740,163"
  fill="none" stroke="#e91e63" stroke-width="2" />
<text x="745" y="165" fill="#e91e63" font-size="10">σ</text>

<polyline points="80,170 399,170 400,170 740,60"
  fill="none" stroke="#f9a825" stroke-width="2.5" />
<text x="745" y="62" fill="#f9a825" font-size="10">ReLU</text>

<polyline points="80,175 200,172 320,162 380,148 400,145 420,140 480,115 580,80 680,52 740,38"
  fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="5" />
<text x="745" y="42" fill="#ffffff" font-size="10">GELU</text>

<text x="395" y="167" text-anchor="end" fill="#ffffff" font-size="9" opacity="0.5">0</text>
<text x="72" y="174" text-anchor="end" fill="#ffffff" font-size="9" opacity="0.5">x=0</text>

<text x="150" y="255" fill="#e91e63" font-size="10">Sigmoid: 勾配消失問題あり</text>
<text x="400" y="255" text-anchor="middle" fill="#f9a825" font-size="10">ReLU: 高速・シンプル</text>
<text x="650" y="255" fill="#ffffff" font-size="10">GELU: Transformerで主流</text>
</li>
</ul>
</svg>
- **Sigmoid**: σ(z) = 1/(1+e^{−z}) — 勾配消失問題あり
- **tanh**: (e^z − e^{−z})/(e^z + e^{−z}) — 中心化で Sigmoid 改善
- **ReLU**: max(0, z) — 勾配消失を大幅改善 (Krizhevsky 2012)
- **Leaky ReLU**: max(αz, z) — Dead ReLU を防止
- **GELU**: z·Φ(z) — BERT / GPT 系で標準採用
- **SiLU (Swish)**: z·σ(z) — LLaMA / Gemma 系で採用

<header>AIの学習の仕組み</header>
<h1 id="%E3%83%90%E3%83%83%E3%83%81%E6%AD%A3%E8%A6%8F%E5%8C%96-batch-normalization">バッチ正規化 (Batch Normalization)</h1>
<blockquote>
<p><em>BatchNorm→LayerNorm→RMSNormの進化がTransformerの学習効率を決定</em></p>
</blockquote>
<ul>
<li><strong>内部共変量シフト</strong>: 学習中に各層の入力分布が変化する問題</li>
<li><strong>BN 操作</strong>: x̂ = (x−μ_B)/σ_B, y = γx̂+β (学習可能パラメータ γ, β)</li>
<li>効果: 学習安定化 / 高学習率使用可 / 正則化効果</li>
<li><strong>LayerNorm</strong>: バッチでなく特徴次元で正規化 — Transformer で使用</li>
<li><strong>RMSNorm</strong>: γx/RMS(x) — LayerNorm より計算効率が高い</li>
<li><strong>GroupNorm</strong>: チャネルをグループ分けして正規化 — 小バッチでも安定</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="%E3%83%89%E3%83%AD%E3%83%83%E3%83%97%E3%82%A2%E3%82%A6%E3%83%88%E3%81%A8%E6%AD%A3%E5%89%87%E5%8C%96">ドロップアウトと正則化</h1>
<blockquote>
<p><em>LLMではDropoutよりWeight Decayが主流—過学習の種類で手法を選択</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 260" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
<rect width="800" height="260" fill="#1a1a2e" />
<text x="400" y="26" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">バッチ正規化 (Batch Normalization)</text>

<rect x="40" y="60" width="320" height="155" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5" />
<text x="200" y="84" text-anchor="middle" fill="#e91e63" font-size="11" font-weight="bold">BN なし</text>
<text x="200" y="108" text-anchor="middle" fill="#ffffff" font-size="10">各層の入力分布が不安定</text>
<text x="200" y="128" text-anchor="middle" fill="#ffffff" font-size="10">Internal Covariate Shift</text>
<text x="200" y="150" text-anchor="middle" fill="#e91e63" font-size="10">学習率を小さくせざるを得ない</text>
<text x="200" y="170" text-anchor="middle" fill="#e91e63" font-size="10">初期化に敏感</text>
<text x="200" y="192" text-anchor="middle" fill="#e91e63" font-size="10">収束が遅い</text>

<rect x="440" y="60" width="320" height="155" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2" />
<text x="600" y="84" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold">BN あり</text>
<text x="600" y="108" text-anchor="middle" fill="#ffffff" font-size="10">μ=0, σ=1 に正規化</text>
<text x="600" y="128" text-anchor="middle" fill="#ffffff" font-size="10">学習を安定化</text>
<text x="600" y="150" text-anchor="middle" fill="#f9a825" font-size="10">高い学習率が使える</text>
<text x="600" y="170" text-anchor="middle" fill="#f9a825" font-size="10">初期化に頑健</text>
<text x="600" y="192" text-anchor="middle" fill="#f9a825" font-size="10">Dropout代替にもなる</text>

<text x="400" y="240" text-anchor="middle" fill="#ffffff" font-size="11">x̂ = (x - μ) / σ  →  γx̂ + β  (γ, β は学習パラメータ)</text>
</li>
</ul>
</svg>
- **Dropout** (Srivastava 2014): 訓練時に確率 p でユニットをゼロ化
- **アンサンブル解釈**: 指数的な数のサブネットの平均と等価
- **Inverted Dropout**: テスト時に (1−p) 補正で期待値を一致
- **DropPath / Stochastic Depth**: 残差ブランチ全体をドロップ
- LLM では Dropout より Weight Decay が主流
- 過学習の種類に応じた正則化手法の選択が重要

<h1 id="%E6%AE%8B%E5%B7%AE%E6%8E%A5%E7%B6%9A-resnet">残差接続 (ResNet)</h1>
<blockquote>
<p><em>残差接続で勾配の直接経路を確保—152層の超深層化を可能にした鍵</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 240" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">

- **消失勾配問題**: 深いNNで勾配が指数的に縮小する問題
- **残差ブロック**: H(x) = F(x) + x — 恒等写像をスキップ
- 勾配の直接経路: スキップ接続を通じて勾配がダイレクトに流れる
- ResNet-152 で ImageNet SOTA を達成 (He et al., 2016)
- **Pre-Activation ResNet**: BN + ReLU → Conv の順で勾配流改善
- Transformer の残差接続も同じ原理 — 深さへの鍵

<header>AIの学習の仕組み</header>
<h1 id="%E5%88%9D%E6%9C%9F%E5%8C%96%E6%88%A6%E7%95%A5">初期化戦略</h1>
<blockquote>
<p><em>He初期化がReLUの標準—ゼロ初期化の対称性破壊問題を回避する</em></p>
</blockquote>
<ul>
<li>ゼロ初期化の問題: 対称性が破れず全ニューロンが同一更新</li>
<li><strong>Xavier 初期化</strong>: Var(w) = 2/(n_in + n_out) — tanh / sigmoid 向け</li>
<li><strong>He / Kaiming 初期化</strong>: Var(w) = 2/n_in — ReLU 向け (推奨)</li>
<li><strong>LeCun 初期化</strong>: Var(w) = 1/n_in — SELU 活性化と組み合わせ</li>
<li><strong>正規直交初期化</strong>: 勾配ノルムの等尺性保持 (Saxe et al., 2014)</li>
<li>μP (Maximal Update Parameterization): スケール不変の初期化</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="cnn-%E7%95%B3%E3%81%BF%E8%BE%BC%E3%81%BF%E3%81%AE%E4%BB%95%E7%B5%84%E3%81%BF">CNN: 畳み込みの仕組み</h1>
<blockquote>
<p><em>局所受容野×重み共有×特徴マップ積み上げがCNNの3原則</em></p>
</blockquote>
<ul>
<li><strong>局所受容野</strong>: 各フィルタは空間的に局所なパターンを検出</li>
<li><strong>重み共有</strong>: 同じフィルタを全位置に適用 → パラメータ削減</li>
<li>演算: (I * K)(i,j) = Σ_{m,n} I(i+m, j+n)·K(m,n)</li>
<li><strong>ストライド</strong>: フィルタ移動間隔 — 空間解像度を削減</li>
<li><strong>特徴マップの積み上げ</strong>: チャネル数 ↑ × 空間解像度 ↓ が基本設計</li>
<li>受容野 (Receptive Field): 深い層ほど入力の広い領域を統合</li>
</ul>

<h1 id="cnn%E3%81%AE%E9%80%B2%E5%8C%96">CNNの進化</h1>
<blockquote>
<p><em>AlexNet2012→ConvNeXt2022の10年—Transformer設計をCNNに逆輸入</em></p>
</blockquote>
<ul>
<li><strong>AlexNet (2012)</strong>: ReLU + Dropout + GPU — 深層学習の火付け役</li>
<li><strong>VGGNet (2014)</strong>: 3×3 Conv の積み重ね — シンプルかつ深い</li>
<li><strong>GoogLeNet / Inception (2014)</strong>: Inception Module — 多スケール特徴</li>
<li><strong>ResNet (2016)</strong>: 残差接続 — 152層の超深層化を実現</li>
<li><strong>EfficientNet (2019)</strong>: NAS + Compound Scaling — 精度・効率の最前線</li>
<li><strong>ConvNeXt (2022)</strong>: Transformer 設計を CNN に導入</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="rnn--lstm-%E3%81%AE%E4%BB%95%E7%B5%84%E3%81%BF">RNN / LSTM の仕組み</h1>
<blockquote>
<p><em>LSTMの3ゲート+Cell stateが長期依存問題を解決、GRUは2ゲートで軽量化</em></p>
</blockquote>
<ul>
<li><strong>RNN</strong>: h_t = tanh(W_h h_{t-1} + W_x x_t + b)</li>
<li><strong>長期依存問題</strong>: 長いシーケンスで勾配が消失または爆発</li>
<li><strong>LSTM (Hochreiter 1997)</strong>: 忘却ゲート f / 入力ゲート i / 出力ゲート o + Cell state c</li>
<li>セル状態: 長期記憶の担体 — ゲートで制御されて情報を保持</li>
<li><strong>GRU (Cho 2014)</strong>: LSTM を簡略化 — 2 ゲートでパラメータ削減</li>
<li>Seq2Seq + Attention: RNN 時代の機械翻訳標準手法</li>
</ul>

- **RoPE** (Rotary PE): 相対位置を回転行列で表現 — LLaMA / GPT-NeoX
- **ALiBi**: Attention スコアに線形バイアス — 学習超えの長文外挿に強い
- **YaRN / LongRoPE**: コンテキスト長拡張に対応した RoPE 変種

<h1 id="%E8%87%AA%E5%B7%B1%E6%95%99%E5%B8%AB%E3%81%82%E3%82%8A%E5%AD%A6%E7%BF%92%E3%81%AE%E6%A6%82%E5%BF%B5">自己教師あり学習の概念</h1>
<blockquote>
<p><em>ラベルなし大規模データを活用—事前学習品質が下流タスクの上限を決定</em></p>
</blockquote>
<ul>
<li><strong>定義</strong>: データ自身から自動的に監督シグナルを生成する学習枠組み</li>
<li>プレテキストタスク: 回転予測 / ジグソーパズル / 色付け / マスク予測</li>
<li>大規模ラベルなしデータの活用 — 人手アノテーション不要</li>
<li><strong>表現学習の目標</strong>: 下流タスクへの転移学習に有用な汎用表現</li>
<li>自然言語はテキスト自体がプレテキストタスクの宝庫 (次トークン予測)</li>
<li>事前学習の品質が下流タスクの上限を決める</li>
</ul>

<h1 id="%E3%83%9E%E3%82%B9%E3%82%AF%E8%A8%80%E8%AA%9E%E3%83%A2%E3%83%87%E3%83%AA%E3%83%B3%E3%82%B0-bert">マスク言語モデリング (BERT)</h1>
<blockquote>
<p><em>BERTのMLM15%マスクで双方向文脈を学習、RoBERTaでNSP廃止し大幅改善</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 260" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">

<text x="190" y="98" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold">大量のラベルなしデータ</text>

<rect x="460" y="70" width="300" height="80" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2" />
<text x="610" y="98" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold">豊富な特徴表現</text>
<text x="610" y="120" text-anchor="middle" fill="#ffffff" font-size="11">汎用的な埋め込み</text>
<text x="610" y="138" text-anchor="middle" fill="#f9a825" font-size="10">下流タスクに転用可能</text>

<header>AIの学習の仕組み</header>
<h1 id="%E5%AF%BE%E7%85%A7%E5%AD%A6%E7%BF%92-contrastive-learning">対照学習 (Contrastive Learning)</h1>
<blockquote>
<p><em>InfoNCE+SimCLRで類似表現を近づけ、CLIPで画像-テキスト4億ペアから共同表現</em></p>
</blockquote>
<ul>
<li>目標: 類似ペアの表現を近づけ、非類似ペアを遠ざける</li>
<li><strong>InfoNCE Loss</strong>: L = −log[exp(sim(zᵢ,zⱼ)/τ) / Σ_k exp(sim(zᵢ,z_k)/τ)]</li>
<li><strong>SimCLR</strong>: 同画像の2種 Augmentation を正例、バッチ内他を負例</li>
<li><strong>MoCo</strong>: Momentum Encoder + キューで大規模負例を効率管理</li>
<li><strong>CLIP</strong> (Radford 2021): 画像-テキストペア 4億件から共同表現を学習</li>
<li>Hard Negative Mining: 難しい負例ほど表現品質の向上に有効</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="mae--simmim">MAE / SimMIM</h1>
<blockquote>
<p><em>MAEは75%マスク復元で冗長な画像から高品質な視覚表現を獲得</em></p>
</blockquote>
<ul>
<li><strong>MAE</strong> (He 2021): 画像の 75% のパッチをランダムマスク → ピクセル復元</li>
<li>非対称 Encoder-Decoder: 可視パッチのみ Encoder へ入力 → 高速</li>
<li>MAE の洞察: 画像は高度に冗長 → 難しい補完タスクが表現品質向上</li>
<li><strong>SimMIM</strong> (2022): スパース線形ヘッドで raw pixel を直接予測</li>
<li><strong>BEiT</strong>: dVAE 由来の離散トークン予測 — DALL-E の離散 VAE を利用</li>
<li>下流転移: Fine-tuning / Linear Probe で BERT 類似の転移学習</li>
</ul>

- **Process Reward Model (PRM)**: 各推論ステップの正しさを評価
- **GRPO / REINFORCE++**: RL で推論品質を直接最適化

<h1 id="chinchilla-%E3%82%B9%E3%82%B1%E3%83%BC%E3%83%AA%E3%83%B3%E3%82%B0%E5%89%87-2022">Chinchilla スケーリング則 (2022)</h1>
<blockquote>
<p><em>Chinchilla則でN=D∝C^0.5—データとモデルを等比率で増やすべき</em></p>
</blockquote>
<ul>
<li><strong>Hoffmann et al. (2022)</strong>: Kaplan 則への反論 — 最適 N/D 配分の再考</li>
<li>Chinchilla (70B / 1.4T tokens) が GPT-3 (175B / 300B) を凌駕</li>
<li>最適配分: N ∝ C^{0.5}, D ∝ C^{0.5} — モデルとデータを等比率で</li>
<li><strong>D ≈ 20N</strong> が実用的な経験則 (N: パラメータ数)</li>
<li><strong>LLaMA / Mistral</strong>: Chinchilla 則に基づく高効率トレーニング</li>
<li>Llama 3: 405B / 15T tokens — 推論コスト最適化を重視</li>
</ul>

<h1 id="%E3%83%87%E3%83%BC%E3%82%BF%E3%83%BB%E8%A8%88%E7%AE%97%E3%83%BB%E3%83%A2%E3%83%87%E3%83%AB%E3%81%AE%E6%9C%80%E9%81%A9%E9%85%8D%E5%88%86">データ・計算・モデルの最適配分</h1>
<blockquote>
<p><em>Compute-optimalはN∝D、推論効率重視なら小モデル+多データが優位</em></p>
</blockquote>
<ul>
<li>固定計算予算: C ≈ 6ND FLOPs (N: パラメータ数, D: トークン数)</li>
<li>Compute-optimal: N* ∝ C^{0.5}, D* ∝ C^{0.5}</li>
<li><strong>Inference-efficiency 重視</strong>: 推論コストを考慮した小モデル + 多データ</li>
<li><strong>Multi-epoch 訓練</strong>: データ拡張・合成データで無限データ化を目指す</li>
<li>データ反復: 同データの複数エポック — 1〜2 エポックが実用的最大</li>
<li>GPT-4 / Gemini 1.5 Ultra はパラメータを非公開 — 新しい配分の可能性</li>
</ul>

<h1 id="supervised-fine-tuning-sft">Supervised Fine-Tuning (SFT)</h1>
<blockquote>

<header>AIの学習の仕組み</header>
<h1 id="%E5%A0%B1%E9%85%AC%E3%83%A2%E3%83%87%E3%83%AB%E3%81%AE%E5%AD%A6%E7%BF%92">報酬モデルの学習</h1>
<blockquote>
<p><em>報酬ハッキングとOveroptimizationがRLHFの最大リスク、Ensemble RMで緩和</em></p>
</blockquote>
<ul>
<li><strong>Bradley-Terry モデル</strong>: P(y_w &gt; y_l | x) = σ(r(x,y_w) − r(x,y_l))</li>
<li><strong>損失関数</strong>: L = −log σ(r(x,y_w) − r(x,y_l))</li>
<li>RM のアーキテクチャ: SFT モデルに線形ヘッドを追加</li>
<li><strong>Reward Hacking</strong>: RL が RM の弱点を突いてスコアを水増し</li>
<li><strong>Overoptimization</strong>: KL 増大で実際の人間評価が低下する現象</li>
<li><strong>Ensemble RM</strong>: 複数報酬モデルの統計で不確実性を推定</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="ppo-%E6%9C%80%E9%81%A9%E5%8C%96">PPO 最適化</h1>
<blockquote>
<p><em>PPOはClip+KLペナルティで安定学習、4モデル同時管理の複雑さが課題</em></p>
</blockquote>
<ul>
<li><strong>PPO</strong> (Schulman 2017): Clip でポリシー変化を制限して安定学習</li>
<li><strong>クリップ目的</strong>: L = E[min(r_t(θ)·A_t, clip(r_t(θ), 1−ε, 1+ε)·A_t)]</li>
<li>r_t(θ) = π_θ(a_t|s_t) / π_{old}(a_t|s_t): 重要度比</li>
<li>価値関数ネットワーク: 状態価値 V(s) を学習 — Advantage の推定</li>
<li>KL ペナルティ: 参照モデルとの KL 発散をペナルティとして加算</li>
<li>実装の複雑さ: RM / Actor / Critic / Reference の4モデルを同時管理</li>
</ul>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># DPO Loss (Rafailov et al., 2023)</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">dpo_loss</span>(<span class="hljs-params">pi_logp_w, pi_logp_l, ref_logp_w, ref_logp_l, beta=<span class="hljs-number">0.1</span></span>):
    pi_ratio_w = pi_logp_w - ref_logp_w  <span class="hljs-comment"># chosen</span>

<header>AIの学習の仕組み</header>
<h1 id="grpo--reinforce">GRPO / REINFORCE++</h1>
<blockquote>
<p><em>GRPOで価値関数不要、DeepSeek-R1-ZeroがSFTなしで推論能力を自発的に獲得</em></p>
</blockquote>
<ul>
<li><strong>GRPO</strong> (DeepSeek-R1): グループ相対方策最適化 — 価値関数ネットワーク不要</li>
<li>アドバンテージ: グループ内の相対スコアで Advantage を計算</li>
<li><strong>REINFORCE++</strong>: 分散低減のためベースライン付き REINFORCE</li>
<li>数学タスクへの適用: 検証可能な正誤で自動報酬 — 人手評価不要</li>
<li><strong>DeepSeek-R1-Zero</strong>: SFT なしで RL のみで推論能力が自発的に出現</li>
<li>Self-Play: モデルが自らに対して学習 — 能力のブートストラップ</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="%E5%AD%A6%E7%BF%92%E3%83%87%E3%83%BC%E3%82%BF%E3%81%AE%E5%93%81%E8%B3%AA%E3%81%A8%E8%A6%8F%E6%A8%A1">学習データの品質と規模</h1>
<blockquote>
<p><em>データ混合比とコード比率が推論能力を左右—多言語は英語の1/50以下</em></p>
</blockquote>
<ul>
<li><strong>Common Crawl</strong>: 数 PB の Web テキスト — 低品質・有害コンテンツを含む</li>
<li><strong>The Pile</strong> (2021): 多様な高品質ソース 825 GB のキュレーション済みデータ</li>
<li><strong>FineWeb</strong> (2024): CC から高品質フィルタリング — 15T tokens</li>
<li>データ混合比: コードデータが大量に含まれると推論能力が向上</li>
<li><strong>多言語不均衡</strong>: 日本語/中国語等は英語の 1/50 以下</li>
<li>法的問題: 著作権データの扱い — Books3, LibGen 等で訴訟</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="%E3%83%87%E3%83%BC%E3%82%BF%E3%82%AD%E3%83%A5%E3%83%AC%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3%E3%83%91%E3%82%A4%E3%83%97%E3%83%A9%E3%82%A4%E3%83%B3">データキュレーションパイプライン</h1>
<blockquote>
<p><em>言語識別→重複排除→品質フィルタ→有害除去のパイプラインが品質の鍵</em></p>
</blockquote>
<ul>
<li>言語識別 → 重複排除 → 品質フィルタ → 有害コンテンツ除去</li>
<li><strong>MinHash LSH</strong>: 近似近傍ハッシュによる大規模重複排除</li>
<li><strong>Perplexity フィルタ</strong>: 言語モデルスコアで低品質テキストを除去</li>
<li><strong>Deduplication の重要性</strong>: 重複データは汎化を損ない記憶を促進</li>
<li><strong>Quality Classifier</strong>: GPT-4 / Claude でアノテートし品質スコアを付与</li>
<li>規模が増えるほどフィルタリングの精度が全体品質を左右</li>
</ul>

- **汚染検出**: n-gram 重複率 / Perplexity スパイク / カナリアデータ

<header>AIの学習の仕組み</header>
<h1 id="%E5%90%88%E6%88%90%E3%83%87%E3%83%BC%E3%82%BF%E3%81%A8%E8%87%AA%E5%B7%B1%E6%94%B9%E5%96%84%E3%83%AB%E3%83%BC%E3%83%97">合成データと自己改善ループ</h1>
<blockquote>
<p><em>合成データはモデル崩壊リスクあり、検証可能タスクで品質保証が不可欠</em></p>
</blockquote>
<ul>
<li><strong>Alpaca / Vicuna</strong>: GPT-4 出力で蒸留 — コスト効率的に能力獲得</li>
<li><strong>Self-Instruct</strong> (2023): LLM が自ら指示データを生成 → フィルタ → FT</li>
<li><strong>STaR / ReST</strong>: 自己生成の正しい推論例でブートストラップ</li>
<li><strong>Phi-1/2/3</strong>: 小モデルでも高品質合成データで大モデルに匹敵</li>
<li>合成データの限界: 多様性欠如 / 幻覚の伝播 / モデル崩壊リスク</li>
<li><strong>検証可能タスク</strong> (数学・コード): 自動報酬で合成データの品質保証</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="%E3%83%A2%E3%83%87%E3%83%AB%E4%B8%A6%E5%88%97%E5%87%A6%E7%90%86%E3%81%A8%E3%83%86%E3%83%B3%E3%82%BD%E3%83%AB%E4%B8%A6%E5%88%97">モデル並列処理とテンソル並列</h1>
<blockquote>
<p><em>Megatron-LMのテンソル並列でAllReduceが律速—NVLink帯域が実質的ボトルネック</em></p>
</blockquote>
<ul>
<li><strong>テンソル並列</strong> (Megatron-LM): 重み行列を GPU 間で列/行方向に分割</li>
<li>Column 並列: W_Q, W_K, W_V を分割 → 各 GPU が独立して計算</li>
<li>Row 並列: FFN の 2層目を分割 → AllReduce で結合</li>
<li>通信コスト: 各 Forward で AllReduce が必要 — NVLink 帯域が律速</li>
<li><strong>Expert 並列</strong>: MoE の各 Expert を異なる GPU に配置</li>
<li><strong>FSDP</strong> (PyTorch): ZeRO-3 相当のパラメータシャーディング</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="%E3%83%91%E3%82%A4%E3%83%97%E3%83%A9%E3%82%A4%E3%83%B3%E4%B8%A6%E5%88%97%E5%8C%96">パイプライン並列化</h1>
<blockquote>
<p><em>1F1B+Interleaved方式でGPUバブルを最小化—最適ステージ数はトレードオフ</em></p>
</blockquote>
<ul>
<li>モデルの層を複数ステージに分割し、各 GPU に割り当て</li>
<li><strong>バブル問題</strong>: ステージ間の待ち時間 — GPU 使用率が低下</li>
<li><strong>GPipe</strong>: マイクロバッチでバブル低減 — バブル率 (p-1)/(m+p-1)</li>
<li><strong>1F1B</strong> (PipeDream): 1 Forward → 1 Backward を交互に実行</li>
<li><strong>Interleaved 1F1B</strong>: 仮想ステージを使いバブルをさらに削減</li>
<li>最適ステージ数: バブル率と通信コストのトレードオフ</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="%E6%B7%B7%E5%90%88%E7%B2%BE%E5%BA%A6%E5%AD%A6%E7%BF%92%E3%81%A8%E5%8B%BE%E9%85%8D%E3%83%81%E3%82%A7%E3%83%83%E3%82%AF%E3%83%9D%E3%82%A4%E3%83%B3%E3%83%88">混合精度学習と勾配チェックポイント</h1>
<blockquote>
<p><em>BF16+Gradient Checkpointing+FlashAttentionの組み合わせがLLM学習の標準</em></p>
</blockquote>
<ul>
<li><strong>FP16</strong>: 2 bytes/param — 一部の演算で数値不安定</li>
<li><strong>BF16</strong>: FP32 と同じ指数域 — LLM 学習の実質標準 (Ampere 以降)</li>
<li>混合精度: BF16 で演算 + FP32 のマスターコピーで勾配更新</li>
<li><strong>Dynamic Loss Scaling</strong>: FP16 アンダーフロー防止の自動スケーリング</li>
<li><strong>Gradient Checkpointing</strong>: 活性化を再計算 → メモリ O(√n) へ削減</li>
<li>FlashAttention-2/3: IO-aware な計算で GPU HBM 帯域を最大活用</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="test-time-compute-ttc">Test-Time Compute (TTC)</h1>
<blockquote>
<p><em>Best-of-N+PRMとMCTSで推論コストをスケール—事前学習に加え第2の軸に</em></p>
</blockquote>
<ul>
<li><strong>パラダイムシフト</strong>: 学習コストではなく推論コストをスケール</li>
<li><strong>Best-of-N Sampling</strong>: N 個の出力を生成 → PRM で最良を選択</li>
<li><strong>Tree Search / MCTS</strong>: 推論過程を木探索で最適化</li>
<li><strong>o1</strong> (OpenAI 2024): <think> トークンで内部推論を展開</li>
<li><strong>DeepSeek-R1</strong>: RL で自発的な長い思考連鎖を誘導</li>
<li>二重スケーリング: 事前学習コスト × 推論コストの両軸で性能向上</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="%E3%83%9E%E3%83%AB%E3%83%81%E3%83%A2%E3%83%BC%E3%83%80%E3%83%AB%E5%AD%A6%E7%BF%92">マルチモーダル学習</h1>
<blockquote>
<p><em>CLIP→LLaVA→GPT-4Vと進化、モダリティ固有エンコーダ+統一Transformerが標準</em></p>
</blockquote>
<ul>
<li><strong>VLM</strong> (Vision-Language Model): 画像とテキストを統合して処理</li>
<li><strong>CLIP</strong> (Radford 2021): 4億ペアのコントラスト学習で視覚-言語表現</li>
<li><strong>LLaVA</strong>: CLIP 視覚エンコーダ + LLM — オープンソース VLM の標準</li>
<li><strong>GPT-4V / Gemini</strong>: ネイティブマルチモーダル — テキスト/画像/動画/音声</li>
<li><strong>Video-LLM</strong>: 時系列フレームを処理するための時間的整合機構</li>
<li>統合アーキテクチャ: モダリティ固有エンコーダ + 統一 Transformer</li>
</ul>

<h1 id="%E6%8B%A1%E6%95%A3%E3%83%A2%E3%83%87%E3%83%AB%E3%81%AE%E5%AD%A6%E7%BF%92">拡散モデルの学習</h1>
<blockquote>
<p><em>DDPMのノイズ予測→DDIMで10倍高速化→Latent DiffusionでStable Diffusionへ</em></p>
</blockquote>
<ul>
<li>
<svg viewBox="0 0 800 260" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">

<text x="400" y="192" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold">訓練目標: ‖ε - εθ(xₜ, t)‖²</text>
<text x="400" y="210" text-anchor="middle" fill="#ffffff" font-size="10">付加したノイズ ε を予測するようにモデルを訓練</text>

- **DDPM** (Ho 2020): q(x_t|x_{t-1}) = N(√αx_{t-1}, (1-α)I) でノイズ付加
- **逆拡散**: εθ(x_t, t) でノイズを予測 → 段階的にデノイズ
- **単純損失**: L = E[‖ε − εθ(√ᾱx₀+√(1-ᾱ)ε, t)‖²]
- **DDIM**: 非マルコフ過程で決定論的サンプリング — 10× 高速化
- **Stable Diffusion**: Latent Diffusion — 潜在空間でのノイズ除去
- **Flow Matching**: 確率フロー ODE で拡散を統一的に定式化

<header>AIの学習の仕組み</header>
<h1 id="world-models-%E3%81%A8%E4%BA%88%E6%B8%AC%E5%AD%A6%E7%BF%92">World Models と予測学習</h1>
<blockquote>
<p><em>World ModelでRL高速化、JEPAが次のパラダイムを提示するLeCunの主張</em></p>
</blockquote>
<ul>
<li><strong>World Model</strong>: 環境ダイナミクス s_{t+1} = f(s_t, a_t) を内化</li>
<li><strong>Dreamer</strong> (Hafner 2020): 潜在空間でのロールアウトで RL を高速化</li>
<li><strong>JEPA</strong> (LeCun): Joint Embedding Predictive Architecture — 潜在空間予測</li>
<li>I-JEPA / V-JEPA: 画像・動画の JEPA 実装</li>
<li><strong>Sora</strong> 等の動画生成: 暗黙的に World Model を学習している可能性</li>
<li>AGI への道: 世界の因果構造を内化したモデルの構築</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="constitutional-ai-%E3%81%A8-rlaif">Constitutional AI と RLAIF</h1>
<blockquote>
<p><em>Constitutional AI+RAIFでスケーラブルなアライメントを実現—Helpful/Harmless/Honestの3H原則</em></p>
</blockquote>
<ul>
<li><strong>Anthropic (2022)</strong>: 原則集 (Constitution) に基づく自己批判・改訂</li>
<li><strong>RLAIF</strong>: 人手ではなく AI フィードバックで RL — スケーラブル</li>
<li><strong>Critique &amp; Revision</strong>: モデルが自らの出力を批判 → 修正</li>
<li><strong>3H 原則</strong>: Helpful / Harmless / Honest の定式化</li>
<li><strong>Scalable Oversight</strong>: 超人的 AI のアライメントへの布石</li>
<li><strong>Debate</strong> (Irving 2018): AI 同士が主張を戦わせ人間が判断</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="speculative-decoding">Speculative Decoding</h1>
<blockquote>
<p><em>Speculative Decodingで2〜3倍高速化—Draft+並列検証で自己回帰のbandwidth律速を克服</em></p>
</blockquote>
<ul>
<li><strong>問題</strong>: LLM の自己回帰生成は GPU の memory bandwidth 律速</li>
<li><strong>Speculative Decoding</strong> (Chen 2023): Draft モデルで複数トークン先読み</li>
<li>検証ステップ: Target LLM が Draft の全トークンを並列検証</li>
<li><strong>数学的等価性</strong>: 受け入れ率調整で Target LLM と完全に等価な出力</li>
<li>速度向上: 2〜3× の高速化 (Drafter と Target の分布が近いほど有効)</li>
<li><strong>Medusa / EAGLE</strong>: 複数ヘッドで並列生成するアーキテクチャ改変手法</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="mechanistic-interpretability">Mechanistic Interpretability</h1>
<blockquote>
<p><em>Circuit Analysis+SAEでニューロン回路を解明—Anthropicが百万規模の特徴辞書を構築</em></p>
</blockquote>
<ul>
<li>目標: 「なぜその答えを出したか」を回路レベルで解明</li>
<li><strong>Circuit Analysis</strong>: サブネットワーク (circuit) が特定タスクを担当</li>
<li><strong>IOI</strong> (Indirect Object Identification): 注意ヘッドの役割特定 (Wang 2022)</li>
<li><strong>Superposition</strong>: 1ニューロンが複数特徴を重ね合わせて表現</li>
<li><strong>Sparse AutoEncoder (SAE)</strong>: 単一の解釈可能特徴を線形分離</li>
<li>Anthropic: 百万規模の SAE で特徴辞書を構築 (Monosemanticity)</li>
</ul>

<header>AIの学習の仕組み</header>
<h1 id="%E8%A9%95%E4%BE%A1%E3%81%AE%E9%99%90%E7%95%8C%E3%81%A8%E8%AA%B2%E9%A1%8C">評価の限界と課題</h1>
<blockquote>
<p><em>ベンチマーク飽和・汚染・ゲームプレイの3問題が評価の信頼性を損なう根本的課題</em></p>
</blockquote>
<ul>
<li><strong>ベンチマーク飽和</strong>: モデルが人間レベルを超えても能力差が見えない</li>
<li><strong>データ汚染</strong>: 訓練データとの重複で過楽観な結果</li>
<li><strong>ゲームプレイ</strong>: スコア最大化に最適化 → 実能力と乖離</li>
<li><strong>Elicitation Gap</strong>: モデルが持つ能力と評価で引き出せる能力のギャップ</li>
<li><strong>多次元能力</strong>: 単一スコアでの比較は誤解を招く</li>
<li><strong>安全性評価</strong>: 有害出力の定量化の難しさ — 標準化が急務</li>
</ul>
