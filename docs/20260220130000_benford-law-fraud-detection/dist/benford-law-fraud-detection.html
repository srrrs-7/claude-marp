- **1881年** Simon Newcomb：対数表の最初のページが汚れていることに気づく
- 「小さい数から始まる数字の方が頻繁に使われる」と提唱 → 無視される
- **1938年** Frank Benford：20種・20,229件のデータで独自に再発見
- 川の長さ、分子量、新聞の数字、野球統計など多様なデータで検証
- 「異常な数字の法則（The Law of Anomalous Numbers）」として発表
- → 以来「**ベンフォードの法則**」として広く知られることに

<header>ベンフォードの法則で不正を見抜く</header>
<h1 id="%E8%87%AA%E7%84%B6%E7%95%8C%E3%81%A7%E3%81%AE%E6%88%90%E7%AB%8B%E4%BE%8B">自然界での成立例</h1>
<blockquote>
<p><em>人口・川幅・株価など無関係なデータが同じ分布に収束する</em></p>
</blockquote>
<ul>
<li><strong>人口・地理</strong>: 国の人口、川の長さ、山の高さ、都市の面積</li>
<li><strong>経済・金融</strong>: 株価、取引金額、企業の売上高、GDPデータ</li>
<li><strong>科学</strong>: 物理定数、素粒子の質量、天体の距離</li>
<li><strong>数学</strong>: フィボナッチ数列、べき乗則に従う数列、素数</li>
<li><strong>共通点</strong>: 「自然に生成され、広い範囲に渡る数値」</li>
<li>→ 人工的に決められた番号（電話番号・郵便番号）は<strong>成立しない</strong></li>
</ul>

</li>
<li>
<p>→ n が大きくなると <code>log(xₙ)</code> が<strong>一様分布</strong>に近づく</p>
</li>
<li>
<p>→ 一様分布した対数値の先頭桁 = ベンフォード分布</p>
</li>
<li>
<p><strong>直感</strong>: 経済データは「成長率の積」で決まる → 対数が一様分布 → ベンフォード</p>
</li>
<li>
<p>複利・GDP成長・人口増加など「掛け算的プロセス」が鍵</p>
</li>
</ul>

<header>ベンフォードの法則で不正を見抜く</header>
<h1 id="%E7%B5%B1%E8%A8%88%E7%9A%84%E6%A4%9C%E5%AE%9A%E6%8C%87%E6%A8%99mad%E3%81%A8ssd">統計的検定指標：MADとSSD</h1>
<blockquote>
<p><em>MAD&lt;0.006が適合基準、外れたら人工操作を疑う</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="380" fill="#1a1a2e" /><br />
<text x="400" y="38" text-anchor="middle" fill="#f9a825" font-size="20" font-weight="bold">統計的検定指標：MAD と SSD の比較</text><br />
<rect x="60" y="65" width="320" height="250" fill="#16213e" rx="8" /><br />
<rect x="420" y="65" width="320" height="250" fill="#16213e" rx="8" /><br />
<text x="220" y="98" text-anchor="middle" fill="#f9a825" font-size="18" font-weight="bold">MAD</text><br />
<text x="220" y="118" text-anchor="middle" fill="#ffffff" font-size="13">平均絶対偏差</text><br />
<text x="220" y="148" text-anchor="middle" fill="#ffffff" font-size="13">MAD = Σ|実測 − 期待| / 9</text><br />
<rect x="80" y="165" width="280" height="24" fill="#1a1a2e" rx="3" /><br />
<text x="95" y="182" fill="#4caf50" font-size="13">≤ 0.006 : 合格</text><br />
<rect x="80" y="195" width="280" height="24" fill="#1a1a2e" rx="3" /><br />
<text x="95" y="212" fill="#f9a825" font-size="13">0.006–0.012 : 許容範囲</text><br />
<rect x="80" y="225" width="280" height="24" fill="#1a1a2e" rx="3" /><br />
<text x="95" y="242" fill="#e91e63" font-size="13">&gt; 0.015 : 不正疑い</text><br />
<text x="220" y="290" text-anchor="middle" fill="#ffffff" font-size="12" opacity="0.7">異常値に対して頑健</text><br />
<text x="580" y="98" text-anchor="middle" fill="#f9a825" font-size="18" font-weight="bold">SSD</text><br />
<text x="580" y="118" text-anchor="middle" fill="#ffffff" font-size="13">平均二乗偏差</text><br />
<text x="580" y="148" text-anchor="middle" fill="#ffffff" font-size="13">SSD = Σ(実測 − 期待)² / 9</text><br />
<rect x="440" y="165" width="280" height="24" fill="#1a1a2e" rx="3" /><br />
<text x="455" y="182" fill="#4caf50" font-size="13">≤ 25 : 合格</text><br />
<rect x="440" y="195" width="280" height="24" fill="#1a1a2e" rx="3" /><br />
<text x="455" y="212" fill="#f9a825" font-size="13">25–100 : 許容範囲</text><br />
<rect x="440" y="225" width="280" height="24" fill="#1a1a2e" rx="3" /><br />
<text x="455" y="242" fill="#e91e63" font-size="13">&gt; 100 : 不正疑い</text><br />
<text x="580" y="290" text-anchor="middle" fill="#ffffff" font-size="12" opacity="0.7">外れ値に敏感（大偏差を強調）</text><br />
<text x="400" y="345" text-anchor="middle" fill="#e91e63" font-size="15">実務では MAD + カイ二乗検定 の組み合わせを推奨</text><br />
</svg></li>
<li><strong>MAD（平均絶対偏差）</strong>: |実測 − 期待値| の平均</li>
<li>Nigrini (2012) の判定基準：<br />
| MAD値 | 判定 |<br />
| &lt; 0.006 | 許容範囲（適合） |<br />
| 0.006〜0.012 | 要注意（境界値） |<br />
| 0.012〜0.015 | 要精査（中程度逸脱） |<br />
| &gt; 0.015 | 高リスク（大幅逸脱） |</li>
<li><strong>SSD（Sum of Squared Differences）</strong>: 二乗偏差の和。感度が高い</li>
</ul>

<h1 id="%E3%83%99%E3%83%B3%E3%83%95%E3%82%A9%E3%83%BC%E3%83%89%E6%B3%95%E3%81%8C%E6%88%90%E7%AB%8B%E3%81%99%E3%82%8B%E6%9D%A1%E4%BB%B6%E3%81%A8%E9%99%90%E7%95%8C">ベンフォード法が成立する条件と限界</h1>
<ul>
<li><svg viewBox='0 0 700 270' style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns='http://www.w3.org/2000/svg'><text x='350' y='25' text-anchor='middle' font-size='14' fill='#ddd' font-family='sans-serif'>ベンフォードの法則が成立する条件チェック</text><rect x='30' y='40' width='640' height='50' fill='#0d2a1a' rx='6' stroke='#5bbf7f' stroke-width='1' /><text x='60' y='60' font-size='13' fill='#5bbf7f' font-family='sans-serif'><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/></text><text x='85' y='60' font-size='13' fill='#ddd' font-family='sans-serif'>データが自然に生成された数値（人工的な番号体系でない）</text><text x='60' y='78' font-size='11' fill='#888' font-family='sans-serif'>例：財務取引、人口、物理測定値 → OK　｜　電話番号、郵便番号 → NG</text><rect x='30' y='100' width='640' height='50' fill='#0d2a1a' rx='6' stroke='#5bbf7f' stroke-width='1' /><text x='60' y='120' font-size='13' fill='#5bbf7f' font-family='sans-serif'><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/></text><text x='85' y='120' font-size='13' fill='#ddd' font-family='sans-serif'>数値が広いスケール（複数桁）にわたって分布している</text><text x='60' y='138' font-size='11' fill='#888' font-family='sans-serif'>例：$1〜$1,000,000 → OK　｜　$9,000〜$11,000（狭い範囲） → NG</text><rect x='30' y='160' width='640' height='50' fill='#0d2a1a' rx='6' stroke='#5bbf7f' stroke-width='1' /><text x='60' y='180' font-size='13' fill='#5bbf7f' font-family='sans-serif'><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2705.svg" data-marp-twemoji=""/></text><text x='85' y='180' font-size='13' fill='#ddd' font-family='sans-serif'>サンプル数が十分にある（目安：100件以上、理想は1,000件以上）</text><text x='60' y='198' font-size='11' fill='#888' font-family='sans-serif'>例：年間全取引データ → OK　｜　50件のサンプル → 検出力不足</text><rect x='30' y='220' width='640' height='40' fill='#2a0d0d' rx='6' stroke='#e05050' stroke-width='1' /><text x='60' y='240' font-size='13' fill='#e05050' font-family='sans-serif'><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/></text><text x='85' y='240' font-size='13' fill='#ddd' font-family='sans-serif'>心理的価格設定・制約付き番号・均一分布データには適用不可</text></svg></li>
<li>3つの条件がそろっているかを必ず確認してから適用する</li>
</ul>

<p><text x="400" y="375" text-anchor="middle" fill="#f9a825" font-size="14">適用前に必ず「データが複数桁スケールにまたがるか」を確認</text><br />

<li>
<p><strong>電話番号</strong>: 市外局番（03, 06など）で先頭桁が固定される</p>

<li>
<p><strong>郵便番号</strong>: 地域コードで範囲が制限される（100〜900番台など）</p>

<li>
<p><strong>ISBN・商品コード</strong>: 規格で番号体系が決まっている</p>
</li>
<li>
<p><strong>年齢・評価スコア</strong>: 1〜100など範囲が限定的</p>
</li>
<li>
<p><strong>共通点</strong>: 人間が設計した「番号体系」は自然な分布にならない</p>
</li>
<li>
<p>→ これらのデータにベンフォード分析を適用しても<strong>意味のある結果が出ない</strong></p>
</li>
</ul>

<header>ベンフォードの法則で不正を見抜く</header>
<h1 id="%E9%99%90%E7%95%8C%E2%91%A1%E5%9D%87%E4%B8%80%E5%88%86%E5%B8%83%E3%83%BB%E4%BA%BA%E5%B7%A5%E5%88%86%E5%B8%83%E3%83%87%E3%83%BC%E3%82%BF">限界②：均一分布・人工分布データ</h1>
<blockquote>
<p><em>人為的に生成された数字はベンフォード分析の対象外となる</em></p>
</blockquote>
<ul>
<li><strong>サイコロの目・乗り物番号</strong>: 意図的に均等設計</li>
<li><strong>ランダム乱数</strong>: 先頭桁が一様分布になるよう生成される</li>
<li><strong>価格設定データ</strong>: 9.99、19.99など心理的価格に集中</li>
<li><strong>時刻・日付</strong>: 00〜23時など定義された範囲の繰り返し</li>
<li>これらは「自然に生まれた」データではなく<strong>人間がデザインしたデータ</strong></li>
<li>→ ベンフォード法が前提とする対数一様分布が成立しない</li>
</ul>
<footer>© 2026 — Benford's Law for Fraud Detection</footer>
