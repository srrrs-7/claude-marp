<header>Metamorphosis × Migration</header>
<h1 id="imaginal-discs%E3%81%AE%E6%95%99%E8%A8%93">Imaginal Discsの教訓</h1>
<blockquote>
<p><em>新機能を旧システム内に埋め込み—共存が変態を可能にする</em></p>
</blockquote>
<ul>
<li>
<ul>
<li>成虫原基（Imaginal Discs）は <strong>幼虫の段階から</strong> 体内に存在</li>
</ul>
</li>
<li>
<ul>
<li>変態時に溶解せず、新しい器官の <strong>核</strong> となる</li>
</ul>
</li>
<li>
<ul>
<li>ソフトウェア: 新サービスのPOC/プロトタイプを旧システム内で育てる</li>
</ul>
</li>
<li>
<ul>
<li>マイグレーション前に <strong>実証済みのコンポーネント</strong> を用意</li>
</ul>
</li>
<li>
<ul>
<li>Feature Flagで新機能を旧システム内で段階的にテスト</li>
</ul>
</li>
<li>
<ul>
<li>全面切替時に「成虫原基」が新システムのコアとなる</li>
</ul>
</li>
</ul>
