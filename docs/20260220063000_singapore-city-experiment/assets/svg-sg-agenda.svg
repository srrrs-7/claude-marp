<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="30" fill="#ffffff" font-size="17" font-family="sans-serif" text-anchor="middle" font-weight="bold">本日のアジェンダ</text>
  <rect x="60" y="55" width="680" height="48" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="110" y="75" fill="#f9a825" font-size="14" font-family="sans-serif" font-weight="bold">1</text>
  <text x="140" y="75" fill="#ffffff" font-size="13" font-family="sans-serif">シンガポールとは何か</text>
  <text x="140" y="93" fill="#aaaaaa" font-size="10" font-family="sans-serif">1965年独立 — 不可能と言われた都市国家の誕生</text>
  <rect x="60" y="113" width="680" height="48" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="110" y="133" fill="#f9a825" font-size="14" font-family="sans-serif" font-weight="bold">2-3</text>
  <text x="140" y="133" fill="#ffffff" font-size="13" font-family="sans-serif">プラグマティズムの哲学</text>
  <text x="140" y="151" fill="#aaaaaa" font-size="10" font-family="sans-serif">イデオロギーより効果 — 「何が機能するか」を問い続ける</text>
  <rect x="60" y="171" width="680" height="48" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="110" y="191" fill="#e91e63" font-size="14" font-family="sans-serif" font-weight="bold">4-5</text>
  <text x="140" y="191" fill="#ffffff" font-size="13" font-family="sans-serif">住宅・交通・教育のシステム設計</text>
  <text x="140" y="209" fill="#aaaaaa" font-size="10" font-family="sans-serif">HDB 80%居住率 + 世界最高の交通 + 教育強制競争</text>
  <rect x="60" y="229" width="680" height="48" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="110" y="249" fill="#e91e63" font-size="14" font-family="sans-serif" font-weight="bold">6-7</text>
  <text x="140" y="249" fill="#ffffff" font-size="13" font-family="sans-serif">スマートネーション + デジタル政府</text>
  <text x="140" y="267" fill="#aaaaaa" font-size="10" font-family="sans-serif">データ駆動型統治 — 都市実験の最前線</text>
  <rect x="60" y="287" width="680" height="48" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="110" y="307" fill="#f9a825" font-size="14" font-family="sans-serif" font-weight="bold">8</text>
  <text x="140" y="307" fill="#ffffff" font-size="13" font-family="sans-serif">教訓 — 都市実験から学ぶ設計哲学</text>
  <text x="140" y="325" fill="#aaaaaa" font-size="10" font-family="sans-serif">制約を逆手にとった最適化戦略</text>
</svg>