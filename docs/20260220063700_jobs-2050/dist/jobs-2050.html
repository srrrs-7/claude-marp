<div class="fig">
<svg viewBox="0 0 800 280" style="display:block;margin:0 auto;display:block;width:100%;height:100%;max-width:100%;max-height:100%;margin:0 auto;letter-spacing:0;"><rect width="800" height="280" fill="#1a1a2e" /><text x="400" y="28" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">2050年の仕事 ― キーメッセージ</text><rect x="40" y="45" width="350" height="55" rx="8" fill="#1565c0" fill-opacity="0.5" stroke="#42a5f5" stroke-width="1" /><text x="55" y="68" fill="#42a5f5" font-size="22" font-weight="bold">1</text><text x="88" y="65" fill="white" font-size="11" font-weight="bold">歴史は「技術が雇用を変換する」</text><text x="88" y="82" fill="#ccc" font-size="10">産業革命から一貫して繰り返されてきた</text><rect x="410" y="45" width="350" height="55" rx="8" fill="#880e4f" fill-opacity="0.5" stroke="#f48fb1" stroke-width="1" /><text x="425" y="68" fill="#f48fb1" font-size="22" font-weight="bold">2</text><text x="458" y="65" fill="white" font-size="11" font-weight="bold">AIは仕事を「奪う」のでなく「変える」</text><text x="458" y="82" fill="#ccc" font-size="10">変化の速度は史上最速 ― 今すぐ動く</text><rect x="40" y="115" width="350" height="55" rx="8" fill="#1b5e20" fill-opacity="0.5" stroke="#81c784" stroke-width="1" /><text x="55" y="138" fill="#81c784" font-size="22" font-weight="bold">3</text><text x="88" y="135" fill="white" font-size="11" font-weight="bold">「ルール・反復」は自動化へ</text><text x="88" y="152" fill="#ccc" font-size="10">「共感・創造・複雑判断」は人間が担う</text><rect x="410" y="115" width="350" height="55" rx="8" fill="#e65100" fill-opacity="0.5" stroke="#ffb74d" stroke-width="1" /><text x="425" y="138" fill="#ffb74d" font-size="22" font-weight="bold">4</text><text x="458" y="135" fill="white" font-size="11" font-weight="bold">AIを使いこなす人が勝つ</text><text x="458" y="152" fill="#ccc" font-size="10">AIに仕事を奪われる前に学ぶ人になれ</text><rect x="160" y="190" width="480" height="60" rx="10" fill="#e91e63" fill-opacity="0.2" stroke="#e91e63" stroke-width="2" /><text x="400" y="215" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold">問い：5年後の自分のスキルセットは</text><text x="400" y="237" text-anchor="middle" fill="white" font-size="13">今のままで通用するか？</text></svg>

<ul>
<li>歴史は「技術が雇用を変換する」ことを繰り返し証明している</li>
<li>AIは仕事を「奪う」のではなく「変える」― ただし変化の速度は史上最速</li>
<li>2050年の勝者は「AIに仕事を奪われない人」ではなく「AIを使いこなす人」</li>
</ul>
