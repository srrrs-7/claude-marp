<header>エジソンと起業家精神</header>
<h1 id="%E3%82%A8%E3%82%B8%E3%82%BD%E3%83%B3%E3%81%8B%E3%82%89%E5%AD%A6%E3%81%B66%E3%81%A4%E3%81%AE%E6%95%99%E8%A8%93">エジソンから学ぶ6つの教訓</h1>
<blockquote>
<p><em>失敗を数でこなし市場ニーズから逆算する6原則</em></p>
</blockquote>
<ul>
<li><strong>1. 発明 ≠ イノベーション</strong> ― 商業化して初めて価値が生まれる</li>
<li><strong>2. チームが個人に勝る</strong> ― 天才よりシステムが持続する</li>
<li><strong>3. インフラを制する者が市場を制する</strong></li>
<li><strong>4. 特許は攻撃兵器にもなる</strong> ― IPの戦略的活用</li>
<li><strong>5. ナラティブの力</strong> ― 「発明王」という物語が資金を集めた</li>
<li><strong>6. 技術的正しさだけでは不十分</strong> ― 市場・タイミング・政治が必要</li>
</ul>

<ul>
<li>エジソンは「発明家」ではなく**「発明を産業化する起業家」**だった</li>
<li>メンロパーク研究所は現代のR&amp;Dラボの直接の祖先</li>
<li>特許戦略・垂直統合・メディア操作は現代テック企業の手法そのもの</li>
<li>テスラの悲劇は「技術が正しくてもビジネスで負ける」ことの証明</li>
<li><strong>イノベーション = 発明 × 商業化 × タイミング × 政治</strong></li>
</ul>
