<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="300" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" fill="#f9a825" font-weight="bold" font-family="sans-serif">個人データの市場価値（データブローカー推定価格）</text>
  <line x1="70" y1="240" x2="720" y2="240" stroke="#555" stroke-width="1"/>
  <line x1="70" y1="50" x2="70" y2="240" stroke="#555" stroke-width="1"/>
  <!-- 基本属性 $0.0005 - barely visible -->
  <rect x="90" y="238" width="90" height="2" rx="1" fill="#888"/>
  <text x="135" y="232" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">$0.0005</text>
  <text x="135" y="258" text-anchor="middle" font-size="10" fill="#aaa" font-family="sans-serif">基本属性</text>
  <text x="135" y="272" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">氏名・年齢</text>
  <!-- 場所履歴 $0.50 -->
  <rect x="200" y="220" width="90" height="20" rx="2" fill="#4fc3f7" opacity="0.75"/>
  <text x="245" y="214" text-anchor="middle" font-size="10" fill="#4fc3f7" font-weight="bold" font-family="sans-serif">$0.50</text>
  <text x="245" y="258" text-anchor="middle" font-size="10" fill="#aaa" font-family="sans-serif">場所履歴</text>
  <text x="245" y="272" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">1ヶ月分</text>
  <!-- 政治的傾向 $1-5 -->
  <rect x="310" y="205" width="90" height="35" rx="2" fill="#ff9800" opacity="0.75"/>
  <text x="355" y="199" text-anchor="middle" font-size="10" fill="#ff9800" font-weight="bold" font-family="sans-serif">$1〜5</text>
  <text x="355" y="258" text-anchor="middle" font-size="10" fill="#aaa" font-family="sans-serif">政治的傾向</text>
  <text x="355" y="272" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">投票・支持</text>
  <!-- 金融行動 $5-15 -->
  <rect x="420" y="180" width="90" height="60" rx="2" fill="#e91e63" opacity="0.75"/>
  <text x="465" y="174" text-anchor="middle" font-size="10" fill="#e91e63" font-weight="bold" font-family="sans-serif">$5〜15</text>
  <text x="465" y="258" text-anchor="middle" font-size="10" fill="#aaa" font-family="sans-serif">金融行動</text>
  <text x="465" y="272" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">購買・投資</text>
  <!-- 健康データ $250 -->
  <rect x="530" y="50" width="90" height="190" rx="2" fill="#9c27b0" opacity="0.85"/>
  <text x="575" y="44" text-anchor="middle" font-size="10" fill="#9c27b0" font-weight="bold" font-family="sans-serif">$250</text>
  <text x="575" y="258" text-anchor="middle" font-size="10" fill="#aaa" font-family="sans-serif">健康・医療</text>
  <text x="575" y="272" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">病歴・処方</text>
  <!-- Annotation box -->
  <rect x="640" y="90" width="140" height="100" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="710" y="115" text-anchor="middle" font-size="11" fill="#f9a825" font-family="sans-serif">広告ターゲット</text>
  <text x="710" y="133" text-anchor="middle" font-size="11" fill="#f9a825" font-family="sans-serif">としての価値は</text>
  <text x="710" y="155" text-anchor="middle" font-size="15" fill="white" font-weight="bold" font-family="sans-serif">桁違いに高い</text>
  <text x="710" y="175" text-anchor="middle" font-size="10" fill="#aaa" font-family="sans-serif">特に組み合わせで</text>
  <polygon points="636,140 640,133 640,147" fill="#f9a825"/>
</svg>
