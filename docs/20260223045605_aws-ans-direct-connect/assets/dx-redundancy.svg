  <rect x="215" y="78" width="60" height="30" rx="3" fill="#0d3b66"/>
  <text x="245" y="98" text-anchor="middle" fill="#ffffff" font-size="9">オンプレ</text>
  <line x1="275" y1="88" x2="310" y2="83" stroke="#4caf50" stroke-width="2"/>
  <polygon points="308,78 318,83 308,88" fill="#4caf50"/>
