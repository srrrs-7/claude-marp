  <text x="293" y="169" text-anchor="middle" fill="#ff8a65" font-size="9">施設障害でリスクあり</text>
  <!-- Pattern 3 -->
  <rect x="395" y="45" width="175" height="150" rx="6" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="483" y="67" text-anchor="middle" fill="#4caf50" font-size="11" font-weight="bold">パターン3: 異ロケーション</text>
  <rect x="405" y="78" width="60" height="30" rx="3" fill="#0d3b66"/>
  <text x="435" y="98" text-anchor="middle" fill="#ffffff" font-size="9">オンプレ</text>
  <line x1="465" y1="88" x2="495" y2="78" stroke="#4caf50" stroke-width="2"/>
  <polygon points="493,73 503,78 493,83" fill="#4caf50"/>
  <line x1="465" y1="98" x2="495" y2="108" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="493,103 503,108 493,113" fill="#4caf50"/>
  <rect x="503" y="68" width="55" height="25" rx="3" fill="#0d3b66"/>
  <text x="531" y="85" text-anchor="middle" fill="#4caf50" font-size="8">東京DX</text>
  <rect x="503" y="100" width="55" height="25" rx="3" fill="#0d3b66"/>
