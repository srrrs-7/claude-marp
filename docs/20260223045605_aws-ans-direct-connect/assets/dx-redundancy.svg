  <text x="483" y="169" text-anchor="middle" fill="#4caf50" font-size="9">AWS 推奨構成</text>
  <!-- Pattern 4 -->
  <rect x="585" y="45" width="200" height="150" rx="6" fill="#16213e" stroke="#64b5f6" stroke-width="1.5"/>
