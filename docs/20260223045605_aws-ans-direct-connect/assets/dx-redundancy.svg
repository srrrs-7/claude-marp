  <!-- Comparison Table -->
  <rect x="15" y="215" width="770" height="30" rx="4" fill="#0d1b2e"/>
  <text x="103" y="235" text-anchor="middle" fill="#ff5252" font-size="10" font-weight="bold">SLA なし</text>
  <text x="293" y="235" text-anchor="middle" fill="#ff9800" font-size="10" font-weight="bold">SLA 99.9%</text>
  <text x="483" y="235" text-anchor="middle" fill="#4caf50" font-size="10" font-weight="bold">SLA 99.99% ★推奨</text>
  <text x="685" y="235" text-anchor="middle" fill="#64b5f6" font-size="10" font-weight="bold">SLA 99.9% + VPN</text>
  <!-- BFD note -->
  <rect x="15" y="260" width="770" height="60" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1"/>
  <text x="400" y="285" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold">フェイルオーバー高速化: BFD 必須</text>
  <text x="400" y="308" text-anchor="middle" fill="#aaaaaa" font-size="11">BFD あり: 1〜3秒以内 | BGP Hold Timer のみ: 最大 90秒 | 設定: bfd interval 300 min_rx 300 multiplier 3</text>
</svg>
