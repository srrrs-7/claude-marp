  <rect x="595" y="78" width="60" height="30" rx="3" fill="#0d3b66"/>
  <text x="625" y="98" text-anchor="middle" fill="#ffffff" font-size="9">オンプレ</text>
  <line x1="655" y1="88" x2="685" y2="83" stroke="#64b5f6" stroke-width="2"/>
  <polygon points="683,78 693,83 683,88" fill="#64b5f6"/>
  <line x1="655" y1="98" x2="685" y2="108" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="683,103 693,108 683,113" fill="#ff9800"/>
  <rect x="693" y="68" width="80" height="25" rx="3" fill="#0d3b66"/>
  <text x="733" y="85" text-anchor="middle" fill="#64b5f6" font-size="8">DX (Primary)</text>
  <rect x="693" y="100" width="80" height="25" rx="3" fill="#0d3b66"/>
  <text x="733" y="117" text-anchor="middle" fill="#ff9800" font-size="8">VPN (Backup)</text>
  <text x="685" y="135" text-anchor="middle" fill="#64b5f6" font-size="10">SLA: 99.9%</text>
