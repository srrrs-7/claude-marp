<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" fill="#f9a825" font-size="15" font-weight="bold">Direct Connect 冗長パターン比較</text>
  <!-- Pattern 1 -->
  <rect x="15" y="45" width="175" height="150" rx="6" fill="#16213e" stroke="#ff5252" stroke-width="1.5"/>
  <text x="103" y="67" text-anchor="middle" fill="#ff5252" font-size="11" font-weight="bold">パターン1: Single</text>
  <rect x="25" y="78" width="60" height="30" rx="3" fill="#0d3b66"/>
  <text x="55" y="98" text-anchor="middle" fill="#ffffff" font-size="9">オンプレ</text>
  <line x1="85" y1="93" x2="115" y2="93" stroke="#ff5252" stroke-width="2"/>
  <polygon points="115,88 125,93 115,98" fill="#ff5252"/>
  <rect x="125" y="78" width="55" height="30" rx="3" fill="#0d3b66"/>
  <text x="153" y="98" text-anchor="middle" fill="#ffffff" font-size="9">AWS</text>
  <text x="103" y="135" text-anchor="middle" fill="#ff5252" font-size="10">SLA: なし</text>
  <text x="103" y="152" text-anchor="middle" fill="#aaaaaa" font-size="9">SPOF あり</text>
  <text x="103" y="169" text-anchor="middle" fill="#aaaaaa" font-size="9">開発/テストのみ</text>
  <!-- Pattern 2 -->
  <rect x="205" y="45" width="175" height="150" rx="6" fill="#16213e" stroke="#ff9800" stroke-width="1.5"/>
