<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" fill="#f9a825" font-size="15" font-weight="bold">接続コスト比較 (月間 100TB Egress)</text>
  <!-- DX bar -->
  <rect x="80" y="100" width="140" height="120" rx="4" fill="#4caf50"/>
  <text x="150" y="93" text-anchor="middle" fill="#4caf50" font-size="13" font-weight="bold">$3,080</text>
  <text x="150" y="238" text-anchor="middle" fill="#ffffff" font-size="12">DX 10G</text>
  <text x="150" y="256" text-anchor="middle" fill="#aaaaaa" font-size="10">データ $2,000</text>
  <text x="150" y="271" text-anchor="middle" fill="#aaaaaa" font-size="10">ポート $1,080</text>
  <!-- VPN bar -->
  <rect x="300" y="40" width="140" height="180" rx="4" fill="#ff9800"/>
  <text x="370" y="33" text-anchor="middle" fill="#ff9800" font-size="13" font-weight="bold">$9,200</text>
  <text x="370" y="238" text-anchor="middle" fill="#ffffff" font-size="12">インターネット</text>
  <text x="370" y="256" text-anchor="middle" fill="#aaaaaa" font-size="10">$0.09/GB × 102,400GB</text>
  <!-- Internet bar -->
  <rect x="520" y="70" width="140" height="150" rx="4" fill="#64b5f6"/>
  <text x="590" y="63" text-anchor="middle" fill="#64b5f6" font-size="13" font-weight="bold">~$5,500</text>
  <text x="590" y="238" text-anchor="middle" fill="#ffffff" font-size="12">VPN (TGW)</text>
  <text x="590" y="256" text-anchor="middle" fill="#aaaaaa" font-size="10">VPN時間料金 + データ</text>
  <!-- Savings annotation -->
  <line x1="150" y1="100" x2="370" y2="40" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="5,3"/>
  <rect x="200" y="48" width="140" height="30" rx="4" fill="#16213e" stroke="#4caf50" stroke-width="1.5"/>
  <text x="270" y="66" text-anchor="middle" fill="#4caf50" font-size="11" font-weight="bold">$6,120 節約 (66%)</text>
  <!-- Rate comparison -->
  <rect x="30" y="300" width="740" height="80" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1"/>
  <text x="400" y="322" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold">Egress 料金単価比較</text>
  <rect x="50" y="333" width="160" height="35" rx="4" fill="#0d3b66"/>
  <text x="130" y="350" text-anchor="middle" fill="#4caf50" font-size="11">DX: $0.02/GB</text>
  <text x="130" y="365" text-anchor="middle" fill="#aaaaaa" font-size="9">東京リージョン</text>
  <rect x="240" y="333" width="160" height="35" rx="4" fill="#0d3b66"/>
  <text x="320" y="350" text-anchor="middle" fill="#ff9800" font-size="11">インターネット: $0.09/GB</text>
  <text x="320" y="365" text-anchor="middle" fill="#aaaaaa" font-size="9">EC2 Egress</text>
  <rect x="430" y="333" width="160" height="35" rx="4" fill="#0d3b66"/>
  <text x="510" y="350" text-anchor="middle" fill="#64b5f6" font-size="11">Ingress (受信): 無料</text>
  <text x="510" y="365" text-anchor="middle" fill="#aaaaaa" font-size="9">AWSへの受信は課金なし</text>
  <rect x="620" y="333" width="140" height="35" rx="4" fill="#0d3b66"/>
  <text x="690" y="350" text-anchor="middle" fill="#f9a825" font-size="11">損益分岐: 10TB+</text>
  <text x="690" y="365" text-anchor="middle" fill="#aaaaaa" font-size="9">月間Egress ≥10TBでDX有利</text>
</svg>
