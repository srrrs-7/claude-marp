<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">A/Bテスト = 多世界解釈</text>
  <!-- Initial state -->
  <rect x="310" y="46" width="180" height="52" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f9a825">観測前のユーザー</text>
  <text x="400" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">重ね合わせ状態</text>
  <!-- Branch arrow left -->
  <line x1="340" y1="98" x2="220" y2="148" stroke="#4ec9b0" stroke-width="2"/>
  <polygon points="215,140 222,152 228,140" fill="#4ec9b0"/>
  <text x="260" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">バリアントA</text>
  <!-- Branch arrow right -->
  <line x1="460" y1="98" x2="580" y2="148" stroke="#e91e63" stroke-width="2"/>
  <polygon points="574,140 580,152 586,140" fill="#e91e63"/>
  <text x="540" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63">バリアントB</text>
  <!-- World A -->
  <rect x="80" y="154" width="280" height="120" rx="8" fill="#003820" stroke="#4ec9b0" stroke-width="2"/>
  <text x="220" y="178" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0" font-weight="bold">世界 A（新デザイン）</text>
  <text x="220" y="202" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">実際のユーザー行動を観測</text>
  <text x="220" y="222" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4ec9b0" font-weight="bold">CVR: 4.2%</text>
  <text x="220" y="242" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">言語報告ではなく行動データ</text>
  <text x="220" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">（弱い観測）</text>
  <!-- World B -->
  <rect x="440" y="154" width="280" height="120" rx="8" fill="#300020" stroke="#e91e63" stroke-width="2"/>
  <text x="580" y="178" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e91e63" font-weight="bold">世界 B（現行デザイン）</text>
  <text x="580" y="202" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">実際のユーザー行動を観測</text>
  <text x="580" y="222" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">CVR: 3.1%</text>
  <text x="580" y="242" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">同時並行で走らせる</text>
  <text x="580" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">（多世界の比較）</text>
  <!-- Comparison arrow -->
  <line x1="363" y1="214" x2="437" y2="214" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="208" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825">統計的比較</text>
  <!-- Key insight bottom -->
  <rect x="80" y="292" width="640" height="52" rx="8" fill="#16213e"/>
  <text x="400" y="314" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">エヴェレットの多世界解釈：観測のたびに世界が分岐する</text>
  <text x="400" y="334" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f9a825" font-weight="bold">A/Bテスト = 観測歪みを最小化した「弱い測定」の最高形</text>
</svg>