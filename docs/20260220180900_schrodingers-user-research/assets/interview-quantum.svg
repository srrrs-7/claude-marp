<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">インタビューの量子的困難</text>
  <!-- Before interview: superposition -->
  <text x="200" y="70" fill="#4fc3f7" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">インタビュー前</text>
  <text x="200" y="90" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">（重ね合わせ状態）</text>
  <!-- Overlapping opinion clouds -->
  <ellipse cx="165" cy="185" rx="80" ry="50" fill="#1e2d4e" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7"/>
  <text x="165" y="180" fill="#4fc3f7" font-size="10" text-anchor="middle" font-family="sans-serif">意見A</text>
  <text x="165" y="196" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">「使いやすい」</text>
  <ellipse cx="215" cy="200" rx="80" ry="50" fill="#2a1a2e" stroke="#ab47bc" stroke-width="1.5" opacity="0.7"/>
  <text x="215" y="196" fill="#ab47bc" font-size="10" text-anchor="middle" font-family="sans-serif">意見B</text>
  <text x="215" y="212" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">「複雑すぎる」</text>
  <ellipse cx="185" cy="220" rx="70" ry="40" fill="#1a2a1e" stroke="#66bb6a" stroke-width="1.5" opacity="0.7"/>
  <text x="185" y="216" fill="#66bb6a" font-size="10" text-anchor="middle" font-family="sans-serif">意見C</text>
  <text x="185" y="230" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">「気にしない」</text>
  <!-- Collapse arrow -->
  <text x="400" y="195" fill="#e91e63" font-size="28" text-anchor="middle" font-family="sans-serif">→</text>
  <text x="400" y="220" fill="#e91e63" font-size="11" text-anchor="middle" font-family="sans-serif">インタビュー</text>
  <text x="400" y="237" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">（波束の収縮）</text>
  <!-- After interview: collapsed -->
  <text x="600" y="70" fill="#e91e63" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">インタビュー後</text>
  <text x="600" y="90" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">（収縮した状態）</text>
  <ellipse cx="600" cy="185" rx="100" ry="60" fill="#2a1a1a" stroke="#e91e63" stroke-width="2"/>
  <text x="600" y="178" fill="#e91e63" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">1つの意見に収束</text>
  <text x="600" y="200" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">「使いやすいと思います」</text>
  <text x="600" y="220" fill="#888" font-size="9" text-anchor="middle" font-family="sans-serif">（本当の気持ちかは不明）</text>
  <!-- Warning -->
  <rect x="100" y="295" width="600" height="55" fill="#1a1a3e" stroke="#f9a825" stroke-width="1" rx="6"/>
  <text x="400" y="318" fill="#f9a825" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">問題の本質</text>
  <text x="400" y="338" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">質問・状況・インタビュアーが「正解」を引き出してしまう → 行動データとの併用が必須</text>
</svg>