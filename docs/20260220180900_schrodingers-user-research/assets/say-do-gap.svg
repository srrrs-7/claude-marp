<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">言うことと行動のギャップ（Say-Do Gap）</text>
  <!-- Y axis labels -->
  <text x="55" y="90" fill="#a0a0c0" font-size="11" text-anchor="end" font-family="sans-serif">高い</text>
  <text x="55" y="280" fill="#a0a0c0" font-size="11" text-anchor="end" font-family="sans-serif">低い</text>
  <!-- Axes -->
  <line x1="70" y1="70" x2="70" y2="310" stroke="#555" stroke-width="1"/>
  <line x1="70" y1="310" x2="750" y2="310" stroke="#555" stroke-width="1"/>
  <text x="400" y="345" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">使いやすいアプリの特徴（ユーザーが「重要」と回答）</text>
  <!-- Bar: Says important (high) -->
  <rect x="120" y="90" width="80" height="220" fill="#e91e63" opacity="0.8" rx="4"/>
  <text x="160" y="82" fill="#e91e63" font-size="11" text-anchor="middle" font-family="sans-serif">言う</text>
  <text x="160" y="325" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">プライバシー</text>
  <!-- Bar: Actually uses (low) -->
  <rect x="220" y="240" width="80" height="70" fill="#4fc3f7" opacity="0.8" rx="4"/>
  <text x="260" y="232" fill="#4fc3f7" font-size="11" text-anchor="middle" font-family="sans-serif">行動</text>
  <text x="260" y="325" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">実際の選択</text>
  <!-- Gap arrow -->
  <line x1="205" y1="190" x2="215" y2="190" stroke="#f9a825" stroke-width="1"/>
  <!-- second group: Speed -->
  <rect x="350" y="120" width="80" height="190" fill="#e91e63" opacity="0.8" rx="4"/>
  <text x="390" y="112" fill="#e91e63" font-size="11" text-anchor="middle" font-family="sans-serif">言う</text>
  <text x="390" y="325" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">速度</text>
  <rect x="450" y="180" width="80" height="130" fill="#4fc3f7" opacity="0.8" rx="4"/>
  <text x="490" y="172" fill="#4fc3f7" font-size="11" text-anchor="middle" font-family="sans-serif">行動</text>
  <text x="490" y="325" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">実際の優先度</text>
  <!-- third group: Design -->
  <rect x="580" y="200" width="80" height="110" fill="#e91e63" opacity="0.8" rx="4"/>
  <text x="620" y="192" fill="#e91e63" font-size="11" text-anchor="middle" font-family="sans-serif">言う</text>
  <text x="620" y="325" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">デザイン</text>
  <rect x="680" y="260" width="50" height="50" fill="#4fc3f7" opacity="0.8" rx="4"/>
  <text x="705" y="252" fill="#4fc3f7" font-size="11" text-anchor="middle" font-family="sans-serif">行動</text>
  <text x="705" y="325" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">実際</text>
  <!-- Legend -->
  <rect x="120" y="355" width="15" height="10" fill="#e91e63" rx="2"/>
  <text x="142" y="365" fill="#e91e63" font-size="10" font-family="sans-serif">アンケート回答</text>
  <rect x="280" y="355" width="15" height="10" fill="#4fc3f7" rx="2"/>
  <text x="302" y="365" fill="#4fc3f7" font-size="10" font-family="sans-serif">実際の行動ログ</text>
</svg>