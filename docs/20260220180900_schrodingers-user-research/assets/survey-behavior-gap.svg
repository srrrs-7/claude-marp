<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">言うこと vs やること：社会的望ましさバイアス</text>
  <!-- Two bars for each scenario -->
  <!-- Scenario 1: Food habits -->
  <text x="130" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#aaa">健康的な食事</text>
  <!-- Stated -->
  <rect x="50" y="64" width="160" height="32" rx="4" fill="#4ec9b0" opacity="0.8"/>
  <text x="130" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">回答：75%「している」</text>
  <!-- Actual -->
  <rect x="50" y="100" width="76" height="32" rx="4" fill="#e91e63" opacity="0.8"/>
  <text x="88" y="121" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">実際：35%</text>
  <!-- Gap indicator -->
  <line x1="130" y1="96" x2="130" y2="100" stroke="#f9a825" stroke-width="1.5"/>
  <line x1="88" y1="96" x2="130" y2="96" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="3"/>
  <text x="175" y="116" font-family="sans-serif" font-size="11" fill="#f9a825">Gap: 40pt</text>

  <!-- Scenario 2: Product usability -->
  <text x="430" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#aaa">UI使いにくい</text>
  <!-- Stated -->
  <rect x="350" y="64" width="64" height="32" rx="4" fill="#4ec9b0" opacity="0.8"/>
  <text x="382" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">回答：30%</text>
  <!-- Actual (离脱率) -->
  <rect x="350" y="100" width="140" height="32" rx="4" fill="#e91e63" opacity="0.8"/>
  <text x="420" y="121" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">離脱率：65%</text>
  <text x="550" y="116" font-family="sans-serif" font-size="11" fill="#f9a825">Gap: 35pt</text>

  <!-- Scenario 3: NPS -->
  <text x="700" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#aaa">友人推薦</text>
  <rect x="630" y="64" width="140" height="32" rx="4" fill="#4ec9b0" opacity="0.8"/>
  <text x="700" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">NPS: +70</text>
  <rect x="630" y="100" width="70" height="32" rx="4" fill="#e91e63" opacity="0.8"/>
  <text x="665" y="121" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">実推薦: 20%</text>

  <!-- Middle section: why -->
  <rect x="40" y="156" width="720" height="88" rx="8" fill="#16213e"/>
  <text x="400" y="180" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f9a825" font-weight="bold">なぜ乖離が生まれるか</text>
  <text x="200" y="204" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">社会的望ましさバイアス</text>
  <text x="200" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">「正しい答え」を返そうとする</text>
  <text x="400" y="204" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">記憶バイアス</text>
  <text x="400" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">記憶を合理化して回答</text>
  <text x="600" y="204" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">観察者効果</text>
  <text x="600" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">見られることで行動変容</text>

  <!-- Bottom solution -->
  <rect x="40" y="264" width="720" height="76" rx="8" fill="#0d1b2a"/>
  <text x="400" y="288" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0" font-weight="bold">解決：行動データ（弱い観測）で補完する</text>
  <text x="400" y="308" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">アンケート（言語）+ アナリティクス（行動）の組み合わせ</text>
  <text x="400" y="328" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">= 量子力学における「弱測定」と「強測定」の使い分け</text>
</svg>