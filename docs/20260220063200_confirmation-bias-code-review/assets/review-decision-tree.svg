<svg viewBox="0 0 800 400" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#f9a825">コードレビューの意思決定ツリー（バイアスあり）</text>
  <!-- Root -->
  <rect x="300" y="48" width="200" height="44" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="75" text-anchor="middle" font-size="13" fill="#ffffff">PRを受け取る</text>
  <!-- Branch: 著者は誰か -->
  <line x1="400" y1="92" x2="400" y2="118" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="395,114 405,114 400,122" fill="#ffffff"/>
  <rect x="290" y="120" width="220" height="44" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="400" y="140" text-anchor="middle" font-size="12" fill="#e91e63">著者はシニア？</text>
  <text x="400" y="156" text-anchor="middle" font-size="11" fill="#e91e63">⚠ バイアスポイント①</text>
  <!-- Yes branch (left) -->
  <line x1="290" y1="142" x2="180" y2="190" stroke="#ffffff" stroke-width="1.5"/>
  <text x="225" y="170" text-anchor="middle" font-size="11" fill="#ffffff">YES</text>
  <polygon points="177,186 187,194 175,196" fill="#ffffff"/>
  <rect x="80" y="192" width="190" height="44" rx="8" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="175" y="212" text-anchor="middle" font-size="12" fill="#4caf50">ざっと確認</text>
  <text x="175" y="228" text-anchor="middle" font-size="11" fill="#ffffff">「きっと正しい」</text>
  <!-- No branch (right) -->
  <line x1="510" y1="142" x2="620" y2="190" stroke="#ffffff" stroke-width="1.5"/>
  <text x="575" y="170" text-anchor="middle" font-size="11" fill="#ffffff">NO</text>
  <polygon points="617,186 627,194 615,196" fill="#ffffff"/>
  <rect x="530" y="192" width="190" height="44" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="625" y="212" text-anchor="middle" font-size="12" fill="#e91e63">細部まで厳しく確認</text>
  <text x="625" y="228" text-anchor="middle" font-size="11" fill="#ffffff">「ミスがあるはず」</text>
  <!-- Next level for YES -->
  <line x1="175" y1="236" x2="175" y2="264" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="170,260 180,260 175,268" fill="#ffffff"/>
  <rect x="80" y="266" width="190" height="44" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="175" y="287" text-anchor="middle" font-size="12" fill="#e91e63">PRサイズは？</text>
  <text x="175" y="303" text-anchor="middle" font-size="11" fill="#e91e63">⚠ バイアスポイント②</text>
  <!-- Result YES-small -->
  <line x1="80" y1="288" x2="30" y2="328" stroke="#ffffff" stroke-width="1.5"/>
  <text x="47" y="316" text-anchor="middle" font-size="10" fill="#ffffff">小</text>
  <polygon points="27,324 37,332 25,334" fill="#ffffff"/>
  <rect x="0" y="335" width="80" height="34" rx="6" fill="#4caf50" stroke="none"/>
  <text x="40" y="356" text-anchor="middle" font-size="11" fill="#ffffff">LGTM</text>
  <!-- Result YES-large -->
  <line x1="270" y1="288" x2="310" y2="328" stroke="#ffffff" stroke-width="1.5"/>
  <text x="298" y="316" text-anchor="middle" font-size="10" fill="#ffffff">大</text>
  <polygon points="307,324 317,332 305,334" fill="#ffffff"/>
  <rect x="268" y="335" width="90" height="34" rx="6" fill="#f9a825" stroke="none"/>
  <text x="313" y="356" text-anchor="middle" font-size="11" fill="#1a1a2e">軽めのレビュー</text>
  <!-- Result NO -->
  <line x1="625" y1="236" x2="625" y2="266" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="620,262 630,262 625,270" fill="#ffffff"/>
  <rect x="530" y="268" width="190" height="44" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="625" y="288" text-anchor="middle" font-size="12" fill="#e91e63">些末な指摘を大量に</text>
  <text x="625" y="304" text-anchor="middle" font-size="11" fill="#ffffff">⚠ バイアスポイント③</text>
  <!-- Bottom label -->
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.6">同じコードでも「著者名」でレビュー結果が変わる</text>
</svg>
