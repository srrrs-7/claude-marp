<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#f9a825">確証バイアスのループ</text>
  <!-- Cycle nodes -->
  <!-- Node: 既存の信念 -->
  <rect x="310" y="55" width="180" height="50" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" fill="#f9a825">既存の信念</text>
  <!-- Node: 情報探索 -->
  <rect x="540" y="155" width="180" height="50" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="630" y="185" text-anchor="middle" font-size="14" fill="#e91e63">支持情報を探す</text>
  <!-- Node: 矛盾を無視 -->
  <rect x="440" y="285" width="180" height="50" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="530" y="315" text-anchor="middle" font-size="14" fill="#ffffff">矛盾を無視</text>
  <!-- Node: 信念強化 -->
  <rect x="180" y="285" width="180" height="50" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="270" y="315" text-anchor="middle" font-size="14" fill="#ffffff">信念を強化</text>
  <!-- Node: バイアス確認 -->
  <rect x="80" y="155" width="180" height="50" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="170" y="185" text-anchor="middle" font-size="14" fill="#e91e63">証拠を選別</text>
  <!-- Arrows: polygon based -->
  <!-- 既存の信念 → 支持情報を探す -->
  <line x1="490" y1="80" x2="570" y2="158" stroke="#f9a825" stroke-width="2"/>
  <polygon points="566,170 576,152 560,158" fill="#f9a825"/>
  <!-- 支持情報を探す → 矛盾を無視 -->
  <line x1="620" y1="205" x2="550" y2="283" stroke="#e91e63" stroke-width="2"/>
  <polygon points="542,278 558,290 552,274" fill="#e91e63"/>
  <!-- 矛盾を無視 → 信念強化 -->
  <line x1="438" y1="310" x2="362" y2="310" stroke="#e91e63" stroke-width="2"/>
  <polygon points="355,305 355,315 368,310" fill="#e91e63"/>
  <!-- 信念強化 → 証拠を選別 -->
  <line x1="238" y1="285" x2="200" y2="208" stroke="#f9a825" stroke-width="2"/>
  <polygon points="194,202 208,214 202,198" fill="#f9a825"/>
  <!-- 証拠を選別 → 既存の信念 -->
  <line x1="228" y1="158" x2="318" y2="82" stroke="#f9a825" stroke-width="2"/>
  <polygon points="314,75 325,87 312,90" fill="#f9a825"/>
  <!-- Center label -->
  <text x="400" y="210" text-anchor="middle" font-size="13" fill="#ffffff" opacity="0.7">バイアスの</text>
  <text x="400" y="228" text-anchor="middle" font-size="13" fill="#ffffff" opacity="0.7">悪循環</text>
  <!-- Code review label -->
  <text x="400" y="370" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.6">コードレビューでは「著者への先入観」がこのループを加速する</text>
</svg>
