<svg viewBox="0 0 800 400" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">チーム力学との相互作用 — 心理的安全性とバイアス</text>
  <!-- Left: Low psychological safety -->
  <rect x="20" y="50" width="365" height="300" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="202" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e91e63">心理的安全性が低い環境</text>
  <rect x="40" y="92" width="325" height="50" rx="6" fill="#1a1a2e" stroke="#e91e63" stroke-width="1" opacity="0.7"/>
  <text x="202" y="112" text-anchor="middle" font-size="11" fill="#e91e63">「問題を指摘したら嫌われそう」</text>
  <text x="202" y="130" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">→ 批判を避けて承認に走る</text>
  <rect x="40" y="152" width="325" height="50" rx="6" fill="#1a1a2e" stroke="#e91e63" stroke-width="1" opacity="0.7"/>
  <text x="202" y="172" text-anchor="middle" font-size="11" fill="#e91e63">「シニアに反論するのは怖い」</text>
  <text x="202" y="190" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">→ 権威バイアスが増幅される</text>
  <rect x="40" y="212" width="325" height="50" rx="6" fill="#1a1a2e" stroke="#e91e63" stroke-width="1" opacity="0.7"/>
  <text x="202" y="232" text-anchor="middle" font-size="11" fill="#e91e63">「間違いを認めたくない」</text>
  <text x="202" y="250" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">→ 確証バイアスが強まる</text>
  <text x="202" y="290" text-anchor="middle" font-size="12" fill="#e91e63">結果：バグが増加し品質が低下</text>
  <text x="202" y="308" text-anchor="middle" font-size="11" fill="#ffffff">「良さそう」レビューが蔓延</text>
  <text x="202" y="325" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.6">技術的問題よりチーム問題が根本</text>
  <!-- Right: High psychological safety -->
  <rect x="415" y="50" width="365" height="300" rx="10" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="597" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#4caf50">心理的安全性が高い環境</text>
  <rect x="435" y="92" width="325" height="50" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
  <text x="597" y="112" text-anchor="middle" font-size="11" fill="#4caf50">「疑問は歓迎される」</text>
  <text x="597" y="130" text-anchor="middle" font-size="10" fill="#ffffff">→ 問題が早期に発見される</text>
  <rect x="435" y="152" width="325" height="50" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
  <text x="597" y="172" text-anchor="middle" font-size="11" fill="#4caf50">「シニアのコードも批判できる」</text>
  <text x="597" y="190" text-anchor="middle" font-size="10" fill="#ffffff">→ ハロー効果が弱まる</text>
  <rect x="435" y="212" width="325" height="50" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1.5"/>
  <text x="597" y="232" text-anchor="middle" font-size="11" fill="#4caf50">「失敗は学習の機会」</text>
  <text x="597" y="250" text-anchor="middle" font-size="10" fill="#ffffff">→ バイアスを認識しやすくなる</text>
  <text x="597" y="290" text-anchor="middle" font-size="12" fill="#4caf50">結果：バイアスが自然に軽減</text>
  <text x="597" y="308" text-anchor="middle" font-size="11" fill="#ffffff">文化がプロセスを補強する</text>
  <text x="597" y="325" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.6">ツールより文化が先</text>
  <!-- Bottom -->
  <text x="400" y="365" text-anchor="middle" font-size="12" fill="#f9a825">バイアス軽減の最善策：心理的安全性の向上</text>
  <text x="400" y="382" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.7">「問題を安全に言える」環境がなければ、どんなプロセスも機能しない</text>
</svg>
