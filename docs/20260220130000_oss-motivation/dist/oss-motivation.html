</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" data-class="invert lead" data-paginate="true" data-header="なぜ人は無料でOSSを作るか" data-footer="© 2026 Workshop — OSS Motivation &amp; Economics" data-theme="gaia" data-style="/* ── Slide layout ─────────────────────────────────────────
     The slide is a fixed 1280x720 box, so its blocks are laid out as a flex
     column: text keeps its natural height and diagrams absorb whatever space
     is left over. Without this a diagram sizes itself from its aspect ratio
     alone and pushes the bullets off the bottom of the slide.
     This also activates Gaia's own `section.lead` centering, which is dead
     while the section is display:block. */
  section {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  section &gt; * { flex: 0 0 auto; min-width: 0; }
  section * { max-width: 100%; box-sizing: border-box; }
  section h1 { overflow-wrap: break-word; word-break: break-word; }

  /* ── Auto-fit ─────────────────────────────────────────────
     Applied per slide by estimateFit() when the text would otherwise be
     clipped. Text cannot shrink itself the way a diagram can. */
  section.fit-94 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.94); }
  section.fit-88 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.88); }
  section.fit-82 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.82); }
  section.fit-76 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.76); }
  section.fit-70 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.7); }
  section.fit-64 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.64); }
  section.fit-58 { font-size: calc(var(--marpit-root-font-size, 1em) * 0.58); }

  /* ── Readability ──────────────────────────────────────── */
  section li {
    line-height: 1.5;
    margin-bottom: 0.1em;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  section p { line-height: 1.7; overflow-wrap: break-word; }

  /* ── Figures (inline SVG + standalone images) ─────────────
     `vh` is deliberately not used anywhere here. Marp scales the slide with a
     CSS transform, so vh resolves against the browser window rather than the
     slide — on a tall window `max-height:70vh` exceeds the whole slide and
     caps nothing. These blocks are bounded by flex layout instead. */
  section &gt; .fig,
  section &gt; p:has(&gt; img) {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0.2em 0;
  }
  /* The SVG fills the wrapper; preserveAspectRatio letterboxes the drawing
     inside it, so it scales down instead of overflowing. */
  section &gt; .fig &gt; svg {
    display: block;
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
  }
  /* `!important` overrides the inline width Marp emits for `![w:800]`. */
  section &gt; p:has(&gt; img) &gt; img {
    max-height: 100% !important;
    max-width: 100% !important;
    object-fit: contain;
    height: auto;
    width: auto;
  }
  /* Fallback for images/SVGs that are not a direct child of the section
     (hand-written markdown, table cells): keep them inside the slide. */
  section img, section svg { max-width: 100%; }

  /* ── Code blocks ──────────────────────────────────────── */
  section pre { overflow: hidden; }
  section pre code { font-size: 0.58em; line-height: 1.4; overflow-wrap: break-word; }

  /* ── Tables ───────────────────────────────────────────── */
  section table {
    font-size: 0.78em;
    width: 100%;
    overflow: hidden;
    word-break: break-word;
    border-collapse: collapse;
  }
  section th, section td {
    padding: 0.35em 0.6em;
    overflow-wrap: break-word;
    word-break: break-word;
  }

  /* ── Subtitle / BLUF callout (blockquote) ─────────────── */
  section blockquote {
    font-size: 0.88em;
    line-height: 1.55;
    padding: 0.25em 0.8em;
    margin: 0.15em 0 0.35em;
    opacity: 0.88;
    overflow-wrap: break-word;
  }
  section blockquote p { margin: 0; }

section {
  font-size: 1.0em;
}
section pre code {
  font-size: 0.55em;

<h1 id="%E3%81%AA%E3%81%9C%E7%B5%8C%E6%B8%88%E5%90%88%E7%90%86%E6%80%A7%E3%81%A7%E3%81%AF%E8%AA%AC%E6%98%8E%E3%81%A7%E3%81%8D%E3%81%AA%E3%81%84%E3%81%8B22">なぜ経済合理性では説明できないか（2/2）</h1>
<blockquote>
<p><em>評判・楽しさ・使命感など非金銭的誘因が貢献を駆動する</em></p>
</blockquote>
<div class="fig">
<svg viewBox="0 0 800 380" style="display:block;margin:0 auto;display:block;width:100%;height:100%;max-width:100%;max-height:100%;margin:0 auto;letter-spacing:0;" xmlns="http://www.w3.org/2000/svg">

<rect x="50" y="55" width="320" height="270" fill="#16213e" rx="8" />
<text x="210" y="82" font-size="14" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">クラウディングアウトとは</text>

<line x1="210" y1="125" x2="210" y2="138" stroke="#e91e63" stroke-width="2" />
<polygon points="210,150 204,138 216,138" fill="#e91e63" />
<text x="210" y="170" font-size="14" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">内発的動機が低下</text>
<text x="210" y="200" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">「義務でやってる感」が生まれる</text>
<text x="210" y="224" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">楽しくなくなる</text>
<text x="210" y="248" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">やめやすくなる</text>
<text x="210" y="278" font-size="13" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">報酬が消えると止まる</text>
<rect x="430" y="55" width="320" height="270" fill="#0f3460" rx="8" />
<text x="590" y="82" font-size="14" fill="#f9a825" text-anchor="middle" font-weight="bold" font-family="sans-serif">OSSでの実例</text>
<text x="590" y="110" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">Firefox の拡張機能開発者に</text>
<text x="590" y="132" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">報酬を払ったら参加者が減った</text>
<text x="590" y="160" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">「義務化」されたOSS貢献は</text>
<text x="590" y="182" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">コード品質が下がる傾向</text>
<text x="590" y="210" font-size="12" fill="#f9a825" text-anchor="middle" font-weight="normal" font-family="sans-serif">適切な報酬設計:</text>
<text x="590" y="232" font-size="13" fill="#f9a825" text-anchor="middle" font-weight="bold" font-family="sans-serif">基本給 + 称賛 + 裁量</text>
<text x="590" y="258" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">→ お金を「隠す」設計が必要</text>
<text x="400" y="368" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">「お金で解決」は OSS コミュニティを壊す可能性がある</text>
</svg>

<ul>
<li><strong>標準モデルが説明できないこと:</strong></li>
<li>① 報酬ゼロでも品質を最大化しようとする行動</li>
<li>② バグ修正の深夜作業・ユーザーサポートへの丁寧な対応</li>
<li>③ 「スターをもらえると嬉しい」— 非金銭報酬の効果</li>
<li>→ 別の動機モデルが必要</li>
</ul>

<svg viewBox="0 0 800 380" style="display:block;margin:0 auto;display:block;width:100%;height:100%;max-width:100%;max-height:100%;margin:0 auto;letter-spacing:0;" xmlns="http://www.w3.org/2000/svg">

<rect x="50" y="55" width="320" height="270" fill="#16213e" rx="8" />
<text x="210" y="82" font-size="14" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">クラウディングアウトとは</text>

<line x1="210" y1="125" x2="210" y2="138" stroke="#e91e63" stroke-width="2" />
<polygon points="210,150 204,138 216,138" fill="#e91e63" />
<text x="210" y="170" font-size="14" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">内発的動機が低下</text>
<text x="210" y="200" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">「義務でやってる感」が生まれる</text>
<text x="210" y="224" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">楽しくなくなる</text>
<text x="210" y="248" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">やめやすくなる</text>

<text x="590" y="110" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">Firefox の拡張機能開発者に</text>
<text x="590" y="132" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">報酬を払ったら参加者が減った</text>
<text x="590" y="160" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">「義務化」されたOSS貢献は</text>
<text x="590" y="182" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">コード品質が下がる傾向</text>

<li>時間を忘れ、完全に没入する状態</li>
<li><strong>OSSでフローが起きやすい理由:</strong></li>
</ul>

<rect x="60" y="55" width="200" height="240" fill="#0f3460" rx="8" />

<text x="160" y="226" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">自分のペースで</text>
<rect x="300" y="55" width="200" height="240" fill="#16213e" rx="8" />
<text x="400" y="90" font-size="18" fill="#f9a825" text-anchor="middle" font-weight="bold" font-family="sans-serif">有能感</text>
<text x="400" y="120" font-size="12" fill="#888" text-anchor="middle" font-weight="normal" font-family="sans-serif">Competence</text>
<text x="400" y="155" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">スキルが伸びている実感</text>
<text x="400" y="178" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">難しい問題を解く喜び</text>
<text x="400" y="202" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">コードレビューで成長</text>
<text x="400" y="226" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">マスタリーの達成感</text>

<text x="640" y="90" font-size="18" fill="#f9a825" text-anchor="middle" font-weight="bold" font-family="sans-serif">関係性</text>
<text x="640" y="120" font-size="12" fill="#888" text-anchor="middle" font-weight="normal" font-family="sans-serif">Relatedness</text>

<text x="640" y="202" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">「一緒に作る」感覚</text>
<text x="640" y="226" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">グローバルな仲間</text>
<text x="400" y="355" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">この3要素が揃うと、人は外部報酬なしでも高いパフォーマンスを発揮する</text>

<ul>

<li>学歴が典型例 — OSSコントリビューションも同様</li>

<svg viewBox="0 0 800 370" style="display:block;margin:0 auto;display:block;width:100%;height:100%;max-width:100%;max-height:100%;margin:0 auto;letter-spacing:0;" xmlns="http://www.w3.org/2000/svg">

<rect x="50" y="60" width="200" height="230" fill="#16213e" rx="8" />

<text x="150" y="162" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">→ 検証可能</text>

<text x="210" y="200" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">「義務でやってる感」が生まれる</text>
<text x="210" y="224" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">楽しくなくなる</text>
<text x="210" y="248" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">やめやすくなる</text>

<li>ポトラッチ: 財を惜しみなく配ることが地位を高める</li>

<polygon points="210,150 204,138 216,138" fill="#e91e63" />

<text x="210" y="248" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">やめやすくなる</text>
<text x="210" y="278" font-size="13" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">報酬が消えると止まる</text>

<blockquote>

</blockquote>
<div class="fig">
<svg viewBox="0 0 800 380" style="display:block;margin:0 auto;display:block;width:100%;height:100%;max-width:100%;max-height:100%;margin:0 auto;letter-spacing:0;" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="800" height="380" fill="#1a1a2e" rx="0" />
<text x="400" y="26" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">クラウディングアウト — お金が動機を壊す逆説</text>
<rect x="50" y="55" width="320" height="270" fill="#16213e" rx="8" />
<text x="210" y="82" font-size="14" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">クラウディングアウトとは</text>
<text x="210" y="110" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">外部報酬 (お金・強制)</text>
<line x1="210" y1="125" x2="210" y2="138" stroke="#e91e63" stroke-width="2" />
<polygon points="210,150 204,138 216,138" fill="#e91e63" />
<text x="210" y="170" font-size="14" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">内発的動機が低下</text>
<text x="210" y="200" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">「義務でやってる感」が生まれる</text>
<text x="210" y="224" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">楽しくなくなる</text>
<text x="210" y="248" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">やめやすくなる</text>
<text x="210" y="278" font-size="13" fill="#e91e63" text-anchor="middle" font-weight="bold" font-family="sans-serif">報酬が消えると止まる</text>
<rect x="430" y="55" width="320" height="270" fill="#0f3460" rx="8" />
<text x="590" y="82" font-size="14" fill="#f9a825" text-anchor="middle" font-weight="bold" font-family="sans-serif">OSSでの実例</text>
<text x="590" y="110" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">Firefox の拡張機能開発者に</text>
<text x="590" y="132" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">報酬を払ったら参加者が減った</text>
<text x="590" y="160" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">「義務化」されたOSS貢献は</text>
<text x="590" y="182" font-size="12" fill="#aaa" text-anchor="middle" font-weight="normal" font-family="sans-serif">コード品質が下がる傾向</text>
<text x="590" y="210" font-size="12" fill="#f9a825" text-anchor="middle" font-weight="normal" font-family="sans-serif">適切な報酬設計:</text>
<text x="590" y="232" font-size="13" fill="#f9a825" text-anchor="middle" font-weight="bold" font-family="sans-serif">基本給 + 称賛 + 裁量</text>
<text x="590" y="258" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal" font-family="sans-serif">→ お金を「隠す」設計が必要</text>
<text x="400" y="368" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">「お金で解決」は OSS コミュニティを壊す可能性がある</text>
</svg>

</ul>
