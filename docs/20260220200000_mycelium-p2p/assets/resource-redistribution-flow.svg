<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">リソース再分配：菌糸ネットワーク ↔ P2P</text>
  <!-- Left column: Mycelium -->
  <text x="200" y="70" fill="#66bb6a" font-size="15" text-anchor="middle" font-weight="bold" font-family="sans-serif">菌糸ネットワーク</text>
  <!-- Surplus node -->
  <rect x="80" y="90" width="130" height="55" fill="#1e3a1e" stroke="#66bb6a" stroke-width="2" rx="6"/>
  <text x="145" y="115" fill="#66bb6a" font-size="12" text-anchor="middle" font-family="sans-serif">過剰な木</text>
  <text x="145" y="132" fill="#a0d0a0" font-size="10" text-anchor="middle" font-family="sans-serif">光合成過多</text>
  <!-- Arrow down -->
  <line x1="145" y1="145" x2="145" y2="185" stroke="#66bb6a" stroke-width="2"/>
  <polygon points="139,185 151,185 145,200" fill="#66bb6a"/>
  <!-- Mycelium (transport) -->
  <rect x="60" y="200" width="170" height="45" fill="#16213e" stroke="#f9a825" stroke-width="2" rx="6"/>
  <text x="145" y="222" fill="#f9a825" font-size="12" text-anchor="middle" font-family="sans-serif">菌糸（輸送路）</text>
  <text x="145" y="238" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">双方向トランスポート</text>
  <!-- Arrow down -->
  <line x1="145" y1="245" x2="145" y2="280" stroke="#66bb6a" stroke-width="2"/>
  <polygon points="139,280 151,280 145,295" fill="#66bb6a"/>
  <!-- Deficit node -->
  <rect x="80" y="295" width="130" height="55" fill="#2a1a1a" stroke="#e91e63" stroke-width="2" rx="6"/>
  <text x="145" y="320" fill="#e91e63" font-size="12" text-anchor="middle" font-family="sans-serif">不足した木</text>
  <text x="145" y="337" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">日陰・栄養不足</text>
  <!-- Middle arrow -->
  <text x="400" y="200" fill="#e91e63" font-size="28" text-anchor="middle" font-family="sans-serif">↔</text>
  <!-- Right column: P2P -->
  <text x="600" y="70" fill="#4fc3f7" font-size="15" text-anchor="middle" font-weight="bold" font-family="sans-serif">P2Pネットワーク</text>
  <!-- Seeder node -->
  <rect x="530" y="90" width="130" height="55" fill="#16213e" stroke="#4fc3f7" stroke-width="2" rx="6"/>
  <text x="595" y="115" fill="#4fc3f7" font-size="12" text-anchor="middle" font-family="sans-serif">シーダー</text>
  <text x="595" y="132" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">帯域余裕あり</text>
  <!-- Arrow down -->
  <line x1="595" y1="145" x2="595" y2="185" stroke="#4fc3f7" stroke-width="2"/>
  <polygon points="589,185 601,185 595,200" fill="#4fc3f7"/>
  <!-- DHT routing -->
  <rect x="510" y="200" width="170" height="45" fill="#16213e" stroke="#f9a825" stroke-width="2" rx="6"/>
  <text x="595" y="222" fill="#f9a825" font-size="12" text-anchor="middle" font-family="sans-serif">DHTルーティング</text>
  <text x="595" y="238" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">分散ハッシュテーブル</text>
  <!-- Arrow down -->
  <line x1="595" y1="245" x2="595" y2="280" stroke="#4fc3f7" stroke-width="2"/>
  <polygon points="589,280 601,280 595,295" fill="#4fc3f7"/>
  <!-- Leecher node -->
  <rect x="530" y="295" width="130" height="55" fill="#2a1a1a" stroke="#e91e63" stroke-width="2" rx="6"/>
  <text x="595" y="320" fill="#e91e63" font-size="12" text-anchor="middle" font-family="sans-serif">リーチャー</text>
  <text x="595" y="337" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">リソース要求中</text>
</svg>