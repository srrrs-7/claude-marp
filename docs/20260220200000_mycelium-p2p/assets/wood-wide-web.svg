<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">Wood Wide Web：4億年前の分散ネットワーク</text>
  <!-- Ground line -->
  <rect x="0" y="220" width="800" height="140" fill="#0a0808" opacity="0.6"/>
  <text x="60" y="240" font-family="sans-serif" font-size="11" fill="#555">地下</text>
  <!-- Trees above ground (simplified) -->
  <!-- Tree 1 (Mother Tree) -->
  <rect x="130" y="120" width="20" height="100" fill="#5d3a1a"/>
  <ellipse cx="140" cy="110" rx="50" ry="40" fill="#1a5c1a" opacity="0.8"/>
  <text x="140" y="82" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0" font-weight="bold">母樹</text>
  <text x="140" y="96" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">(Mother Tree)</text>
  <!-- Tree 2 -->
  <rect x="320" y="160" width="14" height="60" fill="#5d3a1a"/>
  <ellipse cx="327" cy="152" rx="36" ry="30" fill="#2a7a2a" opacity="0.7"/>
  <text x="327" y="136" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">若木</text>
  <!-- Tree 3 -->
  <rect x="490" y="140" width="18" height="80" fill="#5d3a1a"/>
  <ellipse cx="499" cy="132" rx="44" ry="36" fill="#1a5c1a" opacity="0.8"/>
  <!-- Tree 4 -->
  <rect x="640" y="150" width="16" height="70" fill="#5d3a1a"/>
  <ellipse cx="648" cy="142" rx="38" ry="32" fill="#2a7a2a" opacity="0.7"/>
  <!-- Underground: mycelium network -->
  <!-- Roots and mycelium connections -->
  <path d="M 140 220 C 140 240 180 250 200 260 C 230 270 280 265 327 260" fill="none" stroke="#f9a825" stroke-width="2" opacity="0.8"/>
  <path d="M 327 260 C 380 265 430 260 499 258" fill="none" stroke="#f9a825" stroke-width="2" opacity="0.8"/>
  <path d="M 499 258 C 550 260 600 262 648 260" fill="none" stroke="#f9a825" stroke-width="2" opacity="0.8"/>
  <path d="M 140 220 C 160 245 220 250 260 255 C 300 260 350 260 420 255 C 460 252 520 250 570 252 C 610 254 640 258 700 260" fill="none" stroke="#f9a825" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- Mycelium filament nodes -->
  <circle cx="200" cy="262" r="4" fill="#f9a825"/>
  <circle cx="327" cy="260" r="6" fill="#f9a825"/>
  <circle cx="499" cy="258" r="5" fill="#f9a825"/>
  <circle cx="648" cy="260" r="4" fill="#f9a825"/>
  <!-- Carbon transfer animation label -->
  <rect x="230" y="296" width="160" height="30" rx="5" fill="#0d1b2a"/>
  <text x="310" y="316" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">炭素・水・シグナル転送</text>
  <!-- Key stats -->
  <rect x="540" y="290" width="220" height="56" rx="5" fill="#0d1b2a"/>
  <text x="650" y="312" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825">1gの土壌に数kmの菌糸</text>
  <text x="650" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">1997年 Simard博士が提唱</text>
  <text x="650" y="344" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">4億年前から存在</text>
</svg>