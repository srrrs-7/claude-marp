<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="340" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">化学シグナルの仕組み：Gossip Protocolとの対応</text>
  <!-- Step 1: Pest attack -->
  <rect x="30" y="48" width="160" height="90" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="110" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e91e63" font-weight="bold">1. 虫害発生</text>
  <text x="110" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">被害木が</text>
  <text x="110" y="106" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">ジャスモン酸を</text>
  <text x="110" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">菌糸へ送信</text>
  <!-- Arrow 1 -->
  <line x1="195" y1="93" x2="225" y2="93" stroke="#f9a825" stroke-width="2"/>
  <polygon points="218,87 230,93 218,99" fill="#f9a825"/>
  <!-- Step 2: Relay -->
  <rect x="230" y="48" width="160" height="90" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="310" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f9a825" font-weight="bold">2. 菌糸伝播</text>
  <text x="310" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">シグナルが</text>
  <text x="310" y="106" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Gossip式に</text>
  <text x="310" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">隣接ノードへ</text>
  <!-- Arrow 2 -->
  <line x1="395" y1="93" x2="425" y2="93" stroke="#f9a825" stroke-width="2"/>
  <polygon points="418,87 430,93 418,99" fill="#f9a825"/>
  <!-- Step 3: Reception -->
  <rect x="430" y="48" width="160" height="90" rx="6" fill="#16213e" stroke="#4ec9b0" stroke-width="2"/>
  <text x="510" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4ec9b0" font-weight="bold">3. 受信・準備</text>
  <text x="510" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">受信木が</text>
  <text x="510" y="106" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">事前に防御酵素を</text>
  <text x="510" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">生成開始</text>
  <!-- Arrow 3 -->
  <line x1="595" y1="93" x2="625" y2="93" stroke="#f9a825" stroke-width="2"/>
  <polygon points="618,87 630,93 618,99" fill="#f9a825"/>
  <!-- Step 4: Result -->
  <rect x="630" y="48" width="140" height="90" rx="6" fill="#003820" stroke="#4ec9b0" stroke-width="2"/>
  <text x="700" y="70" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4ec9b0" font-weight="bold">4. 防衛完了</text>
  <text x="700" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Eventual</text>
  <text x="700" y="106" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Delivery達成</text>
  <text x="700" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">中央なし</text>
  <!-- Bottom comparison table -->
  <rect x="30" y="160" width="740" height="164" rx="8" fill="#0d1b2a"/>
  <text x="400" y="182" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f9a825" font-weight="bold">Gossip Protocol との対応</text>
  <text x="220" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4ec9b0" font-weight="bold">菌糸ネットワーク</text>
  <text x="580" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e91e63" font-weight="bold">Gossip Protocol</text>
  <line x1="30" y1="214" x2="770" y2="214" stroke="#333" stroke-width="1"/>
  <text x="220" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">ジャスモン酸などの化学物質</text>
  <text x="580" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">メッセージペイロード</text>
  <text x="220" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">数時間〜数日（物理的拡散）</text>
  <text x="580" y="252" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">O(log N) ラウンド</text>
  <text x="220" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Eventual Delivery</text>
  <text x="580" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Eventual Consistency</text>
  <text x="220" y="292" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">中央コーディネーターなし</text>
  <text x="580" y="292" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">分散・非中央集権</text>
  <text x="220" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Cassandra, Redis Clusterが実装</text>
  <text x="580" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">← 同じプロトコル</text>
</svg>