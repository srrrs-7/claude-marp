<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">代表的なP2Pプロトコルと菌糸ネットワークの対応</text>
  <!-- Column headers -->
  <rect x="40" y="46" width="200" height="34" rx="5" fill="#16213e"/>
  <text x="140" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f9a825" font-weight="bold">P2Pプロトコル</text>
  <rect x="250" y="46" width="240" height="34" rx="5" fill="#16213e"/>
  <text x="370" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0" font-weight="bold">主な特性</text>
  <rect x="500" y="46" width="260" height="34" rx="5" fill="#16213e"/>
  <text x="630" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e91e63" font-weight="bold">菌糸の対応機能</text>
  <!-- Row 1: Gossip -->
  <rect x="40" y="90" width="200" height="44" rx="4" fill="#0d1b2a"/>
  <text x="140" y="114" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">Gossip Protocol</text>
  <rect x="250" y="90" width="240" height="44" rx="4" fill="#0d1b2a"/>
  <text x="370" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">噂話のように情報を伝播</text>
  <text x="370" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Cassandra, Redis</text>
  <rect x="500" y="90" width="260" height="44" rx="4" fill="#0d1b2a"/>
  <text x="630" y="114" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">化学シグナル伝達</text>
  <!-- Row 2: DHT -->
  <rect x="40" y="144" width="200" height="44" rx="4" fill="#0d1b2a"/>
  <text x="140" y="168" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">DHT</text>
  <rect x="250" y="144" width="240" height="44" rx="4" fill="#0d1b2a"/>
  <text x="370" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">キーでデータ位置を特定</text>
  <text x="370" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">BitTorrent, IPFS</text>
  <rect x="500" y="144" width="260" height="44" rx="4" fill="#0d1b2a"/>
  <text x="630" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">栄養素の分散配置</text>
  <!-- Row 3: Raft/Paxos -->
  <rect x="40" y="198" width="200" height="44" rx="4" fill="#0d1b2a"/>
  <text x="140" y="222" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">Raft / Paxos</text>
  <rect x="250" y="198" width="240" height="44" rx="4" fill="#0d1b2a"/>
  <text x="370" y="216" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">合意形成アルゴリズム</text>
  <text x="370" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">etcd, ZooKeeper</text>
  <rect x="500" y="198" width="260" height="44" rx="4" fill="#0d1b2a"/>
  <text x="630" y="222" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">Mother Tree の意思決定</text>
  <!-- Row 4: CRDTs -->
  <rect x="40" y="252" width="200" height="44" rx="4" fill="#0d1b2a"/>
  <text x="140" y="276" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">CRDTs</text>
  <rect x="250" y="252" width="240" height="44" rx="4" fill="#0d1b2a"/>
  <text x="370" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">競合フリーな結果整合性</text>
  <text x="370" y="286" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">分散データ型</text>
  <rect x="500" y="252" width="260" height="44" rx="4" fill="#0d1b2a"/>
  <text x="630" y="276" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">栄養素の自然な均衡化</text>
  <!-- Bottom -->
  <rect x="40" y="310" width="720" height="34" rx="6" fill="#16213e"/>
  <text x="400" y="332" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f9a825">Gossip Protocol が菌糸の化学シグナル伝達に最も近い設計</text>
</svg>