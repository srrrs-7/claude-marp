<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">Mother Tree：ネットワークのハブノード</text>
  <!-- Central hub: Mother Tree -->
  <circle cx="400" cy="200" r="55" fill="#1e3a1e" stroke="#66bb6a" stroke-width="3"/>
  <text x="400" y="193" fill="#66bb6a" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">Mother Tree</text>
  <text x="400" y="213" fill="#a0d0a0" font-size="11" text-anchor="middle" font-family="sans-serif">ハブノード</text>
  <!-- Satellite trees -->
  <circle cx="160" cy="110" r="30" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="160" y="105" fill="#f9a825" font-size="10" text-anchor="middle" font-family="sans-serif">若木A</text>
  <text x="160" y="120" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">依存ノード</text>
  <circle cx="640" cy="110" r="30" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="640" y="105" fill="#f9a825" font-size="10" text-anchor="middle" font-family="sans-serif">若木B</text>
  <text x="640" y="120" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">依存ノード</text>
  <circle cx="120" cy="290" r="28" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="120" y="285" fill="#4fc3f7" font-size="10" text-anchor="middle" font-family="sans-serif">隣接木C</text>
  <text x="120" y="300" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">中継ノード</text>
  <circle cx="680" cy="290" r="28" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="680" y="285" fill="#4fc3f7" font-size="10" text-anchor="middle" font-family="sans-serif">隣接木D</text>
  <text x="680" y="300" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">中継ノード</text>
  <circle cx="400" cy="310" r="25" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="400" y="305" fill="#e91e63" font-size="10" text-anchor="middle" font-family="sans-serif">幼木E</text>
  <text x="400" y="318" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">受信専用</text>
  <!-- Connections -->
  <line x1="350" y1="155" x2="190" y2="130" stroke="#66bb6a" stroke-width="2.5"/>
  <line x1="450" y1="155" x2="610" y2="130" stroke="#66bb6a" stroke-width="2.5"/>
  <line x1="355" y1="245" x2="148" y2="268" stroke="#4fc3f7" stroke-width="1.5"/>
  <line x1="445" y1="245" x2="652" y2="268" stroke="#4fc3f7" stroke-width="1.5"/>
  <line x1="400" y1="255" x2="400" y2="285" stroke="#e91e63" stroke-width="1.5"/>
  <!-- Flow labels -->
  <text x="260" y="130" fill="#66bb6a" font-size="10" text-anchor="middle" font-family="sans-serif">炭素・栄養</text>
  <text x="540" y="130" fill="#66bb6a" font-size="10" text-anchor="middle" font-family="sans-serif">炭素・栄養</text>
  <text x="255" y="265" fill="#4fc3f7" font-size="10" text-anchor="middle" font-family="sans-serif">化学信号</text>
  <text x="545" y="265" fill="#4fc3f7" font-size="10" text-anchor="middle" font-family="sans-serif">化学信号</text>
  <!-- P2P analogy -->
  <text x="400" y="362" fill="#a0a0c0" font-size="12" text-anchor="middle" font-family="sans-serif">P2Pのスーパーノード：高帯域・安定接続のハブが全体を支える</text>
</svg>