<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">P2Pネットワークの設計原則</text>
  <!-- Central: Decentralized network visualization -->
  <!-- Multiple nodes without center -->
  <circle cx="400" cy="190" r="12" fill="#4ec9b0"/>
  <circle cx="280" cy="130" r="12" fill="#4ec9b0"/>
  <circle cx="520" cy="130" r="12" fill="#4ec9b0"/>
  <circle cx="220" cy="230" r="12" fill="#4ec9b0"/>
  <circle cx="580" cy="230" r="12" fill="#4ec9b0"/>
  <circle cx="310" cy="300" r="12" fill="#4ec9b0"/>
  <circle cx="490" cy="300" r="12" fill="#4ec9b0"/>
  <circle cx="160" cy="160" r="12" fill="#4ec9b0"/>
  <circle cx="640" cy="160" r="12" fill="#4ec9b0"/>
  <!-- Connections (mesh-like) -->
  <line x1="400" y1="190" x2="280" y2="130" stroke="#4ec9b0" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="190" x2="520" y2="130" stroke="#4ec9b0" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="190" x2="220" y2="230" stroke="#4ec9b0" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="190" x2="580" y2="230" stroke="#4ec9b0" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="190" x2="310" y2="300" stroke="#4ec9b0" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="190" x2="490" y2="300" stroke="#4ec9b0" stroke-width="1.5" opacity="0.6"/>
  <line x1="280" y1="130" x2="160" y2="160" stroke="#4ec9b0" stroke-width="1" opacity="0.4"/>
  <line x1="280" y1="130" x2="220" y2="230" stroke="#4ec9b0" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="130" x2="640" y2="160" stroke="#4ec9b0" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="130" x2="580" y2="230" stroke="#4ec9b0" stroke-width="1" opacity="0.4"/>
  <line x1="220" y1="230" x2="310" y2="300" stroke="#4ec9b0" stroke-width="1" opacity="0.4"/>
  <line x1="580" y1="230" x2="490" y2="300" stroke="#4ec9b0" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="160" x2="220" y2="230" stroke="#4ec9b0" stroke-width="1" opacity="0.3"/>
  <line x1="640" y1="160" x2="580" y2="230" stroke="#4ec9b0" stroke-width="1" opacity="0.3"/>
  <!-- Labels around nodes -->
  <text x="400" y="214" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">ノード</text>
  <!-- Properties on right -->
  <rect x="680" y="50" width="104" height="280" rx="6" fill="#16213e"/>
  <text x="732" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825" font-weight="bold">特性</text>
  <text x="732" y="96" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4ec9b0">非中央集権</text>
  <line x1="692" y1="104" x2="772" y2="104" stroke="#333" stroke-width="1"/>
  <text x="732" y="124" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4ec9b0">対等なノード</text>
  <line x1="692" y1="132" x2="772" y2="132" stroke="#333" stroke-width="1"/>
  <text x="732" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4ec9b0">自律分散</text>
  <line x1="692" y1="160" x2="772" y2="160" stroke="#333" stroke-width="1"/>
  <text x="732" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4ec9b0">スケール性</text>
  <line x1="692" y1="188" x2="772" y2="188" stroke="#333" stroke-width="1"/>
  <text x="732" y="208" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4ec9b0">耐障害性</text>
  <!-- "No single point of failure" indicator -->
  <!-- Highlighted failed node (crossed out) -->
  <circle cx="400" cy="190" r="12" fill="#e91e63" opacity="0.3"/>
  <line x1="392" y1="182" x2="408" y2="198" stroke="#e91e63" stroke-width="2"/>
  <line x1="408" y1="182" x2="392" y2="198" stroke="#e91e63" stroke-width="2"/>
  <text x="400" y="226" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e91e63">障害</text>
  <!-- Bypass path -->
  <line x1="280" y1="130" x2="520" y2="130" stroke="#f9a825" stroke-width="2" stroke-dasharray="5"/>
  <polygon points="510,124 522,130 510,136" fill="#f9a825"/>
  <text x="400" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f9a825">迂回経路</text>
  <!-- Bottom -->
  <rect x="20" y="334" width="650" height="34" rx="6" fill="#0d1b2a"/>
  <text x="345" y="356" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">部分障害でもシステム全体は継続動作 = 菌糸ネットワークと同じ原理</text>
</svg>