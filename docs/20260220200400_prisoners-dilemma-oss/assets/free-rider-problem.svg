<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">フリーライダー問題：OSSの依存関係</text>
  <!-- Large base: millions of projects -->
  <rect x="40" y="200" width="720" height="120" rx="10" fill="#16213e" stroke="#4ec9b0" stroke-width="2"/>
  <text x="400" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4ec9b0" font-weight="bold">数百万のプロジェクト</text>
  <text x="400" y="254" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">Fortune 500の97%がOSSを利用</text>
  <text x="400" y="274" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">全員が無料で使用 → 貢献なし = フリーライダー</text>
  <text x="400" y="294" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e91e63">Nash均衡：誰も貢献しない → エコシステム崩壊</text>
  <!-- Narrow middle: key packages -->
  <rect x="160" y="110" width="480" height="80" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="138" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f9a825" font-weight="bold">重要OSSパッケージ</text>
  <text x="400" y="158" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">left-pad / log4j / OpenSSL ...</text>
  <text x="400" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">世界インフラを支える小さなパッケージ</text>
  <!-- Tiny top: maintainers -->
  <rect x="280" y="46" width="240" height="56" rx="8" fill="#300" stroke="#e91e63" stroke-width="2"/>
  <text x="400" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e91e63" font-weight="bold">メンテナー</text>
  <text x="400" y="88" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">1〜2人のボランティア（無報酬46%）</text>
  <!-- Arrows -->
  <line x1="400" y1="102" x2="400" y2="110" stroke="#f9a825" stroke-width="2"/>
  <polygon points="394,106 400,116 406,106" fill="#f9a825"/>
  <line x1="400" y1="190" x2="400" y2="200" stroke="#4ec9b0" stroke-width="2"/>
  <polygon points="394,194 400,204 406,194" fill="#4ec9b0"/>
  <!-- Left annotation: Log4Shell -->
  <rect x="40" y="68" width="170" height="52" rx="6" fill="#0d1b2a"/>
  <text x="125" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63">Log4Shell (2021)</text>
  <text x="125" y="106" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">2人が世界インフラを支撑</text>
  <!-- Right annotation: left-pad -->
  <rect x="590" y="68" width="170" height="52" rx="6" fill="#0d1b2a"/>
  <text x="675" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63">left-pad (2016)</text>
  <text x="675" y="106" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">11行で百万プロジェクト影響</text>
</svg>