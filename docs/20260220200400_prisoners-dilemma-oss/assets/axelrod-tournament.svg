<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">Axelrodのトーナメント：協力が勝つ</text>
  <!-- Leaderboard style -->
  <!-- Header row -->
  <rect x="60" y="60" width="680" height="35" fill="#16213e" stroke="#f9a825" stroke-width="1" rx="4"/>
  <text x="130" y="82" fill="#f9a825" font-size="13" text-anchor="middle" font-family="sans-serif">戦略名</text>
  <text x="380" y="82" fill="#f9a825" font-size="13" text-anchor="middle" font-family="sans-serif">スコア</text>
  <text x="570" y="82" fill="#f9a825" font-size="13" text-anchor="middle" font-family="sans-serif">特徴</text>
  <!-- Row 1: TFT (winner) -->
  <rect x="60" y="97" width="680" height="40" fill="#1e3a1e" stroke="#66bb6a" stroke-width="2" rx="4"/>
  <text x="80" y="115" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">1</text>
  <text x="130" y="115" fill="#66bb6a" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">Tit for Tat</text>
  <rect x="280" y="104" width="160" height="12" fill="#66bb6a" rx="3"/>
  <text x="380" y="122" fill="#a0d0a0" font-size="10" text-anchor="middle" font-family="sans-serif">652点</text>
  <text x="570" y="115" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">協力スタート、相手に応じる</text>
  <!-- Row 2 -->
  <rect x="60" y="139" width="680" height="38" fill="#16213e" stroke="#4fc3f7" stroke-width="1" rx="4"/>
  <text x="80" y="157" fill="#a0a0c0" font-size="14" font-family="sans-serif">2</text>
  <text x="130" y="157" fill="#4fc3f7" font-size="12" text-anchor="middle" font-family="sans-serif">Tit for Two Tats</text>
  <rect x="280" y="145" width="138" height="12" fill="#4fc3f7" rx="3"/>
  <text x="380" y="163" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">618点</text>
  <text x="570" y="157" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">2回裏切りで報復</text>
  <!-- Row 3 -->
  <rect x="60" y="179" width="680" height="38" fill="#16213e" stroke="#555" stroke-width="1" rx="4"/>
  <text x="80" y="197" fill="#a0a0c0" font-size="14" font-family="sans-serif">3</text>
  <text x="130" y="197" fill="#a0a0c0" font-size="12" text-anchor="middle" font-family="sans-serif">Cooperator</text>
  <rect x="280" y="185" width="110" height="12" fill="#555" rx="3"/>
  <text x="380" y="203" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">571点</text>
  <text x="570" y="197" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">常に協力（搾取されやすい）</text>
  <!-- Last row: Defector (loses) -->
  <rect x="60" y="219" width="680" height="38" fill="#2a1a1a" stroke="#e91e63" stroke-width="1" rx="4"/>
  <text x="80" y="237" fill="#e91e63" font-size="14" font-family="sans-serif">最下</text>
  <text x="130" y="237" fill="#e91e63" font-size="12" text-anchor="middle" font-family="sans-serif">Always Defect</text>
  <rect x="280" y="225" width="48" height="12" fill="#e91e63" rx="3"/>
  <text x="380" y="243" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">241点</text>
  <text x="570" y="237" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">常に裏切り（孤立して敗北）</text>
  <!-- Key insight -->
  <rect x="60" y="278" width="680" height="60" fill="#1a1a3e" stroke="#f9a825" stroke-width="1" rx="6"/>
  <text x="400" y="302" fill="#f9a825" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">Axelrodの結論</text>
  <text x="400" y="323" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">「良い（協力的）、報復的、許容的、明快」の4条件を満たす戦略が長期的に勝つ</text>
</svg>