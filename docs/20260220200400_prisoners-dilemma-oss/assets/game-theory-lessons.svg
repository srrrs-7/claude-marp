<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">ゲーム理論が示す3つの教訓（概観）</text>
  <!-- Lesson 1 -->
  <rect x="40" y="65" width="215" height="260" fill="#16213e" stroke="#66bb6a" stroke-width="2" rx="8"/>
  <text x="147" y="95" fill="#66bb6a" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">1. 繰り返しが協力を生む</text>
  <line x1="60" y1="105" x2="235" y2="105" stroke="#66bb6a" stroke-width="1"/>
  <text x="147" y="135" fill="#ffffff" font-size="11" text-anchor="middle" font-family="sans-serif">1回限りのゲーム</text>
  <text x="147" y="153" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">→ 裏切りが合理的</text>
  <text x="147" y="185" fill="#ffffff" font-size="11" text-anchor="middle" font-family="sans-serif">繰り返しゲーム</text>
  <text x="147" y="203" fill="#a0d0a0" font-size="10" text-anchor="middle" font-family="sans-serif">→ 長期的協力が合理的</text>
  <text x="147" y="250" fill="#4fc3f7" font-size="10" text-anchor="middle" font-family="sans-serif">OSSの教訓:</text>
  <text x="147" y="268" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">コントリビューション履歴が</text>
  <text x="147" y="284" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">信頼を構築する</text>
  <!-- Lesson 2 -->
  <rect x="292" y="65" width="215" height="260" fill="#16213e" stroke="#4fc3f7" stroke-width="2" rx="8"/>
  <text x="399" y="95" fill="#4fc3f7" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">2. 透明性が信頼を作る</text>
  <line x1="312" y1="105" x2="487" y2="105" stroke="#4fc3f7" stroke-width="1"/>
  <text x="399" y="135" fill="#ffffff" font-size="11" text-anchor="middle" font-family="sans-serif">非対称情報</text>
  <text x="399" y="153" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">→ 不信・機会主義</text>
  <text x="399" y="185" fill="#ffffff" font-size="11" text-anchor="middle" font-family="sans-serif">公開ログ・コード</text>
  <text x="399" y="203" fill="#a0d0a0" font-size="10" text-anchor="middle" font-family="sans-serif">→ 監視・相互牽制</text>
  <text x="399" y="250" fill="#4fc3f7" font-size="10" text-anchor="middle" font-family="sans-serif">OSSの教訓:</text>
  <text x="399" y="268" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">GitHubのコミット履歴が</text>
  <text x="399" y="284" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">行動を可視化する</text>
  <!-- Lesson 3 -->
  <rect x="545" y="65" width="215" height="260" fill="#16213e" stroke="#f9a825" stroke-width="2" rx="8"/>
  <text x="652" y="95" fill="#f9a825" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">3. 評判が行動を変える</text>
  <line x1="565" y1="105" x2="740" y2="105" stroke="#f9a825" stroke-width="1"/>
  <text x="652" y="135" fill="#ffffff" font-size="11" text-anchor="middle" font-family="sans-serif">匿名・使い捨て</text>
  <text x="652" y="153" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">→ 無責任行動</text>
  <text x="652" y="185" fill="#ffffff" font-size="11" text-anchor="middle" font-family="sans-serif">評判・ブランド</text>
  <text x="652" y="203" fill="#f9c825" font-size="10" text-anchor="middle" font-family="sans-serif">→ 長期的行動変容</text>
  <text x="652" y="250" fill="#4fc3f7" font-size="10" text-anchor="middle" font-family="sans-serif">OSSの教訓:</text>
  <text x="652" y="268" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">開発者ブランドが</text>
  <text x="652" y="284" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">質の高い貢献を促す</text>
</svg>