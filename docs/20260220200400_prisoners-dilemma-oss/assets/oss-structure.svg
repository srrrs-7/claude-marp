<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">OSS特有の構造：公共財ゲーム</text>
  <!-- Central resource: OSS project -->
  <rect x="290" y="140" width="220" height="100" fill="#1e3a1e" stroke="#66bb6a" stroke-width="3" rx="10"/>
  <text x="400" y="183" fill="#66bb6a" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">OSSプロジェクト</text>
  <text x="400" y="203" fill="#a0d0a0" font-size="11" text-anchor="middle" font-family="sans-serif">公共財（非競合・非排除）</text>
  <text x="400" y="222" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">使っても減らない</text>
  <!-- Contributors -->
  <circle cx="130" cy="100" r="35" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="130" y="95" fill="#4fc3f7" font-size="11" text-anchor="middle" font-family="sans-serif">コントリビュータ</text>
  <text x="130" y="112" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">コード・バグ修正</text>
  <line x1="165" y1="120" x2="290" y2="165" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="215" y="140" fill="#4fc3f7" font-size="9" text-anchor="middle" font-family="sans-serif">貢献</text>
  <circle cx="670" cy="100" r="35" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="670" y="95" fill="#4fc3f7" font-size="11" text-anchor="middle" font-family="sans-serif">スポンサー</text>
  <text x="670" y="112" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">資金・リソース</text>
  <line x1="635" y1="120" x2="510" y2="165" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="582" y="140" fill="#4fc3f7" font-size="9" text-anchor="middle" font-family="sans-serif">投資</text>
  <!-- Free riders -->
  <circle cx="130" cy="300" r="35" fill="#2a1a1a" stroke="#e91e63" stroke-width="2"/>
  <text x="130" y="295" fill="#e91e63" font-size="11" text-anchor="middle" font-family="sans-serif">フリーライダー</text>
  <text x="130" y="312" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">使うだけ</text>
  <line x1="165" y1="280" x2="290" y2="240" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="215" y="265" fill="#e91e63" font-size="9" text-anchor="middle" font-family="sans-serif">搾取</text>
  <circle cx="670" cy="300" r="35" fill="#2a1a1a" stroke="#e91e63" stroke-width="2"/>
  <text x="670" y="295" fill="#e91e63" font-size="11" text-anchor="middle" font-family="sans-serif">企業利用者</text>
  <text x="670" y="312" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">取るだけ</text>
  <line x1="635" y1="280" x2="510" y2="240" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="582" y="265" fill="#e91e63" font-size="9" text-anchor="middle" font-family="sans-serif">搾取</text>
  <!-- Bottom: sustainability concern -->
  <text x="400" y="355" fill="#a0a0c0" font-size="12" text-anchor="middle" font-family="sans-serif">フリーライダーが多すぎると持続可能性が失われる → 制度設計が鍵</text>
</svg>