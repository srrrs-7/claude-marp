<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">インセンティブ設計：Nash均衡を変える</text>
  <!-- Game before incentive design -->
  <rect x="40" y="50" width="320" height="260" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="200" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">変更前：フリーライダー均衡</text>
  <!-- 2x2 matrix -->
  <text x="200" y="104" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">企業の選択</text>
  <text x="100" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">貢献</text>
  <text x="290" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">フリーライド</text>
  <rect x="58" y="138" width="110" height="80" rx="4" fill="#003820"/>
  <text x="113" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">コスト高</text>
  <text x="113" y="188" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">+社会的利益</text>
  <rect x="178" y="138" width="110" height="80" rx="4" fill="#300010" stroke="#e91e63" stroke-width="2"/>
  <text x="233" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63" font-weight="bold">ゼロコスト</text>
  <text x="233" y="188" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ff8080">+完全利益</text>
  <text x="233" y="206" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f9a825">支配戦略!</text>
  <rect x="58" y="240" width="230" height="52" rx="5" fill="#200000"/>
  <text x="173" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e91e63">全員フリーライド</text>
  <text x="173" y="278" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">OSSエコシステム崩壊</text>
  <!-- Arrow between -->
  <line x1="365" y1="180" x2="430" y2="180" stroke="#f9a825" stroke-width="2"/>
  <polygon points="422,174 434,180 422,186" fill="#f9a825"/>
  <text x="397" y="172" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825">制度設計</text>
  <!-- After incentive design -->
  <rect x="440" y="50" width="320" height="260" rx="8" fill="#16213e" stroke="#4ec9b0" stroke-width="2"/>
  <text x="600" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4ec9b0" font-weight="bold">変更後：協力均衡</text>
  <text x="600" y="104" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">GitHub Sponsors / OSPO 等</text>
  <rect x="458" y="118" width="284" height="50" rx="5" fill="#003820" stroke="#4ec9b0" stroke-width="1"/>
  <text x="600" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4ec9b0">貢献に金銭的リターン</text>
  <text x="600" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">→ 貢献コストを下げる</text>
  <rect x="458" y="178" width="284" height="50" rx="5" fill="#003820" stroke="#4ec9b0" stroke-width="1"/>
  <text x="600" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4ec9b0">フリーライドのコスト増加</text>
  <text x="600" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Dual License / SSPL</text>
  <rect x="458" y="240" width="284" height="52" rx="5" fill="#003820"/>
  <text x="600" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">協力が合理的になる</text>
  <text x="600" y="278" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">繰り返しゲームで安定</text>
</svg>