<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">ゲーム理論：個人合理性 vs 集団合理性</text>
  <!-- Two player choices -->
  <!-- Player A -->
  <rect x="40" y="56" width="200" height="260" rx="8" fill="#16213e" stroke="#4ec9b0" stroke-width="2"/>
  <text x="140" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4ec9b0" font-weight="bold">プレイヤー A</text>
  <rect x="60" y="96" width="160" height="50" rx="5" fill="#003820"/>
  <text x="140" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0" font-weight="bold">協力</text>
  <text x="140" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">集団最適</text>
  <rect x="60" y="160" width="160" height="50" rx="5" fill="#300010"/>
  <text x="140" y="182" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e91e63" font-weight="bold">裏切り</text>
  <text x="140" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">支配戦略</text>
  <!-- Center: result matrix summary -->
  <rect x="280" y="56" width="240" height="260" rx="8" fill="#0d1b2a"/>
  <text x="400" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f9a825" font-weight="bold">均衡</text>
  <!-- Both cooperate -->
  <rect x="296" y="100" width="208" height="50" rx="5" fill="#003820" stroke="#4ec9b0" stroke-width="1"/>
  <text x="400" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">両者協力</text>
  <text x="400" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#80ffcc">パレート最適（最善）</text>
  <!-- One defects -->
  <rect x="296" y="160" width="208" height="50" rx="5" fill="#200010"/>
  <text x="400" y="182" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ff8080">一方だけ裏切り</text>
  <text x="400" y="198" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">搾取・非対称</text>
  <!-- Both defect -->
  <rect x="296" y="220" width="208" height="50" rx="5" fill="#300" stroke="#e91e63" stroke-width="2"/>
  <text x="400" y="242" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63" font-weight="bold">両者裏切り</text>
  <text x="400" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ff8080">Nash均衡（最悪）</text>
  <!-- Player B -->
  <rect x="560" y="56" width="200" height="260" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="660" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">プレイヤー B</text>
  <rect x="580" y="96" width="160" height="50" rx="5" fill="#003820"/>
  <text x="660" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0" font-weight="bold">協力</text>
  <text x="660" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">集団最適</text>
  <rect x="580" y="160" width="160" height="50" rx="5" fill="#300010"/>
  <text x="660" y="182" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e91e63" font-weight="bold">裏切り</text>
  <text x="660" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">支配戦略</text>
  <!-- Bottom insight -->
  <rect x="40" y="334" width="720" height="0" rx="5" fill="#16213e"/>
</svg>