<h1 id="%E6%A9%9F%E6%A2%B0%E5%AD%A6%E7%BF%92%E3%81%AE%E7%A8%AE%E9%A1%9E">機械学習の種類</h1>
<blockquote>
<p><em>教師あり・教師なし・強化学習・半教師あり・自己教師ありの5種類、LLMはRLHFで改善</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="800" height="380" fill="#1a1a2e" rx="0" /><text x="400" y="32" font-family="sans-serif" font-size="20" fill="#f9a825" text-anchor="middle" font-weight="bold">機械学習の種類 — 試験ポイント</text><rect x="15" y="70" width="230" height="260" fill="#16213e" rx="8" /><rect x="15" y="70" width="230" height="7" fill="#e91e63" rx="4" /><text x="130" y="110" font-family="sans-serif" font-size="16" fill="#e91e63" text-anchor="middle" font-weight="bold">教師あり学習</text><text x="130" y="145" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal">ラベル付きデータ</text><text x="130" y="175" font-family="sans-serif" font-size="11" fill="#b0b8d0" text-anchor="middle" font-weight="normal">分類・回帰・SageMaker</text><rect x="285" y="70" width="230" height="260" fill="#16213e" rx="8" /><rect x="285" y="70" width="230" height="7" fill="#0d7377" rx="4" /><text x="400" y="110" font-family="sans-serif" font-size="16" fill="#0d7377" text-anchor="middle" font-weight="bold">教師なし学習</text><text x="400" y="145" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal">ラベルなしデータ</text><text x="400" y="175" font-family="sans-serif" font-size="11" fill="#b0b8d0" text-anchor="middle" font-weight="normal">クラスタリング・次元削減</text><rect x="555" y="70" width="230" height="260" fill="#16213e" rx="8" /><rect x="555" y="70" width="230" height="7" fill="#6b2d8b" rx="4" /><text x="670" y="110" font-family="sans-serif" font-size="16" fill="#6b2d8b" text-anchor="middle" font-weight="bold">強化学習</text><text x="670" y="145" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="normal">報酬最大化</text><text x="670" y="175" font-family="sans-serif" font-size="11" fill="#b0b8d0" text-anchor="middle" font-weight="normal">ゲームAI・RLHF</text></svg></li>
<li><strong>教師あり学習（Supervised Learning）</strong>: ラベル付きデータから予測モデルを学習。分類（スパム判定）・回帰（価格予測）</li>
<li><strong>教師なし学習（Unsupervised Learning）</strong>: ラベルなしデータからパターン発見。クラスタリング・次元削減・異常検知</li>
<li><strong>強化学習（Reinforcement Learning）</strong>: 環境との相互作用から報酬を最大化。ゲーム AI・ロボット制御・RLHF（LLM の人間フィードバック学習）</li>
<li><strong>半教師あり学習</strong>: 少量のラベル付き + 大量のラベルなしデータを組み合わせる</li>
<li><strong>自己教師あり学習</strong>: データ自体から教師信号を生成（LLM の事前学習・BERT・GPT）</li>
</ul>
</section>

<p><em>クラス不均衡時はAccuracyより F1 Score、がん診断など偽陰性を減らす場合はRecall優先</em></p>
</blockquote>

<li><strong>Precision（適合率）</strong>: 「陽性と予測した」うち本当の陽性の割合。偽陽性を減らしたい時</li>
<li><strong>Recall（再現率）</strong>: 「実際の陽性」のうち正しく検出できた割合。偽陰性を減らしたい時（がん診断など）</li>
<li><strong>F1 Score</strong>: Precision と Recall の調和平均。不均衡データの総合指標</li>
<li><strong>AUC-ROC</strong>: モデルの判別能力を 0〜1 で評価。0.5 = ランダム、1.0 = 完璧</li>
<li><strong>RMSE/MAE</strong>: 回帰問題の誤差指標。RMSE は外れ値に敏感</li>
</ul>

- **従来 AI との違い**: 判別 AI（入力→分類/予測）vs 生成 AI（入力→新しいコンテンツ創出）
- **Foundation Models（FM）**: 大規模データで事前学習済みの汎用モデル。数十億〜数千億パラメータ
- **FMの特徴**: ファインチューニングなしで多様なタスクに対応（Zero-shot/Few-shot）
- **マルチモーダル**: テキスト・画像・音声・動画など複数モダリティに対応するモデル

- **Self-Attention メカニズム**: 文章内の単語間の関係性を並列計算で捉える（長距離依存も対応）
- **エンコーダ・デコーダ構造**: BERT（エンコーダ型）= 理解タスク / GPT（デコーダ型）= 生成タスク
- **位置エンコーディング**: 単語の順序情報を数値化してモデルに付与（RNN 不要）
- **Scale の重要性**: パラメータ数・データ量・計算量を増やすほど能力が急激に向上（Scaling Law）

- **トークン**: LLM が処理するテキストの基本単位（サブワード）。1 トークン ≈ 0.75 英語単語 / 0.5 日本語文字
- **エンベディング**: テキストを意味を保持した高次元数値ベクトルに変換。類似テキスト = 近いベクトル
- **コンテキストウィンドウ**: 1 回のリクエストで処理できる最大トークン数（入力 + 出力の合計）
- **重要性**: コンテキストウィンドウが大きい = 長い文書・会話履歴を一度に処理可能
- **チャンキング**: 長文書をコンテキストウィンドウに収まるサイズに分割する手法（RAG で重要）

<h1 id="llm-%E6%8E%A8%E8%AB%96%E3%83%91%E3%83%A9%E3%83%A1%E3%83%BC%E3%82%BF">LLM 推論パラメータ</h1>
<blockquote>
<p><em>事実確認・コード生成→低Temperature、創作・アイデア出し→高Temperature が基本原則</em></p>
</blockquote>
<ul>
<li><strong>Temperature（0〜2）</strong>: 出力の多様性。低い値（0.1）→確定的・一貫性高い / 高い値（1.5）→創造的・ランダム</li>
<li><strong>Top-P（0〜1）</strong>: 累積確率が P を超えるまでの上位トークンからサンプリング（Nucleus Sampling）</li>
<li><strong>Top-K</strong>: 上位 K 個のトークンの中からサンプリング。K=1 → Greedy（最高確率を常に選択）</li>
<li><strong>Max Tokens</strong>: 生成するトークン数の上限（コスト制御と応答長のバランス）</li>
<li><strong>Stop Sequences</strong>: 特定の文字列が出現したら生成を停止する（出力形式の制御）</li>
<li><strong>試験ポイント</strong>: 事実確認・コード生成 → 低 Temperature / 創作・アイデア出し → 高 Temperature</li>
</ul>
</section>

- **Self-Consistency**: 同じ質問を複数回（異なる Temperature で）生成し、多数決で最終回答を決定
- **ReAct（Reasoning + Acting）**: 推論とツール使用を交互に繰り返す。Bedrock Agents の基盤
- **Reflection**: モデルが自分の回答を批評・修正する反復プロセス（精度向上）
- **Tree-of-Thought（ToT）**: 複数の推論パスを木構造で探索（複雑な問題に有効）
- **Prompt Injection 対策**: ユーザー入力を信頼しない設計・入力のサニタイズ・Guardrails 活用
- **System Prompt**: AI の役割・制約・出力形式をセッション全体で定義する事前指示

<text x="140" y="133" font-family="sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="normal">外部ナレッジから根拠取得</text><text x="140" y="151" font-family="sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="normal">→ Bedrock Knowledge Bases</text>

- **原因②（確率的生成）**: 次のトークンを確率的に予測するため、「それらしい嘘」が生まれる
- **原因③（コンテキスト不足）**: 十分な情報なしに質問されると、埋め合わせで誤情報を生成
- **被害事例**: 存在しない法律条文・医療情報の誤り・架空の引用文献

<h1 id="ragretrieval-augmented-generation%E3%81%A8%E3%81%AF">RAG（Retrieval-Augmented Generation）とは</h1>
<blockquote>
<p><em>クエリ→エンベディング→ベクトルDB検索→FM入力→生成の5ステップでハルシネーションを大幅軽減</em></p>
</blockquote>
<ul>
<li><strong>RAG の定義</strong>: 外部ナレッジベースから関連情報を取得（Retrieve）して FM の回答生成（Generate）を補強するパターン</li>
<li><strong>解決する問題</strong>: ① 知識カットオフ ② ハルシネーション ③ 社内固有情報への対応（Fine-tuning 不要）</li>
<li><strong>基本フロー</strong>: クエリ → エンベディング変換 → ベクトル DB 類似検索 → 関連チャンク取得 → FM に入力 → 回答生成</li>
<li><strong>AWS 実装</strong>: Amazon Bedrock Knowledge Bases（マネージド RAG）</li>
<li><strong>ベクトルストア選択肢</strong>: OpenSearch Serverless / Aurora PostgreSQL（pgvector）/ Pinecone / Redis Enterprise</li>
<li><strong>メリット</strong>: 最新情報対応・引用付き回答・ハルシネーション大幅軽減・Fine-tuning 不要</li>
</ul>
</section>

<h1 id="amazon-bedrock-knowledge-bases">Amazon Bedrock Knowledge Bases</h1>
<blockquote>
<p><em>S3・Confluence・SharePointを自動処理、RetrieveAndGenerateで引用付き回答生成が可能</em></p>
</blockquote>
<ul>
<li><strong>定義</strong>: S3 のドキュメントを自動的に処理し、ベクトル DB と統合するマネージド RAG サービス</li>
<li><strong>データソース</strong>: Amazon S3 / Confluence / SharePoint / Salesforce / Web Crawler</li>
<li><strong>処理フロー</strong>: ドキュメント読み込み → チャンキング → エンベディング（Titan）→ ベクトル DB 保存</li>
<li><strong>API</strong>: <code>RetrieveAndGenerate</code>（引用付き回答生成）/ <code>Retrieve</code>（検索のみ・後続処理を自由に設計）</li>
<li><strong>チャンキング戦略</strong>: Fixed-size / Semantic（意味単位）/ Hierarchical（階層分割）で検索精度が変わる</li>
<li><strong>統合ベクトル DB</strong>: OpenSearch Serverless（デフォルト）/ Aurora pgvector / Pinecone / Redis Enterprise</li>
</ul>
</section>

<h1 id="amazon-bedrock-agents">Amazon Bedrock Agents</h1>
<blockquote>
<p><em>ReActパターンでOpenAPI定義のLambda関数を自律呼び出し、Return Controlで高リスクアクション前に人間確認</em></p>
</blockquote>
<ul>
<li><strong>定義</strong>: FM を使ってマルチステップタスクを自律実行するエージェント構築サービス</li>
<li><strong>仕組み（ReAct パターン）</strong>: FM が Reasoning（推論）→ Action（ツール実行）→ Observation（結果確認）を繰り返す</li>
<li><strong>Action Groups</strong>: OpenAPI スキーマで定義した API を FM が呼び出す（Lambda 関数に接続）</li>
<li><strong>Return Control</strong>: エージェントが人間の確認を求めて一時停止できる（高リスクアクション前）</li>
<li><strong>Knowledge Bases 連携</strong>: Agent から KB を参照して事実根拠に基づいた回答を生成</li>
<li><strong>ユースケース</strong>: カスタマーサポート自動化 / 社内 Q&amp;A / コード生成 / ワークフロー自動化</li>
</ul>
</section>

<p><em>Fine-tuningは特定タスク精度向上、Continued Pre-trainingはドメイン特化、カタストロフィック忘却に注意</em></p>

<ul>
<li>

- **Fine-tuning（追加学習）**: 事前学習済み FM に特定タスクのデータ（入力/出力ペア）で追加学習
- **Fine-tuning のメリット**: 特定タスクの精度向上 / 応答スタイルの固定 / 推論速度改善
- **Fine-tuning の注意**: カタストロフィック忘却（以前の能力低下）/ 大量の高品質データが必要
- **Continued Pre-training**: 特定ドメインの大量テキストで Base Model を継続学習（医療・法律・言語等）
- **Bedrock での実装**: コンソール / API でファインチューニングジョブを実行（Titan・Llama 対応）
- **Provisioned Throughput**: Fine-tuned モデルを専用スループットでデプロイ（低レイテンシー保証）

<ul>
<li><strong>Fairness（公平性）</strong>: すべてのユーザーに対して公平な結果を提供。特定グループへの差別・偏見を防止</li>
<li><strong>Explainability（説明可能性）</strong>: モデルの予測根拠を人間が理解できる形で提示（ブラックボックス問題の解消）</li>
<li><strong>Privacy &amp; Security（プライバシー）</strong>: 個人データの保護・最小化・安全な取り扱い（GDPR 準拠）</li>
<li><strong>Safety（安全性）</strong>: 有害なコンテンツの生成・意図しない悪用を防止（Guardrails）</li>
<li><strong>Controllability（制御可能性）</strong>: 人間が AI の動作を監視・制御・修正できる仕組み（HITL）</li>
<li><strong>Veracity（正確性）</strong>: 正確な情報を提供し、ハルシネーションを最小化（RAG・Grounding）</li>
</ul>

- **学習データバイアス**: 過去の差別的データを学習したモデルが同様の偏りを再現（採用スクリーニング等）
- **選択バイアス（サンプリングバイアス）**: 特定グループが過小/過剰代表されたデータセットでの学習
- **測定バイアス**: 特定グループのデータ品質・精度が他のグループと異なる（顔認識での人種差）
- **確認バイアス**: モデルが既存の前提・ステレオタイプを強化する方向に学習
- **対策①（データ）**: データ拡張・再重み付け・バランス調整・多様なデータ収集
- **対策②（モデル）**: SageMaker Clarify でバイアス測定・Fairness Indicators でモニタリング

- **XAI（Explainable AI）の必要性**: 医療・金融・採用など高リスク判断での説明責任・規制準拠
- **SHAP（SHapley Additive exPlanations）**: 各特徴量が予測結果に与える影響量を数値化（標準手法）
- **LIME（Local Interpretable Model-agnostic Explanations）**: 個別の予測に対して局所的な線形モデルで近似説明
- **Feature Importance**: ランダムフォレスト等での特徴量重要度ランキング（グローバル解釈）
- **モデルカード**: モデルの目的・学習データ・性能・制限事項を文書化（倫理審査用）
- **AWS 実装**: SageMaker Clarify（SHAP 値計算）/ SageMaker Model Cards

<h1 id="amazon-sagemaker-clarify">Amazon SageMaker Clarify</h1>
<blockquote>
<p><em>学習前/後のバイアス検出とSHAP値可視化、Model Monitorと組み合わせてリアルタイムバイアスモニタリング</em></p>
</blockquote>
<ul>
<li><strong>目的</strong>: ML モデルのバイアス検出とモデル説明性（SHAP）を提供する SageMaker の機能</li>
<li><strong>バイアス検出①（学習前）</strong>: データセット内のバイアス指標を計算（Class Imbalance・DPL など）</li>
<li><strong>バイアス検出②（学習後）</strong>: モデル予測のバイアス指標（Equal Opportunity・Demographic Parity）を算出</li>
<li><strong>SHAP 値の提供</strong>: 各特徴量が個別の予測に与えた影響を可視化（フィーチャー貢献度）</li>
<li><strong>Clarify レポート</strong>: SageMaker Studio 上でバイアス・説明性レポートを自動生成</li>
<li><strong>継続監視</strong>: SageMaker Model Monitor と組み合わせてリアルタイムバイアスモニタリングが可能</li>
</ul>
</section>

- **Bedrock Agents Return Control**: エージェントが特定アクション前に人間の確認を要求する機能
- **設計原則**: どのケースを自動化し、どのケースで人間が介入するかの明確な閾値設定が重要

<h1 id="iam-%E3%81%A8%E6%9C%80%E5%B0%8F%E6%A8%A9%E9%99%90%E8%A8%AD%E8%A8%88">IAM と最小権限設計</h1>
<blockquote>
<p><em>InvokeModelアクション単位で権限設定、Organizations SCPでリージョン・モデルを組織全体で制限</em></p>
</blockquote>
<ul>
<li><strong>最小権限の原則</strong>: 必要最低限の権限のみを付与。<code>*</code> ワイルドカードを避ける</li>
<li><strong>Bedrock の IAM アクション粒度</strong>: <code>bedrock:InvokeModel</code>（モデル呼び出し）/ <code>bedrock:CreateKnowledgeBase</code>（KB 作成）/ <code>bedrock:InvokeAgent</code>（Agent 実行）</li>
<li><strong>リソースポリシー</strong>: 特定のモデル ARN にのみアクセスを許可（Cross-Account も設定可能）</li>
<li><strong>サービスロール</strong>: Bedrock Agents / Knowledge Bases が S3・Lambda・OpenSearch にアクセスするための専用 IAM ロール</li>
<li><strong>AWS Organizations SCP</strong>: 組織単位で Bedrock 利用リージョン・モデルを制限</li>
<li><strong>CloudTrail + Config</strong>: 権限の誰が使ったかの監査 + IAM ポリシー変更の検出・アラート</li>
</ul>
</section>

<h1 id="%E8%A9%A6%E9%A8%93%E3%81%A7%E3%82%88%E3%81%8F%E5%87%BA%E3%82%8B%E3%83%91%E3%82%BF%E3%83%BC%E3%83%B3">試験でよく出るパターン</h1>
<blockquote>
<p><em>RAG=Knowledge Bases、ハルシネーション→RAG+Guardrails、リアルタイム情報→RAGが正解パターン</em></p>
</blockquote>
<ul>
<li><strong>「最適なサービスを選べ」系</strong>: RAG が必要→Bedrock KB / 画像分析→Rekognition / NLP→Comprehend</li>
<li><strong>「最もコスト効率の良い方法は」系</strong>: Prompt Engineering &lt; RAG &lt; Fine-tuning &lt; Pre-training の順でコスト上昇</li>
<li><strong>「ハルシネーションを減らすには」系</strong>: RAG（Knowledge Bases）+ Guardrails（Grounding チェック）</li>
<li><strong>「セキュリティを確保するには」系</strong>: 最小権限 IAM + VPC エンドポイント + KMS 暗号化 + CloudTrail</li>
<li><strong>「責任ある AI の観点から」系</strong>: Clarify でバイアス検出 + Guardrails でコンテンツ制御 + HITL</li>
<li><strong>「リアルタイム情報や社内データが必要」系</strong>: Fine-tuning は不正解、RAG（Knowledge Bases）が正解</li>
</ul>
</section>

<h1 id="%E3%81%BE%E3%81%A8%E3%82%81--%E8%A9%A6%E9%A8%93%E5%90%88%E6%A0%BC%E3%81%AE%E3%81%9F%E3%82%81%E3%81%AE%E6%9C%80%E9%87%8D%E8%A6%81%E3%83%9D%E3%82%A4%E3%83%B3%E3%83%88">まとめ — 試験合格のための最重要ポイント</h1>
<blockquote>
<p><em>Domain 3（Bedrock全機能）が28%最重点、Bedrockの実際の操作経験が合格の鍵</em></p>
</blockquote>
<ul>
<li><strong>Domain 1（20%）</strong>: 機械学習の種類・評価指標（F1/AUC-ROC）・SageMaker コンポーネントを体系的に理解</li>
<li><strong>Domain 2（24%）</strong>: FM の仕組み・プロンプト技法（Zero-shot/Few-shot/CoT）・ハルシネーション対策</li>
<li><strong>Domain 3（28% 最重要）</strong>: Bedrock 全機能（KB・Agents・Guardrails）+ RAG の詳細な処理フローを必ず習得</li>

<li><strong>Domain 5（14%）</strong>: セキュリティ設計（IAM・VPC・KMS）・Guardrails・共有責任モデル</li>
<li><strong>合格の鍵</strong>: 各サービスの「なぜそれを使うか」という選択基準を実践的に理解し、Bedrock を実際に操作して体験すること</li>
</ul>
