" font-family="sans-serif" font-weight="bold">逆算</text><line x1="260" y1="120" x2="260" y2="192" stroke="#e91e63" stroke-width="1" stroke-dasharray="3,3" /><rect x="380" y="50" width="130" height="45" rx="5" fill="#16213e" stroke="#f9a825" stroke-width="1" /><text x="445" y="70" text-anchor="middle" fill="#f9a825" font-size="9" font-family="sans-serif" font-weight="bold">工場投資 $1B</text><text x="445" y="85" text-anchor="middle" fill="#aaaaaa" font-size="8" font-family="sans-serif">→ $20B (TSMCアリゾナ)</text><line x1="445" y1="95" x2="445" y2="147" stroke="#f9a825" stroke-width="1" stroke-dasharray="3,3" /><text x="400" y="345" text-anchor="middle" fill="#aaaaaa" font-size="11" font-family="sans-serif">「ロードマップに載っていない技術は投資されない」→ 予測が計画を支配</text></svg></li>
