  <text x="290" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">速度</text>
  <text x="430" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">コスト</text>
  <text x="570" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">リスク</text>
  <text x="710" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">複雑度</text>

