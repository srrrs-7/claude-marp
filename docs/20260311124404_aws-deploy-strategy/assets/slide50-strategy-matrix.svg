<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="400" fill="transparent"/>
  <text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">デプロイ戦略比較マトリクス（速度・コスト・リスク・複雑度）</text>

  <!-- Header row -->
  <rect x="20" y="45" width="760" height="40" rx="4" fill="#1e1b4b"/>
