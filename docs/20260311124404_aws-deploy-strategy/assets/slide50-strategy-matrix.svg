  <rect x="538" y="300" width="24" height="20" rx="2" fill="#ef4444"/>
  <rect x="566" y="300" width="24" height="20" rx="2" fill="#ef4444"/>
  <rect x="594" y="300" width="24" height="20" rx="2" fill="#ef4444"/>
