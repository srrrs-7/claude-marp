  <line x1="220" y1="45" x2="220" y2="345" stroke="#334155" stroke-width="1"/>
  <line x1="360" y1="45" x2="360" y2="345" stroke="#334155" stroke-width="1"/>
  <line x1="500" y1="45" x2="500" y2="345" stroke="#334155" stroke-width="1"/>
  <line x1="640" y1="45" x2="640" y2="345" stroke="#334155" stroke-width="1"/>
  <rect x="20" y="45" width="760" height="300" rx="4" fill="transparent" stroke="#334155" stroke-width="1"/>

  <!-- Legend -->
  <text x="400" y="372" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">バーの数 = スコア (多いほど高い)    速度・コスト削減: 緑    リスク: 赤    複雑度: 橙</text>
