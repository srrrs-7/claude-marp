  <text x="120" y="135" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="sans-serif">Rolling Update</text>
  <!-- Speed: 3/5 bars -->
  <rect x="230" y="105" width="24" height="20" rx="2" fill="#34d399"/>
