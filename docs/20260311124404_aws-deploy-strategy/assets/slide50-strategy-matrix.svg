  <rect x="510" y="170" width="24" height="20" rx="2" fill="#ef4444"/>
  <rect x="538" y="170" width="24" height="20" rx="2" fill="#334155"/>
  <rect x="566" y="170" width="24" height="20" rx="2" fill="#334155"/>
  <rect x="594" y="170" width="24" height="20" rx="2" fill="#334155"/>
  <rect x="622" y="170" width="24" height="20" rx="2" fill="#334155"/>
  <!-- Complexity: 3/5 -->
  <rect x="650" y="170" width="24" height="20" rx="2" fill="#f59e0b"/>
  <rect x="678" y="170" width="24" height="20" rx="2" fill="#f59e0b"/>
