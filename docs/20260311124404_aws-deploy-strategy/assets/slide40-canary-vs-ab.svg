<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="400" fill="transparent"/>

  <!-- Header row -->
  <rect x="0" y="0" width="800" height="44" rx="0" fill="#1e1b4b"/>
  <text x="200" y="28" text-anchor="middle" font-size="13" fill="#94a3b8" font-family="sans-serif">比較軸</text>
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#60a5fa" font-family="sans-serif">カナリアデプロイ</text>
  <text x="680" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#a855f7" font-family="sans-serif">A/B テスト</text>
  <line x1="330" y1="0" x2="330" y2="400" stroke="#334155" stroke-width="1.5"/>
  <line x1="570" y1="0" x2="570" y2="400" stroke="#334155" stroke-width="1.5"/>

  <!-- Row 1: Purpose -->
  <rect x="0" y="44" width="800" height="52" fill="#0f172a"/>
  <text x="200" y="66" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8" font-family="sans-serif">目的</text>
  <text x="200" y="84" text-anchor="middle" font-size="11" fill="#64748b" font-family="sans-serif">"何のため？"</text>
  <text x="450" y="64" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">安全なリリース・リスク低減</text>
  <text x="450" y="82" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">問題を早期に検出して被害を最小化</text>
  <text x="680" y="64" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">ユーザー体験の最適化</text>
  <text x="680" y="82" text-anchor="middle" font-size="11" fill="#a855f7" font-family="sans-serif">どちらが優れているかを検証</text>
  <line x1="0" y1="96" x2="800" y2="96" stroke="#334155" stroke-width="1"/>

  <!-- Row 2: Method -->
  <rect x="0" y="96" width="800" height="52" fill="#0f172a" opacity="0.5"/>
  <text x="200" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8" font-family="sans-serif">手法</text>
  <text x="200" y="136" text-anchor="middle" font-size="11" fill="#64748b" font-family="sans-serif">"どうやって？"</text>
  <text x="450" y="116" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">段階的トラフィック移行</text>
  <text x="450" y="134" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">5% → 25% → 100%</text>
  <text x="680" y="116" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">同時並行の比較実験</text>
  <text x="680" y="134" text-anchor="middle" font-size="11" fill="#a855f7" font-family="sans-serif">A: 50% vs B: 50% を同期実行</text>
  <line x1="0" y1="148" x2="800" y2="148" stroke="#334155" stroke-width="1"/>

  <!-- Row 3: Success criteria -->
  <rect x="0" y="148" width="800" height="52" fill="#0f172a"/>
  <text x="200" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8" font-family="sans-serif">判定軸</text>
  <text x="200" y="188" text-anchor="middle" font-size="11" fill="#64748b" font-family="sans-serif">"何を見る？"</text>
  <text x="450" y="168" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">エラーレート・レイテンシ</text>
  <text x="450" y="186" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">技術的安定性指標</text>
  <text x="680" y="168" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">CVR・LTV・クリック率</text>
  <text x="680" y="186" text-anchor="middle" font-size="11" fill="#a855f7" font-family="sans-serif">ビジネス KPI 指標</text>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#334155" stroke-width="1"/>

  <!-- Row 4: Duration -->
  <rect x="0" y="200" width="800" height="52" fill="#0f172a" opacity="0.5"/>
  <text x="200" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8" font-family="sans-serif">期間</text>
  <text x="200" y="240" text-anchor="middle" font-size="11" fill="#64748b" font-family="sans-serif">"いつまで？"</text>
  <text x="450" y="220" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">短期 (分〜数時間)</text>
  <text x="450" y="238" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">早期に判断して完了</text>
  <text x="680" y="220" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">中〜長期 (日〜週)</text>
  <text x="680" y="238" text-anchor="middle" font-size="11" fill="#a855f7" font-family="sans-serif">統計的有意差が出るまで継続</text>
  <line x1="0" y1="252" x2="800" y2="252" stroke="#334155" stroke-width="1"/>

  <!-- Row 5: AWS services -->
  <rect x="0" y="252" width="800" height="52" fill="#0f172a"/>
  <text x="200" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8" font-family="sans-serif">AWS サービス</text>
  <text x="200" y="292" text-anchor="middle" font-size="11" fill="#64748b" font-family="sans-serif">"使うもの？"</text>
  <text x="450" y="272" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">CodeDeploy / ALB</text>
  <text x="450" y="290" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">CloudWatch Alarms</text>
  <text x="680" y="272" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">CloudFront / Evidently</text>
  <text x="680" y="290" text-anchor="middle" font-size="11" fill="#a855f7" font-family="sans-serif">CloudWatch Evidently</text>
  <line x1="0" y1="304" x2="800" y2="304" stroke="#334155" stroke-width="1"/>

  <!-- Row 6: Recommendation -->
  <rect x="0" y="304" width="800" height="96" fill="#0f172a" opacity="0.5"/>
  <text x="200" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8" font-family="sans-serif">使い分けの基準</text>
  <rect x="340" y="316" width="220" height="68" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="450" y="338" text-anchor="middle" font-size="12" fill="#60a5fa" font-family="sans-serif">デプロイ安全性が優先</text>
  <text x="450" y="356" text-anchor="middle" font-size="11" fill="#ffffff" font-family="sans-serif">バグ・障害リスクを最小化</text>
  <text x="450" y="374" text-anchor="middle" font-size="11" fill="#ffffff" font-family="sans-serif">したいときに選択</text>
  <rect x="580" y="316" width="200" height="68" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="1.5"/>
  <text x="680" y="338" text-anchor="middle" font-size="12" fill="#a855f7" font-family="sans-serif">機能改善の検証が目的</text>
  <text x="680" y="356" text-anchor="middle" font-size="11" fill="#ffffff" font-family="sans-serif">UX 変更の効果を</text>
  <text x="680" y="374" text-anchor="middle" font-size="11" fill="#ffffff" font-family="sans-serif">定量的に測りたいときに選択</text>
</svg>
