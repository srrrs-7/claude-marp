<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="400" fill="transparent"/>

  <!-- Users -->
  <rect x="330" y="15" width="140" height="44" rx="8" fill="#6d28d9" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="400" y="42" text-anchor="middle" font-size="15" fill="#ffffff" font-family="sans-serif">ユーザー DNS 問い合わせ</text>

  <!-- Arrow to Route53 -->
  <line x1="400" y1="59" x2="400" y2="100" stroke="#a855f7" stroke-width="2"/>
  <polygon points="400,100 394,88 406,88" fill="#a855f7"/>

  <!-- Route53 box -->
  <rect x="270" y="100" width="260" height="50" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="2" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="400" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#a855f7" font-family="sans-serif">Route 53</text>
  <text x="400" y="140" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Weighted Routing Policy</text>

  <!-- Phase steps -->
  <!-- Phase 1 -->
  <rect x="40" y="195" width="200" height="80" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="140" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa" font-family="sans-serif">Phase 1</text>
  <text x="140" y="238" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Blue: 重み 100</text>
  <text x="140" y="256" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Green: 重み 0</text>
  <text x="140" y="270" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">v1稼働中</text>

  <!-- Arrow Phase1→2 -->
  <line x1="240" y1="235" x2="295" y2="235" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="295,235 283,229 283,241" fill="#a855f7"/>

  <!-- Phase 2 -->
  <rect x="295" y="195" width="210" height="80" rx="8" fill="#14532d" stroke="#34d399" stroke-width="1.5"/>
  <text x="400" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399" font-family="sans-serif">Phase 2</text>
  <text x="400" y="238" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Blue: 重み 70 / Green: 重み 30</text>
  <text x="400" y="256" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">TTL短縮で素早く反映</text>
  <text x="400" y="270" text-anchor="middle" font-size="11" fill="#34d399" font-family="sans-serif">段階移行</text>

  <!-- Arrow Phase2→3 -->
  <line x1="505" y1="235" x2="560" y2="235" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="560,235 548,229 548,241" fill="#a855f7"/>

  <!-- Phase 3 -->
  <rect x="560" y="195" width="200" height="80" rx="8" fill="#14532d" stroke="#34d399" stroke-width="2"/>
  <text x="660" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399" font-family="sans-serif">Phase 3</text>
  <text x="660" y="238" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Blue: 重み 0</text>
  <text x="660" y="256" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Green: 重み 100</text>
  <text x="660" y="270" text-anchor="middle" font-size="11" fill="#34d399" font-family="sans-serif">移行完了</text>

  <!-- Arrows from Route53 to phases -->
  <line x1="320" y1="150" x2="140" y2="195" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="140,195 136,183 148,185" fill="#60a5fa"/>
  <line x1="400" y1="150" x2="400" y2="195" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="400,195 394,183 406,183" fill="#34d399"/>
  <line x1="480" y1="150" x2="660" y2="195" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="660,195 651,183 663,185" fill="#34d399"/>

  <!-- TTL note -->
  <rect x="220" y="315" width="360" height="50" rx="8" fill="#312e81" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="338" text-anchor="middle" font-size="13" fill="#ffffff" font-family="sans-serif">TTL 設定のポイント</text>
  <text x="400" y="356" text-anchor="middle" font-size="12" fill="#a855f7" font-family="sans-serif">移行前: TTL を 60s に短縮 → 移行後: TTL を 300s に戻す</text>
</svg>
