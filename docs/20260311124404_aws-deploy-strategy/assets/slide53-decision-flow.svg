<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="420" fill="transparent"/>
  <text x="400" y="25" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">デプロイ戦略 意思決定フロー</text>

  <!-- Start node -->
  <rect x="310" y="40" width="180" height="40" rx="20" fill="#1e1b4b" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="65" text-anchor="middle" fill="#ffffff" font-size="13" font-family="sans-serif">デプロイ戦略を選ぶ</text>

  <!-- Arrow down -->
  <line x1="400" y1="80" x2="400" y2="105" stroke="#a855f7" stroke-width="2"/>
  <polygon points="395,105 400,115 405,105" fill="#a855f7"/>

  <!-- Q1: ダウンタイム許容? -->
  <polygon points="400,115 520,150 400,185 280,150" fill="#1e1b4b" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="145" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">ダウンタイム</text>
  <text x="400" y="162" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">許容できる？</text>

  <!-- Yes branch (left) -->
  <line x1="280" y1="150" x2="150" y2="150" stroke="#34d399" stroke-width="2"/>
  <polygon points="150,145 140,150 150,155" fill="#34d399"/>
  <text x="215" y="142" text-anchor="middle" fill="#34d399" font-size="11" font-family="sans-serif">Yes</text>

  <!-- Recreate result -->
  <rect x="40" y="128" width="100" height="45" rx="6" fill="#1a3a2f" stroke="#34d399" stroke-width="2"/>
  <text x="90" y="148" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">Recreate</text>
  <text x="90" y="165" text-anchor="middle" fill="#34d399" font-size="9" font-family="sans-serif">開発環境向け</text>

  <!-- No branch (down) -->
  <line x1="400" y1="185" x2="400" y2="210" stroke="#ef4444" stroke-width="2"/>
  <polygon points="395,210 400,220 405,210" fill="#ef4444"/>
  <text x="415" y="203" text-anchor="start" fill="#ef4444" font-size="11" font-family="sans-serif">No</text>

  <!-- Q2: コンテナ/Lambda? -->
  <polygon points="400,220 530,257 400,294 270,257" fill="#1e1b4b" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="251" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Lambda /</text>
  <text x="400" y="268" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">コンテナ環境？</text>

  <!-- Yes branch (right) -->
  <line x1="530" y1="257" x2="640" y2="257" stroke="#34d399" stroke-width="2"/>
  <polygon points="640,252 650,257 640,262" fill="#34d399"/>
  <text x="590" y="249" text-anchor="middle" fill="#34d399" font-size="11" font-family="sans-serif">Yes</text>

  <!-- Lambda/ECS result -->
  <rect x="650" y="235" width="130" height="45" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="2"/>
  <text x="715" y="255" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">Blue/Green</text>
  <text x="715" y="272" text-anchor="middle" fill="#a855f7" font-size="9" font-family="sans-serif">ECS/Lambda最適</text>

  <!-- No branch (down) -->
  <line x1="400" y1="294" x2="400" y2="318" stroke="#ef4444" stroke-width="2"/>
  <polygon points="395,318 400,328 405,318" fill="#ef4444"/>
  <text x="415" y="312" text-anchor="start" fill="#ef4444" font-size="11" font-family="sans-serif">No (EC2)</text>

  <!-- Q3: 段階的展開が必要? -->
  <polygon points="400,328 520,362 400,396 280,362" fill="#1e1b4b" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="356" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">段階的展開が</text>
  <text x="400" y="373" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">必要？</text>

  <!-- Yes -> Canary -->
  <line x1="520" y1="362" x2="610" y2="362" stroke="#34d399" stroke-width="2"/>
  <polygon points="610,357 620,362 610,367" fill="#34d399"/>
  <text x="565" y="354" text-anchor="middle" fill="#34d399" font-size="11" font-family="sans-serif">Yes</text>
  <rect x="620" y="340" width="100" height="45" rx="6" fill="#1a3a2f" stroke="#34d399" stroke-width="2"/>
  <text x="670" y="360" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">カナリア</text>
  <text x="670" y="377" text-anchor="middle" fill="#34d399" font-size="9" font-family="sans-serif">CodeDeploy</text>

  <!-- No -> Rolling -->
  <line x1="280" y1="362" x2="175" y2="362" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="175,357 165,362 175,367" fill="#60a5fa"/>
  <text x="230" y="354" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="sans-serif">No</text>
  <rect x="55" y="340" width="110" height="45" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="360" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="sans-serif">ローリング</text>
  <text x="110" y="377" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="sans-serif">EC2/Beanstalk</text>
</svg>
