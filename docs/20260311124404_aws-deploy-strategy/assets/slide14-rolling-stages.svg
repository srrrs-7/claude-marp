<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="400" fill="transparent"/>

  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">ローリングデプロイ: 段階的置き換えフロー（4インスタンス構成）</text>

  <!-- Stage labels -->
  <text x="80" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#9ca3af">初期状態</text>
  <text x="240" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a855f7">Step 1</text>
  <text x="400" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a855f7">Step 2</text>
  <text x="560" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a855f7">Step 3</text>
  <text x="720" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#34d399">完了</text>

  <!-- Stage dividers -->
  <line x1="160" y1="50" x2="160" y2="320" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="320" y1="50" x2="320" y2="320" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="480" y1="50" x2="480" y2="320" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="640" y1="50" x2="640" y2="320" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Row labels (instances) -->
  <text x="8" y="100" font-family="sans-serif" font-size="11" fill="#9ca3af">Inst.1</text>
  <text x="8" y="160" font-family="sans-serif" font-size="11" fill="#9ca3af">Inst.2</text>
  <text x="8" y="220" font-family="sans-serif" font-size="11" fill="#9ca3af">Inst.3</text>
  <text x="8" y="280" font-family="sans-serif" font-size="11" fill="#9ca3af">Inst.4</text>

  <!-- Helper macro: define all cells manually -->

  <!-- Initial state: all v1 -->
  <rect x="40" y="75" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>
  <rect x="40" y="135" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>
  <rect x="40" y="195" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>
  <rect x="40" y="255" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>

  <!-- Step 1: inst1 updating -->
  <rect x="175" y="75" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#f97316" stroke-width="1.5"/>
  <text x="225" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f97316">v2.0 更新中</text>
  <rect x="175" y="135" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="225" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>
  <rect x="175" y="195" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="225" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>
  <rect x="175" y="255" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="225" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>

  <!-- Step 2: inst1 done, inst2 updating -->
  <rect x="335" y="75" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="385" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#60a5fa">v2.0 ✓</text>
  <rect x="335" y="135" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#f97316" stroke-width="1.5"/>
  <text x="385" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f97316">v2.0 更新中</text>
  <rect x="335" y="195" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="385" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>
  <rect x="335" y="255" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="385" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>

  <!-- Step 3: inst1,2 done, inst3 updating -->
  <rect x="495" y="75" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="545" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#60a5fa">v2.0 ✓</text>
  <rect x="495" y="135" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="545" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#60a5fa">v2.0 ✓</text>
  <rect x="495" y="195" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#f97316" stroke-width="1.5"/>
  <text x="545" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f97316">v2.0 更新中</text>
  <rect x="495" y="255" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="545" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 ✓</text>

  <!-- Done: all v2 -->
  <rect x="655" y="75" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="2"/>
  <text x="705" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v2.0 ✓</text>
  <rect x="655" y="135" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="2"/>
  <text x="705" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v2.0 ✓</text>
  <rect x="655" y="195" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="2"/>
  <text x="705" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v2.0 ✓</text>
  <rect x="655" y="255" width="100" height="40" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="2"/>
  <text x="705" y="280" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v2.0 ✓</text>

  <!-- Progress arrows between stages -->
  <polygon points="162,178 170,185 162,192" fill="#a855f7"/>
  <polygon points="322,178 330,185 322,192" fill="#a855f7"/>
  <polygon points="482,178 490,185 482,192" fill="#a855f7"/>
  <polygon points="642,178 650,185 642,192" fill="#34d399"/>

  <!-- Version mix indicator (Step 2 area) -->
  <rect x="170" y="308" width="310" height="28" rx="6" fill="#1e1b4b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="325" y="327" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fbbf24">⚠ 新旧バージョン混在期間 → API後方互換性が必須</text>

  <!-- Key insights bottom -->
  <rect x="30" y="340" width="740" height="50" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1"/>
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff">特徴: ダウンタイム ゼロ ／ 追加コスト なし ／ 常に (N-1) 台でサービス継続</text>
  <text x="400" y="380" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af">Elastic Beanstalk: BatchSize設定 ／ CodeDeploy: OneAtATime / HalfAtATime / Custom</text>
</svg>
