<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff" font-family="sans-serif">イミュータブルデプロイ コスト試算</text>

  <!-- Chart area -->
  <rect x="60" y="40" width="500" height="260" rx="4" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Y axis labels -->
  <text x="50" y="55" text-anchor="end" font-size="10" fill="#ffffff" font-family="sans-serif">2x</text>
  <line x1="60" y1="50" x2="560" y2="50" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <text x="50" y="105" text-anchor="end" font-size="10" fill="#ffffff" font-family="sans-serif">1.5x</text>
  <line x1="60" y1="100" x2="560" y2="100" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <text x="50" y="155" text-anchor="end" font-size="10" fill="#ffffff" font-family="sans-serif">1x</text>
  <line x1="60" y1="150" x2="560" y2="150" stroke="#34d399" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>
  <text x="50" y="205" text-anchor="end" font-size="10" fill="#ffffff" font-family="sans-serif">0.5x</text>
  <line x1="60" y1="200" x2="560" y2="200" stroke="#ffffff" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <text x="50" y="300" text-anchor="end" font-size="10" fill="#ffffff" font-family="sans-serif">0x</text>

  <!-- Scenarios: 3 bars per group (Base, During, Monthly) -->

  <!-- Scenario 1: Deploy once per day -->
  <text x="135" y="330" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">1日1回</text>
  <text x="135" y="344" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7" font-family="sans-serif">並行: 30分</text>
  <!-- Base bar -->
  <rect x="80" y="150" width="32" height="148" rx="3" fill="#60a5fa" opacity="0.8"/>
  <text x="96" y="145" text-anchor="middle" font-size="8" fill="#60a5fa" font-family="sans-serif">通常</text>
  <!-- During bar (2x for 30min) -->
  <rect x="120" y="50" width="32" height="248" rx="3" fill="#f59e0b" opacity="0.8"/>
  <text x="136" y="45" text-anchor="middle" font-size="8" fill="#f59e0b" font-family="sans-serif">2x</text>
  <!-- Monthly cost bar -->
  <rect x="160" y="144" width="32" height="154" rx="3" fill="#a855f7" opacity="0.8"/>
  <text x="176" y="139" text-anchor="middle" font-size="8" fill="#a855f7" font-family="sans-serif">+2%</text>

  <!-- Scenario 2: Deploy 6 times per day -->
  <text x="315" y="330" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">6回/日</text>
  <text x="315" y="344" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7" font-family="sans-serif">並行: 30分</text>
  <!-- Base bar -->
  <rect x="260" y="150" width="32" height="148" rx="3" fill="#60a5fa" opacity="0.8"/>
  <text x="276" y="145" text-anchor="middle" font-size="8" fill="#60a5fa" font-family="sans-serif">通常</text>
  <!-- During bar -->
  <rect x="300" y="50" width="32" height="248" rx="3" fill="#f59e0b" opacity="0.8"/>
  <text x="316" y="45" text-anchor="middle" font-size="8" fill="#f59e0b" font-family="sans-serif">2x</text>
  <!-- Monthly cost bar: 12.5% increase (6 * 0.5 / 24 * 100%) -->
  <rect x="340" y="121" width="32" height="177" rx="3" fill="#a855f7" opacity="0.8"/>
  <text x="356" y="116" text-anchor="middle" font-size="8" fill="#a855f7" font-family="sans-serif">+13%</text>

  <!-- Scenario 3: Deploy 6 times with Spot -->
  <text x="490" y="330" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">6回/日+Spot</text>
  <text x="490" y="344" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7" font-family="sans-serif">新ASGのみSPOT</text>
  <!-- Base bar -->
  <rect x="440" y="150" width="32" height="148" rx="3" fill="#60a5fa" opacity="0.8"/>
  <text x="456" y="145" text-anchor="middle" font-size="8" fill="#60a5fa" font-family="sans-serif">通常</text>
  <!-- During bar (1.3x with Spot 70% cheaper) -->
  <rect x="480" y="110" width="32" height="188" rx="3" fill="#34d399" opacity="0.8"/>
  <text x="496" y="105" text-anchor="middle" font-size="8" fill="#34d399" font-family="sans-serif">1.3x</text>
  <!-- Monthly cost bar: much lower -->
  <rect x="520" y="138" width="32" height="160" rx="3" fill="#a855f7" opacity="0.8"/>
  <text x="536" y="133" text-anchor="middle" font-size="8" fill="#a855f7" font-family="sans-serif">+4%</text>

  <!-- X axis labels legend -->
  <rect x="580" y="90" width="12" height="12" rx="2" fill="#60a5fa" opacity="0.8"/>
  <text x="596" y="101" font-size="10" fill="#ffffff" font-family="sans-serif">通常コスト (1x)</text>
  <rect x="580" y="112" width="12" height="12" rx="2" fill="#f59e0b" opacity="0.8"/>
  <text x="596" y="123" font-size="10" fill="#ffffff" font-family="sans-serif">デプロイ中 (2x)</text>
  <rect x="580" y="134" width="12" height="12" rx="2" fill="#34d399" opacity="0.8"/>
  <text x="596" y="145" font-size="10" fill="#ffffff" font-family="sans-serif">Spot利用時 (1.3x)</text>
  <rect x="580" y="156" width="12" height="12" rx="2" fill="#a855f7" opacity="0.8"/>
  <text x="596" y="167" font-size="10" fill="#ffffff" font-family="sans-serif">月間コスト増加</text>

  <!-- Calculation note -->
  <rect x="580" y="185" width="200" height="80" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1"/>
  <text x="680" y="204" text-anchor="middle" font-size="10" fill="#a855f7" font-weight="bold" font-family="sans-serif">月間コスト増加式</text>
  <text x="590" y="222" font-size="10" fill="#ffffff" font-family="sans-serif">増加率 = N回/日 x</text>
  <text x="590" y="238" font-size="10" fill="#ffffff" font-family="sans-serif">  並行時間(h) / 24h</text>
  <text x="590" y="254" font-size="10" fill="#34d399" font-family="sans-serif">Spot で最大70%削減</text>

  <!-- Bottom summary -->
  <rect x="20" y="358" width="760" height="36" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="378" text-anchor="middle" font-size="11" fill="#a855f7" font-weight="bold" font-family="sans-serif">新 ASG に Spot インスタンスを使うとコスト増加を大幅に抑制 — Warm Pool も有効</text>
</svg>
