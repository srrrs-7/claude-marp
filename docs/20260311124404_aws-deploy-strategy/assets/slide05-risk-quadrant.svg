<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="400" fill="transparent"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">デプロイリスク四象限マトリクス</text>

  <!-- Quadrant background -->
  <!-- Top-left: 高速・低可用 -->
  <rect x="100" y="55" width="290" height="155" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <!-- Top-right: 低速・高可用 -->
  <rect x="410" y="55" width="290" height="155" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <!-- Bottom-left: 低コスト・低複雑度 -->
  <rect x="100" y="225" width="290" height="150" rx="6" fill="#1e1b4b" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Bottom-right: 高コスト・高複雑度 -->
  <rect x="410" y="225" width="290" height="150" rx="6" fill="#1e1b4b" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- Quadrant labels -->
  <text x="245" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a855f7">高速デプロイ重視</text>
  <text x="245" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e9d5ff">デプロイ速度が最優先</text>
  <text x="245" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff">インプレース (All at once)</text>
  <text x="245" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d8b4fe">デプロイ時間: 数分</text>
  <text x="245" y="156" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d8b4fe">ダウンタイム: あり</text>
  <text x="245" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fca5a5">適用: Dev/Staging のみ</text>
  <text x="245" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a855f7">▲ 速度優先 ▽ 可用性低</text>

  <text x="555" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">高可用性重視</text>
  <text x="555" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a7f3d0">ゼロダウンタイムが必須</text>
  <text x="555" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff">Blue/Green / カナリア</text>
  <text x="555" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a7f3d0">デプロイ時間: 10〜30分</text>
  <text x="555" y="156" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a7f3d0">ダウンタイム: ゼロ</text>
  <text x="555" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6ee7b7">適用: 本番・SLA厳格</text>
  <text x="555" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#34d399">▲ 可用性高 ▽ コスト増</text>

  <text x="245" y="252" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#60a5fa">低コスト・シンプル</text>
  <text x="245" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bfdbfe">追加インフラ不要</text>
  <text x="245" y="288" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff">ローリング</text>
  <text x="245" y="306" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bfdbfe">追加コスト: なし</text>
  <text x="245" y="324" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bfdbfe">設定複雑度: 低</text>
  <text x="245" y="358" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#60a5fa">▲ コスト低 ▽ 混在期間あり</text>

  <text x="555" y="252" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fbbf24">高コスト・高複雑</text>
  <text x="555" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fde68a">完全なリスク分離</text>
  <text x="555" y="288" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff">Blue/Green (全環境2倍)</text>
  <text x="555" y="306" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fde68a">追加コスト: 50〜100%増</text>
  <text x="555" y="324" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fde68a">設定複雑度: 高</text>
  <text x="555" y="358" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fbbf24">▲ 安全性最高 ▽ コスト大</text>

  <!-- Axis labels -->
  <text x="50" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff" transform="rotate(-90 50 135)">可 用 性</text>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff">デプロイ速度</text>
  <text x="400" y="48" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af">← 低速                                                   高速 →</text>
  <text x="68" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af" transform="rotate(-90 68 220)">← 低 ← ← ← ← ← ← ← → 高 →</text>
</svg>
