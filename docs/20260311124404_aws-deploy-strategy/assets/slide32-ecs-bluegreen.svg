<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="420" fill="transparent"/>

  <!-- CodePipeline trigger -->
  <rect x="300" y="10" width="200" height="40" rx="8" fill="#4c1d95" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="35" text-anchor="middle" font-size="13" fill="#ffffff" font-family="sans-serif">CodePipeline / ECR push</text>

  <!-- Arrow down -->
  <line x1="400" y1="50" x2="400" y2="80" stroke="#a855f7" stroke-width="2"/>
  <polygon points="400,80 394,68 406,68" fill="#a855f7"/>

  <!-- CodeDeploy box -->
  <rect x="260" y="80" width="280" height="44" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="2" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="400" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#a855f7" font-family="sans-serif">AWS CodeDeploy</text>
  <text x="400" y="116" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">ECS Blue/Green Deployment</text>

  <!-- Test listener label -->
  <text x="180" y="162" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">テスト用リスナー :8080</text>
  <!-- Prod listener label -->
  <text x="620" y="162" text-anchor="middle" font-size="11" fill="#34d399" font-family="sans-serif">本番リスナー :443</text>

  <!-- ALB -->
  <rect x="250" y="170" width="300" height="40" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="195" text-anchor="middle" font-size="13" fill="#ffffff" font-family="sans-serif">ALB (2 Listeners)</text>

  <!-- Arrow from CodeDeploy to ALB -->
  <line x1="400" y1="124" x2="400" y2="170" stroke="#a855f7" stroke-width="1.5"/>
  <polygon points="400,170 394,158 406,158" fill="#a855f7"/>

  <!-- Blue TaskSet -->
  <rect x="60" y="245" width="220" height="90" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="170" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa" font-family="sans-serif">Blue TaskSet (v1)</text>
  <text x="170" y="288" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">ECS Tasks: v1.0</text>
  <text x="170" y="306" text-anchor="middle" font-size="11" fill="#60a5fa" font-family="sans-serif">本番: 100% → 0%</text>
  <text x="170" y="324" text-anchor="middle" font-size="11" fill="#ffffff" font-family="sans-serif">削除猶予: 60分</text>

  <!-- Green TaskSet -->
  <rect x="520" y="245" width="220" height="90" rx="8" fill="#052e16" stroke="#34d399" stroke-width="2" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="630" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399" font-family="sans-serif">Green TaskSet (v2)</text>
  <text x="630" y="288" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">ECS Tasks: v2.0</text>
  <text x="630" y="306" text-anchor="middle" font-size="11" fill="#34d399" font-family="sans-serif">本番: 0% → 100%</text>
  <text x="630" y="324" text-anchor="middle" font-size="11" fill="#ffffff" font-family="sans-serif">テスト後に昇格</text>

  <!-- Arrows ALB to TaskSets -->
  <line x1="310" y1="210" x2="170" y2="245" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="170,245 165,233 177,235" fill="#60a5fa"/>
  <line x1="490" y1="210" x2="630" y2="245" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="630,245 621,233 633,235" fill="#34d399"/>

  <!-- Hook labels -->
  <rect x="280" y="365" width="240" height="44" rx="8" fill="#312e81" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="384" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Hooks: BeforeInstall / AfterInstall</text>
  <text x="400" y="400" text-anchor="middle" font-size="12" fill="#a855f7" font-family="sans-serif">AfterAllowTestTraffic → 検証 → 昇格</text>
</svg>
