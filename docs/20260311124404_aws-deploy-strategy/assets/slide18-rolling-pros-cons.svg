<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff" font-family="sans-serif">ローリングデプロイ メリット・デメリット</text>

  <!-- Divider line -->
  <line x1="400" y1="40" x2="400" y2="385" stroke="#ffffff" stroke-width="1" opacity="0.4"/>

  <!-- Left: Merits -->
  <rect x="20" y="42" width="370" height="340" rx="8" fill="#14532d" opacity="0.4"/>
  <text x="205" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#34d399" font-family="sans-serif">メリット</text>

  <!-- Merit items -->
  <rect x="40" y="80" width="340" height="52" rx="6" fill="#14532d" opacity="0.7"/>
  <text x="65" y="102" font-size="22" fill="#34d399" font-family="sans-serif">$</text>
  <text x="95" y="100" font-size="12" font-weight="bold" fill="#34d399" font-family="sans-serif">追加コスト不要</text>
  <text x="95" y="118" font-size="11" fill="#ffffff" font-family="sans-serif">既存インスタンスを順番に更新するだけ</text>

  <rect x="40" y="142" width="340" height="52" rx="6" fill="#14532d" opacity="0.7"/>
  <text x="65" y="164" font-size="18" fill="#34d399" font-family="sans-serif">~</text>
  <text x="95" y="162" font-size="12" font-weight="bold" fill="#34d399" font-family="sans-serif">段階的リスク軽減</text>
  <text x="95" y="180" font-size="11" fill="#ffffff" font-family="sans-serif">問題発生を一部のユーザーに限定可能</text>

  <rect x="40" y="204" width="340" height="52" rx="6" fill="#14532d" opacity="0.7"/>
  <text x="65" y="226" font-size="18" fill="#34d399" font-family="sans-serif">+</text>
  <text x="95" y="224" font-size="12" font-weight="bold" fill="#34d399" font-family="sans-serif">無停止デプロイ</text>
  <text x="95" y="242" font-size="11" fill="#ffffff" font-family="sans-serif">常に一定数のインスタンスが稼働を維持</text>

  <rect x="40" y="266" width="340" height="52" rx="6" fill="#14532d" opacity="0.7"/>
  <text x="65" y="288" font-size="18" fill="#34d399" font-family="sans-serif">%</text>
  <text x="95" y="286" font-size="12" font-weight="bold" fill="#34d399" font-family="sans-serif">バッチサイズで細かい制御</text>
  <text x="95" y="304" font-size="11" fill="#ffffff" font-family="sans-serif">5%〜50%の幅でリスク許容度に合わせる</text>

  <!-- Right: Demerits -->
  <rect x="410" y="42" width="370" height="340" rx="8" fill="#7f1d1d" opacity="0.4"/>
  <text x="595" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#f87171" font-family="sans-serif">デメリット</text>

  <!-- Demerit items -->
  <rect x="430" y="80" width="340" height="52" rx="6" fill="#7f1d1d" opacity="0.7"/>
  <text x="455" y="102" font-size="18" fill="#f87171" font-family="sans-serif">!</text>
  <text x="480" y="100" font-size="12" font-weight="bold" fill="#f87171" font-family="sans-serif">バージョン混在期間が発生</text>
  <text x="480" y="118" font-size="11" fill="#ffffff" font-family="sans-serif">v1とv2が同時稼働 — API後方互換必須</text>

  <rect x="430" y="142" width="340" height="52" rx="6" fill="#7f1d1d" opacity="0.7"/>
  <text x="455" y="164" font-size="18" fill="#f87171" font-family="sans-serif">-</text>
  <text x="480" y="162" font-size="12" font-weight="bold" fill="#f87171" font-family="sans-serif">一時的なキャパシティ低下</text>
  <text x="480" y="180" font-size="11" fill="#ffffff" font-family="sans-serif">更新バッチのインスタンスが一時停止</text>

  <rect x="430" y="204" width="340" height="52" rx="6" fill="#7f1d1d" opacity="0.7"/>
  <text x="455" y="226" font-size="18" fill="#f87171" font-family="sans-serif">x</text>
  <text x="480" y="224" font-size="12" font-weight="bold" fill="#f87171" font-family="sans-serif">ロールバックが遅い</text>
  <text x="480" y="242" font-size="11" fill="#ffffff" font-family="sans-serif">ロールバック = 逆方向のローリング更新</text>

  <rect x="430" y="266" width="340" height="52" rx="6" fill="#7f1d1d" opacity="0.7"/>
  <text x="455" y="288" font-size="18" fill="#f87171" font-family="sans-serif">?</text>
  <text x="480" y="286" font-size="12" font-weight="bold" fill="#f87171" font-family="sans-serif">デプロイ時間が長い</text>
  <text x="480" y="304" font-size="11" fill="#ffffff" font-family="sans-serif">インスタンス数 x バッチ数 の時間が必要</text>

  <!-- Bottom recommendation -->
  <rect x="100" y="340" width="600" height="40" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="362" text-anchor="middle" font-size="12" fill="#a855f7" font-weight="bold" font-family="sans-serif">推奨: DBスキーマ後方互換 + 小バッチ(20%) + 自動ロールバックAlarm 設定</text>
</svg>
