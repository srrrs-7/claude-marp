<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="transparent"/>

  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">インプレース ロールバック フローチャート</text>

  <!-- Trigger box -->
  <rect x="300" y="50" width="200" height="50" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="71" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a855f7">デプロイ完了</text>
  <text x="400" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">ValidateService フック実行</text>

  <!-- Arrow down -->
  <line x1="400" y1="100" x2="400" y2="128" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="394,128 400,140 406,128" fill="#60a5fa"/>

  <!-- Decision diamond -->
  <polygon points="400,140 510,185 400,230 290,185" fill="#1e1b4b" stroke="#fbbf24" stroke-width="2"/>
  <text x="400" y="181" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fbbf24">ヘルスチェック</text>
  <text x="400" y="198" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">成功？</text>

  <!-- Success path (right) -->
  <line x1="510" y1="185" x2="570" y2="185" stroke="#34d399" stroke-width="2"/>
  <polygon points="570,179 582,185 570,191" fill="#34d399"/>
  <text x="536" y="176" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">YES</text>

  <rect x="582" y="158" width="155" height="55" rx="8" fill="#1e1b4b" stroke="#34d399" stroke-width="2"/>
  <text x="659" y="183" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">デプロイ成功</text>
  <text x="659" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">v2.0 本番稼働開始</text>

  <!-- Failure path (down) -->
  <line x1="400" y1="230" x2="400" y2="258" stroke="#f97316" stroke-width="2"/>
  <polygon points="394,258 400,270 406,258" fill="#f97316"/>
  <text x="418" y="254" text-anchor="start" font-family="sans-serif" font-size="11" fill="#f97316">NO</text>

  <!-- Auto rollback trigger -->
  <rect x="280" y="270" width="240" height="50" rx="8" fill="#1e1b4b" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="293" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f97316">CodeDeploy 自動検知</text>
  <text x="400" y="311" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">deployment_config: OnFailure</text>

  <!-- Arrow down to rollback action -->
  <line x1="400" y1="320" x2="400" y2="348" stroke="#f97316" stroke-width="2"/>
  <polygon points="394,348 400,360 406,348" fill="#f97316"/>

  <!-- Rollback actions - 2 parallel -->
  <rect x="80" y="360" width="240" height="0" rx="8" fill="transparent"/>

  <!-- Rollback path splits -->
  <line x1="300" y1="360" x2="218" y2="360" stroke="#f97316" stroke-width="2"/>
  <line x1="500" y1="360" x2="582" y2="360" stroke="#f97316" stroke-width="2"/>
  <line x1="218" y1="348" x2="218" y2="360" stroke="transparent"/>

  <!-- Final restored state -->
  <rect x="265" y="348" width="270" height="28" rx="6" fill="#14532d" stroke="#34d399" stroke-width="2"/>
  <text x="400" y="367" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">v1.0 復元完了（〜60秒）</text>

  <!-- Timeline note on right -->
  <rect x="582" y="265" width="195" height="120" rx="8" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="679" y="287" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">ロールバック タイムライン</text>
  <text x="600" y="308" font-family="sans-serif" font-size="11" fill="#ffffff">0s  : 失敗検知</text>
  <text x="600" y="326" font-family="sans-serif" font-size="11" fill="#ffffff">10s : S3から旧バージョン取得</text>
  <text x="600" y="344" font-family="sans-serif" font-size="11" fill="#ffffff">30s : インスタンス更新</text>
  <text x="600" y="362" font-family="sans-serif" font-size="11" fill="#34d399">60s : v1.0 サービス復旧</text>

  <!-- Left side: manual rollback option -->
  <rect x="30" y="265" width="220" height="120" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="140" y="287" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a855f7">手動ロールバック方法</text>
  <text x="50" y="308" font-family="sans-serif" font-size="10" fill="#ffffff">1. Beanstalk コンソール</text>
  <text x="50" y="326" font-family="sans-serif" font-size="10" fill="#ffffff">   → [Deploy]→旧バージョン選択</text>
  <text x="50" y="344" font-family="sans-serif" font-size="10" fill="#ffffff">2. CLI: aws deploy create-</text>
  <text x="50" y="362" font-family="sans-serif" font-size="10" fill="#ffffff">   deployment --revision &lt;prev&gt;</text>
</svg>
