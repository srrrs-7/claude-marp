<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="transparent"/>

  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">インプレースデプロイ フロー</text>

  <!-- Step 1: Current State -->
  <rect x="30" y="55" width="130" height="80" rx="8" fill="#1e1b4b" stroke="#9ca3af" stroke-width="2"/>
  <text x="95" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#9ca3af">現在の状態</text>
  <text x="95" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">EC2 Instance</text>
  <text x="95" y="123" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#34d399">v1.0 稼働中</text>

  <!-- Arrow -->
  <line x1="160" y1="95" x2="190" y2="95" stroke="#a855f7" stroke-width="2"/>
  <polygon points="190,89 202,95 190,101" fill="#a855f7"/>

  <!-- Step 2: Stop -->
  <rect x="202" y="55" width="130" height="80" rx="8" fill="#1e1b4b" stroke="#f97316" stroke-width="2"/>
  <text x="267" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f97316">サービス停止</text>
  <text x="267" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">ApplicationStop</text>
  <text x="267" y="123" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fca5a5">⚠ ダウンタイム開始</text>

  <!-- Arrow -->
  <line x1="332" y1="95" x2="362" y2="95" stroke="#a855f7" stroke-width="2"/>
  <polygon points="362,89 374,95 362,101" fill="#a855f7"/>

  <!-- Step 3: Deploy -->
  <rect x="374" y="55" width="130" height="80" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="2"/>
  <text x="439" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a855f7">新バージョン配備</text>
  <text x="439" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">BeforeInstall</text>
  <text x="439" y="123" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d8b4fe">AfterInstall</text>

  <!-- Arrow -->
  <line x1="504" y1="95" x2="534" y2="95" stroke="#a855f7" stroke-width="2"/>
  <polygon points="534,89 546,95 534,101" fill="#a855f7"/>

  <!-- Step 4: Start & Validate -->
  <rect x="546" y="55" width="130" height="80" rx="8" fill="#1e1b4b" stroke="#60a5fa" stroke-width="2"/>
  <text x="611" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">起動・検証</text>
  <text x="611" y="105" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">ApplicationStart</text>
  <text x="611" y="123" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bfdbfe">ValidateService</text>

  <!-- Arrow to result -->
  <line x1="676" y1="95" x2="706" y2="95" stroke="#a855f7" stroke-width="2"/>
  <polygon points="706,89 718,95 706,101" fill="#a855f7"/>

  <!-- Step 5: New State -->
  <rect x="718" y="55" width="62" height="80" rx="8" fill="#1e1b4b" stroke="#34d399" stroke-width="2"/>
  <text x="749" y="82" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#34d399">完了</text>
  <text x="749" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">v2.0</text>
  <text x="749" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#34d399">稼働中</text>

  <!-- Success path label -->
  <text x="400" y="175" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">✓ 成功パス: 全サーバーが順次更新される</text>

  <!-- Failure handling section -->
  <rect x="30" y="200" width="740" height="155" rx="10" fill="#0f172a" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="225" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f97316">失敗時の挙動（ValidateService が失敗した場合）</text>

  <!-- Rollback flow -->
  <rect x="55" y="238" width="130" height="60" rx="8" fill="#1e1b4b" stroke="#f97316" stroke-width="2"/>
  <text x="120" y="263" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f97316">検証失敗</text>
  <text x="120" y="283" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">HTTP 5xx / タイムアウト</text>

  <line x1="185" y1="268" x2="215" y2="268" stroke="#f97316" stroke-width="2"/>
  <polygon points="215,262 227,268 215,274" fill="#f97316"/>

  <rect x="227" y="238" width="130" height="60" rx="8" fill="#1e1b4b" stroke="#f97316" stroke-width="2"/>
  <text x="292" y="263" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f97316">自動ロールバック</text>
  <text x="292" y="283" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">CodeDeploy が検知</text>

  <line x1="357" y1="268" x2="387" y2="268" stroke="#f97316" stroke-width="2"/>
  <polygon points="387,262 399,268 387,274" fill="#f97316"/>

  <rect x="399" y="238" width="150" height="60" rx="8" fill="#1e1b4b" stroke="#fbbf24" stroke-width="2"/>
  <text x="474" y="263" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fbbf24">前リビジョン再デプロイ</text>
  <text x="474" y="283" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">S3から旧バージョン取得</text>

  <line x1="549" y1="268" x2="579" y2="268" stroke="#34d399" stroke-width="2"/>
  <polygon points="579,262 591,268 579,274" fill="#34d399"/>

  <rect x="591" y="238" width="140" height="60" rx="8" fill="#1e1b4b" stroke="#34d399" stroke-width="2"/>
  <text x="661" y="263" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#34d399">v1.0 復元完了</text>
  <text x="661" y="283" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">平均60秒以内</text>

  <!-- Time note -->
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9ca3af">全体デプロイ時間: 3〜10分 ／ ロールバック時間: 〜60秒</text>
  <text x="400" y="358" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fca5a5">⚠ デプロイ中はダウンタイムが発生する点に注意</text>
</svg>
