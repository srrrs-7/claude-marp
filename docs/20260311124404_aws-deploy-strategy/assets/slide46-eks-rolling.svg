<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="400" fill="transparent"/>
  <text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">EKS ローリングアップデート — Pod置き換えフロー</text>

  <!-- Phase labels -->
  <text x="130" y="60" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">Phase 1: 初期状態</text>
  <text x="400" y="60" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">Phase 2: 更新中</text>
  <text x="660" y="60" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">Phase 3: 完了</text>

  <!-- Phase 1 -->
  <rect x="20" y="75" width="220" height="200" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <!-- v1 pods -->
  <rect x="35" y="95" width="85" height="50" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="77" y="118" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v1</text>
  <text x="77" y="134" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <rect x="135" y="95" width="85" height="50" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="177" y="118" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v1</text>
  <text x="177" y="134" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <rect x="35" y="165" width="85" height="50" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="77" y="188" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v1</text>
  <text x="77" y="204" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <rect x="135" y="165" width="85" height="50" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="177" y="188" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v1</text>
  <text x="177" y="204" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <text x="130" y="255" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="sans-serif">replicas: 4 / v1: 4</text>

  <!-- Arrow Phase1 -> Phase2 -->
  <line x1="240" y1="175" x2="278" y2="175" stroke="#a855f7" stroke-width="2"/>
  <polygon points="278,170 288,175 278,180" fill="#a855f7"/>

  <!-- Phase 2 -->
  <rect x="290" y="75" width="220" height="200" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5"/>
  <!-- Terminating pod -->
  <rect x="305" y="95" width="85" height="50" rx="6" fill="#3b0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="347" y="118" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v1</text>
  <text x="347" y="134" text-anchor="middle" fill="#ef4444" font-size="10" font-family="sans-serif">Terminating</text>

  <!-- New v2 pod -->
  <rect x="405" y="95" width="85" height="50" rx="6" fill="#1a3a2f" stroke="#34d399" stroke-width="2"/>
  <text x="447" y="118" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v2</text>
  <text x="447" y="134" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <!-- Remaining v1 -->
  <rect x="305" y="165" width="85" height="50" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="347" y="188" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v1</text>
  <text x="347" y="204" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <rect x="405" y="165" width="85" height="50" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="447" y="188" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v1</text>
  <text x="447" y="204" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <text x="400" y="255" text-anchor="middle" fill="#a855f7" font-size="11" font-family="sans-serif">replicas: 4 / v1: 3 / v2: 1</text>

  <!-- Arrow Phase2 -> Phase3 -->
  <line x1="510" y1="175" x2="548" y2="175" stroke="#a855f7" stroke-width="2"/>
  <polygon points="548,170 558,175 548,180" fill="#a855f7"/>

  <!-- Phase 3 -->
  <rect x="560" y="75" width="220" height="200" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <!-- All v2 pods -->
  <rect x="575" y="95" width="85" height="50" rx="6" fill="#1a3a2f" stroke="#34d399" stroke-width="2"/>
  <text x="617" y="118" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v2</text>
  <text x="617" y="134" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <rect x="675" y="95" width="85" height="50" rx="6" fill="#1a3a2f" stroke="#34d399" stroke-width="2"/>
  <text x="717" y="118" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v2</text>
  <text x="717" y="134" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <rect x="575" y="165" width="85" height="50" rx="6" fill="#1a3a2f" stroke="#34d399" stroke-width="2"/>
  <text x="617" y="188" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v2</text>
  <text x="617" y="204" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <rect x="675" y="165" width="85" height="50" rx="6" fill="#1a3a2f" stroke="#34d399" stroke-width="2"/>
  <text x="717" y="188" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Pod v2</text>
  <text x="717" y="204" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">Running</text>

  <text x="660" y="255" text-anchor="middle" fill="#34d399" font-size="11" font-family="sans-serif">replicas: 4 / v2: 4</text>

  <!-- Config info -->
  <rect x="20" y="295" width="760" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="400" y="318" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" font-family="sans-serif">Deployment 設定パラメータ</text>
  <text x="150" y="343" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="sans-serif">maxUnavailable: 1</text>
  <text x="150" y="362" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">同時停止Podの上限</text>
  <text x="400" y="343" text-anchor="middle" fill="#34d399" font-size="12" font-family="sans-serif">maxSurge: 1</text>
  <text x="400" y="362" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">追加起動Pod数の上限</text>
  <text x="640" y="343" text-anchor="middle" fill="#a855f7" font-size="12" font-family="sans-serif">PodDisruptionBudget</text>
  <text x="640" y="362" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">minAvailable: 3 で可用性保証</text>
</svg>
