<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff" font-family="sans-serif">イミュータブル vs ブルーグリーン — 2 軸比較</text>

  <!-- Axis labels -->
  <!-- X axis: Scope (Instance vs Environment) -->
  <text x="400" y="56" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.7" font-family="sans-serif">スコープ: インスタンス単位 ←————————————→ 環境単位</text>
  <!-- Y axis: Philosophy -->
  <text x="14" y="230" font-size="11" fill="#ffffff" opacity="0.7" font-family="sans-serif" transform="rotate(-90, 14, 230)">哲学: 変更禁止</text>

  <!-- Grid -->
  <line x1="100" y1="65" x2="100" y2="370" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="700" y1="65" x2="700" y2="370" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="65" x2="700" y2="65" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="370" x2="700" y2="370" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="65" x2="400" y2="370" stroke="#ffffff" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="100" y1="218" x2="700" y2="218" stroke="#ffffff" stroke-width="1" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Immutable bubble (upper left) -->
  <circle cx="220" cy="150" r="80" fill="#a855f7" opacity="0.25"/>
  <circle cx="220" cy="150" r="80" fill="none" stroke="#a855f7" stroke-width="2"/>
  <text x="220" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#a855f7" font-family="sans-serif">イミュータブル</text>
  <text x="220" y="148" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">対象: インスタンス</text>
  <text x="220" y="164" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">哲学: 変更禁止</text>
  <text x="220" y="180" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">EB / ASG Refresh</text>

  <!-- Blue-Green bubble (lower right) -->
  <circle cx="580" cy="285" r="80" fill="#60a5fa" opacity="0.25"/>
  <circle cx="580" cy="285" r="80" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <text x="580" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa" font-family="sans-serif">ブルーグリーン</text>
  <text x="580" y="283" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">対象: 環境全体</text>
  <text x="580" y="299" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">手法: 環境を 2 つ維持</text>
  <text x="580" y="315" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">R53 / ELB 切り替え</text>

  <!-- Overlap zone -->
  <ellipse cx="390" cy="210" rx="60" ry="40" fill="#34d399" opacity="0.15"/>
  <ellipse cx="390" cy="210" rx="60" ry="40" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="390" y="205" text-anchor="middle" font-size="10" fill="#34d399" font-weight="bold" font-family="sans-serif">組合せ可</text>
  <text x="390" y="220" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">EB BG (Immutable)</text>

  <!-- Comparison table -->
  <rect x="20" y="368" width="760" height="0" rx="0" fill="none"/>

  <!-- Bottom comparison -->
  <rect x="20" y="358" width="760" height="36" rx="8" fill="#1e1b4b" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <text x="140" y="378" text-anchor="middle" font-size="10" fill="#a855f7" font-family="sans-serif">イミュータブル: インスタンスを新規作成</text>
  <line x1="280" y1="363" x2="280" y2="393" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="400" y="378" text-anchor="middle" font-size="10" fill="#34d399" font-family="sans-serif">共通: 既存を変更しない哲学</text>
  <line x1="520" y1="363" x2="520" y2="393" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="660" y="378" text-anchor="middle" font-size="10" fill="#60a5fa" font-family="sans-serif">ブルーグリーン: 環境全体を切り替え</text>
</svg>
