<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff" font-family="sans-serif">Auto Scaling Immutable — 並行グループ作成フロー</text>

  <!-- ELB top -->
  <rect x="300" y="40" width="200" height="38" rx="8" fill="#1e40af" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff" font-family="sans-serif">ELB (ALB / NLB)</text>

  <!-- Traffic lines: ELB to old and new ASG -->
  <line x1="350" y1="78" x2="200" y2="118" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="196,114 204,122 208,114" fill="#60a5fa"/>
  <text x="240" y="108" font-size="10" fill="#60a5fa" font-family="sans-serif">100% (初期)</text>

  <line x1="450" y1="78" x2="600" y2="118" stroke="#a855f7" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="596,114 604,122 608,114" fill="#a855f7"/>
  <text x="520" y="108" font-size="10" fill="#a855f7" font-family="sans-serif">登録後切替</text>

  <!-- Old ASG -->
  <rect x="60" y="120" width="280" height="120" rx="8" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <text x="200" y="140" text-anchor="middle" font-size="11" fill="#60a5fa" font-weight="bold" font-family="sans-serif">既存 ASG (Old Launch Template)</text>

  <rect x="80" y="150" width="60" height="35" rx="5" fill="#60a5fa"/>
  <text x="110" y="172" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-001 v1</text>
  <rect x="150" y="150" width="60" height="35" rx="5" fill="#60a5fa"/>
  <text x="180" y="172" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-002 v1</text>
  <rect x="220" y="150" width="60" height="35" rx="5" fill="#60a5fa"/>
  <text x="250" y="172" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-003 v1</text>
  <rect x="80" y="196" width="60" height="35" rx="5" fill="#60a5fa"/>
  <text x="110" y="218" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-004 v1</text>
  <rect x="150" y="196" width="60" height="35" rx="5" fill="#60a5fa"/>
  <text x="180" y="218" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-005 v1</text>

  <!-- New ASG -->
  <rect x="460" y="120" width="310" height="120" rx="8" fill="none" stroke="#a855f7" stroke-width="2"/>
  <text x="615" y="140" text-anchor="middle" font-size="11" fill="#a855f7" font-weight="bold" font-family="sans-serif">新規 ASG (New Launch Template)</text>

  <rect x="480" y="150" width="60" height="35" rx="5" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="510" y="172" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-101 v2</text>
  <rect x="550" y="150" width="60" height="35" rx="5" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="580" y="172" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-102 v2</text>
  <rect x="620" y="150" width="60" height="35" rx="5" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="650" y="172" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-103 v2</text>
  <rect x="690" y="150" width="60" height="35" rx="5" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="720" y="172" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-104 v2</text>
  <rect x="480" y="196" width="60" height="35" rx="5" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="510" y="218" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">i-105 v2</text>
  <text x="620" y="215" font-size="10" fill="#34d399" font-family="sans-serif">HC通過後 ELB 登録</text>

  <!-- Steps below -->
  <rect x="0" y="254" width="800" height="1" fill="#ffffff" opacity="0.2"/>
  <text x="400" y="275" text-anchor="middle" font-size="12" fill="#a855f7" font-weight="bold" font-family="sans-serif">切り替えシーケンス</text>

  <!-- Step boxes -->
  <rect x="20" y="285" width="150" height="50" rx="5" fill="none" stroke="#60a5fa" stroke-width="1"/>
  <text x="95" y="306" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="bold" font-family="sans-serif">1. 新 LT 作成</text>
  <text x="95" y="322" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">新 AMI / 設定を定義</text>

  <line x1="170" y1="310" x2="188" y2="310" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="186,306 194,310 186,314" fill="#ffffff"/>

  <rect x="192" y="285" width="150" height="50" rx="5" fill="none" stroke="#a855f7" stroke-width="1"/>
  <text x="267" y="306" text-anchor="middle" font-size="10" fill="#a855f7" font-weight="bold" font-family="sans-serif">2. 新 ASG 構築</text>
  <text x="267" y="322" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">同サイズで並行起動</text>

  <line x1="342" y1="310" x2="360" y2="310" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="358,306 366,310 358,314" fill="#ffffff"/>

  <rect x="364" y="285" width="150" height="50" rx="5" fill="none" stroke="#34d399" stroke-width="1"/>
  <text x="439" y="306" text-anchor="middle" font-size="10" fill="#34d399" font-weight="bold" font-family="sans-serif">3. HC + ELB 登録</text>
  <text x="439" y="322" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">ヘルスチェック後に登録</text>

  <line x1="514" y1="310" x2="532" y2="310" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="530,306 538,310 530,314" fill="#ffffff"/>

  <rect x="536" y="285" width="150" height="50" rx="5" fill="none" stroke="#34d399" stroke-width="1"/>
  <text x="611" y="306" text-anchor="middle" font-size="10" fill="#34d399" font-weight="bold" font-family="sans-serif">4. 旧 ASG 除外</text>
  <text x="611" y="322" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif">ELB から切り離し削除</text>

  <!-- Rollback -->
  <rect x="120" y="348" width="560" height="38" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="368" text-anchor="middle" font-size="11" fill="#a855f7" font-weight="bold" font-family="sans-serif">ロールバック: Step 4 前なら新 ASG を削除するだけ — 旧 ASG は無傷</text>
</svg>
