<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="transparent"/>

  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">インプレースデプロイ: メリット vs デメリット</text>

  <!-- Center divider -->
  <line x1="400" y1="45" x2="400" y2="370" stroke="#374151" stroke-width="2"/>

  <!-- Left: Merits -->
  <rect x="20" y="45" width="365" height="40" rx="8" fill="#14532d" stroke="#34d399" stroke-width="2"/>
  <text x="202" y="71" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#34d399">メリット（利点）</text>

  <!-- Merit items -->
  <rect x="25" y="98" width="355" height="55" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="45" y="122" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">高速デプロイ</text>
  <text x="45" y="142" font-family="sans-serif" font-size="11" fill="#ffffff">全インスタンスを同時更新で 3〜5分で完了。CI/CD サイクルが短縮される</text>

  <rect x="25" y="163" width="355" height="55" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="45" y="187" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">低コスト</text>
  <text x="45" y="207" font-family="sans-serif" font-size="11" fill="#ffffff">追加インフラ不要。現行インスタンスをそのまま使い回せる</text>

  <rect x="25" y="228" width="355" height="55" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="45" y="252" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">シンプルな設定</text>
  <text x="45" y="272" font-family="sans-serif" font-size="11" fill="#ffffff">appspec.yml のみで制御可能。学習コストが最も低い</text>

  <rect x="25" y="293" width="355" height="55" rx="6" fill="#1e1b4b" stroke="#34d399" stroke-width="1.5"/>
  <text x="45" y="317" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">運用負荷が低い</text>
  <text x="45" y="337" font-family="sans-serif" font-size="11" fill="#ffffff">2つの環境を管理する必要がない。状態の一貫性を保ちやすい</text>

  <!-- Right: Demerits -->
  <rect x="415" y="45" width="365" height="40" rx="8" fill="#7f1d1d" stroke="#f97316" stroke-width="2"/>
  <text x="597" y="71" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#f97316">デメリット（欠点）</text>

  <!-- Demerit items -->
  <rect x="420" y="98" width="355" height="55" rx="6" fill="#1e1b4b" stroke="#f97316" stroke-width="1.5"/>
  <text x="440" y="122" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f97316">ダウンタイム必須</text>
  <text x="440" y="142" font-family="sans-serif" font-size="11" fill="#ffffff">全インスタンスが停止するため、SLA 99.9%以上の本番には不適</text>

  <rect x="420" y="163" width="355" height="55" rx="6" fill="#1e1b4b" stroke="#f97316" stroke-width="1.5"/>
  <text x="440" y="187" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f97316">ロールバックに時間がかかる</text>
  <text x="440" y="207" font-family="sans-serif" font-size="11" fill="#ffffff">前バージョンの再デプロイが必要。最短でも 60〜120秒の停止</text>

  <rect x="420" y="228" width="355" height="55" rx="6" fill="#1e1b4b" stroke="#f97316" stroke-width="1.5"/>
  <text x="440" y="252" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f97316">全インスタンスが同時リスク</text>
  <text x="440" y="272" font-family="sans-serif" font-size="11" fill="#ffffff">バグが全ユーザーに即座に影響。影響範囲を限定できない</text>

  <rect x="420" y="293" width="355" height="55" rx="6" fill="#1e1b4b" stroke="#f97316" stroke-width="1.5"/>
  <text x="440" y="317" font-family="sans-serif" font-size="13" font-weight="bold" fill="#f97316">本番環境での検証が困難</text>
  <text x="440" y="337" font-family="sans-serif" font-size="11" fill="#ffffff">カナリアテストやA/Bテストが実施できない</text>

  <!-- VS badge -->
  <circle cx="400" cy="185" r="22" fill="#1e1b4b" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="191" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a855f7">VS</text>
</svg>
