<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff" font-family="sans-serif">ミュータブル vs イミュータブル — インフラ哲学の違い</text>

  <!-- Divider -->
  <line x1="400" y1="38" x2="400" y2="390" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- Left: Mutable -->
  <rect x="20" y="42" width="370" height="330" rx="8" fill="#7f1d1d" opacity="0.35"/>
  <text x="205" y="64" text-anchor="middle" font-size="14" font-weight="bold" fill="#f87171" font-family="sans-serif">ミュータブル (Mutable)</text>
  <text x="205" y="80" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.8" font-family="sans-serif">既存インスタンスを変更・更新する</text>

  <!-- Mutable flow: server with mutation arrows -->
  <rect x="140" y="95" width="130" height="60" rx="8" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="205" y="120" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Server (v1)</text>
  <text x="205" y="138" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8" font-family="sans-serif">Running</text>

  <!-- Mutation operations -->
  <line x1="205" y1="155" x2="205" y2="175" stroke="#f87171" stroke-width="2"/>
  <polygon points="200,173 205,183 210,173" fill="#f87171"/>

  <rect x="110" y="183" width="80" height="26" rx="4" fill="#92400e" opacity="0.8"/>
  <text x="150" y="200" text-anchor="middle" font-size="10" fill="#f59e0b" font-family="sans-serif">apt upgrade</text>
  <rect x="210" y="183" width="80" height="26" rx="4" fill="#92400e" opacity="0.8"/>
  <text x="250" y="200" text-anchor="middle" font-size="10" fill="#f59e0b" font-family="sans-serif">config patch</text>

  <line x1="205" y1="209" x2="205" y2="229" stroke="#f87171" stroke-width="2"/>
  <polygon points="200,227 205,237 210,227" fill="#f87171"/>

  <rect x="140" y="237" width="130" height="60" rx="8" fill="#9ca3af" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="205" y="262" text-anchor="middle" font-size="12" fill="#1f2937" font-family="sans-serif">Server (v1→v2)</text>
  <text x="205" y="278" text-anchor="middle" font-size="10" fill="#1f2937" opacity="0.8" font-family="sans-serif">変更済み</text>

  <rect x="55" y="308" width="300" height="46" rx="6" fill="#7f1d1d" opacity="0.7"/>
  <text x="205" y="326" text-anchor="middle" font-size="10" fill="#f87171" font-weight="bold" font-family="sans-serif">問題点</text>
  <text x="205" y="342" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">設定ドリフト / 再現困難 / ロールバック不確実</text>

  <!-- Right: Immutable -->
  <rect x="410" y="42" width="370" height="330" rx="8" fill="#14532d" opacity="0.35"/>
  <text x="595" y="64" text-anchor="middle" font-size="14" font-weight="bold" fill="#34d399" font-family="sans-serif">イミュータブル (Immutable)</text>
  <text x="595" y="80" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.8" font-family="sans-serif">既存を変えず、新規に作り直す</text>

  <!-- Old server -->
  <rect x="430" y="95" width="120" height="60" rx="8" fill="#60a5fa" opacity="0.6"/>
  <text x="490" y="120" text-anchor="middle" font-size="11" fill="#ffffff" font-family="sans-serif">Old Server</text>
  <text x="490" y="138" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8" font-family="sans-serif">v1 稼働中</text>

  <!-- New server creation -->
  <rect x="630" y="95" width="120" height="60" rx="8" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="690" y="120" text-anchor="middle" font-size="11" fill="#ffffff" font-family="sans-serif">New Server</text>
  <text x="690" y="138" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8" font-family="sans-serif">v2 新規作成</text>

  <!-- Golden image annotation -->
  <rect x="570" y="165" width="180" height="28" rx="4" fill="#1e1b4b" stroke="#a855f7" stroke-width="1"/>
  <text x="660" y="183" text-anchor="middle" font-size="10" fill="#a855f7" font-family="sans-serif">ゴールデンAMIから作成</text>

  <!-- Switch arrow -->
  <line x1="550" y1="125" x2="630" y2="125" stroke="#34d399" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="590" y="118" text-anchor="middle" font-size="10" fill="#34d399" font-family="sans-serif">トラフィック切替</text>
  <polygon points="628,120 638,125 628,130" fill="#34d399"/>

  <!-- Old server termination -->
  <line x1="490" y1="155" x2="490" y2="185" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="490" y="200" text-anchor="middle" font-size="10" fill="#f87171" font-family="sans-serif">削除</text>
  <text x="490" y="215" text-anchor="middle" font-size="26" fill="#f87171" opacity="0.6" font-family="sans-serif">x</text>

  <!-- New stable server -->
  <rect x="570" y="230" width="180" height="60" rx="8" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="660" y="258" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Server (v2)</text>
  <text x="660" y="276" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8" font-family="sans-serif">新規・クリーン</text>

  <!-- Immutable benefits -->
  <rect x="430" y="308" width="330" height="46" rx="6" fill="#14532d" opacity="0.7"/>
  <text x="595" y="326" text-anchor="middle" font-size="10" fill="#34d399" font-weight="bold" font-family="sans-serif">メリット</text>
  <text x="595" y="342" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">設定ドリフトゼロ / 完全再現性 / 高速ロールバック</text>

  <!-- Bottom summary -->
  <text x="400" y="388" text-anchor="middle" font-size="11" fill="#a855f7" font-weight="bold" font-family="sans-serif">「サーバーは家畜 (cattle) — ペット (pet) ではない」</text>
</svg>
