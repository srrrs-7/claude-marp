<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <!-- Background -->
  <rect width="800" height="400" fill="transparent"/>

  <!-- Title row: Users -->
  <rect x="330" y="20" width="140" height="44" rx="8" fill="#6d28d9" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="400" y="47" text-anchor="middle" font-size="16" fill="#ffffff" font-family="sans-serif">ユーザー</text>

  <!-- Arrow down from Users to Router -->
  <line x1="400" y1="64" x2="400" y2="100" stroke="#a855f7" stroke-width="2"/>
  <polygon points="400,100 394,88 406,88" fill="#a855f7"/>

  <!-- Router box -->
  <rect x="290" y="100" width="220" height="44" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="2" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="400" y="127" text-anchor="middle" font-size="15" fill="#ffffff" font-family="sans-serif">Route 53 / ALB</text>

  <!-- Arrow left to Blue -->
  <line x1="290" y1="122" x2="180" y2="200" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="180,200 185,188 193,197" fill="#60a5fa"/>

  <!-- Arrow right to Green -->
  <line x1="510" y1="122" x2="620" y2="200" stroke="#34d399" stroke-width="2"/>
  <polygon points="620,200 607,195 615,187" fill="#34d399"/>

  <!-- Blue env box -->
  <rect x="60" y="200" width="240" height="110" rx="10" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="180" y="228" text-anchor="middle" font-size="15" font-weight="bold" fill="#60a5fa" font-family="sans-serif">Blue 環境 (現行)</text>
  <text x="180" y="252" text-anchor="middle" font-size="13" fill="#ffffff" font-family="sans-serif">v1.0 稼働中</text>
  <rect x="100" y="265" width="160" height="28" rx="5" fill="#60a5fa" opacity="0.25"/>
  <text x="180" y="284" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Traffic: 100% → 0%</text>

  <!-- Green env box -->
  <rect x="500" y="200" width="240" height="110" rx="10" fill="#052e16" stroke="#34d399" stroke-width="2" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="620" y="228" text-anchor="middle" font-size="15" font-weight="bold" fill="#34d399" font-family="sans-serif">Green 環境 (新)</text>
  <text x="620" y="252" text-anchor="middle" font-size="13" fill="#ffffff" font-family="sans-serif">v2.0 準備完了</text>
  <rect x="540" y="265" width="160" height="28" rx="5" fill="#34d399" opacity="0.25"/>
  <text x="620" y="284" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">Traffic: 0% → 100%</text>

  <!-- Switch arrow at bottom -->
  <line x1="300" y1="355" x2="500" y2="355" stroke="#a855f7" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="500,355 488,349 488,361" fill="#a855f7"/>
  <text x="400" y="376" text-anchor="middle" font-size="13" fill="#a855f7" font-family="sans-serif">瞬時切り替え (ダウンタイムゼロ)</text>

  <!-- DB shared -->
  <rect x="330" y="330" width="140" height="34" rx="6" fill="#312e81" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="352" text-anchor="middle" font-size="12" fill="#ffffff" font-family="sans-serif">共有 RDS / DB</text>
  <line x1="180" y1="310" x2="330" y2="345" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="620" y1="310" x2="470" y2="345" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
