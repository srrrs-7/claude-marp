<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff" font-family="sans-serif">EC2 Auto Scaling Instance Refresh フロー</text>

  <!-- ELB -->
  <rect x="320" y="42" width="160" height="36" rx="8" fill="#1e40af" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff" font-family="sans-serif">ELB (ALB)</text>

  <!-- ELB to ASG arrow -->
  <line x1="400" y1="78" x2="400" y2="100" stroke="#ffffff" stroke-width="2"/>
  <polygon points="395,98 400,108 405,98" fill="#ffffff"/>

  <!-- ASG border -->
  <rect x="40" y="108" width="720" height="130" rx="8" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="128" font-size="11" fill="#a855f7" font-family="sans-serif">Auto Scaling Group</text>
  <text x="650" y="128" font-size="10" fill="#ffffff" font-family="sans-serif">MinHealthy: 80%</text>

  <!-- Instance row: before -->
  <text x="60" y="155" font-size="10" fill="#ffffff" font-family="sans-serif">Before:</text>
  <rect x="110" y="140" width="60" height="35" rx="5" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="140" y="162" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-001 v1</text>
  <rect x="185" y="140" width="60" height="35" rx="5" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="215" y="162" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-002 v1</text>
  <rect x="260" y="140" width="60" height="35" rx="5" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="290" y="162" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-003 v1</text>
  <rect x="335" y="140" width="60" height="35" rx="5" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="365" y="162" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-004 v1</text>
  <rect x="410" y="140" width="60" height="35" rx="5" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="440" y="162" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-005 v1</text>

  <!-- Instance row: during -->
  <text x="60" y="205" font-size="10" fill="#ffffff" font-family="sans-serif">During:</text>
  <rect x="110" y="190" width="60" height="35" rx="5" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="140" y="212" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-101 v2</text>
  <rect x="185" y="190" width="60" height="35" rx="5" fill="#a855f7" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="215" y="212" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-102 v2</text>
  <rect x="260" y="190" width="60" height="35" rx="5" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="290" y="212" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-003 v1</text>
  <rect x="335" y="190" width="60" height="35" rx="5" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="365" y="212" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-004 v1</text>
  <rect x="410" y="190" width="60" height="35" rx="5" fill="#60a5fa" style="filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15))"/>
  <text x="440" y="212" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">i-005 v1</text>

  <!-- refresh action annotation -->
  <text x="500" y="155" font-size="10" fill="#34d399" font-family="sans-serif">Instance Refresh</text>
  <text x="500" y="170" font-size="10" fill="#34d399" font-family="sans-serif">StartInstanceRefresh</text>
  <line x1="480" y1="162" x2="475" y2="162" stroke="#34d399" stroke-width="1.5"/>
  <polygon points="477,158 469,162 477,166" fill="#34d399"/>

  <!-- Warm up note -->
  <text x="500" y="210" font-size="10" fill="#f59e0b" font-family="sans-serif">WarmupSeconds: 300</text>
  <text x="500" y="225" font-size="10" fill="#ffffff" font-family="sans-serif">新インスタンス起動後</text>
  <text x="500" y="238" font-size="10" fill="#ffffff" font-family="sans-serif">300秒ウォームアップ待機</text>

  <!-- Flow steps -->
  <rect x="0" y="255" width="800" height="1" fill="#ffffff" opacity="0.2"/>

  <rect x="30" y="268" width="155" height="55" rx="6" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="107" y="286" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="bold" font-family="sans-serif">1. Launch Template 更新</text>
  <text x="107" y="302" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">新AMI / 新設定を</text>
  <text x="107" y="315" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">Launch Templateに定義</text>

  <line x1="185" y1="295" x2="205" y2="295" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="203,291 211,295 203,299" fill="#ffffff"/>

  <rect x="208" y="268" width="155" height="55" rx="6" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <text x="285" y="286" text-anchor="middle" font-size="10" fill="#a855f7" font-weight="bold" font-family="sans-serif">2. Instance Refresh 開始</text>
  <text x="285" y="302" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">MinHealthy%を維持しながら</text>
  <text x="285" y="315" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">古いインスタンスを終了</text>

  <line x1="363" y1="295" x2="383" y2="295" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="381,291 389,295 381,299" fill="#ffffff"/>

  <rect x="386" y="268" width="155" height="55" rx="6" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="463" y="286" text-anchor="middle" font-size="10" fill="#34d399" font-weight="bold" font-family="sans-serif">3. 新インスタンス起動</text>
  <text x="463" y="302" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">ヘルスチェック + Warmup</text>
  <text x="463" y="315" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">通過後に次の置き換えへ</text>

  <line x1="541" y1="295" x2="561" y2="295" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="559,291 567,295 559,299" fill="#ffffff"/>

  <rect x="564" y="268" width="210" height="55" rx="6" fill="none" stroke="#34d399" stroke-width="1.5"/>
  <text x="669" y="286" text-anchor="middle" font-size="10" fill="#34d399" font-weight="bold" font-family="sans-serif">4. 全インスタンス置き換え完了</text>
  <text x="669" y="302" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">旧インスタンスは全て終了</text>
  <text x="669" y="315" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">新 Launch Template で稼働</text>

  <!-- Key config bottom -->
  <rect x="150" y="340" width="500" height="44" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#a855f7" font-weight="bold" font-family="sans-serif">重要設定: MinHealthyPercentage=80, WarmupSeconds=300</text>
  <text x="400" y="376" text-anchor="middle" font-size="10" fill="#ffffff" font-family="sans-serif">チェックポイント障害時は自動キャンセル — 旧インスタンスに戻る</text>
</svg>
