<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="400" fill="transparent"/>
  <text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">Elastic Beanstalk デプロイ戦略比較マトリクス</text>

  <!-- Table header background -->
  <rect x="20" y="45" width="760" height="40" rx="4" fill="#1e1b4b"/>
  <!-- Column headers -->
  <text x="110" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">戦略</text>
  <text x="270" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">ダウンタイム</text>
  <text x="420" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">速度</text>
  <text x="560" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">コスト追加</text>
  <text x="700" y="70" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">リスク</text>

  <!-- Row 1: All at once -->
  <rect x="20" y="90" width="760" height="60" rx="0" fill="#0f172a"/>
  <rect x="20" y="90" width="190" height="60" fill="#1e1b4b"/>
  <text x="110" y="115" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold" font-family="sans-serif">All at once</text>
  <text x="110" y="135" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="sans-serif">全一括更新</text>
  <text x="270" y="125" text-anchor="middle" fill="#ef4444" font-size="13" font-family="sans-serif">あり (分〜数分)</text>
  <text x="420" y="125" text-anchor="middle" fill="#34d399" font-size="13" font-family="sans-serif">最速</text>
  <!-- Cost stars: 0/3 -->
  <text x="560" y="125" text-anchor="middle" fill="#34d399" font-size="13" font-family="sans-serif">なし</text>
  <!-- Risk: High -->
  <rect x="655" y="108" width="90" height="24" rx="4" fill="#7f1d1d"/>
  <text x="700" y="125" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold" font-family="sans-serif">高</text>

  <!-- Row 2: Rolling -->
  <rect x="20" y="155" width="760" height="60" rx="0" fill="#0f172a"/>
  <rect x="20" y="155" width="190" height="60" fill="#1e1b4b"/>
  <text x="110" y="180" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold" font-family="sans-serif">Rolling</text>
  <text x="110" y="200" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="sans-serif">バッチ順次更新</text>
  <text x="270" y="190" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="sans-serif">一時的に容量減</text>
  <text x="420" y="190" text-anchor="middle" fill="#60a5fa" font-size="13" font-family="sans-serif">中速</text>
  <text x="560" y="190" text-anchor="middle" fill="#34d399" font-size="13" font-family="sans-serif">最小</text>
  <rect x="655" y="173" width="90" height="24" rx="4" fill="#1a3a2f"/>
  <text x="700" y="190" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold" font-family="sans-serif">中</text>

  <!-- Row 3: Immutable -->
  <rect x="20" y="220" width="760" height="60" rx="0" fill="#0f172a"/>
  <rect x="20" y="220" width="190" height="60" fill="#1e1b4b"/>
  <text x="110" y="245" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold" font-family="sans-serif">Immutable</text>
  <text x="110" y="265" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif">新インスタンス並走</text>
  <text x="270" y="255" text-anchor="middle" fill="#34d399" font-size="13" font-family="sans-serif">なし</text>
  <text x="420" y="255" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="sans-serif">低速</text>
  <text x="560" y="255" text-anchor="middle" fill="#f59e0b" font-size="13" font-family="sans-serif">2倍 (一時的)</text>
  <rect x="655" y="238" width="90" height="24" rx="4" fill="#1a3a2f"/>
  <text x="700" y="255" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold" font-family="sans-serif">低</text>

  <!-- Row 4: Blue/Green -->
  <rect x="20" y="285" width="760" height="60" rx="0" fill="#0f172a"/>
  <rect x="20" y="285" width="190" height="60" fill="#1e1b4b"/>
  <text x="110" y="310" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">Blue/Green</text>
  <text x="110" y="330" text-anchor="middle" fill="#a855f7" font-size="10" font-family="sans-serif">環境丸ごと切替</text>
  <text x="270" y="320" text-anchor="middle" fill="#34d399" font-size="13" font-family="sans-serif">なし (DNS切替)</text>
  <text x="420" y="320" text-anchor="middle" fill="#60a5fa" font-size="13" font-family="sans-serif">中速</text>
  <text x="560" y="320" text-anchor="middle" fill="#ef4444" font-size="13" font-family="sans-serif">2倍 (環境維持)</text>
  <rect x="655" y="303" width="90" height="24" rx="4" fill="#1e1b4b"/>
  <text x="700" y="320" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold" font-family="sans-serif">最低</text>

  <!-- Divider lines -->
  <line x1="20" y1="90" x2="780" y2="90" stroke="#334155" stroke-width="1"/>
  <line x1="20" y1="155" x2="780" y2="155" stroke="#334155" stroke-width="1"/>
  <line x1="20" y1="220" x2="780" y2="220" stroke="#334155" stroke-width="1"/>
  <line x1="20" y1="285" x2="780" y2="285" stroke="#334155" stroke-width="1"/>
  <line x1="20" y1="345" x2="780" y2="345" stroke="#334155" stroke-width="1"/>

  <!-- Vertical dividers -->
  <line x1="210" y1="45" x2="210" y2="345" stroke="#334155" stroke-width="1"/>
  <line x1="340" y1="45" x2="340" y2="345" stroke="#334155" stroke-width="1"/>
  <line x1="490" y1="45" x2="490" y2="345" stroke="#334155" stroke-width="1"/>
  <line x1="635" y1="45" x2="635" y2="345" stroke="#334155" stroke-width="1"/>
  <rect x="20" y="45" width="760" height="300" rx="4" fill="transparent" stroke="#334155" stroke-width="1"/>

  <!-- Recommendation note -->
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">推奨: 本番環境では Immutable または Blue/Green を選択。All at once は開発環境のみ。</text>
</svg>
