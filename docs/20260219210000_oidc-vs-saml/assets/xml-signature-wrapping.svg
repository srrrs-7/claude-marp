<svg viewBox="0 0 1050 500" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="1050" height="500" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="525" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#f38ba8" font-family="sans-serif">XML Signature Wrapping (XSW) 攻撃</text>
  <text x="525" y="40" text-anchor="middle" font-size="11" fill="#6c7086" font-family="sans-serif">SAML の最も危険な脆弱性 — 署名は有効なのに別の要素が検証される</text>

  <!-- Normal flow (left) -->
  <rect x="20" y="52" width="460" height="210" fill="#1a2a1a" stroke="#a6e3a1" stroke-width="1.5" rx="8"/>
  <text x="250" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6e3a1" font-family="sans-serif">① 正常なリクエスト</text>

  <!-- Normal SAML structure -->
  <rect x="35" y="82" width="430" height="168" fill="#181825" stroke="#45475a" rx="4"/>
  <text x="50" y="102" font-size="11" fill="#a6e3a1" font-family="monospace">&lt;Response&gt;</text>
  <text x="65" y="120" font-size="11" fill="#cba6f7" font-family="monospace">&lt;Assertion ID="a1"&gt;</text>
  <text x="80" y="138" font-size="11" fill="#cdd6f4" font-family="monospace">&lt;Subject&gt;</text>
  <text x="95" y="156" font-size="11" fill="#a6e3a1" font-family="monospace">&lt;NameID&gt;alice&lt;/NameID&gt;</text>
  <text x="80" y="174" font-size="11" fill="#cdd6f4" font-family="monospace">&lt;/Subject&gt;</text>
  <text x="80" y="192" font-size="11" fill="#89b4fa" font-family="monospace">&lt;Signature ref="#a1"/&gt;</text>
  <text x="65" y="210" font-size="11" fill="#cba6f7" font-family="monospace">&lt;/Assertion&gt;</text>
  <text x="50" y="228" font-size="11" fill="#a6e3a1" font-family="monospace">&lt;/Response&gt;</text>
  <!-- Signature points to Assertion -->
  <line x1="208" y1="192" x2="208" y2="175" stroke="#89b4fa" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="215" y="186" font-size="9" fill="#89b4fa" font-family="sans-serif">a1を署名</text>

  <!-- Verification note for normal -->
  <rect x="35" y="256" width="430" height="40" fill="#1a2a1a" stroke="#a6e3a1" rx="3"/>
  <text x="250" y="271" text-anchor="middle" font-size="11" fill="#a6e3a1" font-family="sans-serif">SP: Assertion#a1 を検証 → 署名 OK</text>
  <text x="250" y="288" text-anchor="middle" font-size="11" fill="#a6e3a1" font-family="sans-serif">→ alice としてログイン許可 ✓</text>

  <!-- Arrow between normal and attack -->
  <text x="525" y="180" text-anchor="middle" font-size="28" fill="#f38ba8" font-family="sans-serif">⇒</text>
  <text x="525" y="200" text-anchor="middle" font-size="11" fill="#f38ba8" font-family="sans-serif">攻撃者が</text>
  <text x="525" y="215" text-anchor="middle" font-size="11" fill="#f38ba8" font-family="sans-serif">改ざん</text>

  <!-- Attack flow (right) -->
  <rect x="570" y="52" width="460" height="210" fill="#2a1a1a" stroke="#f38ba8" stroke-width="2" rx="8"/>
  <text x="800" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#f38ba8" font-family="sans-serif">② XSW 攻撃リクエスト</text>

  <!-- Malicious SAML structure -->
  <rect x="585" y="82" width="430" height="168" fill="#181825" stroke="#45475a" rx="4"/>
  <text x="600" y="102" font-size="11" fill="#a6e3a1" font-family="monospace">&lt;Response&gt;</text>
  <!-- Evil assertion (attacker's) -->
  <rect x="600" y="106" width="400" height="55" fill="#3a1a1a" stroke="#f38ba8" rx="2"/>
  <text x="615" y="122" font-size="11" fill="#f38ba8" font-family="monospace">&lt;Assertion ID="evil"&gt;  &lt;!-- 偽の --&gt;</text>
  <text x="630" y="140" font-size="11" fill="#f38ba8" font-family="monospace">&lt;NameID&gt;admin&lt;/NameID&gt;</text>
  <text x="615" y="158" font-size="11" fill="#f38ba8" font-family="monospace">&lt;/Assertion&gt;</text>
  <!-- Original signed assertion (still valid) -->
  <text x="615" y="178" font-size="11" fill="#cba6f7" font-family="monospace">&lt;Assertion ID="a1"&gt;  &lt;!-- 元の --&gt;</text>
  <text x="630" y="196" font-size="11" fill="#a6e3a1" font-family="monospace">&lt;NameID&gt;alice&lt;/NameID&gt;</text>
  <text x="630" y="214" font-size="11" fill="#89b4fa" font-family="monospace">&lt;Signature ref="#a1"/&gt;</text>
  <text x="615" y="232" font-size="11" fill="#cba6f7" font-family="monospace">&lt;/Assertion&gt;</text>
  <text x="600" y="248" font-size="11" fill="#a6e3a1" font-family="monospace">&lt;/Response&gt;</text>

  <!-- Verification note for attack -->
  <rect x="585" y="268" width="430" height="54" fill="#2a1a1a" stroke="#f38ba8" rx="3"/>
  <text x="800" y="285" text-anchor="middle" font-size="11" fill="#f38ba8" font-family="sans-serif">脆弱な SP: 最初の Assertion (evil) を使用</text>
  <text x="800" y="302" text-anchor="middle" font-size="11" fill="#f38ba8" font-family="sans-serif">署名検証: Assertion#a1 → alice ✓ (有効!)</text>
  <text x="800" y="318" text-anchor="middle" font-size="11" fill="#f38ba8" font-family="sans-serif">→ admin としてログイン 💀</text>

  <!-- Root cause explanation -->
  <rect x="20" y="332" width="1010" height="80" fill="#181825" stroke="#f38ba8" stroke-width="1.5" rx="8"/>
  <text x="525" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#f38ba8" font-family="sans-serif">根本原因と対策</text>
  <!-- Cause -->
  <rect x="30" y="358" width="490" height="46" fill="#2a1a1a" stroke="#f38ba8" stroke-width="1" rx="4"/>
  <text x="275" y="374" text-anchor="middle" font-size="11" fill="#f38ba8" font-family="sans-serif">原因: 署名検証と ID 参照の不整合</text>
  <text x="275" y="390" text-anchor="middle" font-size="10" fill="#a6adc8" font-family="sans-serif">署名が "#a1" を指すのに SP が別の要素 "evil" を処理</text>
  <text x="275" y="404" text-anchor="middle" font-size="10" fill="#a6adc8" font-family="sans-serif">XML パーサーによって挙動が異なる (JAXB, minidom, etc.)</text>
  <!-- Countermeasure -->
  <rect x="530" y="358" width="490" height="46" fill="#1a2a1a" stroke="#a6e3a1" stroke-width="1" rx="4"/>
  <text x="775" y="374" text-anchor="middle" font-size="11" fill="#a6e3a1" font-family="sans-serif">対策: ID と署名参照を必ず一致確認</text>
  <text x="775" y="390" text-anchor="middle" font-size="10" fill="#a6adc8" font-family="sans-serif">① Signature の Reference URI が Assertion の ID と一致するか確認</text>
  <text x="775" y="404" text-anchor="middle" font-size="10" fill="#a6adc8" font-family="sans-serif">② 検証済みライブラリを使用 (OneLogin, Shibboleth, etc.)</text>

  <!-- CVE note -->
  <rect x="20" y="420" width="1010" height="60" fill="#181825" stroke="#45475a" rx="4"/>
  <text x="525" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="#fab387" font-family="sans-serif">著名な XSW 関連インシデント</text>
  <text x="30" y="456" font-size="10" fill="#a6adc8" font-family="sans-serif">• Duo Security (2017): SAML SSO 実装の XSW 脆弱性 — GitHub, OktaなどのSAML実装に影響</text>
  <text x="30" y="472" font-size="10" fill="#a6adc8" font-family="sans-serif">• Ruby-saml (CVE-2015-20031): 複数の脆弱実装で管理者権限取得が可能。Python-saml も同様</text>
</svg>
