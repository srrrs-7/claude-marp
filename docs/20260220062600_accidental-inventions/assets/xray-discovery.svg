<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">X線発見（1895年）— 意図と結果の乖離</text>
  <!-- Timeline of events -->
  <!-- Step 1 -->
  <rect x="30" y="55" width="160" height="90" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="110" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#e91e63">実験の目的</text>
  <text x="110" y="100" text-anchor="middle" font-size="11" fill="#ffffff">陰極線管の</text>
  <text x="110" y="117" text-anchor="middle" font-size="11" fill="#ffffff">研究</text>
  <text x="110" y="134" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">レントゲン博士</text>
  <!-- Arrow -->
  <polygon points="195,100 208,93 208,107" fill="#ffffff"/>
  <line x1="190" y1="100" x2="208" y2="100" stroke="#ffffff" stroke-width="2"/>
  <!-- Step 2 -->
  <rect x="210" y="55" width="160" height="90" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="290" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9a825">偶然の観察</text>
  <text x="290" y="100" text-anchor="middle" font-size="11" fill="#ffffff">暗室で蛍光板が</text>
  <text x="290" y="117" text-anchor="middle" font-size="11" fill="#ffffff">光った</text>
  <text x="290" y="134" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">なぜ？と問う</text>
  <!-- Arrow -->
  <polygon points="375,100 388,93 388,107" fill="#ffffff"/>
  <line x1="370" y1="100" x2="388" y2="100" stroke="#ffffff" stroke-width="2"/>
  <!-- Step 3 -->
  <rect x="390" y="55" width="160" height="90" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="470" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9a825">体系的調査</text>
  <text x="470" y="100" text-anchor="middle" font-size="11" fill="#ffffff">6週間、妻の手を</text>
  <text x="470" y="117" text-anchor="middle" font-size="11" fill="#ffffff">撮影して検証</text>
  <text x="470" y="134" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">X線と命名</text>
  <!-- Arrow -->
  <polygon points="555,100 568,93 568,107" fill="#ffffff"/>
  <line x1="550" y1="100" x2="568" y2="100" stroke="#ffffff" stroke-width="2"/>
  <!-- Step 4 -->
  <rect x="570" y="55" width="200" height="90" rx="8" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="670" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">医療革命</text>
  <text x="670" y="100" text-anchor="middle" font-size="11" fill="#ffffff">非侵襲的診断が</text>
  <text x="670" y="117" text-anchor="middle" font-size="11" fill="#ffffff">可能に</text>
  <text x="670" y="134" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">1901年 ノーベル物理学賞</text>
  <!-- Key analysis -->
  <rect x="30" y="165" width="740" height="110" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="400" y="188" text-anchor="middle" font-size="14" font-weight="bold" fill="#f9a825">セレンディピティの解剖</text>
  <!-- 3 elements -->
  <rect x="50" y="200" width="200" height="60" rx="6" fill="#1a1a2e" stroke="#e91e63" stroke-width="1"/>
  <text x="150" y="222" text-anchor="middle" font-size="12" fill="#e91e63">準備された心</text>
  <text x="150" y="242" text-anchor="middle" font-size="11" fill="#ffffff">陰極線の専門知識あり</text>
  <text x="150" y="258" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">知識なしでは「光」を見流す</text>
  <rect x="300" y="200" width="200" height="60" rx="6" fill="#1a1a2e" stroke="#f9a825" stroke-width="1"/>
  <text x="400" y="222" text-anchor="middle" font-size="12" fill="#f9a825">異常への注意</text>
  <text x="400" y="242" text-anchor="middle" font-size="11" fill="#ffffff">「なぜ光る？」の問い</text>
  <text x="400" y="258" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">予期しない現象を無視しない</text>
  <rect x="550" y="200" width="200" height="60" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1"/>
  <text x="650" y="222" text-anchor="middle" font-size="12" fill="#4caf50">探求の行動</text>
  <text x="650" y="242" text-anchor="middle" font-size="11" fill="#ffffff">6週間の集中調査</text>
  <text x="650" y="258" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">気づいた後に追いかける</text>
  <!-- Bottom -->
  <text x="400" y="305" text-anchor="middle" font-size="13" fill="#f9a825">「偶然」は誰にでも起きる。「準備」があった人だけが活かせる</text>
  <text x="400" y="325" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.7">Pasteur: "Chance favors only the prepared mind"</text>
  <!-- Stats -->
  <rect x="100" y="340" width="600" height="44" rx="6" fill="#16213e" stroke="#4caf50" stroke-width="1"/>
  <text x="400" y="360" text-anchor="middle" font-size="12" fill="#4caf50">発見から発表まで：わずか7週間 | 最初の論文発表後1ヶ月で世界中に普及</text>
  <text x="400" y="378" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.6">当時の科学界：「信じられない」「詐欺だ」→ 実証後に急速採用</text>
</svg>
