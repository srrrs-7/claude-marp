<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#f9a825">偶然の発明タイムライン</text>
  <!-- Timeline base line -->
  <line x1="60" y1="200" x2="740" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <!-- Arrows at end -->
  <polygon points="734,195 748,200 734,205" fill="#ffffff" opacity="0.4"/>
  <!-- Year markers -->
  <!-- X-Ray 1895 -->
  <line x1="120" y1="200" x2="120" y2="130" stroke="#f9a825" stroke-width="2"/>
  <circle cx="120" cy="200" r="7" fill="#f9a825"/>
  <rect x="60" y="85" width="120" height="48" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-size="12" fill="#f9a825">X線</text>
  <text x="120" y="122" text-anchor="middle" font-size="11" fill="#ffffff">1895年</text>
  <text x="120" y="220" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">レントゲン</text>
  <!-- Penicillin 1928 -->
  <line x1="260" y1="200" x2="260" y2="260" stroke="#e91e63" stroke-width="2"/>
  <circle cx="260" cy="200" r="7" fill="#e91e63"/>
  <rect x="200" y="262" width="120" height="48" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="260" y="282" text-anchor="middle" font-size="12" fill="#e91e63">ペニシリン</text>
  <text x="260" y="299" text-anchor="middle" font-size="11" fill="#ffffff">1928年</text>
  <text x="260" y="222" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">フレミング</text>
  <!-- Teflon 1938 -->
  <line x1="380" y1="200" x2="380" y2="130" stroke="#f9a825" stroke-width="2"/>
  <circle cx="380" cy="200" r="7" fill="#f9a825"/>
  <rect x="320" y="85" width="120" height="48" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="380" y="105" text-anchor="middle" font-size="12" fill="#f9a825">テフロン</text>
  <text x="380" y="122" text-anchor="middle" font-size="11" fill="#ffffff">1938年</text>
  <text x="380" y="220" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">プランケット</text>
  <!-- Microwave 1945 -->
  <line x1="490" y1="200" x2="490" y2="260" stroke="#e91e63" stroke-width="2"/>
  <circle cx="490" cy="200" r="7" fill="#e91e63"/>
  <rect x="430" y="262" width="120" height="48" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="490" y="282" text-anchor="middle" font-size="12" fill="#e91e63">電子レンジ</text>
  <text x="490" y="299" text-anchor="middle" font-size="11" fill="#ffffff">1945年</text>
  <text x="490" y="222" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">スペンサー</text>
  <!-- Post-it 1968-80 -->
  <line x1="630" y1="200" x2="630" y2="130" stroke="#f9a825" stroke-width="2"/>
  <circle cx="630" cy="200" r="7" fill="#f9a825"/>
  <rect x="565" y="85" width="130" height="48" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="630" y="105" text-anchor="middle" font-size="12" fill="#f9a825">ポストイット</text>
  <text x="630" y="122" text-anchor="middle" font-size="11" fill="#ffffff">1968-1980年</text>
  <text x="630" y="220" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">シルバー/フライ</text>
  <!-- Bottom note -->
  <text x="400" y="376" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.6">全て「失敗」または「予期しない観察」から生まれた</text>
</svg>
