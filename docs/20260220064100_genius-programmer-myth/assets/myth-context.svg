<svg viewBox="0 0 800 400" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">1. 10xエンジニアの起源 — 神話の誕生と伝播</text>
  <!-- Timeline -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <!-- 1968 -->
  <circle cx="120" cy="150" r="10" fill="#e91e63"/>
  <line x1="120" y1="140" x2="120" y2="80" stroke="#e91e63" stroke-width="2"/>
  <rect x="50" y="45" width="140" height="55" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="120" y="67" text-anchor="middle" font-size="11" fill="#e91e63">1968年</text>
  <text x="120" y="84" text-anchor="middle" font-size="10" fill="#ffffff">Sackman研究</text>
  <text x="120" y="99" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7">「28倍差」発見</text>
  <text x="120" y="170" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">小規模・特殊条件</text>
  <!-- 1975 -->
  <circle cx="270" cy="150" r="8" fill="#f9a825"/>
  <line x1="270" y1="160" x2="270" y2="220" stroke="#f9a825" stroke-width="2"/>
  <rect x="200" y="222" width="140" height="55" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="270" y="244" text-anchor="middle" font-size="11" fill="#f9a825">1975年</text>
  <text x="270" y="261" text-anchor="middle" font-size="10" fill="#ffffff">Brooks 「人月の神話」</text>
  <text x="270" y="276" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7">間接引用で拡散</text>
  <text x="270" y="170" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">「10倍差」として紹介</text>
  <!-- 1995 -->
  <circle cx="430" cy="150" r="8" fill="#f9a825"/>
  <line x1="430" y1="140" x2="430" y2="80" stroke="#f9a825" stroke-width="2"/>
  <rect x="360" y="45" width="140" height="55" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="430" y="67" text-anchor="middle" font-size="11" fill="#f9a825">1995〜</text>
  <text x="430" y="84" text-anchor="middle" font-size="10" fill="#ffffff">シリコンバレー文化</text>
  <text x="430" y="99" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7">「10x採用」が常識化</text>
  <text x="430" y="170" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">スタートアップが採用戦略に</text>
  <!-- 2010s -->
  <circle cx="600" cy="150" r="10" fill="#4caf50"/>
  <line x1="600" y1="160" x2="600" y2="220" stroke="#4caf50" stroke-width="2"/>
  <rect x="530" y="222" width="140" height="55" rx="6" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="600" y="244" text-anchor="middle" font-size="11" fill="#4caf50">2010年代</text>
  <text x="600" y="261" text-anchor="middle" font-size="10" fill="#ffffff">神話への疑問</text>
  <text x="600" y="276" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7">エビデンス再検討</text>
  <text x="600" y="170" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">Google, DORA研究が反証</text>
  <!-- Bottom analysis -->
  <rect x="20" y="300" width="760" height="85" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="400" y="323" text-anchor="middle" font-size="13" fill="#f9a825">「10x神話」がなぜ消えないのか</text>
  <rect x="40" y="338" width="215" height="40" rx="6" fill="#1a1a2e"/>
  <text x="147" y="356" text-anchor="middle" font-size="11" fill="#ffffff">希望の源泉</text>
  <text x="147" y="371" text-anchor="middle" font-size="10" fill="#f9a825">「天才を見つければ解決」</text>
  <rect x="290" y="338" width="215" height="40" rx="6" fill="#1a1a2e"/>
  <text x="397" y="356" text-anchor="middle" font-size="11" fill="#ffffff">採用のラベル</text>
  <text x="397" y="371" text-anchor="middle" font-size="10" fill="#f9a825">「10xエンジニア募集」の簡便さ</text>
  <rect x="540" y="338" width="220" height="40" rx="6" fill="#1a1a2e"/>
  <text x="650" y="356" text-anchor="middle" font-size="11" fill="#ffffff">生存者バイアス</text>
  <text x="650" y="371" text-anchor="middle" font-size="10" fill="#f9a825">成功した「天才」が目立つ</text>
</svg>
