<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">個人 vs チーム — 生産性の比較実験</text>
  <!-- Bar chart: individual vs team contributions -->
  <text x="40" y="68" font-size="12" fill="#ffffff">コード行数/日</text>
  <text x="400" y="68" text-anchor="middle" font-size="13" fill="#f9a825">個人の10x vs チームの1.5x — どちらが組織に大きな影響を与えるか？</text>
  <!-- Axes -->
  <line x1="80" y1="320" x2="740" y2="320" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="80" y1="80" x2="80" y2="320" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <!-- Y axis labels -->
  <text x="72" y="320" text-anchor="end" font-size="10" fill="#ffffff" opacity="0.6">0</text>
  <text x="72" y="260" text-anchor="end" font-size="10" fill="#ffffff" opacity="0.6">50</text>
  <text x="72" y="200" text-anchor="end" font-size="10" fill="#ffffff" opacity="0.6">100</text>
  <text x="72" y="140" text-anchor="end" font-size="10" fill="#ffffff" opacity="0.6">150</text>
  <text x="72" y="90" text-anchor="end" font-size="10" fill="#ffffff" opacity="0.6">200</text>
  <!-- Grid lines -->
  <line x1="80" y1="260" x2="740" y2="260" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
  <line x1="80" y1="200" x2="740" y2="200" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
  <line x1="80" y1="140" x2="740" y2="140" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
  <!-- Bar 1: Average engineer -->
  <rect x="110" y="260" width="80" height="60" rx="4" fill="#4caf50" opacity="0.7"/>
  <text x="150" y="250" text-anchor="middle" font-size="10" fill="#4caf50">50/日</text>
  <text x="150" y="340" text-anchor="middle" font-size="10" fill="#ffffff">普通のエンジニア</text>
  <!-- Bar 2: 10x individual -->
  <rect x="230" y="80" width="80" height="240" rx="4" fill="#e91e63" opacity="0.7"/>
  <text x="270" y="72" text-anchor="middle" font-size="10" fill="#e91e63">500/日</text>
  <text x="270" y="340" text-anchor="middle" font-size="10" fill="#ffffff">10xエンジニア</text>
  <text x="270" y="353" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">(1人)</text>
  <!-- Bar 3: Team after 1.5x improvement -->
  <rect x="400" y="175" width="80" height="145" rx="4" fill="#f9a825" opacity="0.7"/>
  <text x="440" y="165" text-anchor="middle" font-size="10" fill="#f9a825">75/日×5人</text>
  <text x="440" y="340" text-anchor="middle" font-size="10" fill="#ffffff">1.5x向上チーム</text>
  <text x="440" y="353" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">(5人計375)</text>
  <!-- Bar 4: 10x + team -->
  <rect x="560" y="140" width="80" height="180" rx="4" fill="#4caf50" opacity="0.8"/>
  <text x="600" y="130" text-anchor="middle" font-size="10" fill="#4caf50">75/日×6人</text>
  <text x="600" y="340" text-anchor="middle" font-size="10" fill="#ffffff">協調型エンジニア</text>
  <text x="600" y="353" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">メンタリング後(計450)</text>
  <!-- Arrow and insight -->
  <rect x="80" y="368" width="660" height="24" rx="4" fill="#16213e" stroke="#f9a825" stroke-width="1"/>
  <text x="400" y="384" text-anchor="middle" font-size="11" fill="#f9a825">チーム全体を1.5倍にする人 &gt; 個人だけが10倍の人 — これがチーム生産性の数学</text>
</svg>
