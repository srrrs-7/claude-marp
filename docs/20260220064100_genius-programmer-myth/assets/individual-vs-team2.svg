<svg viewBox="0 0 800 400" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">4. 個人 vs チーム — 複利効果の数学</text>
  <!-- Left: individual 10x -->
  <rect x="20" y="50" width="360" height="295" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="200" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#e91e63">「天才1人」モデル</text>
  <text x="200" y="98" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.7">チーム6人: 天才1 + 普通5</text>
  <!-- Visual: 1 big + 5 small -->
  <circle cx="200" cy="175" r="45" fill="#e91e63" opacity="0.6"/>
  <text x="200" y="168" text-anchor="middle" font-size="18" fill="#ffffff">10x</text>
  <text x="200" y="188" text-anchor="middle" font-size="10" fill="#ffffff">500/日</text>
  <circle cx="60" cy="270" r="20" fill="#e91e63" opacity="0.3"/>
  <text x="60" y="274" text-anchor="middle" font-size="9" fill="#ffffff">1x</text>
  <circle cx="110" cy="270" r="20" fill="#e91e63" opacity="0.3"/>
  <text x="110" y="274" text-anchor="middle" font-size="9" fill="#ffffff">1x</text>
  <circle cx="160" cy="270" r="20" fill="#e91e63" opacity="0.3"/>
  <text x="160" y="274" text-anchor="middle" font-size="9" fill="#ffffff">1x</text>
  <circle cx="240" cy="270" r="20" fill="#e91e63" opacity="0.3"/>
  <text x="240" y="274" text-anchor="middle" font-size="9" fill="#ffffff">1x</text>
  <circle cx="290" cy="270" r="20" fill="#e91e63" opacity="0.3"/>
  <text x="290" y="274" text-anchor="middle" font-size="9" fill="#ffffff">1x</text>
  <text x="200" y="315" text-anchor="middle" font-size="12" fill="#e91e63">合計：750/日</text>
  <text x="200" y="332" text-anchor="middle" font-size="11" fill="#ffffff">（500 + 5×50）</text>
  <!-- Right: team 1.5x -->
  <rect x="420" y="50" width="360" height="295" rx="10" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="600" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#4caf50">「チーム底上げ」モデル</text>
  <text x="600" y="98" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.7">同じ6人: 全員を1.5倍に引き上げる人</text>
  <!-- Visual: 6 medium circles -->
  <circle cx="480" cy="200" r="32" fill="#4caf50" opacity="0.7"/>
  <text x="480" y="196" text-anchor="middle" font-size="10" fill="#ffffff">1.5x</text>
  <text x="480" y="210" text-anchor="middle" font-size="9" fill="#ffffff">75/日</text>
  <circle cx="560" cy="200" r="32" fill="#4caf50" opacity="0.7"/>
  <text x="560" y="196" text-anchor="middle" font-size="10" fill="#ffffff">1.5x</text>
  <text x="560" y="210" text-anchor="middle" font-size="9" fill="#ffffff">75/日</text>
  <circle cx="640" cy="200" r="32" fill="#4caf50" opacity="0.7"/>
  <text x="640" y="196" text-anchor="middle" font-size="10" fill="#ffffff">1.5x</text>
  <text x="640" y="210" text-anchor="middle" font-size="9" fill="#ffffff">75/日</text>
  <circle cx="720" cy="200" r="32" fill="#4caf50" opacity="0.7"/>
  <text x="720" y="196" text-anchor="middle" font-size="10" fill="#ffffff">1.5x</text>
  <text x="720" y="210" text-anchor="middle" font-size="9" fill="#ffffff">75/日</text>
  <circle cx="520" cy="265" r="32" fill="#4caf50" opacity="0.7"/>
  <text x="520" y="261" text-anchor="middle" font-size="10" fill="#ffffff">1.5x</text>
  <text x="520" y="275" text-anchor="middle" font-size="9" fill="#ffffff">75/日</text>
  <circle cx="680" cy="265" r="32" fill="#4caf50" opacity="0.7"/>
  <text x="680" y="261" text-anchor="middle" font-size="10" fill="#ffffff">1.5x</text>
  <text x="680" y="275" text-anchor="middle" font-size="9" fill="#ffffff">75/日</text>
  <text x="600" y="315" text-anchor="middle" font-size="12" fill="#4caf50">合計：450/日</text>
  <text x="600" y="332" text-anchor="middle" font-size="11" fill="#ffffff">（6×75）</text>
  <!-- Bottom comparison -->
  <rect x="20" y="358" width="760" height="32" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="400" y="373" text-anchor="middle" font-size="12" fill="#f9a825">天才モデル: 750 vs チームモデル: 450 — 一見天才が勝る</text>
  <text x="400" y="383" text-anchor="middle" font-size="10" fill="#4caf50">しかし天才が去ると 250、チームが育つと 6ヶ月後は 900 になる</text>
</svg>
