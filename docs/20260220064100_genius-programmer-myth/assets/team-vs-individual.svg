<svg viewBox="0 0 800 400" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#f9a825">10x個人 vs 1.5xチームの比較</text>
  <!-- Left: 10x Individual -->
  <rect x="40" y="60" width="320" height="290" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#e91e63">10xエンジニア（神話）</text>
  <!-- Person icon -->
  <circle cx="200" cy="135" r="28" fill="#e91e63" opacity="0.8"/>
  <text x="200" y="141" text-anchor="middle" font-size="16" fill="#ffffff">★</text>
  <text x="200" y="175" text-anchor="middle" font-size="13" fill="#ffffff">「天才」1人</text>
  <!-- Metrics -->
  <text x="70" y="210" font-size="12" fill="#ffffff">コーディング速度：</text>
  <text x="280" y="210" text-anchor="end" font-size="12" fill="#e91e63">10x</text>
  <text x="70" y="232" font-size="12" fill="#ffffff">知識共有：</text>
  <text x="280" y="232" text-anchor="end" font-size="12" fill="#e91e63">なし</text>
  <text x="70" y="254" font-size="12" fill="#ffffff">バス係数：</text>
  <text x="280" y="254" text-anchor="end" font-size="12" fill="#e91e63">1（危険）</text>
  <text x="70" y="276" font-size="12" fill="#ffffff">心理的安全性：</text>
  <text x="280" y="276" text-anchor="end" font-size="12" fill="#e91e63">低下しがち</text>
  <text x="70" y="298" font-size="12" fill="#ffffff">組織リスク：</text>
  <text x="280" y="298" text-anchor="end" font-size="12" fill="#e91e63">高</text>
  <text x="200" y="330" text-anchor="middle" font-size="11" fill="#e91e63">辞めたらプロジェクトが止まる</text>
  <!-- Right: 1.5x Team -->
  <rect x="440" y="60" width="320" height="290" rx="10" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="600" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#4caf50">1.5xチーム（現実解）</text>
  <!-- 6 person icons -->
  <circle cx="530" cy="130" r="18" fill="#4caf50" opacity="0.7"/>
  <circle cx="570" cy="115" r="18" fill="#4caf50" opacity="0.7"/>
  <circle cx="610" cy="125" r="18" fill="#4caf50" opacity="0.7"/>
  <circle cx="650" cy="115" r="18" fill="#4caf50" opacity="0.7"/>
  <circle cx="690" cy="130" r="18" fill="#4caf50" opacity="0.7"/>
  <circle cx="600" cy="150" r="18" fill="#f9a825" opacity="0.8"/>
  <text x="600" y="175" text-anchor="middle" font-size="13" fill="#ffffff">6人 × 1.5x = 9x</text>
  <!-- Metrics -->
  <text x="460" y="210" font-size="12" fill="#ffffff">コーディング速度：</text>
  <text x="740" y="210" text-anchor="end" font-size="12" fill="#4caf50">1.5x × 6人</text>
  <text x="460" y="232" font-size="12" fill="#ffffff">知識共有：</text>
  <text x="740" y="232" text-anchor="end" font-size="12" fill="#4caf50">チーム全体に拡散</text>
  <text x="460" y="254" font-size="12" fill="#ffffff">バス係数：</text>
  <text x="740" y="254" text-anchor="end" font-size="12" fill="#4caf50">6（安全）</text>
  <text x="460" y="276" font-size="12" fill="#ffffff">心理的安全性：</text>
  <text x="740" y="276" text-anchor="end" font-size="12" fill="#4caf50">高</text>
  <text x="460" y="298" font-size="12" fill="#ffffff">組織リスク：</text>
  <text x="740" y="298" text-anchor="end" font-size="12" fill="#4caf50">低</text>
  <text x="600" y="330" text-anchor="middle" font-size="11" fill="#4caf50">誰が辞めても継続できる</text>
  <!-- Bottom -->
  <text x="400" y="376" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.6">10xエンジニアを探すより、10xチームを作る方が現実的で持続可能</text>
</svg>
