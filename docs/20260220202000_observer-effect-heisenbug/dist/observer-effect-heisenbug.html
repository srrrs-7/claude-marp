<header>Observer Effect × Heisenbug</header>
<h1 id="printf%E3%83%87%E3%83%90%E3%83%83%E3%82%B0%E3%81%AE%E7%BD%A0%E3%82%B3%E3%83%BC%E3%83%89%E4%BE%8B%E3%82%B3%E3%83%BC%E3%83%89%E4%BE%8B">printfデバッグの罠（コード例）（コード例）</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-comment">// Printf debugging creates observer effect</span>
<span class="hljs-keyword">function</span> <span class="hljs-title function_">processData</span>(<span class="hljs-params"><span class="hljs-attr">buffer</span>: <span class="hljs-title class_">Buffer</span></span>) {
  <span class="hljs-keyword">const</span> data = <span class="hljs-title function_">parseHeader</span>(buffer);
  <span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-string">&#x27;Header:&#x27;</span>, data); <span class="hljs-comment">// This flush changes timing!</span>
  <span class="hljs-comment">// Without console.log: corrupted data (race condition)</span>
  <span class="hljs-comment">// With console.log: works perfectly (I/O flush serializes)</span>
  <span class="hljs-keyword">return</span> <span class="hljs-title function_">transform</span>(data);
}
</code></pre>

<header>Observer Effect × Heisenbug</header>
<h1 id="%E9%9D%9E%E4%BE%B5%E8%A5%B2%E7%9A%84%E8%A6%B3%E6%B8%AC%E6%89%8B%E6%B3%95">非侵襲的観測手法</h1>
<blockquote>
<p><em>eBPF・分散トレース・構造化ログで観測影響ゼロに近づける</em></p>
</blockquote>
<ul>
<li>
<ul>
<li><strong>構造化ログ</strong> (Structured Logging): リングバッファで最小オーバーヘッド</li>
</ul>
</li>
<li>
<ul>
<li><strong>eBPF</strong>: カーネルレベルで非侵襲的にトレーシング</li>
</ul>
</li>
<li>
<ul>
<li><strong>Flight Recorder</strong> (JFR): JVMの常時記録、オーバーヘッド1%未満</li>

</li>

<li>原則: <strong>系を変えずに観測する</strong> 手法を選ぶ</li>

<h1 id="observability-as-design-principle">Observability as Design Principle</h1>

<li>

<li><strong>OpenTelemetry</strong>: 統一的な計装で観測コストを最小化</li>
</ul>
</li>
<li>
<ul>
<li><strong>Distributed Tracing</strong>: 非侵襲的にリクエストフローを追跡</li>
</ul>
</li>
<li>
<ul>
<li><strong>Metrics Pipeline</strong>: Prometheus + Grafana で常時監視</li>
</ul>
</li>
<li>
<ul>
<li>「観測できないシステムは制御できない」</li>
</ul>
</li>
<li>

</li>
