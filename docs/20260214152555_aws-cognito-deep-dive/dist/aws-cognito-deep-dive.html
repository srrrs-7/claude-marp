<ul>
<li><svg viewBox="0 0 800 490" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="490" fill="#1a1a2e" rx="8" /><rect x="40" y="100" width="140" height="50" fill="#16213e" rx="6" /><text x="110" y="130" text-anchor="middle" fill="#ffffff" font-size="14" font-family="sans-serif" font-weight="normal">Client</text><line x1="180" y1="125" x2="268" y2="125" stroke="#f9a825" stroke-width="2" /><polygon points="280,125 268,131 268,119" fill="#f9a825" /><text x="230" y="115" text-anchor="middle" fill="#b0bec5" font-size="10" font-family="sans-serif" font-weight="normal">API call</li>

<h1 id="s3--dynamodb-%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B9%E5%88%B6%E5%BE%A1">S3 / DynamoDB アクセス制御</h1>
<blockquote>
<p><em>Identity Pool経由のSTS一時認証情報でS3ユーザー専用フォルダとDynamoDB行レベル制御を実現</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 315" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="315" fill="#1a1a2e" rx="8" /><text x="400" y="30" text-anchor="middle" fill="#ffffff" font-size="15" font-family="sans-serif" font-weight="bold">Cognito JWT トークン種別</text><rect x="40" y="60" width="210" height="200" fill="#1565c0" rx="8" /><text x="145" y="85" text-anchor="middle" fill="#f9a825" font-size="14" font-family="sans-serif" font-weight="bold">ID Token</text><text x="145" y="110" text-anchor="middle" fill="#b0bec5" font-size="12" font-family="sans-serif" font-weight="normal">ユーザー情報を含む</text><text x="145" y="132" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">sub / email / custom attrs</text><text x="145" y="154" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">有効期限: 1h (default)</text><text x="145" y="176" text-anchor="middle" fill="#b0bec5" font-size="12" font-family="sans-serif" font-weight="normal">バックエンド認証に使用</text><text x="145" y="198" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">Audience: App Client ID</text><text x="145" y="232" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">OpenID Connect 準拠</text><rect x="295" y="60" width="210" height="200" fill="#6a1b9a" rx="8" /><text x="400" y="85" text-anchor="middle" fill="#f9a825" font-size="14" font-family="sans-serif" font-weight="bold">Access Token</text><text x="400" y="110" text-anchor="middle" fill="#b0bec5" font-size="12" font-family="sans-serif" font-weight="normal">スコープ・グループ情報</text><text x="400" y="132" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">cognito:groups 等</text><text x="400" y="154" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">有効期限: 1h (default)</text><text x="400" y="176" text-anchor="middle" fill="#b0bec5" font-size="12" font-family="sans-serif" font-weight="normal">Cognito API 呼び出しに使用</text><text x="400" y="198" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">OAuth 2.0 スコープ付き</text><text x="400" y="232" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">OAuth 2.0 準拠</text><rect x="550" y="60" width="210" height="200" fill="#00695c" rx="8" /><text x="655" y="85" text-anchor="middle" fill="#f9a825" font-size="14" font-family="sans-serif" font-weight="bold">Refresh Token</text><text x="655" y="110" text-anchor="middle" fill="#b0bec5" font-size="12" font-family="sans-serif" font-weight="normal">新規トークン取得用</text><text x="655" y="132" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">有効期限: 30日 (default)</text><text x="655" y="154" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">安全に保管が必要</text><text x="655" y="176" text-anchor="middle" fill="#b0bec5" font-size="12" font-family="sans-serif" font-weight="normal">Revoke 可能</text><text x="655" y="198" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">デバイス単位で管理</text><text x="655" y="232" text-anchor="middle" fill="#b0bec5" font-size="11" font-family="sans-serif" font-weight="normal">ローテーション対応</text><text x="400" y="295" text-anchor="middle" fill="#b0bec5" font-size="12" font-family="sans-serif" font-weight="normal">全トークンは RS256 署名済み / JWKS で検証</text></svg></li>
<li><strong>Identity Pool 経由のリソースアクセス</strong></li>
<li>Cognito JWT → Identity Pool → STS 一時認証情報 → AWS リソース</li>
