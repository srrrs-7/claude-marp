<h1 id="pkce-%E6%B7%B1%E6%8E%98%E3%82%8A--code_verifier--challenge-%E7%94%9F%E6%88%90">PKCE 深掘り — code_verifier / challenge 生成</h1>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">PKCE 深掘り — code_verifier / challenge 生成</text><br />
<rect x="20" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<rect x="430" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><br />
<text x="195" y="78" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">code_verifier</text><br />
<text x="605" y="78" text-anchor="middle" fill="#e91e63" font-size="14" font-weight="bold" font-family="sans-serif">code_challenge</text><br />
<text x="35" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">• ランダム文字列 (43-128文字)</text><br />
<text x="35" y="142" fill="#ffffff" font-size="12" font-family="sans-serif">• Base64URL文字のみ使用</text><br />
<text x="35" y="172" fill="#ffffff" font-size="12" font-family="sans-serif">• クライアント側で生成・保持</text><br />
<text x="35" y="202" fill="#ffffff" font-size="12" font-family="sans-serif">• トークン取得時のみ送信</text><br />
<text x="35" y="245" fill="#f9a825" font-size="12" font-family="sans-serif">例: dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1g...</text><br />
<text x="445" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">• S256(SHA256)推奨</text><br />
<text x="445" y="142" fill="#ffffff" font-size="12" font-family="sans-serif">• BASE64URL(SHA256(verifier))</text><br />
<text x="445" y="172" fill="#ffffff" font-size="12" font-family="sans-serif">• 認可リクエストで送信</text><br />
<text x="445" y="202" fill="#ffffff" font-size="12" font-family="sans-serif">• サーバーはこれを保管</text><br />
<text x="445" y="245" fill="#e91e63" font-size="12" font-family="sans-serif">例: E9Melhoa2OwvFrEMTJguCHaoeK1t8...</text><br />
<rect x="20" y="370" width="760" height="0" rx="0" /><br />
<text x="400" y="365" text-anchor="middle" fill="#4caf50" font-size="12" font-family="sans-serif">セキュリティ: code_verifier なしではトークン取得不可 → 盗まれたcodeが無効化</text></svg><br />
<img src="../assets/pkce-deep-dive.svg" alt="center" style="width:580px;" /></li>
</ul>

<h1 id="%E3%83%88%E3%83%BC%E3%82%AF%E3%83%B3%E3%82%A8%E3%83%B3%E3%83%89%E3%83%9D%E3%82%A4%E3%83%B3%E3%83%88--grant_type-%E5%88%A5%E3%83%91%E3%83%A9%E3%83%A1%E3%83%BC%E3%82%BF%E8%A9%B3%E8%A7%A3">トークンエンドポイント — grant_type 別パラメータ詳解</h1>
<blockquote>
<p><em>PrivateLinkはトラフィックをAWSバックボーンに閉じてデータ漏洩リスクを根絶する</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" font-size="15" fill="#f9a825" text-anchor="middle" font-weight="bold">トークンエンドポイント — grant_type 別パラメータ</text><br />
<text x="110" y="58" font-size="11" fill="#f9a825" text-anchor="middle">grant_type</text><br />
<text x="330" y="58" font-size="11" fill="#f9a825" text-anchor="middle">必須パラメータ</text><br />
<text x="590" y="58" font-size="11" fill="#f9a825" text-anchor="middle">レスポンス</text><br />
<line x1="30" y1="63" x2="770" y2="63" stroke="#444" stroke-width="1" /><br />
<rect x="30" y="70" width="740" height="60" rx="3" fill="#0d0d1a" /><br />
<text x="110" y="88" font-size="9.5" fill="#f9a825" text-anchor="middle" font-weight="bold">authorization_code</text><br />
<text x="330" y="86" font-size="9" fill="#ffffff" text-anchor="middle">code, redirect_uri,</text><text x="330" y="102" font-size="9" fill="#ffffff" text-anchor="middle">client_id, code_verifier(PKCE)</text><br />
<text x="590" y="86" font-size="9" fill="#4caf50" text-anchor="middle">access_token, id_token,</text><text x="590" y="102" font-size="9" fill="#4caf50" text-anchor="middle">refresh_token, expires_in</text><rect x="30" y="138" width="740" height="60" rx="3" fill="#16213e" /><br />
<text x="110" y="156" font-size="9.5" fill="#f9a825" text-anchor="middle" font-weight="bold">refresh_token</text><br />
<text x="330" y="154" font-size="9" fill="#ffffff" text-anchor="middle">refresh_token,</text><text x="330" y="170" font-size="9" fill="#ffffff" text-anchor="middle">client_id, scope(任意)</text><br />
<text x="590" y="154" font-size="9" fill="#4caf50" text-anchor="middle">新しいaccess_token,</text><text x="590" y="170" font-size="9" fill="#4caf50" text-anchor="middle">新しいrefresh_token(RTR)</text><rect x="30" y="206" width="740" height="60" rx="3" fill="#0d0d1a" /><br />
<text x="110" y="224" font-size="9.5" fill="#f9a825" text-anchor="middle" font-weight="bold">client_credentials</text><br />
<text x="330" y="222" font-size="9" fill="#ffffff" text-anchor="middle">client_id, client_secret,</text><text x="330" y="238" font-size="9" fill="#ffffff" text-anchor="middle">scope</text><br />
<text x="590" y="222" font-size="9" fill="#4caf50" text-anchor="middle">access_token, expires_in</text><text x="590" y="238" font-size="9" fill="#4caf50" text-anchor="middle">(refresh_tokenなし)</text><rect x="30" y="274" width="740" height="60" rx="3" fill="#16213e" /><br />
<text x="110" y="292" font-size="9.5" fill="#f9a825" text-anchor="middle" font-weight="bold">urn:ietf:params:oauth:</text><text x="110" y="308" font-size="9.5" fill="#f9a825" text-anchor="middle" font-weight="bold">grant-type:device_code</text><br />
<text x="330" y="290" font-size="9" fill="#ffffff" text-anchor="middle">device_code, client_id</text><br />
<text x="590" y="290" font-size="9" fill="#4caf50" text-anchor="middle">authorization_pending /</text><text x="590" y="306" font-size="9" fill="#4caf50" text-anchor="middle">access_token</text><br />
<rect x="30" y="346" width="740" height="44" rx="5" fill="#16213e" stroke="#f9a825" stroke-width="1" /><br />
<text x="400" y="366" font-size="12" fill="#f9a825" text-anchor="middle" font-weight="bold">Content-Type: application/x-www-form-urlencoded (必須)</text><br />
<text x="400" y="382" font-size="10" fill="#ffffff" text-anchor="middle">Authorization: Basic base64(client_id:client_secret) または リクエストボディに含める</text></svg></li>
<li><strong>共通必須</strong>: <code>grant_type</code>、クライアント認証（Basic / Body / JWT）</li>
<li><strong>authorization_code</strong>: <code>code</code> + <code>redirect_uri</code> + <code>code_verifier</code>（PKCE 時）</li>
<li><strong>refresh_token</strong>: <code>refresh_token</code> + <code>scope</code>（元スコープ以下のみ縮小可）</li>
<li><strong>レスポンス</strong>: <code>access_token</code> / <code>token_type: Bearer</code> / <code>expires_in</code> / <code>id_token</code>（OIDC）</li>
</ul>

<h1 id="%E3%83%88%E3%83%BC%E3%82%AF%E3%83%B3%E5%A4%B1%E5%8A%B9-rfc-7009--%E5%8D%B3%E6%99%82%E7%84%A1%E5%8A%B9%E5%8C%96">トークン失効 (RFC 7009) — 即時無効化</h1>
<blockquote>
<p><em>トークン失効はログアウト・紛失・インシデント時の全セッション強制終了に不可欠</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">トークン失効 (RFC 7009) — 即時無効化</text><br />
<rect x="30" y="50" width="350" height="290" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<rect x="420" y="50" width="350" height="290" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><br />
<text x="205" y="78" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">なぜ必要か</text><br />
<text x="595" y="78" text-anchor="middle" fill="#e91e63" font-size="14" font-weight="bold" font-family="sans-serif">失効フロー</text><br />
<text x="45" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">• JWTは自己完結 → 期限前に</text><br />
<text x="45" y="138" fill="#ffffff" font-size="12" font-family="sans-serif">  無効化できない</text><br />
<text x="45" y="168" fill="#ffffff" font-size="12" font-family="sans-serif">• ログアウト時にすべての</text><br />
<text x="45" y="194" fill="#ffffff" font-size="12" font-family="sans-serif">  トークンを無効化したい</text><br />
<text x="45" y="224" fill="#ffffff" font-size="12" font-family="sans-serif">• トークン漏洩時の緊急対応</text><br />
<text x="45" y="285" fill="#e91e63" font-size="12" font-family="sans-serif">OpaqueトークンはDBで管理可能</text><br />
<text x="435" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">① POST /revoke</text><br />
<text x="435" y="138" fill="#ffffff" font-size="12" font-family="sans-serif">  token=xxx&amp;token_type_hint=</text><br />
<text x="435" y="164" fill="#ffffff" font-size="12" font-family="sans-serif">  access_token</text><br />
<text x="435" y="200" fill="#ffffff" font-size="12" font-family="sans-serif">② 認可サーバーがDB更新</text><br />
<text x="435" y="230" fill="#ffffff" font-size="12" font-family="sans-serif">③ イントロスペクション時に</text><br />
<text x="435" y="256" fill="#ffffff" font-size="12" font-family="sans-serif">  active:false を返す</text><br />
<text x="435" y="285" fill="#4caf50" font-size="12" font-family="sans-serif">即時失効 → 再利用不可</text></svg></li>
<li><strong><code>token_type_hint</code></strong>: <code>access_token</code> / <code>refresh_token</code>（ヒントのみ、逆順も試行される）</li>
<li><strong>失効伝播</strong>: RT 失効 → 紐づく AT も失効推奨。逆は非推奨</li>
<li><strong>成功レスポンス</strong>: <code>200 OK</code>（トークン不存在でも 200 返却）</li>
<li><strong>ユースケース</strong>: ログアウト・デバイス紛失・セキュリティインシデント時の全セッション強制終了</li>
</ul>

<h1 id="section-2-oidc-%E8%A9%B3%E8%A7%A3">Section 2: OIDC 詳解</h1>
<ul>
<li><svg viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="380" fill="#1a1a2e" /><br />
<text x="400" y="28" font-size="16" fill="#f9a825" text-anchor="middle" font-weight="bold">Section 2: OIDC 詳解 — OpenID Connect の全体像</text><br />
<rect x="30" y="45" width="740" height="35" rx="5" fill="#16213e" stroke="#f9a825" stroke-width="1" /><br />
<text x="400" y="68" font-size="11" fill="#ffffff" text-anchor="middle">OIDC = OAuth 2.0 の上位レイヤー。認証（Authentication）を標準化するプロトコル</text><br />
<rect x="30" y="95" width="360" height="185" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<text x="210" y="115" font-size="12" fill="#f9a825" text-anchor="middle" font-weight="bold">OIDC が追加するもの</text><br />

<header>OAuth2 / OIDC 実装詳細ガイド</header>
<h1 id="access-token-vs-id-token--%E7%94%A8%E9%80%94%E3%81%AE%E5%8E%B3%E5%AF%86%E3%81%AA%E5%88%86%E9%9B%A2">Access Token vs ID Token — 用途の厳密な分離</h1>
<ul>
<li>
<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">
</li>
</ul>
<rect width="800" height="400" fill="#1a1a2e" />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">Access Token vs ID Token — 用途の厳密な分離</text>
<rect x="30" y="50" width="340" height="310" rx="12" fill="#16213e" stroke="#e91e63" stroke-width="2.5" />
<rect x="430" y="50" width="340" height="310" rx="12" fill="#16213e" stroke="#f9a825" stroke-width="2.5" />
<text x="200" y="78" text-anchor="middle" fill="#e91e63" font-size="15" font-weight="bold" font-family="sans-serif">Access Token</text>
<text x="600" y="78" text-anchor="middle" fill="#f9a825" font-size="15" font-weight="bold" font-family="sans-serif">ID Token</text>
<text x="200" y="108" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">対象: Resource Server</text>
<text x="600" y="108" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">対象: Client (RP)</text>
<text x="200" y="138" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">用途: API認可</text>
<text x="600" y="138" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">用途: ユーザー認証証明</text>
<text x="200" y="168" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">含む情報: scope / aud</text>
<text x="600" y="168" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">含む情報: sub / email / name</text>
<text x="200" y="198" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">JWT か opaque か選択可</text>
<text x="600" y="198" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">常に JWT</text>
<text x="200" y="228" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">送る先: API サーバー</text>
<text x="600" y="228" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">送る先: Client内部のみ</text>
<rect x="50" y="255" width="300" height="45" rx="6" fill="#1a1a2e" stroke="#e91e63" stroke-width="1.5" />
<text x="200" y="278" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">Authorization: Bearer &lt;token&gt;</text>
<rect x="450" y="255" width="300" height="45" rx="6" fill="#1a1a2e" stroke="#e91e63" stroke-width="1.5" />
<text x="600" y="278" text-anchor="middle" fill="#e91e63" font-size="12" font-weight="bold" font-family="sans-serif">APIには絶対に送らない!</text>
<text x="200" y="330" text-anchor="middle" fill="#4caf50" font-size="12" font-family="sans-serif">scope の中身だけ見る</text>
<text x="600" y="330" text-anchor="middle" fill="#4caf50" font-size="12" font-family="sans-serif">sub でユーザー識別</text>
</svg>
| 項目 | Access Token | ID Token |
| --- | --- | --- |
| 目的 | API リソースへのアクセス許可 | ユーザー認証の証明 |
| 受信者 | **リソースサーバー** | **クライアント (RP) のみ** |
| 主要クレーム | scope / sub / client_id | ユーザー属性 / nonce / at_hash |
| 有効期間 | 短め（15〜60 分） | AT と同じ |
| 検証方法 | Introspect or JWT 検証 | JWT 検証（JWKS 公開鍵） |
- ⚠ **ID Token を API 呼び出しに使用禁止**（audience が一致しない）
- ⚠ **Access Token の中身をクライアントが信頼しない**（RS が検証する）

<h1 id="userinfo-%E3%82%A8%E3%83%B3%E3%83%89%E3%83%9D%E3%82%A4%E3%83%B3%E3%83%88--%E3%82%B9%E3%82%B3%E3%83%BC%E3%83%97%E3%81%A8%E3%82%AF%E3%83%AC%E3%83%BC%E3%83%A0%E3%83%9E%E3%83%83%E3%83%94%E3%83%B3%E3%82%B0">UserInfo エンドポイント — スコープとクレームマッピング</h1>
<blockquote>
<p><em>PrivateLinkはトラフィックをAWSバックボーンに閉じてデータ漏洩リスクを根絶する</em></p>
</blockquote>
<ul>
<li><strong>認証</strong>: Bearer <code>access_token</code>（scope に <code>openid</code> が必要）</li>

<li><strong>集約クレーム</strong>: 外部 IdP クレームを aggregate して返すことも可能</li>
</ul>

<h1 id="oidc-%E3%82%BB%E3%83%83%E3%82%B7%E3%83%A7%E3%83%B3%E7%AE%A1%E7%90%86--check_session_iframe">OIDC セッション管理 — check_session_iframe</h1>
<blockquote>
<p><em>OIDCはOAuth2上にアイデンティティ層を追加しフェデレーション認証を標準化する</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">OIDC セッション管理 — check_session_iframe</text><br />
<rect x="30" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<rect x="420" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><br />
<text x="205" y="78" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">セッション確認フロー</text><br />
<text x="595" y="78" text-anchor="middle" fill="#e91e63" font-size="14" font-weight="bold" font-family="sans-serif">実装上の注意</text><br />
<text x="45" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">① RPがiframeでIdPに問合せ</text><br />
<text x="45" y="140" fill="#ffffff" font-size="12" font-family="sans-serif">  postMessage経由で状態確認</text><br />
<text x="45" y="170" fill="#ffffff" font-size="12" font-family="sans-serif">② changed/unchanged/error</text><br />
<text x="45" y="200" fill="#ffffff" font-size="12" font-family="sans-serif">  いずれかを返す</text><br />
<text x="45" y="230" fill="#ffffff" font-size="12" font-family="sans-serif">③ changed → silent re-auth</text><br />
<text x="45" y="260" fill="#ffffff" font-size="12" font-family="sans-serif">   または再ログイン要求</text><br />
<text x="45" y="295" fill="#f9a825" font-size="12" font-family="sans-serif">継続的にログイン状態を同期</text><br />
<text x="435" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">• サードパーティCookieの廃止</text><br />
<text x="435" y="140" fill="#ffffff" font-size="12" font-family="sans-serif">  でiframe方式が問題に</text><br />
<text x="435" y="170" fill="#ffffff" font-size="12" font-family="sans-serif">• Back-Channel Logoutが</text><br />
<text x="435" y="200" fill="#ffffff" font-size="12" font-family="sans-serif">  より信頼性が高い</text><br />
<text x="435" y="230" fill="#ffffff" font-size="12" font-family="sans-serif">• Silent Auth (prompt=none)</text><br />
<text x="435" y="260" fill="#ffffff" font-size="12" font-family="sans-serif">  でセッション更新可能</text><br />
<text x="435" y="295" fill="#4caf50" font-size="12" font-family="sans-serif">→ Back-Channel推奨</text></svg></li>
<li><strong>目的</strong>: RP がバックグラウンドで OP のセッション状態を監視（ポーリング方式）</li>
<li><strong>仕組み</strong>: <code>check_session_iframe</code> の URL に postMessage でポーリング送信</li>
<li><strong>session_state</strong>: 認可レスポンスで返却。変化を検知したら再認証 or ログアウト</li>
<li><strong>限界</strong>: Third-party Cookie 規制で現代ブラウザでは動作しないケースが多い</li>
<li><strong>代替推奨</strong>: Back-Channel Logout（高信頼性） or 定期的なサイレントリフレッシュ</li>
</ul>
<footer>© 2026 Internal</footer>
</section>

<h1 id="rp-initiated-logout--%E3%82%A8%E3%83%B3%E3%83%89%E3%83%A6%E3%83%BC%E3%82%B6%E3%83%BC%E4%B8%BB%E5%B0%8E%E3%83%AD%E3%82%B0%E3%82%A2%E3%82%A6%E3%83%88">RP-Initiated Logout — エンドユーザー主導ログアウト</h1>
<blockquote>
<p><em>すべての要件を満たすことが本番環境での安全な運用を保証する唯一の方法</em></p>

<li><strong><code>id_token_hint</code></strong>: OP がユーザーを確認するために推奨（必須ではない）</li>
<li><strong><code>post_logout_redirect_uri</code></strong>: ログアウト後のリダイレクト先（RP 側で事前登録必要）</li>
<li><strong>Cognito</strong>: <code>logout</code> エンドポイント + <code>client_id</code> + <code>logout_uri</code> パラメータ形式</li>
</ul>

<h1 id="par--pushed-authorization-requests-rfc-9126">PAR — Pushed Authorization Requests (RFC 9126)</h1>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">PAR — Pushed Authorization Requests (RFC 9126)</text><br />
<rect x="30" y="50" width="350" height="150" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><br />
<rect x="420" y="50" width="350" height="150" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<text x="205" y="78" text-anchor="middle" fill="#e91e63" font-size="13" font-weight="bold" font-family="sans-serif">従来の問題</text><br />
<text x="595" y="78" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold" font-family="sans-serif">PARの解決</text><br />
<text x="45" y="108" fill="#ffffff" font-size="12" font-family="sans-serif">• Auth Requestのパラメータが</text><br />
<text x="45" y="132" fill="#ffffff" font-size="12" font-family="sans-serif">  URLに露出 → ログ・履歴に残る</text><br />
<text x="45" y="156" fill="#ffffff" font-size="12" font-family="sans-serif">• URLが長大になる</text><br />
<text x="435" y="108" fill="#ffffff" font-size="12" font-family="sans-serif">• 事前にPOST /par でリクエスト登録</text><br />
<text x="435" y="132" fill="#ffffff" font-size="12" font-family="sans-serif">• request_uri参照のみURLに含める</text><br />
<text x="435" y="156" fill="#ffffff" font-size="12" font-family="sans-serif">• パラメータがサーバー側で安全</text><br />
<rect x="30" y="225" width="740" height="135" rx="10" fill="#16213e" stroke="#2196f3" stroke-width="1.5" /><br />
<text x="400" y="252" text-anchor="middle" fill="#2196f3" font-size="13" font-weight="bold" font-family="sans-serif">PARフロー</text><br />
<text x="50" y="282" fill="#ffffff" font-size="12" font-family="sans-serif">① POST /par (全パラメータ + client認証) → request_uri=urn:ietf:params:oauth:request_uri:xxx</text><br />
<text x="50" y="312" fill="#ffffff" font-size="12" font-family="sans-serif">② GET /authorize?request_uri=xxx&amp;client_id=yyy (URLはシンプル)</text><br />
<text x="50" y="342" fill="#4caf50" font-size="12" font-family="sans-serif">利点: URLパラメータ漏洩防止 / client認証強化 / FAPI2.0必須</text></svg><br />
<img src="../assets/par-flow.svg" alt="center" style="width:760px;" /></li>
</ul>

<h1 id="rar--rich-authorization-requests-rfc-9396--%E7%B2%BE%E7%B7%BB%E3%81%AA%E8%AA%8D%E5%8F%AF%E8%A6%81%E6%B1%82">RAR — Rich Authorization Requests (RFC 9396) — 精緻な認可要求</h1>
<blockquote>
<p><em>AIによる医療診断と創薬加速が数百万人規模の命を救う可能性を持つ</em></p>
</blockquote>
<ul>
<li><strong>目的</strong>: <code>scope</code> 文字列では表現不可能な複雑な認可詳細を構造化 JSON で送信</li>
<li><strong><code>authorization_details</code></strong>: 型 (<code>type</code>) + 対象リソース + アクション + 金額等を指定</li>
<li><strong>適用先</strong>: 金融 API (PSD2) / 医療 / 電子処方箋 / 法人間契約</li>
<li><strong>FAPI 2.0</strong>: PAR + RAR の組み合わせが標準フロー</li>
</ul>

<h1 id="jarm--jwt-secured-authorization-response-mode">JARM — JWT Secured Authorization Response Mode</h1>
<blockquote>
<p><em>JWTはステートレス認証の標準だが実装の落とし穴が多く署名検証が最重要</em></p>
</blockquote>
<ul>
<li><strong>目的</strong>: 認可レスポンス（code + state）を JWT で署名 / 暗号化</li>
<li><strong><code>response_mode</code></strong>: <code>jwt</code> / <code>query.jwt</code> / <code>fragment.jwt</code> / <code>form_post.jwt</code></li>
<li><strong>検証必須</strong>: <code>iss</code> / <code>aud</code>（client_id）/ <code>exp</code> を検証 → Mix-Up 攻撃防止</li>
<li><strong>FAPI 2.0 必須</strong>: <code>query.jwt</code> or <code>form_post.jwt</code></li>
</ul>
<footer>© 2026 Internal</footer>
</section>

<h1 id="oauth2--mtls-%E3%82%AF%E3%83%A9%E3%82%A4%E3%82%A2%E3%83%B3%E3%83%88%E8%AA%8D%E8%A8%BC-rfc-8705--%E8%A8%BC%E6%98%8E%E6%9B%B8%E3%83%90%E3%82%A4%E3%83%B3%E3%83%89%E3%83%88%E3%83%BC%E3%82%AF%E3%83%B3">OAuth2 + mTLS クライアント認証 (RFC 8705) — 証明書バインドトークン</h1>
<blockquote>
<p><em>OAuth2の認可フロー選択がセキュリティとユーザー体験の両立を決める</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">OAuth2 + mTLS クライアント認証 (RFC 8705)</text><br />
<rect x="30" y="55" width="360" height="300" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<rect x="420" y="55" width="350" height="300" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><br />
<text x="210" y="83" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">mTLS仕組み</text><br />
<text x="595" y="83" text-anchor="middle" fill="#e91e63" font-size="14" font-weight="bold" font-family="sans-serif">メリット・用途</text><br />
<text x="45" y="115" fill="#ffffff" font-size="12" font-family="sans-serif">• 通常のTLS: サーバー証明書のみ</text><br />
<text x="45" y="145" fill="#ffffff" font-size="12" font-family="sans-serif">• mTLS: クライアントも証明書提示</text><br />
<text x="45" y="175" fill="#ffffff" font-size="12" font-family="sans-serif">• 証明書はClient識別子として使用</text><br />
<text x="45" y="205" fill="#ffffff" font-size="12" font-family="sans-serif">• TokenはクライアントのThumbprint</text><br />
<text x="45" y="231" fill="#ffffff" font-size="12" font-family="sans-serif">  にバインド (cnf.x5t#S256)</text><br />
<text x="45" y="261" fill="#ffffff" font-size="12" font-family="sans-serif">• トークン盗難でも再利用不可</text><br />
<text x="45" y="295" fill="#f9a825" font-size="12" font-family="sans-serif">→ Sender-Constrained Token</text><br />
<text x="435" y="115" fill="#4caf50" font-size="12" font-family="sans-serif">• client_secretより強固</text><br />
<text x="435" y="145" fill="#ffffff" font-size="12" font-family="sans-serif">• B2B APIで採用増加</text><br />
<text x="435" y="175" fill="#ffffff" font-size="12" font-family="sans-serif">• 金融API (FAPI2.0) 必須</text><br />
<text x="435" y="205" fill="#ffffff" font-size="12" font-family="sans-serif">• マイクロサービス間通信</text><br />
<text x="435" y="235" fill="#ffffff" font-size="12" font-family="sans-serif">• サービスメッシュと併用</text><br />
<text x="435" y="275" fill="#e91e63" font-size="12" font-family="sans-serif">課題: 証明書の管理コスト</text></svg></li>
<li><strong>mTLS 認証</strong>: TLS ハンドシェイクでクライアント証明書を送信し client_id と紐づけ</li>
<li><strong>Certificate-Bound AT</strong>: <code>cnf.x5t#S256</code> クレームで証明書フィンガープリントをバインド</li>
<li><strong>RS での検証</strong>: TLS クライアント証明書のフィンガープリントと AT の <code>cnf</code> を照合</li>
<li><strong>PKI</strong>: 自己署名 or プライベート CA（ACM PCA）で発行。SAN に client_id を含める</li>
</ul>
<footer>© 2026 Internal</footer>
</section>

<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">FAPI 2.0 Security Profile — 金融グレード API</text>

<text x="400" y="80" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">FAPI 2.0 構成要素</text>

<text x="160" y="217" text-anchor="middle" fill="#2196f3" font-size="13" font-weight="bold" font-family="sans-serif">RAR (推奨)</text>
<text x="160" y="242" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">精緻な認可表現</text>
<rect x="300" y="190" width="200" height="70" rx="8" fill="#1a1a2e" stroke="#2196f3" stroke-width="1.5" />
