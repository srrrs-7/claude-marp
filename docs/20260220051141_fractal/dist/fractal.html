<ul>
<li>株価チャートは<strong>スケール不変</strong>なフラクタル構造を持つ</li>
<li></li>
<li><svg viewBox="0 0 760 220" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">  <rect width="760" height="220" fill="#f5f5f5" />    <rect x="20" y="20" width="220" height="160" rx="6" fill="white" stroke="#ddd" stroke-width="1" />  <text x="130" y="44" font-size="13" font-weight="bold" fill="#555" text-anchor="middle">1日</text>  <polyline points="35,130 57,110 79,125 101,90 123,105 145,75 167,95 189,80 211,100 225,85" fill="none" stroke="#e94560" stroke-width="2.5" stroke-linejoin="round" />  <line x1="35" y1="160" x2="225" y2="160" stroke="#bbb" stroke-width="1" />  <line x1="35" y1="55" x2="35" y2="160" stroke="#bbb" stroke-width="1" />  <text x="130" y="188" font-size="11" fill="#888" text-anchor="middle">時間 →</text>    <rect x="270" y="20" width="220" height="160" rx="6" fill="white" stroke="#ddd" stroke-width="1" />  <text x="380" y="44" font-size="13" font-weight="bold" fill="#555" text-anchor="middle">1週間</text>  <polyline points="285,100 307,125 329,95 351,140 373,115 395,80 417,100 439,70 461,90 475,105" fill="none" stroke="#e94560" stroke-width="2.5" stroke-linejoin="round" />  <line x1="285" y1="160" x2="475" y2="160" stroke="#bbb" stroke-width="1" />  <line x1="285" y1="55" x2="285" y2="160" stroke="#bbb" stroke-width="1" />  <text x="380" y="188" font-size="11" fill="#888" text-anchor="middle">時間 →</text>    <rect x="520" y="20" width="220" height="160" rx="6" fill="white" stroke="#ddd" stroke-width="1" />  <text x="630" y="44" font-size="13" font-weight="bold" fill="#555" text-anchor="middle">1ヶ月</text>  <polyline points="535,120 557,95 579,130 601,85 623,110 645,75 667,100 689,65 711,90 725,80" fill="none" stroke="#e94560" stroke-width="2.5" stroke-linejoin="round" />  <line x1="535" y1="160" x2="725" y2="160" stroke="#bbb" stroke-width="1" />  <line x1="535" y1="55" x2="535" y2="160" stroke="#bbb" stroke-width="1" />  <text x="630" y="188" font-size="11" fill="#888" text-anchor="middle">時間 →</text>    <text x="12" y="125" font-size="9" fill="#999" text-anchor="middle">価格</text>  <text x="262" y="125" font-size="9" fill="#999" text-anchor="middle">価格</text>  <text x="512" y="125" font-size="9" fill="#999" text-anchor="middle">価格</text></svg></li>
<li></li>
<li>→ 3つのチャートを並べても、<strong>どれが日足か月足かわからない</strong></li>
<li>→ これがフラクタルの「スケール不変性」</li>
</ul>

<header>フラクタル：自然界のコピー&amp;ペースト</header>
<h1 id="%E9%87%91%E8%9E%8D%E3%83%95%E3%83%A9%E3%82%AF%E3%82%BF%E3%83%AB%E3%81%BE%E3%81%A8%E3%82%81">金融フラクタルまとめ</h1>
<ul>
<li><strong>「正規分布」→「フラクタル分布」への思考転換</strong></li>
<li></li>
</ul>
<table>
<thead>
<tr>
<th>観点</th>
<th>正規分布モデル</th>
<th>フラクタルモデル</th>
</tr>
</thead>
<tbody>
<tr>
<td>暴落の頻度</td>
<td>稀（100年に1度）</td>
<td>頻繁（数年に1度）</td>
</tr>
<tr>
<td>リスク管理</td>
<td>VaRで計算可能</td>
<td>真のリスクは計算不能</td>
</tr>
<tr>
<td>予測</td>
<td>統計的に予測可能</td>
<td>本質的に不確実</td>
</tr>
<tr>
<td>対策</td>
<td>ヘッジで管理</td>
<td>強靭性（レジリエンス）で対処</td>
</tr>
</tbody>
</table>
<ul>
<li></li>
