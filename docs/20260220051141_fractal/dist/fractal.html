<h1 id="%E6%B5%B7%E5%B2%B8%E7%B7%9A%E3%81%AE%E3%83%91%E3%83%A9%E3%83%89%E3%83%83%E3%82%AF%E3%82%B9">海岸線のパラドックス</h1>
<blockquote>
<p><em>測定スケール次第で長さが無限大に—定義なき測定は意味をなさない</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#0a0a1a" /><text x="400" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">海岸線パラドックス：物差しが短いほど長くなる</text><rect x="40" y="65" width="220" height="180" rx="8" fill="#16213e" stroke="#2196F3" stroke-width="2" /><text x="150" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#2196F3">200km の物差し</text><polyline points="60,150 100,130 140,155 180,135 220,150 240,145" fill="none" stroke="#2196F3" stroke-width="3" /><text x="150" y="205" text-anchor="middle" font-size="12" fill="#ffffff">約 2,400 km</text><text x="150" y="230" text-anchor="middle" font-size="10" fill="#aaaaaa">大まかな輪郭のみ</text><rect x="290" y="65" width="220" height="180" rx="8" fill="#16213e" stroke="#FF9800" stroke-width="2" /><text x="400" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#FF9800">50km の物差し</text><polyline points="310,150 330,135 350,158 370,130 390,155 410,128 430,152 450,135 470,150 500,145" fill="none" stroke="#FF9800" stroke-width="2.5" /><text x="400" y="205" text-anchor="middle" font-size="12" fill="#ffffff">約 3,400 km</text><text x="400" y="230" text-anchor="middle" font-size="10" fill="#aaaaaa">湾や半島を計測</text><rect x="540" y="65" width="220" height="180" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2" /><text x="650" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#e91e63">1km の物差し</text><polyline points="560,150 572,138 580,155 592,130 600,158 612,128 620,148 632,135 640,155 652,130 660,150 672,140 680,158 692,132 700,150 720,145 740,150" fill="none" stroke="#e91e63" stroke-width="2" /><text x="650" y="205" text-anchor="middle" font-size="12" fill="#ffffff">約 17,820 km</text><text x="650" y="230" text-anchor="middle" font-size="10" fill="#aaaaaa">岩や入り江も計測</text><rect x="160" y="295" width="480" height="80" rx="8" fill="#1a0a1a" stroke="#f9a825" stroke-width="2" /><text x="400" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#f9a825">物差しを短くすれば → 長さは無限大に近づく</text><text x="400" y="355" text-anchor="middle" font-size="11" fill="#aaaaaa">海岸線には「決まった長さ」が存在しない — これがフラクタルの本質</text></svg></li>

<li></li>

<h1 id="%E3%83%95%E3%83%A9%E3%82%AF%E3%82%BF%E3%83%AB%E6%AC%A1%E5%85%83-%E2%80%95-%E5%B0%8F%E6%95%B0%E3%81%AE%E6%AC%A1%E5%85%8312">フラクタル次元 ― 小数の次元（1/2）</h1>

<h1 id="%E3%83%9E%E3%83%B3%E3%83%87%E3%83%AB%E3%83%96%E3%83%AD%E3%83%83%E3%83%88%E5%B8%82%E5%A0%B4%E3%81%AE%E8%AA%A4%E8%A1%8C%E5%8B%95">マンデルブロット「市場の（誤）行動」</h1>
<blockquote>
<p><em>正規分布は市場を過小評価する—べき乗則が正しく極端事象の頻度を予測</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#0a0a1a" /><text x="400" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">正規分布 vs べき乗分布（フラクタル）</text><rect x="40" y="65" width="340" height="290" rx="10" fill="#16213e" stroke="#2196F3" stroke-width="2" /><text x="210" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#2196F3">正規分布モデル</text><text x="210" y="115" text-anchor="middle" font-size="11" fill="#aaaaaa">（従来の金融理論）</text><polyline points="80,230 110,225 140,210 170,180 200,140 230,115 260,140 290,180 320,210 350,225 370,230" fill="none" stroke="#2196F3" stroke-width="2.5" /><text x="210" y="275" text-anchor="middle" font-size="11" fill="#ffffff">大暴落は「100年に1度」</text><text x="210" y="295" text-anchor="middle" font-size="11" fill="#ffffff">テールは薄い（外れ値は稀）</text><text x="210" y="320" text-anchor="middle" font-size="10" fill="#e91e63">→ リーマンショックは「あり得ない」はず</text><rect x="420" y="65" width="340" height="290" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><text x="590" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#e91e63">べき乗分布（フラクタル）</text><text x="590" y="115" text-anchor="middle" font-size="11" fill="#aaaaaa">（マンデルブロットの主張）</text><polyline points="430,135 460,155 490,175 520,200 550,220 580,232 610,238 640,242 660,244 680,245" fill="none" stroke="#e91e63" stroke-width="2.5" /><text x="590" y="275" text-anchor="middle" font-size="11" fill="#ffffff">大暴落は「数年に1度」起きる</text><text x="590" y="295" text-anchor="middle" font-size="11" fill="#ffffff">テールが厚い（外れ値も現実的）</text><text x="590" y="320" text-anchor="middle" font-size="10" fill="#4CAF50">→ 1929・1987・2008年が説明できる</text></svg></li>

<li></li>

<th>マンデルブロットの主張</th>
</tr>
</thead>

<td>価格変動は<strong>べき乗分布</strong>に従う</td>
</tr>
<tr>
<td>大暴落は「100年に1度」</td>
<td>大暴落は正規分布より<strong>はるかに頻繁</strong></td>
</tr>
<tr>
<td>過去データで未来を予測できる</td>
<td>市場は本質的に<strong>予測不能</strong></td>
</tr>
</tbody>
</table>
<ul>
<li></li>
<li>→ <strong>2008年リーマンショック</strong>は「あり得ない確率」の出来事ではなかった</li>

</ul>

<blockquote>
<p><em>フラクタル分析は正規分布の嘘を暴き、実際の市場リスクを正確に計算する</em></p>
</blockquote>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#0a0a1a" /><text x="400" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">フラクタル思考への転換</text><rect x="40" y="65" width="340" height="280" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><text x="210" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#e91e63">従来のリスク管理</text><text x="210" y="120" text-anchor="middle" font-size="12" fill="#ffffff">正規分布前提</text><text x="210" y="145" text-anchor="middle" font-size="11" fill="#aaaaaa">VaR（Value at Risk）</text><text x="210" y="168" text-anchor="middle" font-size="11" fill="#aaaaaa">統計的に予測可能</text><text x="210" y="191" text-anchor="middle" font-size="11" fill="#aaaaaa">ヘッジで「管理」できる</text><text x="210" y="220" text-anchor="middle" font-size="10" fill="#e91e63">問題：テールリスクを過小評価</text><text x="210" y="240" text-anchor="middle" font-size="10" fill="#e91e63">2008年: VaRが機能しなかった</text><rect x="420" y="65" width="340" height="280" rx="10" fill="#16213e" stroke="#4CAF50" stroke-width="2" /><text x="590" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#4CAF50">フラクタルリスク管理</text><text x="590" y="120" text-anchor="middle" font-size="12" fill="#ffffff">べき乗則前提</text><text x="590" y="145" text-anchor="middle" font-size="11" fill="#aaaaaa">ハースト指数で市場構造分析</text><text x="590" y="168" text-anchor="middle" font-size="11" fill="#aaaaaa">本質的に不確実と認める</text><text x="590" y="191" text-anchor="middle" font-size="11" fill="#aaaaaa">「強靭性」で対処</text><text x="590" y="220" text-anchor="middle" font-size="10" fill="#4CAF50">完璧な予測より</text><text x="590" y="240" text-anchor="middle" font-size="10" fill="#4CAF50">「どんな揺れにも耐える設計」</text><line x1="382" y1="205" x2="418" y2="205" stroke="#f9a825" stroke-width="2" /><polygon points="415,200 425,205 415,210" fill="#f9a825" /></svg></li>
