<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">任天堂 品質管理システム vs アタリ時代</text>
  <!-- Left panel: Atari era -->
  <rect x="40" y="54" width="330" height="290" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="205" y="80" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#e91e63" font-weight="bold">アタリ時代（問題）</text>
  <rect x="70" y="96" width="270" height="44" rx="6" fill="#0d1b2a"/>
  <text x="205" y="114" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">サードパーティが無制限にソフト発売</text>
  <text x="205" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">品質審査なし</text>
  <polygon points="205,150 213,166 197,166" fill="#555"/>
  <rect x="70" y="172" width="270" height="44" rx="6" fill="#0d1b2a"/>
  <text x="205" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">粗悪ソフトが氾濫</text>
  <text x="205" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">（E.T.など）</text>
  <polygon points="205,226 213,242 197,242" fill="#555"/>
  <rect x="70" y="248" width="270" height="72" rx="6" fill="#300"/>
  <text x="205" y="272" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e91e63" font-weight="bold">消費者の信頼喪失</text>
  <text x="205" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">市場崩壊 −97%</text>
  <text x="205" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">32億$ → 1億$</text>
  <!-- Right panel: Nintendo -->
  <rect x="430" y="54" width="330" height="290" rx="10" fill="#16213e" stroke="#4ec9b0" stroke-width="2"/>
  <text x="595" y="80" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#4ec9b0" font-weight="bold">任天堂 NES（解決）</text>
  <rect x="460" y="96" width="270" height="44" rx="6" fill="#0d1b2a"/>
  <text x="595" y="114" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">年間5本制限 + Seal of Quality</text>
  <text x="595" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">10NESロックアウトチップ</text>
  <polygon points="595,150 603,166 587,166" fill="#4ec9b0"/>
  <rect x="460" y="172" width="270" height="44" rx="6" fill="#0d1b2a"/>
  <text x="595" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">全ソフトを任天堂が審査・承認</text>
  <text x="595" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">高い品質基準を維持</text>
  <polygon points="595,226 603,242 587,242" fill="#4ec9b0"/>
  <rect x="460" y="248" width="270" height="72" rx="6" fill="#003020"/>
  <text x="595" y="272" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0" font-weight="bold">消費者の信頼回復</text>
  <text x="595" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">市場復活・1,500万台販売</text>
  <text x="595" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">現代App Storeの原型</text>
</svg>