<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">黄金時代からの教訓</text>
  <!-- Center circle -->
  <circle cx="400" cy="200" r="60" fill="#16213e" stroke="#f9a825" stroke-width="3"/>
  <text x="400" y="195" fill="#f9a825" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">黄金時代</text>
  <text x="400" y="213" fill="#f9a825" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">の核心</text>
  <!-- Lesson boxes around center -->
  <!-- Top -->
  <rect x="300" y="58" width="200" height="55" fill="#16213e" stroke="#4fc3f7" stroke-width="2" rx="6"/>
  <text x="400" y="80" fill="#4fc3f7" font-size="12" text-anchor="middle" font-weight="bold" font-family="sans-serif">制約が創造性を生む</text>
  <text x="400" y="100" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">限られたROMがゲームデザインを洗練</text>
  <line x1="400" y1="140" x2="400" y2="113" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Right -->
  <rect x="595" y="148" width="185" height="55" fill="#16213e" stroke="#e91e63" stroke-width="2" rx="6"/>
  <text x="687" y="170" fill="#e91e63" font-size="12" text-anchor="middle" font-weight="bold" font-family="sans-serif">クリエイター中心主義</text>
  <text x="687" y="190" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">宮本・堀井など個の才能が牽引</text>
  <line x1="595" y1="175" x2="460" y2="185" stroke="#e91e63" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Bottom right -->
  <rect x="520" y="270" width="200" height="55" fill="#16213e" stroke="#f9a825" stroke-width="2" rx="6"/>
  <text x="620" y="292" fill="#f9a825" font-size="12" text-anchor="middle" font-weight="bold" font-family="sans-serif">品質保証の文化</text>
  <text x="620" y="311" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">任天堂の厳格なQCが信頼を構築</text>
  <line x1="520" y1="275" x2="445" y2="245" stroke="#f9a825" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Bottom left -->
  <rect x="80" y="270" width="200" height="55" fill="#16213e" stroke="#66bb6a" stroke-width="2" rx="6"/>
  <text x="180" y="292" fill="#66bb6a" font-size="12" text-anchor="middle" font-weight="bold" font-family="sans-serif">競争が産業を育てる</text>
  <text x="180" y="311" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">任天堂vs.セガが技術革新を加速</text>
  <line x1="280" y1="275" x2="355" y2="245" stroke="#66bb6a" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Left -->
  <rect x="20" y="148" width="185" height="55" fill="#16213e" stroke="#ab47bc" stroke-width="2" rx="6"/>
  <text x="112" y="170" fill="#ab47bc" font-size="12" text-anchor="middle" font-weight="bold" font-family="sans-serif">国際化戦略の重要性</text>
  <text x="112" y="190" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">北米市場開拓が黄金時代の礎</text>
  <line x1="205" y1="175" x2="340" y2="185" stroke="#ab47bc" stroke-width="1" stroke-dasharray="4,3"/>
</svg>