<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">覇権が揺らいだ構造的要因</text>
  <!-- Timeline: 2001-2010 -->
  <line x1="80" y1="190" x2="720" y2="190" stroke="#555" stroke-width="2"/>
  <!-- Xbox 2001 -->
  <circle cx="140" cy="190" r="12" fill="#e91e63"/>
  <line x1="140" y1="178" x2="140" y2="110" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="70" y="70" width="148" height="38" rx="5" fill="#16213e"/>
  <text x="144" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63" font-weight="bold">2001: Xbox参入</text>
  <text x="144" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">3兆円の資金力</text>
  <!-- Online 2002 -->
  <circle cx="260" cy="190" r="12" fill="#e91e63"/>
  <line x1="260" y1="202" x2="260" y2="266" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="188" y="266" width="150" height="38" rx="5" fill="#16213e"/>
  <text x="263" y="282" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63" font-weight="bold">オンライン遅れ</text>
  <text x="263" y="296" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">Xbox Liveに先行される</text>
  <!-- HD cost 2005 -->
  <circle cx="420" cy="190" r="12" fill="#f9a825"/>
  <line x1="420" y1="178" x2="420" y2="110" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="344" y="70" width="154" height="38" rx="5" fill="#16213e"/>
  <text x="421" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825" font-weight="bold">HD開発高コスト化</text>
  <text x="421" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">中小スタジオ淘汰</text>
  <!-- FPS rise 2007 -->
  <circle cx="580" cy="190" r="12" fill="#f9a825"/>
  <line x1="580" y1="202" x2="580" y2="266" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="500" y="266" width="160" height="38" rx="5" fill="#16213e"/>
  <text x="580" y="282" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825" font-weight="bold">FPSジャンル台頭</text>
  <text x="580" y="296" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">西洋型ゲームデザイン</text>
  <!-- Impact -->
  <circle cx="700" cy="190" r="12" fill="#9c27b0"/>
  <line x1="700" y1="178" x2="700" y2="110" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="630" y="70" width="130" height="38" rx="5" fill="#16213e"/>
  <text x="695" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9c27b0" font-weight="bold">シェア低下</text>
  <text x="695" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">職人芸の限界</text>
  <!-- Bottom lesson -->
  <rect x="80" y="320" width="640" height="30" rx="6" fill="#16213e"/>
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">「職人芸」はグローバルスケールではスケールしなかった</text>
</svg>