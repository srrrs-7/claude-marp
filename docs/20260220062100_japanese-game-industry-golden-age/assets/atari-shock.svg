<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">北米ゲーム市場の崩壊と復活（1980-1990）</text>
  <!-- Y axis label -->
  <text x="30" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa" transform="rotate(-90,30,200)">市場規模（億ドル）</text>
  <!-- Axis lines -->
  <line x1="80" y1="60" x2="80" y2="310" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="310" x2="760" y2="310" stroke="#555" stroke-width="2"/>
  <!-- Y gridlines and labels -->
  <line x1="80" y1="310" x2="760" y2="310" stroke="#333" stroke-width="1" stroke-dasharray="4"/>
  <text x="74" y="314" text-anchor="end" font-family="sans-serif" font-size="11" fill="#aaa">0</text>
  <line x1="80" y1="235" x2="760" y2="235" stroke="#333" stroke-width="1" stroke-dasharray="4"/>
  <text x="74" y="239" text-anchor="end" font-family="sans-serif" font-size="11" fill="#aaa">10</text>
  <line x1="80" y1="160" x2="760" y2="160" stroke="#333" stroke-width="1" stroke-dasharray="4"/>
  <text x="74" y="164" text-anchor="end" font-family="sans-serif" font-size="11" fill="#aaa">20</text>
  <line x1="80" y1="85" x2="760" y2="85" stroke="#333" stroke-width="1" stroke-dasharray="4"/>
  <text x="74" y="89" text-anchor="end" font-family="sans-serif" font-size="11" fill="#aaa">30</text>
  <!-- Data points: 1980=5, 1981=10, 1982=32, 1983=3, 1984=1, 1985=1, 1986=4, 1987=7, 1988=12, 1989=18, 1990=25 -->
  <!-- Scale: max=32 → y=85, so 1unit = (310-85)/32 = 7.03px -->
  <!-- x: 1980 at x=110, each year = 60px apart -->
  <polyline points="110,275 170,240 230,86 290,289 350,303 410,303 470,282 530,261 590,226 650,184 710,134"
    fill="none" stroke="#e91e63" stroke-width="3"/>
  <!-- Data dots -->
  <circle cx="110" cy="275" r="5" fill="#e91e63"/>
  <circle cx="170" cy="240" r="5" fill="#e91e63"/>
  <circle cx="230" cy="86" r="5" fill="#f9a825"/>
  <circle cx="290" cy="289" r="8" fill="#e91e63"/>
  <circle cx="350" cy="303" r="5" fill="#e91e63"/>
  <circle cx="410" cy="303" r="5" fill="#4ec9b0"/>
  <circle cx="470" cy="282" r="5" fill="#4ec9b0"/>
  <circle cx="530" cy="261" r="5" fill="#4ec9b0"/>
  <circle cx="590" cy="226" r="5" fill="#4ec9b0"/>
  <circle cx="650" cy="184" r="5" fill="#4ec9b0"/>
  <circle cx="710" cy="134" r="5" fill="#4ec9b0"/>
  <!-- Year labels -->
  <text x="110" y="328" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">1980</text>
  <text x="230" y="328" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">1982</text>
  <text x="290" y="328" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e91e63" font-weight="bold">1983</text>
  <text x="410" y="328" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4ec9b0" font-weight="bold">1985</text>
  <text x="710" y="328" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">1990</text>
  <!-- Annotations -->
  <line x1="230" y1="86" x2="230" y2="60" stroke="#f9a825" stroke-width="1" stroke-dasharray="3"/>
  <text x="232" y="56" font-family="sans-serif" font-size="11" fill="#f9a825">ピーク 32億$</text>
  <line x1="290" y1="289" x2="290" y2="265" stroke="#e91e63" stroke-width="1" stroke-dasharray="3"/>
  <text x="212" y="262" font-family="sans-serif" font-size="11" fill="#e91e63">アタリショック</text>
  <line x1="410" y1="303" x2="450" y2="280" stroke="#4ec9b0" stroke-width="1" stroke-dasharray="3"/>
  <text x="452" y="276" font-family="sans-serif" font-size="11" fill="#4ec9b0">NES 発売</text>
</svg>