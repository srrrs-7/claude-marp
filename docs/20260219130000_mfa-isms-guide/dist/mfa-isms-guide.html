<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="mfa%E3%81%AE%E5%AE%9A%E7%BE%A9%E3%81%A8%E5%8E%9F%E5%89%87">MFAの定義と原則</h1>
<ul>
<li>
<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">
</li>
</ul>
<rect width="800" height="400" fill="#1a1a2e" />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="sans-serif">MFAの定義と原則</text>
<rect x="20" y="50" width="760" height="80" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" />
<text x="400" y="82" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">Multi-Factor Authentication</text>
<text x="400" y="112" text-anchor="middle" fill="#ffffff" font-size="13" font-family="sans-serif">2つ以上の異なるカテゴリの認証要素を組み合わせて本人確認を行う方式</text>
<rect x="30" y="155" width="220" height="90" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2" />
<rect x="290" y="155" width="220" height="90" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2" />
<rect x="550" y="155" width="220" height="90" rx="8" fill="#16213e" stroke="#4caf50" stroke-width="2" />
<text x="140" y="182" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold" font-family="sans-serif">Factor 1</text>
<text x="400" y="182" text-anchor="middle" fill="#e91e63" font-size="13" font-weight="bold" font-family="sans-serif">Factor 2</text>
<text x="660" y="182" text-anchor="middle" fill="#4caf50" font-size="13" font-weight="bold" font-family="sans-serif">Factor 3 (オプション)</text>
<text x="140" y="210" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">Knowledge</text>
<text x="400" y="210" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">Possession</text>
<text x="660" y="210" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">Inherence</text>
<text x="140" y="234" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">パスワード / PIN</text>
<text x="400" y="234" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">TOTP / FIDO2 / SMS</text>
<text x="660" y="234" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">生体認証</text>
<text x="255" y="200" text-anchor="middle" fill="#ffffff" font-size="20" font-family="sans-serif">+</text>
<text x="515" y="200" text-anchor="middle" fill="#ffffff" font-size="20" font-family="sans-serif">+</text>
<rect x="30" y="275" width="740" height="60" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="1.5" />
<text x="400" y="300" text-anchor="middle" fill="#e91e63" font-size="13" font-weight="bold" font-family="sans-serif">重要: 同一カテゴリの2要素はMFAではない</text>
<text x="400" y="325" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">例: パスワード + 秘密の質問 = 両方 Knowledge = MFA NOT OK</text>
</svg>
- **多要素認証（MFA）**: 2種類以上の**異なるカテゴリ**の認証要素を組み合わせる認証方式
- **2FA（二要素認証）** はMFAの最も一般的な実装形態
- 同カテゴリの組合せ（パスワード + PIN）は **SFA（単要素認証）** のまま
- **ステップアップ認証**: リスクに応じて追加要素を動的要求するアダプティブMFA
- ISO27001:2022 附属書A 8.5「セキュアな認証」— MFAを**明示的に要求**
- NIST SP 800-63B — 保証レベル（AAL1/2/3）によりMFA方式の強度を規定

<h1 id="sms--%E9%9B%BB%E8%A9%B1-otp">SMS / 電話 OTP</h1>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">SMS / 電話 OTP</text><br />
<rect x="30" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<rect x="420" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><br />
<text x="205" y="78" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">仕組みと特徴</text><br />
<text x="595" y="78" text-anchor="middle" fill="#e91e63" font-size="14" font-weight="bold" font-family="sans-serif">リスクと限界</text><br />
<text x="45" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">• 認証時に電話番号にOTP送信</text><br />
<text x="45" y="140" fill="#ffffff" font-size="12" font-family="sans-serif">• 通常6桁・有効期間5〜10分</text><br />
<text x="45" y="168" fill="#ffffff" font-size="12" font-family="sans-serif">• 追加アプリ不要で導入容易</text><br />
<text x="45" y="196" fill="#ffffff" font-size="12" font-family="sans-serif">• 既存電話番号をそのまま利用</text><br />
<text x="45" y="250" fill="#f9a825" font-size="12" font-family="sans-serif">メリット: 低コスト・広い普及率</text><br />
<text x="45" y="278" fill="#f9a825" font-size="12" font-family="sans-serif">ユーザー: 追加アプリなし</text><br />
<text x="435" y="112" fill="#e91e63" font-size="12" font-family="sans-serif">• SIMスワッピング攻撃</text><br />
<text x="435" y="140" fill="#e91e63" font-size="12" font-family="sans-serif">• SS7プロトコル脆弱性</text><br />
<text x="435" y="168" fill="#e91e63" font-size="12" font-family="sans-serif">• AiTMフィッシングで盗取可能</text><br />
<text x="435" y="196" fill="#e91e63" font-size="12" font-family="sans-serif">• 通信費・遅延の問題</text><br />
<text x="435" y="250" fill="#4caf50" font-size="12" font-family="sans-serif">NIST SP 800-63B:</text><br />
<text x="435" y="278" fill="#ffffff" font-size="12" font-family="sans-serif">SMS OTPは「推奨しない」(RESTRICTED)</text><br />
<text x="400" y="365" text-anchor="middle" fill="#f9a825" font-size="12" font-family="sans-serif">導入しやすいが中リスク環境のみ / 高リスクはTOTP以上へ</text></svg></li>
<li><strong>仕組み</strong>: SMSまたは音声通話でワンタイムパスワード（6桁）を送信</li>
<li><strong>長所</strong>: 追加アプリ不要・なじみがある・導入が容易・低コスト</li>
<li><strong>短所</strong>: SIMスワッピング / SS7攻撃に脆弱、電波不要環境で使用不可、AiTMに無防備</li>
<li><strong>NIST評価</strong>: SP 800-63B で <strong>AAL1（RESTRICTED）</strong>— 高セキュリティ用途に非推奨</li>
<li><strong>廃止動向</strong>: NIST 2016年にSMS OTPを「制限付き（RESTRICTED）」に分類して以降、廃止の流れ</li>
<li><strong>用途例</strong>: 一般消費者向け低リスクサービス限定。社内システムへの使用は避けるべき</li>
</ul>

<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="totptime-based-otp--rfc-6238">TOTP（Time-based OTP） — RFC 6238</h1>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">TOTP（Time-based OTP） — RFC 6238</text><br />
<rect x="30" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<rect x="420" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><br />
<text x="205" y="78" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">アルゴリズム</text><br />
<text x="595" y="78" text-anchor="middle" fill="#e91e63" font-size="14" font-weight="bold" font-family="sans-serif">特徴と注意点</text><br />
<text x="45" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">TOTP = HMAC-SHA1(secret, T)</text><br />
<text x="45" y="140" fill="#ffffff" font-size="12" font-family="sans-serif">T = floor(現在時刻 / 30秒)</text><br />
<text x="45" y="168" fill="#ffffff" font-size="12" font-family="sans-serif">→ 30秒ごとに変わる6桁コード</text><br />
<text x="45" y="196" fill="#ffffff" font-size="12" font-family="sans-serif">共有シークレット (QRコード登録)</text><br />
<text x="45" y="228" fill="#ffffff" font-size="12" font-family="sans-serif">対応アプリ: Google Authenticator</text><br />
<text x="45" y="254" fill="#ffffff" font-size="12" font-family="sans-serif">Authy / Microsoft Authenticator</text><br />
<text x="45" y="290" fill="#f9a825" font-size="12" font-family="sans-serif">オフラインで動作可能</text><br />
<text x="435" y="112" fill="#4caf50" font-size="12" font-family="sans-serif">• SMS OTPより安全</text><br />
<text x="435" y="140" fill="#ffffff" font-size="12" font-family="sans-serif">• SIMスワッピングに強い</text><br />
<text x="435" y="168" fill="#ffffff" font-size="12" font-family="sans-serif">• アプリのみで完結</text><br />
<text x="435" y="210" fill="#e91e63" font-size="12" font-family="sans-serif">注意: フィッシング耐性なし</text><br />
<text x="435" y="238" fill="#e91e63" font-size="12" font-family="sans-serif">リアルタイム攻撃で盗取可能</text><br />
<text x="435" y="266" fill="#e91e63" font-size="12" font-family="sans-serif">端末紛失 → リカバリー必要</text><br />
<text x="435" y="290" fill="#f9a825" font-size="12" font-family="sans-serif">コスト低 / SMSより上位</text></svg></li>
<li><strong>仕組み</strong>: 共有秘密鍵 + 現在時刻（30秒窓）から HMAC-SHA1 で6桁のコードを生成</li>
<li><strong>標準規格</strong>: RFC 6238（TOTP）/ RFC 4226（HOTP）— 完全オープンスタンダード</li>
<li><strong>実装例</strong>: Google Authenticator, Microsoft Authenticator, Authy, 1Password, Bitwarden</li>
<li><strong>長所</strong>: オフライン動作・オープン標準・追加コスト低・幅広く対応</li>
<li><strong>短所</strong>: AiTMフィッシングに脆弱（リアルタイム転送可能）・秘密鍵漏洩リスク</li>
<li><strong>秘密鍵管理</strong>: QRコード初回登録時のスクリーンショット・通信路漏洩に注意</li>
</ul>

<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="push%E9%80%9A%E7%9F%A5%E8%AA%8D%E8%A8%BC">PUSH通知認証</h1>
<ul>
<li><strong>仕組み</strong>: 認証リクエストをスマートフォンアプリにプッシュ送信し、ユーザーが承認/拒否</li>
<li><strong>実装例</strong>: Microsoft Authenticator, Duo Security, Okta Verify, PingID</li>
<li><strong>進化型</strong>: 番号照合（Number Matching）でPush Bombing攻撃を防御</li>
<li><strong>長所</strong>: UXが優秀（タップ1回）・追加コンテキスト（IP/場所）表示が可能</li>
<li><strong>短所</strong>: インターネット接続が必要・Push Bombing攻撃に脆弱（番号照合なしの場合）</li>
<li><strong>ISMS推奨</strong>: 番号照合 + 位置情報表示を必須設定にすること</li>
</ul>
<footer>© 2026 Security Workshop</footer>
</section>

<h1 id="fido2--webauthn--%E3%83%95%E3%82%A3%E3%83%83%E3%82%B7%E3%83%B3%E3%82%B0%E8%80%90%E6%80%A7mfa">FIDO2 / WebAuthn — フィッシング耐性MFA</h1>
<ul>
<li><svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="400" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">FIDO2 / WebAuthn — フィッシング耐性MFA</text><br />
<rect x="30" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#4caf50" stroke-width="2.5" /><br />
<rect x="420" y="50" width="350" height="300" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<text x="205" y="78" text-anchor="middle" fill="#4caf50" font-size="14" font-weight="bold" font-family="sans-serif">仕組み</text><br />
<text x="595" y="78" text-anchor="middle" fill="#f9a825" font-size="14" font-weight="bold" font-family="sans-serif">なぜフィッシング耐性があるか</text><br />
<text x="45" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">• 公開鍵暗号方式 (ECDSA)</text><br />
<text x="45" y="140" fill="#ffffff" font-size="12" font-family="sans-serif">• 秘密鍵はデバイス内のみ</text><br />
<text x="45" y="168" fill="#ffffff" font-size="12" font-family="sans-serif">• 生体認証 or PINでローカル解錠</text><br />
<text x="45" y="196" fill="#ffffff" font-size="12" font-family="sans-serif">• サーバーはチャレンジを送信</text><br />
<text x="45" y="224" fill="#ffffff" font-size="12" font-family="sans-serif">• デバイスが秘密鍵で署名応答</text><br />
<text x="45" y="265" fill="#4caf50" font-size="12" font-family="sans-serif">対応: YubiKey / TouchID / FaceID</text><br />
<text x="45" y="290" fill="#4caf50" font-size="12" font-family="sans-serif">Windows Hello / Android</text><br />
<text x="435" y="112" fill="#ffffff" font-size="12" font-family="sans-serif">• チャレンジにOrigin (domain) 含む</text><br />
<text x="435" y="140" fill="#ffffff" font-size="12" font-family="sans-serif">• 偽ドメインでは署名が不一致</text><br />
<text x="435" y="168" fill="#ffffff" font-size="12" font-family="sans-serif">• 秘密鍵はデバイス外に出ない</text><br />
<text x="435" y="196" fill="#ffffff" font-size="12" font-family="sans-serif">• AiTMフィッシングでも無効</text><br />
<text x="435" y="240" fill="#f9a825" font-size="13" font-weight="bold" font-family="sans-serif">唯一のフィッシング耐性MFA</text><br />
<text x="435" y="270" fill="#ffffff" font-size="12" font-family="sans-serif">NIST AAL3 (最高保証レベル)</text></svg></li>
<li><strong>仕組み</strong>: 公開鍵暗号方式。デバイス上で鍵ペア生成、サーバーは公開鍵のみ保存</li>
<li><strong>標準</strong>: FIDO Alliance + W3C WebAuthn（Level 3）/ CTAP2.1</li>
<li><strong>デバイス</strong>: YubiKey, Google Titan Key, Windows Hello などのハードウェアセキュリティキー</li>
<li><strong>フィッシング耐性</strong>: 鍵はオリジン（ドメイン）にバインド → 偽サイトでは絶対に使用不能</li>
<li><strong>NIST AAL3</strong>: 物理セキュリティキーで最高保証レベルを達成。政府機関・金融に推奨</li>
<li><strong>採用実績</strong>: Google（社内全社員）, Microsoft, GitHub, 日本政府（デジタル庁）</li>
</ul>

<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="%E3%83%90%E3%82%A4%E3%82%AA%E3%83%A1%E3%83%88%E3%83%AA%E3%82%AF%E3%82%B9%E8%AA%8D%E8%A8%BC">バイオメトリクス認証</h1>
<ul>
<li><strong>種別</strong>: 指紋・顔・虹彩・声紋・静脈パターン（各方式で精度が異なる）</li>
<li><strong>FAR/FRR</strong>: 誤受入率（FAR）と誤拒否率（FRR）はトレードオフ — 用途によりチューニング</li>
<li><strong>FIDO2統合</strong>: 生体認証はデバイスローカルで処理 → バイオデータがサーバーに送信されない</li>
<li><strong>個人情報保護</strong>: 生体情報は <strong>要配慮個人情報</strong> — GDPR/個人情報保護法で厳格管理が必要</li>
<li><strong>ISMS観点</strong>: 附属書A 8.5 — 生体認証システムの精度要件・データ保存場所・アクセス制御を文書化</li>
<li><strong>限界</strong>: 顔・指紋の複製リスク・加齢/怪我による誤拒否・センサー品質依存</li>
</ul>

<ul>
<li><svg viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="380" fill="#1a1a2e" /><br />

<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="iso270012022--%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B9%E5%88%B6%E5%BE%A1%E3%81%AE%E8%A6%81%E6%B1%82">ISO27001:2022 — アクセス制御の要求</h1>
<ul>
<li><svg viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="380" fill="#1a1a2e" /><br />
<text x="400" y="28" font-size="15" fill="#f9a825" text-anchor="middle" font-weight="bold">ISO 27001:2022 — アクセス制御とMFAの要求</text><br />
<rect x="30" y="50" width="360" height="125" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="2" /><br />
<text x="210" y="70" font-size="11" fill="#e91e63" text-anchor="middle" font-weight="bold">8.2 特権アクセス権の管理</text><br />
<text x="45" y="88" font-size="10" fill="#ffffff">• 特権アカウントの払い出しは厳格な承認プロセス</text><text x="45" y="110" font-size="10" fill="#ffffff">• 特権操作にはMFA必須（審査官が証跡を確認）</text><text x="45" y="132" font-size="10" fill="#ffffff">• PAMツールによる操作記録・セッション録画</text><rect x="410" y="50" width="360" height="125" rx="6" fill="#16213e" stroke="#2196f3" stroke-width="2" /><br />
<text x="590" y="70" font-size="11" fill="#2196f3" text-anchor="middle" font-weight="bold">8.3 情報アクセス制限</text><br />
<text x="425" y="88" font-size="10" fill="#ffffff">• Need-to-Know: 最小権限の原則</text><text x="425" y="110" font-size="10" fill="#ffffff">• 定期的なアクセス権レビュー（四半期推奨）</text><text x="425" y="132" font-size="10" fill="#ffffff">• 高機密データへのアクセスはMFA強制</text><rect x="30" y="190" width="360" height="125" rx="6" fill="#16213e" stroke="#4caf50" stroke-width="2" /><br />
<text x="210" y="210" font-size="11" fill="#4caf50" text-anchor="middle" font-weight="bold">8.5 セキュアな認証</text><br />
<text x="45" y="228" font-size="10" fill="#ffffff">• 認証に関するすべての要件を文書化</text><text x="45" y="250" font-size="10" fill="#ffffff">• MFAポリシー: 誰に・どの条件で・どの方式を</text><text x="45" y="272" font-size="10" fill="#ffffff">• パスワードポリシーとMFAの組み合わせ方針</text><rect x="410" y="190" width="360" height="125" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<text x="590" y="210" font-size="11" fill="#f9a825" text-anchor="middle" font-weight="bold">6.7 リモートワーク</text><br />
<text x="425" y="228" font-size="10" fill="#ffffff">• リモートアクセスには原則MFA必須</text><text x="425" y="250" font-size="10" fill="#ffffff">• VPN + MFA の組み合わせが一般的</text><text x="425" y="272" font-size="10" fill="#ffffff">• 管理対象外デバイスの制御方針</text><br />
<rect x="100" y="333" width="600" height="40" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2" /><br />
<text x="400" y="351" font-size="12" fill="#f9a825" text-anchor="middle" font-weight="bold">ISO 27001 審査でのMFA確認ポイント</text><br />
<text x="400" y="367" font-size="10" fill="#ffffff" text-anchor="middle">①方針文書の存在 ②適用範囲の明確化 ③実施証跡（ログ）④例外管理のプロセス</text></svg></li>
<li><strong>ISO/IEC 27001:2022</strong>: 2022年版で大幅改訂 → 114→93コントロール（11の新規追加）</li>
<li><strong>8.2 特権アクセス権限管理</strong>: 管理者・特権アカウントへのMFA強制を<strong>事実上要求</strong></li>
<li><strong>8.3 情報アクセスの制限</strong>: 最小権限原則 + 強化認証の組合せ要求</li>
<li><strong>8.5 セキュアな認証</strong>: <strong>MFAを明示的に言及</strong>（2013年版にはなかった重要強化点）</li>
<li><strong>5.17 認証情報の管理</strong>: パスワードポリシー + 追加認証要素の管理手順策定</li>
<li><strong>8.15 ログ管理</strong>: MFA認証イベントのログ記録・保護・保管期間の設定要求</li>
</ul>

<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="%E9%96%A2%E9%80%A3%E6%B3%95%E8%A6%8F%E5%88%B6--%E3%83%95%E3%83%AC%E3%83%BC%E3%83%A0%E3%83%AF%E3%83%BC%E3%82%AF%E3%81%A8%E3%81%AE%E5%AF%BE%E5%BF%9C">関連法規制 / フレームワークとの対応</h1>
<ul>
<li><svg viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="380" fill="#1a1a2e" /><br />

<text x="100" y="60" font-size="12" fill="#f9a825" text-anchor="middle">法令/規制</text><br />
<text x="310" y="60" font-size="12" fill="#f9a825" text-anchor="middle">MFA要件</text><br />
<text x="580" y="60" font-size="12" fill="#f9a825" text-anchor="middle">詳細</text><br />

<text x="310" y="93" font-size="10" fill="#e91e63" text-anchor="middle" font-weight="bold">推奨/一部必須</text><br />
<text x="400" y="93" font-size="9" fill="#ffffff">要配慮個人情報取扱システムへのアクセスに強い認証推奨</text><rect x="30" y="120" width="740" height="42" rx="3" fill="#16213e" /><br />
<text x="100" y="136" font-size="10" fill="#ffffff" text-anchor="middle">NIST SP 800-63B</text><br />
<text x="310" y="141" font-size="10" fill="#e91e63" text-anchor="middle" font-weight="bold">AAL2+で必須</text><br />
<text x="400" y="141" font-size="9" fill="#ffffff">AAL2: MFA必須 / AAL3: ハードウェアMFA+生体</text><rect x="30" y="168" width="740" height="42" rx="3" fill="#0d0d1a" /><br />
<text x="100" y="184" font-size="10" fill="#ffffff" text-anchor="middle">PCI DSS v4.0</text><br />
<text x="310" y="189" font-size="10" fill="#e91e63" text-anchor="middle" font-weight="bold">必須</text><br />
<text x="400" y="189" font-size="9" fill="#ffffff">カード保有者データ環境へのアクセスは全ユーザーMFA必須</text><rect x="30" y="216" width="740" height="42" rx="3" fill="#16213e" /><br />

<text x="310" y="237" font-size="10" fill="#f9a825" text-anchor="middle" font-weight="bold">推奨/監査対象</text><br />
<text x="400" y="237" font-size="9" fill="#ffffff">Trust Services Criteria CC6.1: 論理アクセス制御</text><rect x="30" y="264" width="740" height="42" rx="3" fill="#0d0d1a" /><br />
<text x="100" y="280" font-size="10" fill="#ffffff" text-anchor="middle">HIPAA</text><br />
<text x="310" y="285" font-size="10" fill="#f9a825" text-anchor="middle" font-weight="bold">推奨</text><br />
<text x="400" y="285" font-size="9" fill="#ffffff">ePHIへのアクセス管理の一環として強い認証推奨</text><rect x="30" y="312" width="740" height="42" rx="3" fill="#16213e" /><br />
<text x="100" y="328" font-size="10" fill="#ffffff" text-anchor="middle">金融庁ガイドライン</text><br />
<text x="310" y="333" font-size="10" fill="#e91e63" text-anchor="middle" font-weight="bold">必須傾向</text><br />
<text x="400" y="333" font-size="9" fill="#ffffff">インターネットバンキング等への不正ログイン対策</text></svg></li>
<li><strong>GDPR（EU一般データ保護規則）</strong>: Art.32 — 適切な技術的措置（MFAを含む暗号化・アクセス制御）</li>

<h1 id="sim%E3%82%B9%E3%83%AF%E3%83%83%E3%83%94%E3%83%B3%E3%82%B0%E6%94%BB%E6%92%83">SIMスワッピング攻撃</h1>
<ul>
<li><strong>概要</strong>: 攻撃者がキャリアを騙して被害者の電話番号を攻撃者のSIMに移管する攻撃</li>
<li><strong>手口</strong>: ①個人情報収集（SNS/ダークウェブ）→ ②キャリアへのなりすまし手続き → ③SMS OTP傍受</li>
<li><strong>被害例</strong>: 2019年 Jack Dorsey（Twitter CEO）乗っ取り / 暗号資産盗難多数</li>
<li><strong>対策</strong>: SMS OTPを廃止してFIDO2/TOTPへ移行 / キャリアへのSIM変更時の認証強化要求</li>
<li><strong>ISMS観点</strong>: 高リスク資産へのSMS MFA使用を<strong>禁止するポリシー</strong>を策定すること</li>
<li><strong>日本の状況</strong>: 2023年〜 キャリア各社がSIM変更時の本人確認を強化（マイナンバーカード照合等）</li>
</ul>

<h1 id="mfa-push%E7%96%B2%E5%8A%B4%E6%94%BB%E6%92%83push-bombing">MFA Push疲労攻撃（Push Bombing）</h1>
<ul>
<li><strong>手口</strong>: 攻撃者は正しいID/PWを入手済み → 大量のプッシュ通知を深夜等に連続送信</li>
<li><strong>狙い</strong>: ユーザーが誤操作・疲れ・諦めで承認 または 止まらないと思い込んで承認</li>
<li><strong>実例</strong>: 2022年 Uber社侵害 — 深夜のPush Bombing後にソーシャルエンジニアリングで承認取得</li>
<li><strong>対策①</strong>: 番号照合（Number Matching）— 画面の数字と一致するものを必ず選択</li>
<li><strong>対策②</strong>: 追加コンテキスト表示 — 場所・デバイス・アプリ情報を通知に含める</li>
<li><strong>対策③</strong>: Push通知の送信頻度制限（Rate Limiting） + 連続失敗でアカウントロック</li>
</ul>
<footer>© 2026 Security Workshop</footer>

<h1 id="ss7%E3%83%97%E3%83%AD%E3%83%88%E3%82%B3%E3%83%AB%E8%84%86%E5%BC%B1%E6%80%A7">SS7プロトコル脆弱性</h1>
<ul>
<li><strong>SS7</strong>: 1975年設計の電話網シグナリングプロトコル — 認証機構が設計に存在しない</li>
<li><strong>攻撃</strong>: 電話網への不正アクセスにより通話・SMSをリアルタイムで傍受・転送が可能</li>
<li><strong>必要条件</strong>: 電話キャリアネットワークへのアクセス（国家機関・高度な犯罪者集団等）</li>
<li><strong>リスク評価</strong>: SMS OTPは傍受可能 — 高価値標的への SMS MFA は不適切</li>
<li><strong>代替</strong>: TOTP（オフライン生成）またはFIDO2（SS7攻撃の影響を受けない）</li>
<li><strong>NIST見解</strong>: SS7脆弱性を理由にSMS OTPをAAL1「RESTRICTED（制限付き）」に分類（2017年〜）</li>
</ul>

<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="%E3%83%A6%E3%83%BC%E3%82%B6%E3%83%BC%E5%8F%97%E5%AE%B9%E6%80%A7--ux%E8%A8%AD%E8%A8%88">ユーザー受容性 &amp; UX設計</h1>
<ul>
<li><strong>摩擦と安全性のバランス</strong>: 過度なMFA要求はシャドーITや回避行動を招く</li>
<li><strong>段階的導入</strong>: 特権アカウント → 全社員 → 外部委託先 の順序で展開（混乱を最小化）</li>
<li><strong>セルフサービス登録</strong>: ポータルで社員が自分でデバイス登録できる設計（ヘルプデスク負荷軽減）</li>
<li><strong>コミュニケーション</strong>: 導入前の説明会・FAQ整備・ヘルプデスクサポート体制の事前整備</li>
<li><strong>アクセシビリティ</strong>: 障害者・高齢者向けの代替認証方法の提供（WCAG 2.1 準拠）</li>
<li><strong>KPIモニタリング</strong>: MFA失敗率・ヘルプデスク問合せ数・登録完了率を定期レポート</li>
</ul>

<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="%E4%BE%8B%E5%A4%96%E5%87%A6%E7%90%86%E3%83%BB%E3%82%A2%E3%82%AB%E3%82%A6%E3%83%B3%E3%83%88%E3%83%AA%E3%82%AB%E3%83%90%E3%83%AA%E3%83%BC%E8%A8%AD%E8%A8%88">例外処理・アカウントリカバリー設計</h1>
<ul>
<li><strong>リカバリーコード</strong>: MFA登録時に発行 → 印刷/暗号化保管を指示（デジタルのみはNG）</li>
<li><strong>緊急アクセス手順</strong>: 全MFAデバイス紛失時の本人確認フロー（対面確認/管理者承認/ID証明）</li>
<li><strong>MFA免除申請</strong>: 業務上やむを得ない免除は 申請 → リスク評価 → 経営承認 → 有期限設定</li>
<li><strong>ブレークグラスアカウント</strong>: 緊急時専用高権限アカウント — 使用は即座にアラート + 全ログ記録</li>
<li><strong>ISMS観点</strong>: 例外はすべて文書化し四半期ごとの免除リスト棚卸しを実施すること</li>
<li><strong>インシデント対応</strong>: MFA妨害が疑われる場合のアカウントロック → 調査 → 復旧フローを整備</li>
</ul>
<footer>© 2026 Security Workshop</footer>
</section>

<header>MFA完全ガイド — ISMSの観点から</header>
<h1 id="%E5%B0%8E%E5%85%A5%E6%99%82%E3%81%AE%E3%82%88%E3%81%8F%E3%81%82%E3%82%8B%E8%90%BD%E3%81%A8%E3%81%97%E7%A9%B4">導入時のよくある落とし穴</h1>
<ul>
<li><strong>サービスアカウントの見落とし</strong>: 人間アカウントのみMFA対応 → 機械アカウントが抜け穴になる</li>
<li><strong>リカバリープロセスの脆弱性</strong>: MFA自体は堅牢でもリセット手順がSEに弱い（MGM事例）</li>
<li><strong>例外の常態化</strong>: 業務理由でのMFA免除が増加 → スコープが空洞化して形骸化</li>
<li><strong>ベンダー・委託先の漏れ</strong>: 社内のみMFA対応 → 外部アクセス権限がバイパス経路になる</li>
<li><strong>ログの未活用</strong>: MFAログは取得しているが監視・アラートが未整備で侵害に気づかない</li>
<li><strong>レガシー認証の残存</strong>: NTLM / レガシー認証が有効のままMFAをバイパスされる可能性</li>
</ul>

<li>
<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">

<rect x="30" y="50" width="740" height="305" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="1.5" />
<rect x="50" y="70" width="680" height="55" rx="8" fill="#1a1a2e" stroke="#e91e63" stroke-width="1.5" />
<text x="150" y="95" text-anchor="middle" fill="#e91e63" font-size="13" font-weight="bold" font-family="sans-serif">Level 1</text>
<text x="150" y="113" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">初期</text>
<text x="510" y="95" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">一部システムでSMS MFA / パスワード+SMSのみ</text>
<rect x="50" y="140" width="680" height="55" rx="8" fill="#1a1a2e" stroke="#f9a825" stroke-width="1.5" />
<text x="150" y="165" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold" font-family="sans-serif">Level 2</text>
<text x="150" y="183" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">管理</text>
<text x="510" y="165" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">特権アカウントにTOTP必須 / MFAポリシー文書化</text>
<rect x="50" y="210" width="680" height="55" rx="8" fill="#1a1a2e" stroke="#2196f3" stroke-width="1.5" />
<text x="150" y="235" text-anchor="middle" fill="#2196f3" font-size="13" font-weight="bold" font-family="sans-serif">Level 3</text>
<text x="150" y="253" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">定義</text>
<text x="510" y="235" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">全社員にMFA強制 / Adaptive MFA導入 / 監査証跡</text>
<rect x="50" y="280" width="680" height="55" rx="8" fill="#1a1a2e" stroke="#4caf50" stroke-width="2" />
<text x="150" y="305" text-anchor="middle" fill="#4caf50" font-size="13" font-weight="bold" font-family="sans-serif">Level 4</text>
<text x="150" y="323" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">最適化</text>
<text x="510" y="305" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">FIDO2/Passkeys全社展開 / ゼロトラスト統合 / 継続的改善</text>
<text x="400" y="375" text-anchor="middle" fill="#f9a825" font-size="12" font-family="sans-serif">ISMS目標: Level 3以上 / 高セキュリティ環境: Level 4</text>
</svg>
- **Level 1（初期）**: 特権アカウントのみMFA（SMS/TOTP）、ポリシー未整備
- **Level 2（管理）**: 全従業員にMFA展開、ポリシー文書化、一部例外あり
- **Level 3（定義）**: フィッシング耐性MFA（FIDO2）採用、リスクベース認証、例外管理プロセス確立
- **Level 4（定量的）**: MFAカバレッジ率・失敗率をKPI化、SIEM連携で自動検知・対応
- **Level 5（最適化）**: Passkeys/デバイス証明書でパスワードレス実現、継続的な脅威対応サイクル
- **目標設定**: 現在レベルを自己評価 → 年間でLevel+1を目標 → ISMSレビューで進捗を追跡
