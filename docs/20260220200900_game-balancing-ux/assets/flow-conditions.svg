<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">フロー状態の5条件</text>
  <!-- Center circle: Flow -->
  <circle cx="400" cy="190" r="60" fill="#16213e" stroke="#f9a825" stroke-width="3"/>
  <text x="400" y="186" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f9a825" font-weight="bold">フロー</text>
  <text x="400" y="204" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f9a825">状態</text>
  <!-- 5 condition nodes around -->
  <!-- Top: clear goal -->
  <circle cx="400" cy="68" r="40" fill="#0d1b2a" stroke="#4ec9b0" stroke-width="2"/>
  <text x="400" y="64" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0" font-weight="bold">明確な</text>
  <text x="400" y="80" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0" font-weight="bold">目標</text>
  <line x1="400" y1="108" x2="400" y2="130" stroke="#4ec9b0" stroke-width="1.5" opacity="0.5"/>
  <!-- Top-right: immediate feedback -->
  <circle cx="574" cy="118" r="40" fill="#0d1b2a" stroke="#e91e63" stroke-width="2"/>
  <text x="574" y="114" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63" font-weight="bold">即時</text>
  <text x="574" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63" font-weight="bold">フィードバック</text>
  <line x1="545" y1="150" x2="450" y2="162" stroke="#e91e63" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom-right: skill/challenge balance -->
  <circle cx="574" cy="262" r="40" fill="#0d1b2a" stroke="#9c27b0" stroke-width="2"/>
  <text x="574" y="254" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9c27b0" font-weight="bold">スキル=</text>
  <text x="574" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9c27b0" font-weight="bold">チャレンジ</text>
  <line x1="545" y1="234" x2="450" y2="218" stroke="#9c27b0" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom-left: concentration -->
  <circle cx="226" cy="262" r="40" fill="#0d1b2a" stroke="#ff9800" stroke-width="2"/>
  <text x="226" y="254" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ff9800" font-weight="bold">集中の</text>
  <text x="226" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ff9800" font-weight="bold">没入</text>
  <line x1="255" y1="234" x2="350" y2="218" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
  <!-- Top-left: intrinsic motivation -->
  <circle cx="226" cy="118" r="40" fill="#0d1b2a" stroke="#4ec9b0" stroke-width="2"/>
  <text x="226" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0" font-weight="bold">自己</text>
  <text x="226" y="126" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0" font-weight="bold">目的的</text>
  <line x1="255" y1="150" x2="350" y2="162" stroke="#4ec9b0" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom label -->
  <rect x="100" y="320" width="600" height="32" rx="6" fill="#0d1b2a"/>
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">ゲームはフローを意図的に設計する唯一のメディア</text>
</svg>