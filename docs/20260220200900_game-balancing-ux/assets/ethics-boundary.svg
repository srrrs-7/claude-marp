<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="340" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">ゲーミフィケーション：光と影</text>
  <!-- Left: Good design -->
  <rect x="30" y="50" width="350" height="250" rx="8" fill="#003820" stroke="#4ec9b0" stroke-width="2"/>
  <text x="205" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4ec9b0" font-weight="bold">良い設計</text>
  <text x="205" y="92" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">ユーザーの目標達成を助ける</text>
  <rect x="50" y="106" width="310" height="40" rx="5" fill="#003820" stroke="#4ec9b0" stroke-width="1"/>
  <text x="205" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">Duolingo: 学習の習慣化</text>
  <rect x="50" y="154" width="310" height="40" rx="5" fill="#003820" stroke="#4ec9b0" stroke-width="1"/>
  <text x="205" y="178" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">GitHub: 貢献の可視化</text>
  <rect x="50" y="202" width="310" height="40" rx="5" fill="#003820" stroke="#4ec9b0" stroke-width="1"/>
  <text x="205" y="226" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#80ffcc">Fitbit: 健康行動の動機づけ</text>
  <rect x="50" y="258" width="310" height="30" rx="5" fill="#002016"/>
  <text x="205" y="278" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4ec9b0">透明・自律・脆弱者配慮</text>
  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="300" stroke="#f9a825" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f9a825" font-weight="bold">倫理的境界線</text>
  <!-- Right: Bad design -->
  <rect x="420" y="50" width="350" height="250" rx="8" fill="#300" stroke="#e91e63" stroke-width="2"/>
  <text x="595" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">悪い設計</text>
  <text x="595" y="92" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">企業目標のためにユーザーを操作</text>
  <rect x="440" y="106" width="310" height="40" rx="5" fill="#300" stroke="#e91e63" stroke-width="1"/>
  <text x="595" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">ダークパターン: 解約困難</text>
  <rect x="440" y="154" width="310" height="40" rx="5" fill="#300" stroke="#e91e63" stroke-width="1"/>
  <text x="595" y="178" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">無限スクロール: 意図しない消費</text>
  <rect x="440" y="202" width="310" height="40" rx="5" fill="#300" stroke="#e91e63" stroke-width="1"/>
  <text x="595" y="226" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">ルートボックス: ギャンブル依存</text>
  <rect x="440" y="258" width="310" height="30" rx="5" fill="#200000"/>
  <text x="595" y="278" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e91e63">エンゲージメント vs 依存</text>
</svg>