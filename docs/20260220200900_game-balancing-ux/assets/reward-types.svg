<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">報酬スケジュール：強化の強度比較</text>
  <!-- Y axis: response strength -->
  <line x1="80" y1="60" x2="80" y2="280" stroke="#555" stroke-width="2"/>
  <!-- X axis: time/actions -->
  <line x1="80" y1="280" x2="720" y2="280" stroke="#555" stroke-width="2"/>
  <text x="400" y="306" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">行動回数 / 時間</text>
  <text x="36" y="180" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa" transform="rotate(-90,36,180)">反応強度</text>
  <!-- Fixed ratio line: step function -->
  <polyline points="100,260 200,260 200,230 300,230 300,200 400,200 400,170 500,170 500,140 600,140 600,110 700,110"
    fill="none" stroke="#4ec9b0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="708" y="114" font-family="sans-serif" font-size="10" fill="#4ec9b0">固定比率</text>
  <!-- Fixed interval line: scallop pattern -->
  <path d="M 100 268 C 160 265 190 240 200 260 C 220 265 280 240 300 260 C 320 265 380 235 400 258 C 420 265 480 230 500 256"
    fill="none" stroke="#9c27b0" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="510" y="250" font-family="sans-serif" font-size="10" fill="#9c27b0">固定間隔</text>
  <!-- Variable ratio line: steep/sustained -->
  <path d="M 100 265 C 200 240 300 200 400 150 C 500 100 600 75 700 60"
    fill="none" stroke="#e91e63" stroke-width="3"/>
  <text x="706" y="64" font-family="sans-serif" font-size="10" fill="#e91e63">変動比率</text>
  <text x="706" y="78" font-family="sans-serif" font-size="10" fill="#e91e63">（最強）</text>
  <!-- Variable interval line: moderate -->
  <path d="M 100 265 C 200 250 300 225 400 200 C 500 175 600 155 700 140"
    fill="none" stroke="#f9a825" stroke-width="2.5"/>
  <text x="706" y="144" font-family="sans-serif" font-size="10" fill="#f9a825">変動間隔</text>
  <!-- Annotation: gacha area -->
  <rect x="560" y="50" width="130" height="30" rx="4" fill="#300010"/>
  <text x="625" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63">ガチャ・ルートボックス</text>
  <line x1="620" y1="80" x2="580" y2="100" stroke="#e91e63" stroke-width="1" stroke-dasharray="3"/>
  <!-- Bottom note -->
  <rect x="80" y="304" width="640" height="42" rx="6" fill="#16213e"/>
  <text x="400" y="322" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ffffff">変動比率 = スロットマシン / ガチャ / いいね通知</text>
  <text x="400" y="338" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f9a825">予測できない報酬が最も行動を強化する（Skinnerの法則）</text>
</svg>