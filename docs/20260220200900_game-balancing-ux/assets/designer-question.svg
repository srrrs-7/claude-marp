<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">設計者の問い（1/2）：デザインの倫理スペクトラム</text>
  <!-- Spectrum bar: 3 solid segments -->
  <rect x="80" y="145" width="213" height="40" fill="#66bb6a" rx="4"/>
  <rect x="293" y="145" width="214" height="40" fill="#f9a825"/>
  <rect x="507" y="145" width="213" height="40" fill="#e91e63" rx="4"/>
  <text x="186" y="172" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">ユーザー中心</text>
  <text x="400" y="172" fill="#1a1a2e" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">グレーゾーン</text>
  <text x="613" y="172" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">搾取的</text>
  <!-- Pointers -->
  <line x1="186" y1="185" x2="186" y2="230" stroke="#66bb6a" stroke-width="2"/>
  <line x1="400" y1="185" x2="400" y2="230" stroke="#f9a825" stroke-width="2"/>
  <line x1="613" y1="185" x2="613" y2="230" stroke="#e91e63" stroke-width="2"/>
  <text x="186" y="250" fill="#66bb6a" font-size="10" text-anchor="middle" font-family="sans-serif">「このデザインは</text>
  <text x="186" y="266" fill="#66bb6a" font-size="10" text-anchor="middle" font-family="sans-serif">ユーザーの利益になるか」</text>
  <text x="400" y="250" fill="#f9a825" font-size="10" text-anchor="middle" font-family="sans-serif">「楽しさと時間消費の</text>
  <text x="400" y="266" fill="#f9a825" font-size="10" text-anchor="middle" font-family="sans-serif">バランスは適切か」</text>
  <text x="613" y="250" fill="#e91e63" font-size="10" text-anchor="middle" font-family="sans-serif">「離脱できないよう</text>
  <text x="613" y="266" fill="#e91e63" font-size="10" text-anchor="middle" font-family="sans-serif">設計していないか」</text>
  <!-- Note at bottom -->
  <rect x="80" y="295" width="640" height="55" fill="#1a1a3e" stroke="#f9a825" stroke-width="1" rx="6"/>
  <text x="400" y="318" fill="#f9a825" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">設計者の責任</text>
  <text x="400" y="338" fill="#ffffff" font-size="11" text-anchor="middle" font-family="sans-serif">「このデザインは何を目的にしているか」を明確にし、ユーザー・ビジネス双方に価値をもたらす設計を</text>
</svg>