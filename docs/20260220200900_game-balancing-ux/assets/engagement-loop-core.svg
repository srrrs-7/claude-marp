<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">エンゲージメントループ（コアループ）</text>
  <!-- Central circle -->
  <circle cx="400" cy="200" r="55" fill="#16213e" stroke="#f9a825" stroke-width="3"/>
  <text x="400" y="195" fill="#f9a825" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">プレイヤー</text>
  <text x="400" y="213" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">モチベーション</text>
  <!-- 4 nodes around the center -->
  <!-- Action (top) -->
  <rect x="300" y="55" width="200" height="50" fill="#1e3a1e" stroke="#66bb6a" stroke-width="2" rx="6"/>
  <text x="400" y="78" fill="#66bb6a" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">行動</text>
  <text x="400" y="96" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">クエスト・戦闘・収集</text>
  <!-- Reward (right) -->
  <rect x="610" y="145" width="165" height="50" fill="#1e2a3e" stroke="#4fc3f7" stroke-width="2" rx="6"/>
  <text x="692" y="168" fill="#4fc3f7" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">報酬</text>
  <text x="692" y="186" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">XP・アイテム・称号</text>
  <!-- Growth (bottom) -->
  <rect x="300" y="280" width="200" height="50" fill="#2a1a3e" stroke="#ab47bc" stroke-width="2" rx="6"/>
  <text x="400" y="303" fill="#ab47bc" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">成長</text>
  <text x="400" y="321" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">スキルアップ・強化</text>
  <!-- New challenge (left) -->
  <rect x="25" y="145" width="165" height="50" fill="#3a1a1e" stroke="#e91e63" stroke-width="2" rx="6"/>
  <text x="107" y="168" fill="#e91e63" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">新たな挑戦</text>
  <text x="107" y="186" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">より高い壁・新ステージ</text>
  <!-- Arrows (loop) -->
  <!-- Action → center -->
  <line x1="400" y1="105" x2="400" y2="145" stroke="#66bb6a" stroke-width="2"/>
  <polygon points="394,145 406,145 400,160" fill="#66bb6a"/>
  <!-- center → Reward -->
  <line x1="455" y1="180" x2="608" y2="170" stroke="#4fc3f7" stroke-width="2"/>
  <polygon points="608,164 620,170 608,176" fill="#4fc3f7"/>
  <!-- Reward → Growth -->
  <line x1="680" y1="195" x2="510" y2="285" stroke="#ab47bc" stroke-width="2"/>
  <polygon points="505,279 516,291 510,285" fill="#ab47bc"/>
  <!-- Growth → center -->
  <line x1="400" y1="280" x2="400" y2="255" stroke="#ab47bc" stroke-width="2"/>
  <polygon points="394,255 406,255 400,240" fill="#ab47bc"/>
  <!-- New challenge → center -->
  <line x1="190" y1="170" x2="345" y2="185" stroke="#e91e63" stroke-width="2"/>
  <polygon points="345,179 357,185 345,191" fill="#e91e63"/>
  <!-- center → Action -->
  <line x1="380" y1="145" x2="375" y2="108" stroke="#66bb6a" stroke-width="1" stroke-dasharray="4,3"/>
</svg>