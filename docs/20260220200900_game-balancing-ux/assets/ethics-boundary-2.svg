<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">設計者の問い：ユーザー利益 vs 依存性</text>
  <!-- Left side: Healthy engagement -->
  <rect x="40" y="60" width="310" height="280" fill="#16213e" stroke="#66bb6a" stroke-width="2" rx="10"/>
  <text x="195" y="90" fill="#66bb6a" font-size="15" text-anchor="middle" font-weight="bold" font-family="sans-serif">健全なエンゲージメント</text>
  <line x1="60" y1="100" x2="330" y2="100" stroke="#66bb6a" stroke-width="1"/>
  <text x="195" y="130" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">スキル習得の達成感</text>
  <text x="195" y="155" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">自己効力感の向上</text>
  <text x="195" y="180" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">適切な挑戦と成長</text>
  <text x="195" y="205" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">ユーザーが制御可能</text>
  <text x="195" y="245" fill="#66bb6a" font-size="11" text-anchor="middle" font-family="sans-serif">設計指針:</text>
  <text x="195" y="265" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">「やめたいときにやめられるか？」</text>
  <text x="195" y="283" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">「やり続けると何が得られるか？」</text>
  <text x="195" y="308" fill="#a0d0a0" font-size="10" text-anchor="middle" font-family="sans-serif">長期的ユーザー満足度が高い</text>
  <!-- Right side: Dark patterns -->
  <rect x="450" y="60" width="310" height="280" fill="#16213e" stroke="#e91e63" stroke-width="2" rx="10"/>
  <text x="605" y="90" fill="#e91e63" font-size="15" text-anchor="middle" font-weight="bold" font-family="sans-serif">依存性設計（ダークパターン）</text>
  <line x1="470" y1="100" x2="740" y2="100" stroke="#e91e63" stroke-width="1"/>
  <text x="605" y="130" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">可変報酬スケジュール</text>
  <text x="605" y="155" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">FOMO（見逃し恐怖）誘発</text>
  <text x="605" y="180" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">ソーシャルプレッシャー</text>
  <text x="605" y="205" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">ペイウォール・ガチャ</text>
  <text x="605" y="245" fill="#e91e63" font-size="11" text-anchor="middle" font-family="sans-serif">問題:</text>
  <text x="605" y="265" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">短期収益は高いが</text>
  <text x="605" y="283" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">長期的信頼を損なう</text>
  <text x="605" y="308" fill="#f08080" font-size="10" text-anchor="middle" font-family="sans-serif">規制リスク・ブランド毀損</text>
  <!-- Middle divider -->
  <text x="400" y="205" fill="#f9a825" font-size="28" text-anchor="middle" font-family="sans-serif">⟷</text>
</svg>