<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">良い難易度カーブの特徴</text>
  <!-- Axes -->
  <line x1="80" y1="50" x2="80" y2="310" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="310" x2="750" y2="310" stroke="#555" stroke-width="2"/>
  <text x="45" y="55" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">難易度</text>
  <text x="415" y="340" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">ゲーム進行</text>
  <!-- Good curve: gradual staircase with dip after tutorial -->
  <!-- Tutorial dip -->
  <polyline points="80,260 150,260 180,240 230,200 260,220 310,190 360,170 410,150 460,140 490,160 540,130 590,115 640,100 700,90" fill="none" stroke="#66bb6a" stroke-width="3"/>
  <!-- Challenge spike annotations -->
  <line x1="260" y1="220" x2="260" y2="330" stroke="#f9a825" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="260" y="350" fill="#f9a825" font-size="9" text-anchor="middle" font-family="sans-serif">1stボス</text>
  <line x1="490" y1="160" x2="490" y2="330" stroke="#f9a825" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="490" y="350" fill="#f9a825" font-size="9" text-anchor="middle" font-family="sans-serif">中盤</text>
  <!-- Bad curve comparison -->
  <polyline points="80,260 150,260 200,240 250,230 300,225 310,100 360,95 410,92 460,90 510,88" fill="none" stroke="#e91e63" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Labels -->
  <text x="560" y="85" fill="#66bb6a" font-size="12" font-family="sans-serif">良い曲線</text>
  <text x="560" y="105" fill="#a0a0c0" font-size="9" font-family="sans-serif">漸進的・波型上昇</text>
  <text x="560" y="135" fill="#e91e63" font-size="12" font-family="sans-serif">悪い曲線</text>
  <text x="560" y="155" fill="#a0a0c0" font-size="9" font-family="sans-serif">急激なスパイク</text>
  <!-- Y axis ticks -->
  <text x="72" y="260" fill="#a0a0c0" font-size="9" text-anchor="end" font-family="sans-serif">易</text>
  <text x="72" y="150" fill="#a0a0c0" font-size="9" text-anchor="end" font-family="sans-serif">中</text>
  <text x="72" y="80" fill="#a0a0c0" font-size="9" text-anchor="end" font-family="sans-serif">難</text>
  <!-- Key principle boxes -->
  <rect x="90" y="320" width="140" height="40" fill="#1e3a1e" stroke="#66bb6a" stroke-width="1" rx="4"/>
  <text x="160" y="338" fill="#66bb6a" font-size="10" text-anchor="middle" font-family="sans-serif">漸進的上昇</text>
  <text x="160" y="353" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">1つずつ新要素</text>
  <rect x="250" y="320" width="140" height="40" fill="#1e3a1e" stroke="#66bb6a" stroke-width="1" rx="4"/>
  <text x="320" y="338" fill="#66bb6a" font-size="10" text-anchor="middle" font-family="sans-serif">谷間の回復</text>
  <text x="320" y="353" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">ボス後は簡単ゾーン</text>
  <rect x="410" y="320" width="140" height="40" fill="#1e3a1e" stroke="#66bb6a" stroke-width="1" rx="4"/>
  <text x="480" y="338" fill="#66bb6a" font-size="10" text-anchor="middle" font-family="sans-serif">適切な達成感</text>
  <text x="480" y="353" fill="#a0a0c0" font-size="9" text-anchor="middle" font-family="sans-serif">難所をクリアしたら報酬</text>
</svg>