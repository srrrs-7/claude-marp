<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="370" fill="#1a1a2e"/>
  <text x="400" y="30" fill="#ffffff" font-size="17" font-family="sans-serif" text-anchor="middle" font-weight="bold">Activity ≠ Progress — 活動と進捗の違い</text>
  <!-- Left: Activity -->
  <rect x="40" y="55" width="320" height="260" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="200" y="88" fill="#e91e63" font-size="15" font-family="sans-serif" text-anchor="middle" font-weight="bold">高活動・低進捗</text>
  <text x="200" y="118" fill="#ffffff" font-size="12" font-family="sans-serif" text-anchor="middle">1日10ミーティング</text>
  <text x="200" y="140" fill="#ffffff" font-size="12" font-family="sans-serif" text-anchor="middle">Slackに即レス</text>
  <text x="200" y="162" fill="#ffffff" font-size="12" font-family="sans-serif" text-anchor="middle">バグを次々修正</text>
  <text x="200" y="184" fill="#ffffff" font-size="12" font-family="sans-serif" text-anchor="middle">PR 20件レビュー</text>
  <text x="200" y="214" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">「忙しい」= 価値ではない</text>
  <text x="200" y="234" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">文脈切り替えコストが高い</text>
  <text x="200" y="280" fill="#e91e63" font-size="28" font-family="sans-serif" text-anchor="middle">🔄</text>
  <!-- Right: Progress -->
  <rect x="440" y="55" width="320" height="260" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2.5"/>
  <text x="600" y="88" fill="#f9a825" font-size="15" font-family="sans-serif" text-anchor="middle" font-weight="bold">低活動・高進捗</text>
  <text x="600" y="118" fill="#ffffff" font-size="12" font-family="sans-serif" text-anchor="middle">4時間の深い集中</text>
  <text x="600" y="140" fill="#ffffff" font-size="12" font-family="sans-serif" text-anchor="middle">設計ドキュメント作成</text>
  <text x="600" y="162" fill="#ffffff" font-size="12" font-family="sans-serif" text-anchor="middle">根本原因の分析</text>
  <text x="600" y="184" fill="#ffffff" font-size="12" font-family="sans-serif" text-anchor="middle">複雑な機能の実装</text>
  <text x="600" y="214" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">「成果」= 実際の価値創出</text>
  <text x="600" y="234" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">フロー状態が生産性を決める</text>
  <text x="600" y="280" fill="#f9a825" font-size="28" font-family="sans-serif" text-anchor="middle">🎯</text>
  <text x="400" y="345" fill="#888888" font-size="11" font-family="sans-serif" text-anchor="middle">「忙しさで自分の価値を測る」罠から抜け出す</text>
</svg>