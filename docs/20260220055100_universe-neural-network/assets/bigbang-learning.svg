<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="340" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">ビッグバン = 学習の開始（Vitelli仮説）</text>
  <!-- Timeline arrow -->
  <line x1="60" y1="170" x2="720" y2="170" stroke="#555" stroke-width="3"/>
  <polygon points="720,162 736,170 720,178" fill="#555"/>
  <text x="750" y="174" font-family="sans-serif" font-size="12" fill="#aaa">時間</text>
  <!-- Event 1: Big Bang -->
  <circle cx="120" cy="170" r="18" fill="#e91e63"/>
  <text x="120" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e91e63" font-weight="bold">ビッグバン</text>
  <text x="120" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">ランダム重み</text>
  <text x="120" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">学習開始</text>
  <text x="120" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">138億年前</text>
  <!-- Event 2: Structure formation -->
  <circle cx="300" cy="170" r="14" fill="#f9a825"/>
  <text x="300" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f9a825" font-weight="bold">構造形成</text>
  <text x="300" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">勾配降下</text>
  <text x="300" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">〜10億年後</text>
  <!-- Event 3: Galaxy clusters -->
  <circle cx="480" cy="170" r="14" fill="#4ec9b0"/>
  <text x="480" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4ec9b0" font-weight="bold">銀河団形成</text>
  <text x="480" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">重みの収束</text>
  <text x="480" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">〜50億年後</text>
  <!-- Event 4: Present -->
  <circle cx="660" cy="170" r="14" fill="#9c27b0"/>
  <text x="660" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9c27b0" font-weight="bold">現在</text>
  <text x="660" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">最適化された</text>
  <text x="660" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">物理法則</text>
  <text x="660" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">現在</text>
  <!-- Bottom summary -->
  <rect x="100" y="240" width="600" height="74" rx="8" fill="#16213e"/>
  <text x="400" y="262" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">損失関数 = ハミルトニアン | エポック = 138億年</text>
  <text x="400" y="282" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">学習率 = 宇宙膨張速度 | 重み = 物理定数</text>
  <text x="400" y="302" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f9a825" font-weight="bold">宇宙全体が1つの巨大ニューラルネットワーク</text>
</svg>