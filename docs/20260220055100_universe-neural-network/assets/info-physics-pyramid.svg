<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">情報は物理の根本か？</text>
  <!-- Pyramid of reality -->
  <!-- Base: Information -->
  <polygon points="150,320 650,320 560,230 240,230" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="285" fill="#f9a825" font-size="15" text-anchor="middle" font-weight="bold" font-family="sans-serif">情報（Information）</text>
  <text x="400" y="308" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">It from Bit — ジョン・ホイーラー</text>
  <!-- Middle: Physical laws -->
  <polygon points="240,230 560,230 490,150 310,150" fill="#1e2d4e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="400" y="200" fill="#4fc3f7" font-size="14" text-anchor="middle" font-weight="bold" font-family="sans-serif">物理法則</text>
  <text x="400" y="220" fill="#a0a0c0" font-size="10" text-anchor="middle" font-family="sans-serif">時空・重力・電磁気</text>
  <!-- Top: Matter/Energy -->
  <polygon points="310,150 490,150 440,80 360,80" fill="#2a1a2e" stroke="#e91e63" stroke-width="2"/>
  <text x="400" y="125" fill="#e91e63" font-size="13" text-anchor="middle" font-weight="bold" font-family="sans-serif">物質・エネルギー</text>
  <!-- Apex -->
  <polygon points="360,80 440,80 400,35" fill="#3a0a1e" stroke="#ab47bc" stroke-width="2"/>
  <text x="400" y="67" fill="#ab47bc" font-size="10" text-anchor="middle" font-family="sans-serif">意識？</text>
  <!-- Arrow up on right -->
  <line x1="690" y1="310" x2="690" y2="90" stroke="#66bb6a" stroke-width="2"/>
  <polygon points="684,90 696,90 690,70" fill="#66bb6a"/>
  <text x="720" y="200" fill="#66bb6a" font-size="12" text-anchor="middle" font-family="sans-serif" transform="rotate(90,720,200)">創発レベル</text>
  <!-- Note -->
  <text x="400" y="360" fill="#a0a0c0" font-size="12" text-anchor="middle" font-family="sans-serif">宇宙の構造が情報処理なら、物理法則は「コード」かもしれない</text>
</svg>