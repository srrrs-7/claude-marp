<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">もし本当なら：各分野への影響</text>
  <!-- 6 domains in grid -->
  <rect x="30" y="48" width="220" height="90" rx="8" fill="#16213e" stroke="#4ec9b0" stroke-width="2"/>
  <text x="140" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4ec9b0" font-weight="bold">物理学</text>
  <text x="140" y="94" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">全ての力の統一が</text>
  <text x="140" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">ネットワーク構造から</text>
  <text x="140" y="126" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">自然に導出される</text>
  <rect x="290" y="48" width="220" height="90" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="400" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">AI研究</text>
  <text x="400" y="94" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">物理法則から効率的な</text>
  <text x="400" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">アーキテクチャの</text>
  <text x="400" y="126" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">ヒントを得る</text>
  <rect x="550" y="48" width="220" height="90" rx="8" fill="#16213e" stroke="#9c27b0" stroke-width="2"/>
  <text x="660" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9c27b0" font-weight="bold">哲学</text>
  <text x="660" y="94" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">意識・自由意志に</text>
  <text x="660" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">対する新しい</text>
  <text x="660" y="126" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">枠組みが生まれる</text>
  <rect x="30" y="156" width="220" height="90" rx="8" fill="#16213e" stroke="#ff9800" stroke-width="2"/>
  <text x="140" y="182" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ff9800" font-weight="bold">数学</text>
  <text x="140" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">なぜ数学が自然を</text>
  <text x="140" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">記述できるかへの</text>
  <text x="140" y="234" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">回答（不合理な有効性）</text>
  <rect x="290" y="156" width="220" height="90" rx="8" fill="#16213e" stroke="#4ec9b0" stroke-width="2"/>
  <text x="400" y="182" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4ec9b0" font-weight="bold">宇宙論</text>
  <text x="400" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">物理定数の微調整問題に</text>
  <text x="400" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">自然な説明が</text>
  <text x="400" y="234" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">生まれる</text>
  <rect x="550" y="156" width="220" height="90" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="660" y="182" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">宇宙の意味</text>
  <text x="660" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">我々は宇宙NNの</text>
  <text x="660" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">中の計算プロセス</text>
  <text x="660" y="234" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">なのか？</text>
  <!-- Bottom question -->
  <rect x="100" y="264" width="600" height="70" rx="8" fill="#0d1b2a" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="292" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#f9a825" font-weight="bold">最も深い問い</text>
  <text x="400" y="316" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">我々は宇宙を理解するために、宇宙が使う言語（NN）を再発明したのか？</text>
</svg>