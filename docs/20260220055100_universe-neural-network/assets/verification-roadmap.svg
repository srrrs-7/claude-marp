<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">仮説の検証ロードマップ</text>
  <!-- Timeline line -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#555" stroke-width="3"/>
  <!-- Stage 1: Analogy -->
  <circle cx="160" cy="200" r="16" fill="#e91e63"/>
  <polygon points="160,178 168,194 152,194" fill="#e91e63"/>
  <text x="160" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff" font-weight="bold">段階 1</text>
  <text x="160" y="145" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e91e63">形態的類似</text>
  <text x="160" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">2020年</text>
  <text x="160" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Bologna研究</text>
  <!-- Stage 2: Mathematical -->
  <circle cx="320" cy="200" r="16" fill="#f9a825"/>
  <polygon points="320,178 328,194 312,194" fill="#f9a825"/>
  <text x="320" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff" font-weight="bold">段階 2</text>
  <text x="320" y="145" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f9a825">数学的形式化</text>
  <text x="320" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">2020年</text>
  <text x="320" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">Vitelli仮説</text>
  <!-- Stage 3: Prediction -->
  <circle cx="480" cy="200" r="16" fill="#4ec9b0"/>
  <polygon points="480,178 488,194 472,194" fill="#4ec9b0"/>
  <text x="480" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff" font-weight="bold">段階 3</text>
  <text x="480" y="145" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4ec9b0">具体的予測</text>
  <text x="480" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">進行中</text>
  <text x="480" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">相転移・物理定数</text>
  <!-- Stage 4: Experiment -->
  <circle cx="640" cy="200" r="16" fill="#555" stroke="#9c27b0" stroke-width="2"/>
  <polygon points="640,178 648,194 632,194" fill="#555"/>
  <text x="640" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9c27b0" font-weight="bold">段階 4</text>
  <text x="640" y="145" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9c27b0">実験的検証</text>
  <text x="640" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">未来</text>
  <text x="640" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">量子重力と</text>
  <text x="640" y="274" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">NN構造の一致</text>
  <!-- Bottom status bar -->
  <rect x="60" y="316" width="680" height="48" rx="8" fill="#0d1b2a"/>
  <text x="400" y="338" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ffffff">現在地：段階2〜3　批判：反証可能性・数学的形式の一致≠物理的同一</text>
  <text x="400" y="356" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f9a825" font-weight="bold">「刺激的な仮説」として、検証は始まったばかり</text>
</svg>