<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">構造的類似性の発見</text>
  <!-- Left: cosmic web -->
  <text x="195" y="68" fill="#4fc3f7" font-size="16" text-anchor="middle" font-weight="bold" font-family="sans-serif">宇宙の大規模構造</text>
  <!-- Cosmic web nodes -->
  <circle cx="120" cy="120" r="8" fill="#f9a825"/>
  <circle cx="200" cy="95" r="12" fill="#f9a825"/>
  <circle cx="160" cy="185" r="6" fill="#f9a825"/>
  <circle cx="260" cy="150" r="10" fill="#f9a825"/>
  <circle cx="80" cy="210" r="7" fill="#f9a825"/>
  <circle cx="190" cy="255" r="9" fill="#f9a825"/>
  <circle cx="290" cy="230" r="6" fill="#f9a825"/>
  <circle cx="130" cy="285" r="5" fill="#f9a825"/>
  <!-- Cosmic filaments -->
  <line x1="120" y1="120" x2="200" y2="95" stroke="#4fc3f7" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="95" x2="260" y2="150" stroke="#4fc3f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="120" y1="120" x2="160" y2="185" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="185" x2="260" y2="150" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="210" x2="160" y2="185" stroke="#4fc3f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="210" x2="190" y2="255" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <line x1="190" y1="255" x2="290" y2="230" stroke="#4fc3f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="130" y1="285" x2="190" y2="255" stroke="#4fc3f7" stroke-width="1" opacity="0.5"/>
  <text x="185" y="330" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">銀河がフィラメントで繋がる</text>
  <!-- Middle: equals -->
  <text x="400" y="200" fill="#e91e63" font-size="36" text-anchor="middle" font-family="sans-serif">≈</text>
  <text x="400" y="230" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">統計的類似度 0.97</text>
  <!-- Right: neural network -->
  <text x="605" y="68" fill="#e91e63" font-size="16" text-anchor="middle" font-weight="bold" font-family="sans-serif">ニューラルネットワーク</text>
  <!-- Neural nodes -->
  <circle cx="530" cy="120" r="8" fill="#e91e63"/>
  <circle cx="610" cy="95" r="12" fill="#e91e63"/>
  <circle cx="570" cy="185" r="6" fill="#e91e63"/>
  <circle cx="670" cy="150" r="10" fill="#e91e63"/>
  <circle cx="490" cy="210" r="7" fill="#e91e63"/>
  <circle cx="600" cy="255" r="9" fill="#e91e63"/>
  <circle cx="700" cy="230" r="6" fill="#e91e63"/>
  <circle cx="540" cy="285" r="5" fill="#e91e63"/>
  <!-- Neural connections -->
  <line x1="530" y1="120" x2="610" y2="95" stroke="#e91e63" stroke-width="2" opacity="0.7"/>
  <line x1="610" y1="95" x2="670" y2="150" stroke="#e91e63" stroke-width="1.5" opacity="0.6"/>
  <line x1="530" y1="120" x2="570" y2="185" stroke="#e91e63" stroke-width="1" opacity="0.5"/>
  <line x1="570" y1="185" x2="670" y2="150" stroke="#e91e63" stroke-width="1" opacity="0.5"/>
  <line x1="490" y1="210" x2="570" y2="185" stroke="#e91e63" stroke-width="1.5" opacity="0.6"/>
  <line x1="490" y1="210" x2="600" y2="255" stroke="#e91e63" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="255" x2="700" y2="230" stroke="#e91e63" stroke-width="1.5" opacity="0.6"/>
  <line x1="540" y1="285" x2="600" y2="255" stroke="#e91e63" stroke-width="1" opacity="0.5"/>
  <text x="595" y="330" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">ニューロンがシナプスで繋がる</text>
</svg>