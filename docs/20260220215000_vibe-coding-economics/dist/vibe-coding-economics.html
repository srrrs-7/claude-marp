<li><svg viewBox="0 0 800 360" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="360" fill="#1a1a2e" /><text x="400" y="28" text-anchor="middle" fill="#f9a825" font-size="16" font-weight="bold" font-family="sans-serif">バイブコーディングとは：3つのコア特性</text><rect x="40" y="50" width="220" height="280" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><text x="150" y="75" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold" font-family="sans-serif">①自然言語で指示</text><rect x="58" y="90" width="184" height="52" rx="6" fill="#1a1a2e" /><text x="150" y="112" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">「ログイン画面を作って」</text><text x="150" y="130" text-anchor="middle" fill="#aaaaaa" font-size="10" font-family="sans-serif">→ AIがコード生成</text><rect x="58" y="150" width="184" height="52" rx="6" fill="#1a1a2e" /><text x="150" y="172" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">技術詳細を省略できる</text><text x="150" y="190" text-anchor="middle" fill="#aaaaaa" font-size="10" font-family="sans-serif">非エンジニアも参加可能に</text><rect x="58" y="215" width="184" height="100" rx="6" fill="#f9a825" fill-opacity="0.15" /><text x="150" y="238" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold" font-family="sans-serif">意図を伝える能力が</text><text x="150" y="256" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold" font-family="sans-serif">主要スキルになる</text><rect x="290" y="50" width="220" height="280" rx="10" fill="#16213e" stroke="#e91e63" stroke-width="2" /><text x="400" y="75" text-anchor="middle" fill="#e91e63" font-size="13" font-weight="bold" font-family="sans-serif">②反復が高速</text><rect x="308" y="90" width="184" height="52" rx="6" fill="#1a1a2e" /><text x="400" y="112" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">見て→フィードバック</text><text x="400" y="130" text-anchor="middle" fill="#aaaaaa" font-size="10" font-family="sans-serif">→ すぐ修正のサイクル</text><rect x="308" y="150" width="184" height="52" rx="6" fill="#1a1a2e" /><text x="400" y="172" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">プロトタイプが数分で完成</text><text x="400" y="190" text-anchor="middle" fill="#aaaaaa" font-size="10" font-family="sans-serif">従来比10-100x速い</text><rect x="308" y="215" width="184" height="100" rx="6" fill="#e91e63" fill-opacity="0.15" /><text x="400" y="238" text-anchor="middle" fill="#e91e63" font-size="11" font-weight="bold" font-family="sans-serif">動くものを見ながら</text><text x="400" y="256" text-anchor="middle" fill="#e91e63" font-size="11" font-weight="bold" font-family="sans-serif">考えられる</text><rect x="540" y="50" width="220" height="280" rx="10" fill="#16213e" stroke="#f9a825" stroke-width="2" /><text x="650" y="75" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold" font-family="sans-serif">③コードを「信頼」する</text><rect x="558" y="90" width="184" height="52" rx="6" fill="#1a1a2e" /><text x="650" y="112" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">細部を読まずに受け入れる</text><text x="650" y="130" text-anchor="middle" fill="#aaaaaa" font-size="10" font-family="sans-serif">動けば良い判断基準</text><rect x="558" y="150" width="184" height="52" rx="6" fill="#1a1a2e" /><text x="650" y="172" text-anchor="middle" fill="#ffffff" font-size="11" font-family="sans-serif">エラーも「AIに修正させる」</text><text x="650" y="190" text-anchor="middle" fill="#aaaaaa" font-size="10" font-family="sans-serif">デバッグも自然言語で</text><rect x="558" y="215" width="184" height="100" rx="6" fill="#f9a825" fill-opacity="0.15" /><text x="650" y="238" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold" font-family="sans-serif">理解よりも</text><text x="650" y="256" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold" font-family="sans-serif">実現速度を優先</text></svg></li>

ht="170" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="1.5" /><text x="590" y="188" text-anchor="middle" fill="#e91e63" font-size="13" font-weight="bold" font-family="sans-serif">何が変わったのか</text><rect x="438" y="200" width="304" height="36" rx="5" fill="#1a1a2e" /><text x="590" y="223" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">従来：コードを書いて動かす</text><text x="590" y="239" text-anchor="middle" fill="#aaaaaa" font-size="11" font-family="sans-serif">→ 手を動かすことが価値</text><rect x="438" y="244" width="304" height="36" rx="5" fill="#1a1a2e" /><text x="590" y="267" text-anchor="middle" fill="#ffffff" font-size="12" font-family="sans-serif">新：意図を伝えて動かす</text><text x="590" y="283" text-anchor="middle" fill="#f9a825" font-size="11" font-family="sans-serif">→ 意図を明確にすることが価値</text></svg><br />
