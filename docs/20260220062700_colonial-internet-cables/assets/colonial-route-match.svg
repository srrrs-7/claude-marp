<svg viewBox="0 0 800 400" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">植民地ルートとの一致 — 歴史が繰り返される理由</text>
  <!-- Key table showing matching -->
  <rect x="20" y="48" width="760" height="40" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="160" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9a825">1870年代 電信ルート</text>
  <text x="400" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">一致点</text>
  <text x="640" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">現代の光ファイバールート</text>
  <!-- Row 1 -->
  <rect x="20" y="100" width="350" height="52" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1" opacity="0.7"/>
  <text x="195" y="122" text-anchor="middle" font-size="12" fill="#e91e63">英国 → インド（カラチ経由）</text>
  <text x="195" y="140" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">インド洋を縦断</text>
  <text x="400" y="128" text-anchor="middle" font-size="20" fill="#f9a825">≈</text>
  <rect x="430" y="100" width="350" height="52" rx="6" fill="#16213e" stroke="#4caf50" stroke-width="1"/>
  <text x="605" y="122" text-anchor="middle" font-size="12" fill="#4caf50">FLAG / SEA-ME-WE ケーブル</text>
  <text x="605" y="140" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">ほぼ同じルートを通過</text>
  <!-- Row 2 -->
  <rect x="20" y="165" width="350" height="52" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1" opacity="0.7"/>
  <text x="195" y="187" text-anchor="middle" font-size="12" fill="#e91e63">英国 → 西アフリカ沿岸</text>
  <text x="195" y="205" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">大西洋岸を南下</text>
  <text x="400" y="193" text-anchor="middle" font-size="20" fill="#f9a825">≈</text>
  <rect x="430" y="165" width="350" height="52" rx="6" fill="#16213e" stroke="#4caf50" stroke-width="1"/>
  <text x="605" y="187" text-anchor="middle" font-size="12" fill="#4caf50">ACE / SAT3 ケーブル</text>
  <text x="605" y="205" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">植民地港湾都市に着地点</text>
  <!-- Row 3 -->
  <rect x="20" y="230" width="350" height="52" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1" opacity="0.7"/>
  <text x="195" y="252" text-anchor="middle" font-size="12" fill="#e91e63">香港・シンガポール中継</text>
  <text x="195" y="270" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">東南アジアの英国拠点</text>
  <text x="400" y="258" text-anchor="middle" font-size="20" fill="#f9a825">≈</text>
  <rect x="430" y="230" width="350" height="52" rx="6" fill="#16213e" stroke="#4caf50" stroke-width="1"/>
  <text x="605" y="252" text-anchor="middle" font-size="12" fill="#4caf50">現代のケーブル中継点</text>
  <text x="605" y="270" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">同じ場所がハブのまま</text>
  <!-- Why section -->
  <rect x="20" y="300" width="760" height="84" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="400" y="323" text-anchor="middle" font-size="13" fill="#f9a825">なぜルートが一致するのか</text>
  <rect x="40" y="335" width="220" height="42" rx="6" fill="#1a1a2e"/>
  <text x="150" y="355" text-anchor="middle" font-size="11" fill="#ffffff">地形的制約</text>
  <text x="150" y="370" text-anchor="middle" font-size="10" fill="#f9a825">海峡・陸路が同じ</text>
  <rect x="290" y="335" width="220" height="42" rx="6" fill="#1a1a2e"/>
  <text x="400" y="355" text-anchor="middle" font-size="11" fill="#ffffff">既存インフラへの依存</text>
  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#f9a825">着地点・中継所が既にある</text>
  <rect x="540" y="335" width="220" height="42" rx="6" fill="#1a1a2e"/>
  <text x="650" y="355" text-anchor="middle" font-size="11" fill="#ffffff">権力構造の継続</text>
  <text x="650" y="370" text-anchor="middle" font-size="10" fill="#f9a825">同じ国・企業が運営</text>
</svg>
