  <text x="404" y="173" text-anchor="middle" font-size="11" fill="#a78bfa" font-family="sans-serif">SLO策定済み</text>
  <text x="404" y="191" text-anchor="middle" font-size="11" fill="#a78bfa" font-family="sans-serif">Policy as Code</text>
