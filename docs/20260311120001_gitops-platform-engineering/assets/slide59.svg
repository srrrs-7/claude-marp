  <text x="556" y="255" text-anchor="middle" font-size="10" fill="#34d399" font-family="sans-serif">目標:</text>
  <text x="556" y="273" text-anchor="middle" font-size="10" fill="#34d399" font-family="sans-serif">開発者満足度↑</text>

