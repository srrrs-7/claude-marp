<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#f9a825">Walkability指標の再定義</text>
  <!-- Traditional column -->
  <rect x="60" y="55" width="300" height="44" rx="8" fill="#16213e" stroke="#ffffff" stroke-width="1.5"/>
  <text x="210" y="82" text-anchor="middle" font-size="14" fill="#ffffff">従来の指標</text>
  <!-- AR column -->
  <rect x="440" y="55" width="300" height="44" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="590" y="82" text-anchor="middle" font-size="14" fill="#f9a825">AR時代の指標</text>
  <!-- Center arrow -->
  <polygon points="380,75 420,65 420,85" fill="#e91e63"/>
  <line x1="360" y1="75" x2="380" y2="75" stroke="#e91e63" stroke-width="2"/>
  <!-- Traditional items -->
  <rect x="70" y="115" width="280" height="36" rx="6" fill="#16213e" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <text x="210" y="138" text-anchor="middle" font-size="12" fill="#ffffff">歩道幅・段差</text>
  <rect x="70" y="160" width="280" height="36" rx="6" fill="#16213e" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <text x="210" y="183" text-anchor="middle" font-size="12" fill="#ffffff">信号タイミング</text>
  <rect x="70" y="205" width="280" height="36" rx="6" fill="#16213e" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <text x="210" y="228" text-anchor="middle" font-size="12" fill="#ffffff">バリアフリー設計</text>
  <rect x="70" y="250" width="280" height="36" rx="6" fill="#16213e" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <text x="210" y="273" text-anchor="middle" font-size="12" fill="#ffffff">目的地への距離</text>
  <!-- AR items -->
  <rect x="450" y="115" width="280" height="36" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="590" y="138" text-anchor="middle" font-size="12" fill="#f9a825">デジタルランドマーク密度</text>
  <rect x="450" y="160" width="280" height="36" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="590" y="183" text-anchor="middle" font-size="12" fill="#f9a825">注意力分散リスク指標</text>
  <rect x="450" y="205" width="280" height="36" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="1.5"/>
  <text x="590" y="228" text-anchor="middle" font-size="12" fill="#f9a825">AR集客ポイント設計</text>
  <rect x="450" y="250" width="280" height="36" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="1.5"/>
  <text x="590" y="273" text-anchor="middle" font-size="12" fill="#e91e63">+ 歩きスマホ安全設計</text>
  <!-- New metric box -->
  <rect x="150" y="308" width="500" height="44" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="327" text-anchor="middle" font-size="13" fill="#f9a825">新提案：Digital Walkability Index</text>
  <text x="400" y="345" text-anchor="middle" font-size="11" fill="#ffffff">物理空間 × デジタルレイヤーの統合設計指標</text>
</svg>
