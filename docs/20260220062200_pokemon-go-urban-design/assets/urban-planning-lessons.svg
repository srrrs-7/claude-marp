<svg viewBox="0 0 800 400" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#1a1a2e" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f9a825">都市計画への示唆 — 見落としていた視点</text>
  <!-- 4 lesson cards -->
  <rect x="20" y="50" width="178" height="200" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="109" y="78" text-anchor="middle" font-size="25" fill="#f9a825">1</text>
  <text x="109" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9a825">インセンティブの力</text>
  <text x="109" y="122" text-anchor="middle" font-size="11" fill="#ffffff">命令ではなく</text>
  <text x="109" y="139" text-anchor="middle" font-size="11" fill="#ffffff">楽しさで人を動かす</text>
  <text x="109" y="166" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">罰金 → 歩かない</text>
  <text x="109" y="182" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">ゲーム → 歩きたい</text>
  <text x="109" y="208" text-anchor="middle" font-size="10" fill="#f9a825">楽しい街歩きの</text>
  <text x="109" y="223" text-anchor="middle" font-size="10" fill="#f9a825">設計へ</text>
  <rect x="210" y="50" width="178" height="200" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="299" y="78" text-anchor="middle" font-size="25" fill="#e91e63">2</text>
  <text x="299" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#e91e63">見えない場所の発見</text>
  <text x="299" y="122" text-anchor="middle" font-size="11" fill="#ffffff">普段素通りする</text>
  <text x="299" y="139" text-anchor="middle" font-size="11" fill="#ffffff">場所に人が集まる</text>
  <text x="299" y="166" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">公園・史跡・小道</text>
  <text x="299" y="182" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">が「発見」される</text>
  <text x="299" y="208" text-anchor="middle" font-size="10" fill="#e91e63">デジタル地図が</text>
  <text x="299" y="223" text-anchor="middle" font-size="10" fill="#e91e63">物理的価値を再発見</text>
  <rect x="400" y="50" width="178" height="200" rx="8" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="489" y="78" text-anchor="middle" font-size="25" fill="#4caf50">3</text>
  <text x="489" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">夜間・悪天候の課題</text>
  <text x="489" y="122" text-anchor="middle" font-size="11" fill="#ffffff">ゲームで人は来た</text>
  <text x="489" y="139" text-anchor="middle" font-size="11" fill="#ffffff">でも安全・快適?</text>
  <text x="489" y="166" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">暗い公園・</text>
  <text x="489" y="182" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">雨天での歩行</text>
  <text x="489" y="208" text-anchor="middle" font-size="10" fill="#4caf50">デジタル誘致後の</text>
  <text x="489" y="223" text-anchor="middle" font-size="10" fill="#4caf50">物理整備が必要</text>
  <rect x="590" y="50" width="190" height="200" rx="8" fill="#16213e" stroke="#4caf50" stroke-width="2"/>
  <text x="685" y="78" text-anchor="middle" font-size="25" fill="#4caf50">4</text>
  <text x="685" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">一時的 vs 持続的</text>
  <text x="685" y="122" text-anchor="middle" font-size="11" fill="#ffffff">イベントで人は来る</text>
  <text x="685" y="139" text-anchor="middle" font-size="11" fill="#ffffff">その後どうなる?</text>
  <text x="685" y="166" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">熱狂→日常への</text>
  <text x="685" y="182" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">定着設計が鍵</text>
  <text x="685" y="208" text-anchor="middle" font-size="10" fill="#4caf50">継続的なコンテンツ</text>
  <text x="685" y="223" text-anchor="middle" font-size="10" fill="#4caf50">更新が必要</text>
  <!-- New paradigm -->
  <rect x="20" y="265" width="760" height="120" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-size="14" fill="#f9a825">新しい都市計画パラダイム</text>
  <rect x="40" y="305" width="220" height="65" rx="6" fill="#1a1a2e"/>
  <text x="150" y="325" text-anchor="middle" font-size="12" fill="#ffffff">物理空間の設計</text>
  <text x="150" y="345" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.7">+</text>
  <text x="150" y="360" text-anchor="middle" font-size="12" fill="#f9a825">デジタル体験の設計</text>
  <text x="290" y="345" text-anchor="middle" font-size="24" fill="#f9a825">=</text>
  <rect x="320" y="305" width="440" height="65" rx="6" fill="#1a1a2e" stroke="#4caf50" stroke-width="1"/>
  <text x="540" y="325" text-anchor="middle" font-size="12" fill="#4caf50">Phygital（物理×デジタル）都市空間</text>
  <text x="540" y="345" text-anchor="middle" font-size="11" fill="#ffffff">AR・位置情報・SNSが都市体験を拡張する</text>
  <text x="540" y="362" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.6">次世代の都市計画者はデジタルも設計する</text>
</svg>
