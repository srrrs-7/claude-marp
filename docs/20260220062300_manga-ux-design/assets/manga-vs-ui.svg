<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">マンガ = 紙の上のUXデザイン</text>
  <!-- Left: Manga panel layout -->
  <rect x="40" y="50" width="330" height="300" rx="8" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="205" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f9a825" font-weight="bold">マンガページ</text>
  <!-- Manga panels - simulated panel layout -->
  <rect x="60" y="86" width="140" height="90" rx="3" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="130" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">大ゴマ</text>
  <text x="130" y="135" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">（重要シーン）</text>
  <text x="130" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">視線を引く</text>
  <rect x="210" y="86" width="140" height="40" rx="3" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="280" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">小コマ × 2</text>
  <rect x="210" y="136" width="65" height="40" rx="3" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <rect x="285" y="136" width="65" height="40" rx="3" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <rect x="60" y="186" width="290" height="50" rx="3" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="205" y="215" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">見開き（WOWモーメント）</text>
  <rect x="60" y="246" width="290" height="80" rx="3" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="205" y="278" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">ガター（コマ間の余白）</text>
  <text x="205" y="294" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">→ 読者が時間経過を</text>
  <text x="205" y="310" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">　 脳内補完する</text>
  <!-- Right: UI layout -->
  <rect x="430" y="50" width="330" height="300" rx="8" fill="#16213e" stroke="#e91e63" stroke-width="2"/>
  <text x="595" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">UIデザイン</text>
  <!-- UI elements -->
  <rect x="450" y="86" width="290" height="50" rx="4" fill="#0d1b2a" stroke="#e91e63" stroke-width="1"/>
  <text x="595" y="107" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ff8080">ヒーロー画像</text>
  <text x="595" y="122" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">（メインメッセージ）大</text>
  <rect x="450" y="146" width="140" height="60" rx="4" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="520" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">カードA</text>
  <text x="520" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">補助情報</text>
  <rect x="600" y="146" width="140" height="60" rx="4" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="670" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">カードB</text>
  <text x="670" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">補助情報</text>
  <rect x="450" y="216" width="290" height="34" rx="4" fill="#e91e63" opacity="0.8"/>
  <text x="595" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">フルスクリーンCTA（見開き相当）</text>
  <rect x="450" y="260" width="290" height="70" rx="4" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="595" y="288" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">ホワイトスペース（ガター相当）</text>
  <text x="595" y="304" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">→ ユーザーが文脈を</text>
  <text x="595" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">　 理解する間</text>
  <!-- Bridge arrow -->
  <line x1="372" y1="200" x2="428" y2="200" stroke="#f9a825" stroke-width="2"/>
  <polygon points="428,194 440,200 428,206" fill="#f9a825"/>
  <text x="400" y="194" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f9a825">対応</text>
</svg>