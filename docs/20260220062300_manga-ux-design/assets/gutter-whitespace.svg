<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">ガターとホワイトスペース：「間」の設計</text>
  <!-- Left: Manga gutter -->
  <rect x="40" y="50" width="330" height="280" rx="8" fill="#16213e"/>
  <text x="205" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f9a825" font-weight="bold">マンガのガター</text>
  <!-- Panel A -->
  <rect x="60" y="86" width="135" height="90" rx="4" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="127" y="126" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">シーン A</text>
  <text x="127" y="144" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">（日常）</text>
  <!-- Gutter between panels -->
  <rect x="205" y="86" width="20" height="90" fill="#f9a825" opacity="0.15"/>
  <text x="215" y="134" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f9a825">ガター</text>
  <!-- Panel B -->
  <rect x="235" y="86" width="135" height="90" rx="4" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="302" y="126" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">シーン B</text>
  <text x="302" y="144" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">（翌日）</text>
  <!-- Gutter label -->
  <line x1="60" y1="195" x2="370" y2="195" stroke="#555" stroke-width="1" stroke-dasharray="3"/>
  <rect x="80" y="208" width="260" height="48" rx="5" fill="#0d1b2a"/>
  <text x="210" y="226" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">読者がガターで時間経過を補完</text>
  <text x="210" y="242" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4ec9b0">= Scott McCloud「クロージャー」</text>
  <!-- Bottom analysis -->
  <rect x="60" y="268" width="260" height="44" rx="5" fill="#0d1b2a"/>
  <text x="190" y="284" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825">「何もない」ではなく</text>
  <text x="190" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825">「意味がある」</text>
  <!-- Right: UI white space -->
  <rect x="430" y="50" width="330" height="280" rx="8" fill="#16213e"/>
  <text x="595" y="74" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">UIのホワイトスペース</text>
  <!-- Step indicators -->
  <circle cx="490" cy="120" r="18" fill="#4ec9b0"/>
  <text x="490" y="126" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">1</text>
  <!-- Gutter in UI -->
  <rect x="510" y="112" width="40" height="16" fill="#e91e63" opacity="0.15"/>
  <text x="530" y="123" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e91e63">間</text>
  <circle cx="552" cy="120" r="18" fill="#16213e" stroke="#aaa" stroke-width="2"/>
  <text x="552" y="126" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#aaa" font-weight="bold">2</text>
  <rect x="572" y="112" width="40" height="16" fill="#e91e63" opacity="0.15"/>
  <text x="592" y="123" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e91e63">間</text>
  <circle cx="614" cy="120" r="18" fill="#16213e" stroke="#aaa" stroke-width="2"/>
  <text x="614" y="126" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#aaa" font-weight="bold">3</text>
  <rect x="450" y="152" width="270" height="40" rx="5" fill="#0d1b2a"/>
  <text x="585" y="166" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">ステップインジケーター間の空白</text>
  <text x="585" y="182" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">→ 進行感を演出</text>
  <!-- Card spacing -->
  <rect x="450" y="208" width="120" height="56" rx="5" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="510" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">カード A</text>
  <rect x="590" y="208" width="120" height="56" rx="5" fill="#0d1b2a" stroke="#555" stroke-width="1"/>
  <text x="650" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">カード B</text>
  <rect x="574" y="208" width="14" height="56" fill="#e91e63" opacity="0.1"/>
  <rect x="450" y="276" width="260" height="44" rx="5" fill="#0d1b2a"/>
  <text x="580" y="292" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63">カード間スペーシング</text>
  <text x="580" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e91e63">→ 情報のチャンク化</text>
</svg>