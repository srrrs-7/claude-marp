<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" style="max-height:70vh;width:auto;display:block;margin:0 auto;letter-spacing:0">
  <rect width="800" height="360" fill="#1a1a2e"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#f9a825" font-weight="bold">手塚治虫の映画的技法 → UI/UX対応表</text>
  <!-- Headers -->
  <rect x="40" y="46" width="230" height="36" rx="6" fill="#16213e"/>
  <text x="155" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f9a825" font-weight="bold">マンガ技法</text>
  <rect x="300" y="46" width="200" height="36" rx="6" fill="#16213e"/>
  <text x="400" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#aaa" font-weight="bold">映画手法</text>
  <rect x="530" y="46" width="230" height="36" rx="6" fill="#16213e"/>
  <text x="645" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e91e63" font-weight="bold">UI/UX応用</text>
  <!-- Row 1: Pan/Zoom -->
  <rect x="40" y="96" width="230" height="48" rx="5" fill="#0d1b2a"/>
  <text x="155" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0">パン・ズーム</text>
  <text x="155" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">コマ間の拡大・移動</text>
  <line x1="270" y1="120" x2="300" y2="120" stroke="#555" stroke-width="1.5"/>
  <polygon points="296,115 308,120 296,125" fill="#555"/>
  <rect x="300" y="96" width="200" height="48" rx="5" fill="#0d1b2a"/>
  <text x="400" y="124" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#aaa">カメラワーク</text>
  <line x1="500" y1="120" x2="530" y2="120" stroke="#555" stroke-width="1.5"/>
  <polygon points="526,115 538,120 526,125" fill="#555"/>
  <rect x="530" y="96" width="230" height="48" rx="5" fill="#0d1b2a"/>
  <text x="645" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">スクロールアニメーション</text>
  <text x="645" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">視線を誘導するモーション</text>
  <!-- Row 2: Montage -->
  <rect x="40" y="158" width="230" height="48" rx="5" fill="#0d1b2a"/>
  <text x="155" y="182" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0">モンタージュ</text>
  <text x="155" y="198" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">シーンの連続で意味生成</text>
  <line x1="270" y1="182" x2="300" y2="182" stroke="#555" stroke-width="1.5"/>
  <polygon points="296,177 308,182 296,187" fill="#555"/>
  <rect x="300" y="158" width="200" height="48" rx="5" fill="#0d1b2a"/>
  <text x="400" y="186" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#aaa">編集技法</text>
  <line x1="500" y1="182" x2="530" y2="182" stroke="#555" stroke-width="1.5"/>
  <polygon points="526,177 538,182 526,187" fill="#555"/>
  <rect x="530" y="158" width="230" height="48" rx="5" fill="#0d1b2a"/>
  <text x="645" y="178" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">マルチステップウィザード</text>
  <text x="645" y="194" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">文脈を積み重ねるフロー</text>
  <!-- Row 3: Panel size control -->
  <rect x="40" y="220" width="230" height="48" rx="5" fill="#0d1b2a"/>
  <text x="155" y="244" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0">コマサイズ制御</text>
  <text x="155" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">時間の速度をコントロール</text>
  <line x1="270" y1="244" x2="300" y2="244" stroke="#555" stroke-width="1.5"/>
  <polygon points="296,239 308,244 296,249" fill="#555"/>
  <rect x="300" y="220" width="200" height="48" rx="5" fill="#0d1b2a"/>
  <text x="400" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#aaa">テンポ制御</text>
  <line x1="500" y1="244" x2="530" y2="244" stroke="#555" stroke-width="1.5"/>
  <polygon points="526,239 538,244 526,249" fill="#555"/>
  <rect x="530" y="220" width="230" height="48" rx="5" fill="#0d1b2a"/>
  <text x="645" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">プログレッシブディスクロージャー</text>
  <text x="645" y="256" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">段階的な情報開示</text>
  <!-- Row 4: Spread pages -->
  <rect x="40" y="282" width="230" height="48" rx="5" fill="#0d1b2a"/>
  <text x="155" y="306" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4ec9b0">見開きページ</text>
  <text x="155" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">WOWモーメント</text>
  <line x1="270" y1="306" x2="300" y2="306" stroke="#555" stroke-width="1.5"/>
  <polygon points="296,301 308,306 296,311" fill="#555"/>
  <rect x="300" y="282" width="200" height="48" rx="5" fill="#0d1b2a"/>
  <text x="400" y="310" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#aaa">クライマックス</text>
  <line x1="500" y1="306" x2="530" y2="306" stroke="#555" stroke-width="1.5"/>
  <polygon points="526,301 538,306 526,311" fill="#555"/>
  <rect x="530" y="282" width="230" height="48" rx="5" fill="#0d1b2a"/>
  <text x="645" y="302" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff8080">フルスクリーンモーダル</text>
  <text x="645" y="318" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#aaa">重要アクション確認</text>
