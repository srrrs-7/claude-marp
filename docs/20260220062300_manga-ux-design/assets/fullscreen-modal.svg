<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <text x="400" y="35" fill="#f9a825" font-size="20" font-weight="bold" text-anchor="middle" font-family="sans-serif">「見開き」効果とUI全画面体験</text>
  <!-- Left: manga spread -->
  <rect x="30" y="55" width="330" height="230" fill="#16213e" stroke="#f9a825" stroke-width="3"/>
  <text x="195" y="80" fill="#f9a825" font-size="14" text-anchor="middle" font-family="sans-serif">マンガ見開き</text>
  <!-- drawing lines suggesting epic scene -->
  <line x1="195" y1="180" x2="60" y2="260" stroke="#e91e63" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="195" y1="180" x2="120" y2="285" stroke="#e91e63" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="195" y1="180" x2="270" y2="285" stroke="#e91e63" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="195" y1="180" x2="330" y2="260" stroke="#e91e63" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="195" cy="180" r="45" fill="none" stroke="#f9a825" stroke-width="2"/>
  <text x="195" y="186" fill="#ffffff" font-size="13" text-anchor="middle" font-family="sans-serif">クライマックス</text>
  <text x="195" y="310" fill="#a0a0c0" font-size="12" text-anchor="middle" font-family="sans-serif">ページ全体で圧倒的インパクト</text>
  <!-- Arrow -->
  <text x="400" y="185" fill="#e91e63" font-size="32" text-anchor="middle" font-family="sans-serif">↔</text>
  <!-- Right: UI full modal -->
  <rect x="440" y="55" width="330" height="230" fill="#16213e" stroke="#4fc3f7" stroke-width="3"/>
  <text x="605" y="80" fill="#4fc3f7" font-size="14" text-anchor="middle" font-family="sans-serif">UIフルスクリーンモーダル</text>
  <rect x="470" y="95" width="270" height="160" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1" rx="6"/>
  <text x="605" y="135" fill="#ffffff" font-size="13" text-anchor="middle" font-family="sans-serif">重要なアクション確認</text>
  <text x="605" y="165" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">この操作は取り消せません。</text>
  <text x="605" y="185" fill="#a0a0c0" font-size="11" text-anchor="middle" font-family="sans-serif">本当に実行しますか？</text>
  <rect x="520" y="210" width="90" height="30" fill="#e91e63" rx="4"/>
  <text x="565" y="230" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">実行する</text>
  <rect x="625" y="210" width="90" height="30" fill="#444" rx="4"/>
  <text x="670" y="230" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">キャンセル</text>
  <text x="605" y="310" fill="#a0a0c0" font-size="12" text-anchor="middle" font-family="sans-serif">注意力を集中させ意思決定を促す</text>
</svg>