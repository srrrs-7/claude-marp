<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="380" fill="#1a1a2e"/>
  <!-- Left: manga grid -->
  <text x="200" y="35" fill="#f9a825" font-size="18" font-weight="bold" text-anchor="middle" font-family="sans-serif">マンガのコマ割り</text>
  <!-- main panel -->
  <rect x="30" y="55" width="220" height="140" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <!-- bottom left panel -->
  <rect x="30" y="205" width="100" height="90" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <!-- bottom right panel -->
  <rect x="140" y="205" width="110" height="90" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <!-- top right tall -->
  <rect x="260" y="55" width="90" height="240" fill="#16213e" stroke="#f9a825" stroke-width="2"/>
  <text x="140" y="130" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">メインビジュアル</text>
  <text x="80" y="255" fill="#ffffff" font-size="10" text-anchor="middle" font-family="sans-serif">サブ1</text>
  <text x="196" y="255" fill="#ffffff" font-size="10" text-anchor="middle" font-family="sans-serif">サブ2</text>
  <text x="305" y="182" fill="#ffffff" font-size="10" text-anchor="middle" font-family="sans-serif">縦長</text>
  <!-- Arrow -->
  <text x="400" y="195" fill="#e91e63" font-size="32" text-anchor="middle" font-family="sans-serif">↔</text>
  <!-- Right: UI grid -->
  <text x="600" y="35" fill="#f9a825" font-size="18" font-weight="bold" text-anchor="middle" font-family="sans-serif">UIのグリッドシステム</text>
  <!-- Header -->
  <rect x="460" y="55" width="280" height="40" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="600" y="80" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">ナビゲーションバー</text>
  <!-- Hero -->
  <rect x="460" y="103" width="280" height="80" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="600" y="148" fill="#ffffff" font-size="12" text-anchor="middle" font-family="sans-serif">ヒーローセクション</text>
  <!-- 3 cards -->
  <rect x="460" y="191" width="84" height="60" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <rect x="552" y="191" width="84" height="60" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <rect x="644" y="191" width="96" height="60" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="502" y="226" fill="#ffffff" font-size="10" text-anchor="middle" font-family="sans-serif">カード</text>
  <text x="594" y="226" fill="#ffffff" font-size="10" text-anchor="middle" font-family="sans-serif">カード</text>
  <text x="692" y="226" fill="#ffffff" font-size="10" text-anchor="middle" font-family="sans-serif">カード</text>
  <!-- Footer -->
  <rect x="460" y="259" width="280" height="36" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="600" y="282" fill="#ffffff" font-size="11" text-anchor="middle" font-family="sans-serif">フッター</text>
  <!-- Labels -->
  <text x="400" y="330" fill="#a0a0c0" font-size="13" text-anchor="middle" font-family="sans-serif">視覚的重み付けと情報の流れは共通原則</text>
</svg>