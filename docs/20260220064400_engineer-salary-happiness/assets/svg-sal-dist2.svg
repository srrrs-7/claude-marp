<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <rect width="800" height="370" fill="#1a1a2e"/>
  <text x="400" y="28" fill="#ffffff" font-size="16" font-family="sans-serif" text-anchor="middle" font-weight="bold">日本エンジニア年収分布（2024年）</text>
  <!-- Y axis -->
  <line x1="90" y1="50" x2="90" y2="290" stroke="#aaaaaa" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="90" y1="290" x2="730" y2="290" stroke="#aaaaaa" stroke-width="1.5"/>
  <!-- X labels -->
  <text x="130" y="310" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">300</text>
  <text x="210" y="310" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">400</text>
  <text x="290" y="310" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">500</text>
  <text x="370" y="310" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">600</text>
  <text x="450" y="310" fill="#f9a825" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">700</text>
  <text x="530" y="310" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">800</text>
  <text x="610" y="310" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">900</text>
  <text x="690" y="310" fill="#aaaaaa" font-size="10" font-family="sans-serif" text-anchor="middle">1000+</text>
  <text x="400" y="330" fill="#aaaaaa" font-size="11" font-family="sans-serif" text-anchor="middle">年収（万円）</text>
  <!-- Bars (approximate distribution) -->
  <rect x="110" y="250" width="60" height="40" fill="#f9a825" opacity="0.5" rx="2"/>
  <rect x="190" y="200" width="60" height="90" fill="#f9a825" opacity="0.6" rx="2"/>
  <rect x="270" y="140" width="60" height="150" fill="#f9a825" opacity="0.75" rx="2"/>
  <rect x="350" y="110" width="60" height="180" fill="#f9a825" opacity="0.85" rx="2"/>
  <rect x="430" y="90" width="60" height="200" fill="#f9a825" stroke="#f9a825" stroke-width="2" rx="2"/>
  <rect x="510" y="140" width="60" height="150" fill="#f9a825" opacity="0.75" rx="2"/>
  <rect x="590" y="210" width="60" height="80" fill="#e91e63" opacity="0.7" rx="2"/>
  <rect x="670" y="245" width="50" height="45" fill="#e91e63" opacity="0.6" rx="2"/>
  <!-- median marker -->
  <line x1="460" y1="55" x2="460" y2="295" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="460" y="72" fill="#ffffff" font-size="11" font-family="sans-serif" text-anchor="middle">中央値 〜700万</text>
  <!-- happiness threshold -->
  <line x1="530" y1="55" x2="530" y2="295" stroke="#e91e63" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="600" y="72" fill="#e91e63" font-size="10" font-family="sans-serif">幸福度</text>
  <text x="600" y="86" fill="#e91e63" font-size="10" font-family="sans-serif">閾値帯</text>
  <text x="400" y="350" fill="#888888" font-size="10" font-family="sans-serif" text-anchor="middle">出典: doda, JISA年収調査 / 〜1,000万以上はシニア・スタートアップ・外資系</text>
</svg>