- - **BGP ASN**: お客様側の AS 番号（パブリック or プライベート ASN）

- - **BGP ピアリング IP**: /30 または /31 サブネットで指定
-   - AWS 割り当て or お客様指定（Public VIF はパブリック IP 必須）
- - **BGP MD5 認証**: オプションだが **強く推奨**

<li>Direct Connect の Private VIF と VPN の両方の終端点</li>
</ul>
</li>
<li>
<ul>
<li><strong>1つの VPC に 1つの VGW</strong> のみアタッチ可能</li>
</ul>
</li>
<li>
<ul>
<li>VGW は <strong>特定の AWS リージョンに属する</strong> リソース</li>
</ul>
</li>
<li>
<ul>
<li>ASN はデフォルト 64512 だが、<strong>カスタム ASN</strong> を指定可能</li>
</ul>
</li>
<li>
<ul>
<li>VPC のルートテーブルに <strong>ルート伝搬 (Route Propagation)</strong> を有効化する必要あり</li>
</ul>
</li>
</ul>
</section>

<h1 id="vgw-%E3%81%AE%E5%88%B6%E7%B4%84%E4%BA%8B%E9%A0%85">VGW の制約事項</h1>
<ul>
<li><svg viewBox="0 0 800 390" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="390" fill="#1a1a2e" /><br />
<text x="400" y="28" text-anchor="middle" dominant-baseline="middle" fill="#e91e63" font-size="18" font-weight="bold" font-family="sans-serif">VGW の制約事項</text><br />
<rect x="30" y="75" width="340" height="75" rx="8" fill="#2a1a2a" stroke="#f9a825" stroke-width="1.5" /><br />
<text x="200" y="103.5" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">制約 1: 単一 VPC のみ</text><br />
<text x="200" y="124.5" text-anchor="middle" dominant-baseline="middle" fill="#f9a825" font-size="12" font-family="sans-serif">1 VGW = 1 VPC に限定</text><br />
<rect x="430" y="75" width="340" height="75" rx="8" fill="#2a1a2a" stroke="#f9a825" stroke-width="1.5" /><br />
<text x="600" y="103.5" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">制約 2: 同リージョンのみ</text><br />
<text x="600" y="124.5" text-anchor="middle" dominant-baseline="middle" fill="#f9a825" font-size="12" font-family="sans-serif">クロスリージョン不可</text><br />
<rect x="30" y="205" width="340" height="75" rx="8" fill="#2a1a2a" stroke="#f9a825" stroke-width="1.5" /><br />
<text x="200" y="233.5" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">制約 3: クロスアカウント制限</text><br />
<text x="200" y="254.5" text-anchor="middle" dominant-baseline="middle" fill="#f9a825" font-size="12" font-family="sans-serif">別アカウント VPC への接続困難</text><br />
<rect x="430" y="205" width="340" height="75" rx="8" fill="#1a3a1a" stroke="#f9a825" stroke-width="1.5" /><br />
<text x="600" y="233.5" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">解決策: DX Gateway</text><br />
<text x="600" y="254.5" text-anchor="middle" dominant-baseline="middle" fill="#f9a825" font-size="12" font-family="sans-serif">マルチVPC / マルチリージョン対応</text><br />
<text x="400" y="340" text-anchor="middle" dominant-baseline="middle" fill="#4caf50" font-size="13" font-weight="normal" font-family="sans-serif">大規模構成では VGW より DX Gateway を推奨</text><br />
</svg></li>
<li>
<ul>
<li><strong>1 VPC : 1 VGW</strong> — VPC あたり VGW は1つのみ</li>
</ul>
</li>
<li>
<ul>
<li><strong>リージョン固定</strong> — VGW は作成したリージョンでのみ利用可能</li>
</ul>
</li>
<li>
<ul>
<li><strong>VIF 数の制限</strong> — 1つの VGW に接続できる Private VIF は最大 <strong>30個</strong></li>
</ul>
</li>
<li>
<ul>
<li><strong>ECMP 非対応</strong> — 複数 VIF からの同一プレフィックスは1つだけアクティブ</li>
</ul>
</li>
<li>
<ul>
<li>（Transit VIF + TGW なら ECMP 対応可能）</li>
</ul>
</li>
<li>
<ul>
<li><strong>トランジットルーティング不可</strong> — VGW 経由で VPC 間通信はできない</li>
</ul>
</li>
</ul>
</section>
