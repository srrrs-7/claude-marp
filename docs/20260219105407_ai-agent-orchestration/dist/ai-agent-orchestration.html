ht="30" rx="4" fill="#1a1a2e" /><text x="600" y="184" text-anchor="middle" fill="#ff7043" font-size="11" font-family="sans-serif">レイテンシオーバーヘッド</text><rect x="450" y="202" width="300" height="30" rx="4" fill="#1a1a2e" /><text x="600" y="222" text-anchor="middle" fill="#ff7043" font-size="11" font-family="sans-serif">実装コスト高</text><text x="400" y="280" text-anchor="middle" fill="#4fc3f7" font-size="11" font-family="sans-serif">判断基準: タスク時間 &gt; 30秒 または 外部依存あり → 永続化を選択</text></svg>

</ul>

<h1 id="%E3%82%A8%E3%83%A9%E3%83%BC%E3%83%8F%E3%83%B3%E3%83%89%E3%83%AA%E3%83%B3%E3%82%B0%E6%88%A6%E7%95%A5">エラーハンドリング戦略</h1>
<blockquote>
<p><em>Retry/Fallback/Graceful Degradation/回路遮断の組み合わせでエージェントの障害耐性を確保する</em></p>
</blockquote>
<div class="fig">
<svg viewBox="0 0 800 280" style="display:block;margin:0 auto;display:block;width:100%;height:100%;max-width:100%;max-height:100%;margin:0 auto;letter-spacing:0;" xmlns="http://www.w3.org/2000/svg"><rect width="800" height="280" fill="#1a1a2e" /><text x="400" y="28" text-anchor="middle" fill="#f9a825" font-size="15" font-weight="bold" font-family="sans-serif">エラーハンドリング戦略の選択</text><rect x="20" y="48" width="148" height="80" rx="6" fill="#16213e" stroke="#ff7043" stroke-width="2" /><text x="94" y="72" text-anchor="middle" fill="#ff7043" font-size="11" font-weight="bold" font-family="sans-serif">Retry w/ Backoff</text><text x="94" y="90" text-anchor="middle" fill="#ffffff" font-size="9" font-family="sans-serif">1s → 2s → 4s → 8s</text><text x="94" y="108" text-anchor="middle" fill="#4fc3f7" font-size="9" font-family="sans-serif">一時的エラー向け</text><rect x="178" y="48" width="148" height="80" rx="6" fill="#16213e" stroke="#e91e63" stroke-width="2" /><text x="252" y="72" text-anchor="middle" fill="#e91e63" font-size="11" font-weight="bold" font-family="sans-serif">Fallback Agent</text><text x="252" y="90" text-anchor="middle" fill="#ffffff" font-size="9" font-family="sans-serif">Primary失敗→Secondary</text><text x="252" y="108" text-anchor="middle" fill="#4fc3f7" font-size="9" font-family="sans-serif">モデル障害向け</text><rect x="336" y="48" width="148" height="80" rx="6" fill="#16213e" stroke="#f9a825" stroke-width="2" /><text x="410" y="72" text-anchor="middle" fill="#f9a825" font-size="11" font-weight="bold" font-family="sans-serif">Graceful Degrade</text><text x="410" y="90" text-anchor="middle" fill="#ffffff" font-size="9" font-family="sans-serif">部分失敗→部分結果</text><text x="410" y="108" text-anchor="middle" fill="#4fc3f7" font-size="9" font-family="sans-serif">可用性優先向け</text><rect x="494" y="48" width="148" height="80" rx="6" fill="#16213e" stroke="#69f0ae" stroke-width="2" /><text x="568" y="72" text-anchor="middle" fill="#69f0ae" font-size="11" font-weight="bold" font-family="sans-serif">Circuit Breaker</text><text x="568" y="90" text-anchor="middle" fill="#ffffff" font-size="9" font-family="sans-serif">連続失敗→一時停止</text><text x="568" y="108" text-anchor="middle" fill="#4fc3f7" font-size="9" font-family="sans-serif">下流保護向け</text><rect x="642" y="48" width="148" height="80" rx="6" fill="#16213e" stroke="#4fc3f7" stroke-width="2" /><text x="716" y="72" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="bold" font-family="sans-serif">Error Propagation</text><text x="716" y="90" text-anchor="middle" fill="#ffffff" font-size="9" font-family="sans-serif">上位に伝播 or 吸収</text><text x="716" y="108" text-anchor="middle" fill="#4fc3f7" font-size="9" font-family="sans-serif">設計判断</text><rect x="20" y="148" width="760" height="110" rx="6" fill="#16213e" /><text x="400" y="170" text-anchor="middle" fill="#f9a825" font-size="12" font-weight="bold" font-family="sans-serif">実装パターン</text><text x="40" y="192" fill="#ffffff" font-size="10" font-family="sans-serif">Circuit Breaker 状態遷移:</text><rect x="160" y="178" width="80" height="26" rx="4" fill="#2d1b3d" stroke="#69f0ae" stroke-width="1" /><text x="200" y="195" text-anchor="middle" fill="#69f0ae" font-size="10" font-family="sans-serif">CLOSED</text><polygon points="248,191 258,187 258,195" fill="#f9a825" /><line x1="242" y1="191" x2="258" y2="191" stroke="#f9a825" stroke-width="1.5" /><rect x="260" y="178" width="80" height="26" rx="4" fill="#2d1b3d" stroke="#ff7043" stroke-width="1" /><text x="300" y="195" text-anchor="middle" fill="#ff7043" font-size="10" font-family="sans-serif">OPEN</text><polygon points="348,191 358,187 358,195" fill="#4fc3f7" /><line x1="342" y1="191" x2="358" y2="191" stroke="#4fc3f7" stroke-width="1.5" /><rect x="360" y="178" width="100" height="26" rx="4" fill="#2d1b3d" stroke="#f9a825" stroke-width="1" /><text x="410" y="195" text-anchor="middle" fill="#f9a825" font-size="10" font-family="sans-serif">HALF-OPEN</text><text x="40" y="232" fill="#4fc3f7" font-size="10" font-family="sans-serif">推奨: 3回失敗→OPEN (30秒)→HALF-OPEN (1回テスト)→成功でCLOSEDに戻る</text><text x="40" y="250" fill="#69f0ae" font-size="10" font-family="sans-serif">全パターン共通: エラーにはtrace_id・agent名・入力を必ずログ記録</text></svg>

<ul>
<li><strong>Retry with backoff</strong>: 一時的エラーには指数バックオフでリトライ</li>
<li><strong>Fallback agent</strong>: プライマリエージェント失敗時のフォールバック戦略</li>
<li><strong>Graceful degradation</strong>: 部分失敗時も可能な範囲で結果を返す</li>
