<li><svg viewBox="0 0 800 280" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;"><rect width="800" height="280" fill="#1a1a2e" /><rect x="30" y="20" width="360" height="60" rx="10" fill="#2d2d5e" stroke="#f9a825" stroke-width="1.5" /><text x="210" y="48" text-anchor="middle" fill="#f9a825" font-size="13">相関係数が高くても因果関係があるとは言えない</text><text x="210" y="67" text-anchor="middle" fill="#cccccc" font-size="11">r が高い = 交絡因子の可能性を調べる</text><rect x="410" y="20" width="360" height="60" rx="10" fill="#2d2d5e" stroke="#f9a825" stroke-width="1.5" /><text x="590" y="48" text-anchor="middle" fill="#f9a825" font-size="13">交絡因子を探すことが因果推論の第一歩</text><text x="590" y="67" text-anchor="middle" fill="#cccccc" font-size="11">DAGで因果構造を可視化する</text><rect x="30" y="110" width="360" height="60" rx="10" fill="#2d2d5e" stroke="#4fc3f7" stroke-width="1.5" /><text x="210" y="138" text-anchor="middle" fill="#4fc3f7" font-size="13">RCT が最強、観察データでも推論可能</text><text x="210" y="157" text-anchor="middle" fill="#cccccc" font-size="11">IV・DiD・RDD などの準実験的手法</text><rect x="410" y="110" width="360" height="60" rx="10" fill="#2d2d5e" stroke="#4fc3f7" stroke-width="1.5" /><text x="590" y="138" text-anchor="middle" fill="#4fc3f7" font-size="13">AIも相関に騙される</text><text x="590" y="157" text-anchor="middle" fill="#cccccc" font-size="11">因果を学ぶ AI が次の課題（Causal ML）</text><rect x="150" y="210" width="500" height="50" rx="12" fill="#f9a82520" stroke="#f9a825" stroke-width="2" /><text x="400" y="233" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold">「相関は証拠。因果は論証。</text><text x="400" y="252" text-anchor="middle" fill="#f9a825" font-size="13" font-weight="bold">この違いが科学を科学たらしめる」</text></svg></li>
