<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" style="max-height:70vh;max-width:100%;display:block;margin:0 auto;">
  <!-- 分類 -->
  <rect x="10" y="20" width="164" height="250" rx="12" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="92" y="52" text-anchor="middle" font-size="15" font-weight="bold" fill="#60a5fa">🔵 分類</text>
  <line x1="25" y1="62" x2="159" y2="62" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  <text x="92" y="86" text-anchor="middle" font-size="12" fill="#f8f8f8">Accuracy</text>
  <text x="92" y="106" text-anchor="middle" font-size="12" fill="#f8f8f8">Precision / Recall</text>
  <text x="92" y="126" text-anchor="middle" font-size="12" fill="#f8f8f8">F1-Score / Fβ</text>
  <text x="92" y="146" text-anchor="middle" font-size="12" fill="#f8f8f8">AUC-ROC / PR</text>
  <text x="92" y="166" text-anchor="middle" font-size="12" fill="#94a3b8">MCC / Kappa</text>
  <!-- 回帰 -->
  <rect x="184" y="20" width="164" height="250" rx="12" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="266" y="52" text-anchor="middle" font-size="15" font-weight="bold" fill="#a78bfa">🟣 回帰</text>
  <line x1="199" y1="62" x2="333" y2="62" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <text x="266" y="86" text-anchor="middle" font-size="12" fill="#f8f8f8">MAE / MSE</text>
  <text x="266" y="106" text-anchor="middle" font-size="12" fill="#f8f8f8">RMSE</text>
  <text x="266" y="126" text-anchor="middle" font-size="12" fill="#f8f8f8">R² / Adjusted R²</text>
  <text x="266" y="146" text-anchor="middle" font-size="12" fill="#f8f8f8">MAPE / SMAPE</text>
  <text x="266" y="166" text-anchor="middle" font-size="12" fill="#94a3b8">Huber Loss</text>
  <!-- NLP生成 -->
  <rect x="358" y="20" width="164" height="250" rx="12" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="440" y="52" text-anchor="middle" font-size="15" font-weight="bold" fill="#34d399">🟢 NLP生成</text>
  <line x1="373" y1="62" x2="507" y2="62" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <text x="440" y="86" text-anchor="middle" font-size="12" fill="#f8f8f8">BLEU</text>
  <text x="440" y="106" text-anchor="middle" font-size="12" fill="#f8f8f8">ROUGE-1/2/L</text>
  <text x="440" y="126" text-anchor="middle" font-size="12" fill="#f8f8f8">METEOR / ChrF</text>
  <text x="440" y="146" text-anchor="middle" font-size="12" fill="#f8f8f8">BERTScore</text>
  <text x="440" y="166" text-anchor="middle" font-size="12" fill="#94a3b8">Perplexity</text>
  <!-- ランキング -->
  <rect x="532" y="20" width="164" height="250" rx="12" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="614" y="52" text-anchor="middle" font-size="15" font-weight="bold" fill="#fb923c">🟠 ランキング</text>
  <line x1="547" y1="62" x2="681" y2="62" stroke="#fb923c" stroke-width="1" opacity="0.4"/>
  <text x="614" y="86" text-anchor="middle" font-size="12" fill="#f8f8f8">Precision@K</text>
  <text x="614" y="106" text-anchor="middle" font-size="12" fill="#f8f8f8">Recall@K</text>
  <text x="614" y="126" text-anchor="middle" font-size="12" fill="#f8f8f8">MAP / NDCG</text>
  <text x="614" y="146" text-anchor="middle" font-size="12" fill="#f8f8f8">MRR</text>
  <text x="614" y="166" text-anchor="middle" font-size="12" fill="#94a3b8">Hit Rate@K</text>
  <!-- クラスタリング -->
  <rect x="706" y="20" width="184" height="250" rx="12" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="798" y="52" text-anchor="middle" font-size="15" font-weight="bold" fill="#f472b6">🩷 クラスタリング</text>
  <line x1="721" y1="62" x2="875" y2="62" stroke="#f472b6" stroke-width="1" opacity="0.4"/>
  <text x="798" y="86" text-anchor="middle" font-size="12" fill="#f8f8f8">Silhouette Score</text>
  <text x="798" y="106" text-anchor="middle" font-size="12" fill="#f8f8f8">Davies-Bouldin</text>
  <text x="798" y="126" text-anchor="middle" font-size="12" fill="#f8f8f8">Calinski-Harabasz</text>
  <text x="798" y="146" text-anchor="middle" font-size="12" fill="#f8f8f8">ARI / NMI</text>
  <text x="798" y="166" text-anchor="middle" font-size="12" fill="#94a3b8">Inertia</text>
  <!-- bottom label -->
  <text x="450" y="288" text-anchor="middle" font-size="13" fill="#94a3b8">105スライドで各指標を詳細解説</text>
</svg>
